<!DOCTYPE html>
<html>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');

  // Background - rounded green
  ctx.fillStyle = '#0f3d1e';
  ctx.beginPath();
  const r = s * 0.15;
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.fill();

  // Inner glow
  const grd = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s*0.5);
  grd.addColorStop(0, 'rgba(26,92,46,0.6)');
  grd.addColorStop(1, 'rgba(10,42,20,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, s, s);

  // Domino tile (vertical, centered)
  const tw = s * 0.38;
  const th = s * 0.7;
  const tx = (s - tw) / 2;
  const ty = (s - th) / 2;
  const tr = s * 0.03;

  // Tile shadow
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = s * 0.05;
  ctx.shadowOffsetY = s * 0.02;

  // Tile body
  const tgrd = ctx.createLinearGradient(tx, ty, tx + tw, ty + th);
  tgrd.addColorStop(0, '#faf5e8');
  tgrd.addColorStop(1, '#ede6d3');
  ctx.fillStyle = tgrd;
  ctx.beginPath();
  ctx.moveTo(tx + tr, ty);
  ctx.lineTo(tx + tw - tr, ty);
  ctx.quadraticCurveTo(tx + tw, ty, tx + tw, ty + tr);
  ctx.lineTo(tx + tw, ty + th - tr);
  ctx.quadraticCurveTo(tx + tw, ty + th, tx + tw - tr, ty + th);
  ctx.lineTo(tx + tr, ty + th);
  ctx.quadraticCurveTo(tx, ty + th, tx, ty + th - tr);
  ctx.lineTo(tx, ty + tr);
  ctx.quadraticCurveTo(tx, ty, tx + tr, ty);
  ctx.fill();

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;

  // Tile border
  ctx.strokeStyle = '#b8a88a';
  ctx.lineWidth = s * 0.008;
  ctx.stroke();

  // Divider line
  ctx.beginPath();
  ctx.moveTo(tx + s*0.04, ty + th/2);
  ctx.lineTo(tx + tw - s*0.04, ty + th/2);
  ctx.strokeStyle = '#c8b898';
  ctx.lineWidth = s * 0.005;
  ctx.stroke();

  // Draw dots
  function dot(cx, cy, radius) {
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    const dgrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    dgrd.addColorStop(0, '#1a1a1a');
    dgrd.addColorStop(1, '#333');
    ctx.fillStyle = dgrd;
    ctx.fill();
  }

  const dotR = s * 0.025;
  const pad = tw * 0.25;
  const cx = tx + tw / 2;

  // Top half: 6 dots (two columns of 3)
  const topCy = ty + th * 0.25;
  const topSpread = th * 0.12;
  // Left column
  dot(tx + pad, topCy - topSpread, dotR);
  dot(tx + pad, topCy, dotR);
  dot(tx + pad, topCy + topSpread, dotR);
  // Right column
  dot(tx + tw - pad, topCy - topSpread, dotR);
  dot(tx + tw - pad, topCy, dotR);
  dot(tx + tw - pad, topCy + topSpread, dotR);

  // Bottom half: 4 dots
  const botCy = ty + th * 0.75;
  const botSpread = th * 0.1;
  dot(tx + pad, botCy - botSpread, dotR);
  dot(tx + pad, botCy + botSpread, dotR);
  dot(tx + tw - pad, botCy - botSpread, dotR);
  dot(tx + tw - pad, botCy + botSpread, dotR);
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

// Download links
function download(canvasId, filename) {
  const canvas = document.getElementById(canvasId);
  const link = document.createElement('a');
  link.download = filename;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

document.write('<br><button onclick="download(\'c192\',\'icon-192.png\')">Download 192</button>');
document.write('<button onclick="download(\'c512\',\'icon-512.png\')">Download 512</button>');
document.write('<button onclick="download(\'c192\',\'icon-192.png\');setTimeout(()=>download(\'c512\',\'icon-512.png\'),500)">Download Both</button>');
</script>
</body>
</html>

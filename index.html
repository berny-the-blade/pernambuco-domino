                  </div>
                </div>

                {/* My Hand */}
                <div className={'my-hand p-3 mx-4 ' + (isMyTurn ? 'my-turn' : '')}>
                  <div className="flex items-center justify-center gap-2 mb-2">
                    <span className="text-xs font-bold text-white/80">Voce</span>
                    <span className="text-[10px] px-1.5 py-0.5 rounded bg-white/10 text-white/60 font-bold">{myHand.length} pecas</span>
                    {isMyTurn && <span className="text-[10px] px-2 py-0.5 rounded-full font-bold turn-pulse" style={{ background: 'rgba(250,204,21,0.25)', color: '#fde047' }}>SUA VEZ</span>}
                  </div>

                  <div className="flex flex-wrap gap-2 justify-center mb-2">
                    {myHand.map(tile => (
                      <DominoTile
                        key={tile.id}
                        tile={tile}
                        playable={isMyTurn && canPlayTile(tile)}
                        onClick={() => {
                          if (!isMyTurn || !canPlayTile(tile)) return;
                          if (canPlayOnBothEnds(tile)) {
                            setChoosingTile(tile);
                          } else {
                            playTile(tile);
                          }
                        }}
                      />
                    ))}
                  </div>
                  {isMyTurn && (
                    <button onClick={pass} className="btn-pass w-full">
                      Passar
                    </button>
                  )}
                </div>
              </div>

              {/* Revealed hands after round ends (blocked or won) */}
              {gameState.currentPlayer === -1 && !gameState.waitingForStarterChoice && (
                <div className="p-3 rounded-xl mb-2" style={{ background: 'rgba(0,0,0,0.15)', border: '1px solid rgba(255,255,255,0.06)' }}>
                  <div className="text-xs text-white/50 font-bold text-center mb-2">Maos reveladas</div>
                  <div className="grid grid-cols-2 gap-2">
                    {[0, 1, 2, 3].map(slot => {
                      const hand = gameState.hands?.[slot] || [];
                      const pts = hand.reduce((s, t) => s + t.left + t.right, 0);
                      const team = slot % 2;
                      const teamColor = team === 0 ? 'text-blue-300' : 'text-orange-300';
                      return (
                        <div key={slot} className="p-2 rounded-lg" style={{ background: 'rgba(255,255,255,0.04)' }}>
                          <div className="flex items-center justify-between mb-1">
                            <span className="text-[10px] text-white/70 font-bold truncate">{gameState.players?.[slot]?.name}</span>
                            <span className={'text-[10px] font-bold ' + teamColor}>{pts} pts</span>
                          </div>
                          {hand.length === 0
                            ? <div className="text-[10px] text-green-400 font-bold text-center">Bateu!</div>
                            : <div className="flex gap-1 flex-wrap">
                                {hand.map(tile => (
                                  <BoardTile key={tile.id} tile={tile} orientation={tile.left === tile.right ? 'vertical' : 'horizontal'} flipped={false} />
                                ))}
                              </div>
                          }
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* Action buttons */}
              {gameState.currentPlayer === -1 && !gameState.gameEnded && !gameState.waitingForStarterChoice && playerSlot === 0 && (
                <button onClick={newRound} className="btn-primary w-full text-lg animate-bounce-in">
                  Proxima Rodada
                </button>
              )}

              {gameState.gameEnded && playerSlot === 0 && (
                <button onClick={startGame} className="btn-primary w-full text-lg animate-celebrate">
                  Nova Partida
                </button>
              )}

              {error && (
                <div className="mt-2 p-3 rounded-xl bg-red-500/20 border border-red-400/30 text-red-200 text-center text-sm font-semibold animate-slide-down">
                  {error}
                </div>
              )}
            </div>
          </div>
        );
      }

      return null;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Brawl Arena</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  position: fixed;
  inset: 0;
  overflow: hidden;
  background: #000;
  font-family: 'Arial Black', Arial, sans-serif;
  touch-action: none;
}

#game-wrapper {
  position: fixed;
  inset: 0;
  overflow: hidden;
}

#hud {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 8px 12px;
  background: rgba(0,0,0,0.7);
  border-radius: 8px 8px 0 0;
}

#hud-left {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.hud-label {
  color: #fff;
  font-size: 12px;
  font-weight: bold;
}

#hp-bar-bg {
  width: 240px;
  height: 16px;
  background: #333;
  border-radius: 8px;
  overflow: hidden;
  border: 2px solid #555;
}

#hp-bar {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg, #4caf50, #8bc34a);
  border-radius: 6px;
  transition: width 0.1s, background 0.3s;
}

#super-bar-bg {
  width: 240px;
  height: 10px;
  background: #333;
  border-radius: 5px;
  overflow: hidden;
  border: 2px solid #555;
}

#super-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #2196f3, #00bcd4);
  border-radius: 3px;
  transition: width 0.1s;
}

#hud-right {
  text-align: right;
  color: #fff;
}

#wave-info {
  font-size: 18px;
  font-weight: bold;
  color: #ffd700;
  text-shadow: 0 0 8px #ffa000;
}

#enemies-left {
  font-size: 14px;
  color: #fff;
  margin-top: 4px;
}

#arena-container {
  position: fixed;
  inset: 0;
  overflow: hidden;
}

#arena {
  position: fixed;
  inset: 0;
  background-color: #4caf50;
  background-image:
    linear-gradient(rgba(0,0,0,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.08) 1px, transparent 1px);
  background-size: 40px 40px;
}

.wall {
  position: absolute;
  background: #795548;
  border: 3px solid #4e342e;
  border-radius: 4px;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
}

.enemy {
  position: absolute;
  border-radius: 0;
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  transform: translate(-50%, -50%);
  cursor: default;
  z-index: 10;
}
.enemy img {
  mix-blend-mode: multiply;
  display: block;
}

.enemy-hp-wrap {
  position: absolute;
  transform: translate(-50%, -100%);
  top: -8px;
  left: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  pointer-events: none;
  z-index: 20;
}

.enemy-name {
  color: #fff;
  font-size: 9px;
  font-weight: bold;
  text-shadow: 0 1px 2px #000;
  white-space: nowrap;
}

.enemy-hp-bg {
  width: 40px;
  height: 6px;
  background: #333;
  border-radius: 3px;
  overflow: hidden;
}

.enemy-hp-bar {
  height: 100%;
  background: #4caf50;
  border-radius: 3px;
  transition: width 0.1s, background 0.2s;
}

#player {
  position: absolute;
  width: 56px;
  height: 56px;
  transform: translate(-50%, -50%);
  z-index: 15;
  pointer-events: none;
}

#player img {
  width: 56px;
  height: 56px;
  object-fit: contain;
  display: block;
}

#player-fallback {
  width: 56px;
  height: 56px;
  background: radial-gradient(circle at 40% 35%, #ff9800, #f44336);
  border-radius: 50%;
  border: 3px solid #fff;
  display: none;
}

.bullet {
  position: absolute;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  z-index: 12;
  pointer-events: none;
}

.player-bullet {
  width: 12px;
  height: 12px;
  background: radial-gradient(circle, #ffeb3b, #ff9800);
  box-shadow: 0 0 6px #ff9800;
}

.enemy-bullet {
  width: 10px;
  height: 10px;
  background: radial-gradient(circle, #ff5252, #b71c1c);
  box-shadow: 0 0 5px #f44336;
}

.spike-bullet {
  width: 12px;
  height: 12px;
  background: radial-gradient(circle, #76ff03, #33691e);
  box-shadow: 0 0 6px #76ff03;
  clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
  border-radius: 0;
}

.bomb-div {
  position: absolute;
  width: 14px;
  height: 14px;
  background: radial-gradient(circle, #6d4c41, #3e2723);
  border-radius: 50%;
  border: 2px solid #ff9800;
  transform: translate(-50%, -50%);
  z-index: 12;
  pointer-events: none;
}

.explosion-div {
  position: absolute;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  z-index: 11;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
}

.fire-zone {
  position: absolute;
  width: 120px;
  height: 120px;
  background: rgba(255, 87, 34, 0.45);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  z-index: 9;
  pointer-events: none;
  border: 2px solid rgba(255,87,34,0.7);
}

.shadow-circle {
  position: absolute;
  width: 50px;
  height: 50px;
  background: rgba(0,0,0,0.4);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  z-index: 8;
  pointer-events: none;
}

.bull-trail {
  position: absolute;
  width: 20px;
  height: 20px;
  background: rgba(244,67,54,0.6);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  z-index: 8;
  pointer-events: none;
  animation: trailFade 0.5s forwards;
}

@keyframes trailFade {
  from { opacity: 0.7; transform: translate(-50%,-50%) scale(1); }
  to { opacity: 0; transform: translate(-50%,-50%) scale(0.3); }
}

.damage-num {
  position: absolute;
  font-size: 16px;
  font-weight: bold;
  pointer-events: none;
  z-index: 50;
  text-shadow: 0 1px 3px #000;
  animation: floatUp 0.9s forwards;
  transform: translateX(-50%);
}

@keyframes floatUp {
  0% { opacity: 1; transform: translateX(-50%) translateY(0); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-50px); }
}

#joystick-zone {
  position: fixed;
  bottom: 30px;
  left: 30px;
  width: 160px;
  height: 160px;
  z-index: 200;
  display: none;
  pointer-events: none;
}

#joystick-base {
  position: absolute;
  width: 160px;
  height: 160px;
  background: rgba(255,255,255,0.15);
  border: 3px solid rgba(255,255,255,0.3);
  border-radius: 50%;
}

#joystick-stick {
  position: absolute;
  width: 60px;
  height: 60px;
  background: rgba(255,255,255,0.5);
  border: 3px solid rgba(255,255,255,0.7);
  border-radius: 50%;
  top: 50px;
  left: 50px;
  transition: none;
}

#announcement {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 42px;
  font-weight: 900;
  color: #fff;
  text-shadow: 0 0 20px rgba(0,0,0,0.8), 3px 3px 0 #000;
  z-index: 100;
  pointer-events: none;
  text-align: center;
  display: none;
  white-space: nowrap;
}

#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 200;
  color: #fff;
  text-align: center;
}

#overlay h1 {
  font-size: 52px;
  font-weight: 900;
  text-shadow: 0 0 20px currentColor, 3px 3px 0 #000;
  margin-bottom: 16px;
}

#overlay p {
  font-size: 20px;
  margin-bottom: 24px;
  opacity: 0.85;
}

#overlay button {
  padding: 14px 40px;
  font-size: 20px;
  font-weight: bold;
  background: linear-gradient(135deg, #ff9800, #f44336);
  color: #fff;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 2px;
  box-shadow: 0 4px 15px rgba(244,67,54,0.5);
  transition: transform 0.1s;
}

#overlay button:hover { transform: scale(1.05); }
#overlay button:active { transform: scale(0.97); }

@media (max-width: 820px) {
  #joystick-zone { display: block; }
}
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="hud">
    <div id="hud-left">
      <div class="hud-label">❤️ <span id="hp-text">300/300</span></div>
      <div id="hp-bar-bg"><div id="hp-bar"></div></div>
      <div id="super-bar-bg"><div id="super-bar"></div></div>
      <div class="hud-label" style="font-size:10px;color:#00bcd4;">⚡ SUPER</div>
    </div>
    <div id="hud-right">
      <div id="wave-info">WAVE 1/5</div>
      <div id="enemies-left">👾 0 left</div>
    </div>
  </div>

  <div id="arena-container">
    <div id="arena">
      <!-- Walls (positioned dynamically by JS) -->

      <div id="player">
        <img src="shelly.png" alt="Shelly" id="shelly-img" style="mix-blend-mode:multiply;" onerror="document.getElementById('shelly-img').style.display='none';document.getElementById('player-fallback').style.display='block';">
        <div id="player-fallback"></div>
      </div>

      <div id="announcement"></div>
    </div>

    <div id="joystick-zone">
      <div id="joystick-base"></div>
      <div id="joystick-stick"></div>
    </div>
  </div>

  <div id="overlay">
    <h1 style="color:#ffd700;">🏆 BRAWL ARENA</h1>
    <p>WASD / Arrows: Move &nbsp;|&nbsp; Space: Shoot &nbsp;|&nbsp; Q: Super</p>
    <p style="font-size:15px;opacity:0.7;">Mobile: Joystick left | Tap right to shoot | Double-tap for super</p>
    <button onclick="startGame()">TAP TO START</button>
  </div>
</div>

<script>
// ─── CONSTANTS ────────────────────────────────────────────────
const HUD_H = 60;
let ARENA_W = document.documentElement.clientWidth;
let ARENA_H = document.documentElement.clientHeight;

function resizeArena() {
  ARENA_W = document.documentElement.clientWidth;
  ARENA_H = document.documentElement.clientHeight;
}
// Most reliable time on iOS Safari
window.addEventListener('load', resizeArena);
window.addEventListener('orientationchange', function() {
  setTimeout(resizeArena, 300);
});

const PLAYER_HP = 300, PLAYER_SPEED = 180, PLAYER_RADIUS = 24;
const SUPER_MAX = 100;

// Wall rects as % of arena: [x%, y%, w%, h%]
const WALLS_PCT = [
  [0.10, 0.21, 0.15, 0.054],
  [0.75, 0.21, 0.15, 0.054],
  [0.25, 0.054, 0.038, 0.18],
  [0.25, 0.77, 0.038, 0.18],
  [0.71, 0.054, 0.038, 0.18],
  [0.71, 0.77, 0.038, 0.18],
  [0.45, 0.36, 0.10, 0.045],
  [0.45, 0.60, 0.10, 0.045],
  [0.125, 0.45, 0.031, 0.11],
  [0.844, 0.45, 0.031, 0.11],
];
// Computed at runtime after arena size is known
let WALLS = [];

// ─── GAME STATE ───────────────────────────────────────────────
let gameRunning = false;
let player, enemies, bullets, bombs, fireZones, explosions;
let waveNum = 1;
let lastTime = 0;
let reviveUsed = false;
let superBar = 0;
let playerInvincible = 0;
let screenShakeTime = 0;
let spikeBossSpawned = false;

// ─── DOM REFS ─────────────────────────────────────────────────
const arena = document.getElementById('arena');
const overlay = document.getElementById('overlay');
const announcement = document.getElementById('announcement');
const hpBar = document.getElementById('hp-bar');
const hpText = document.getElementById('hp-text');
const superBarEl = document.getElementById('super-bar');
const waveInfo = document.getElementById('wave-info');
const enemiesLeft = document.getElementById('enemies-left');
const playerEl = document.getElementById('player');

// ─── INPUT ────────────────────────────────────────────────────
const keys = {};
let joystickActive = false, joystickDx = 0, joystickDy = 0;
let rightTapCount = 0, rightTapTime = 0;
let fireBtnHeld = false;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); }
  if (e.code === 'KeyQ' && superBar >= SUPER_MAX) activateSuper();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ── JOYSTICK (fixed overlay, pure screen coords) ──────────────
const joystickZone = document.getElementById('joystick-zone');
const joystickStick = document.getElementById('joystick-stick');
const joyBase = document.getElementById('joystick-base');
let joystickId = null;
// Joystick center in screen px
let joyCenterX = 110, joyCenterY = window.innerHeight - 110;
const JOY_RADIUS = 80;

function isMobile() { return 'ontouchstart' in window || navigator.maxTouchPoints > 0; }

document.addEventListener('touchstart', handleTouchStart, {passive:false});
document.addEventListener('touchmove', handleTouchMove, {passive:false});
document.addEventListener('touchend', handleTouchEnd, {passive:false});
document.addEventListener('touchcancel', handleTouchEnd, {passive:false});

function handleTouchStart(e) {
  // Don't block overlay button taps
  if (!gameRunning) return;
  e.preventDefault();
  for (const t of e.changedTouches) {
    const sx = t.clientX, sy = t.clientY;
    if (sx < window.innerWidth / 2) {
      // Left half → joystick
      joystickId = t.identifier;
      joystickActive = true;
      joyCenterX = sx;
      joyCenterY = sy;
      // Move joystick base to finger position
      joystickZone.style.left = (sx - JOY_RADIUS) + 'px';
      joystickZone.style.top  = (sy - JOY_RADIUS) + 'px';
      joystickZone.style.bottom = 'auto';
      joystickZone.style.display = 'block';
      joystickStick.style.transform = 'translate(0,0)';
      joystickDx = 0; joystickDy = 0;
    } else {
      // Right half → fire / super
      fireBtnHeld = true;
      const now = Date.now();
      if (now - rightTapTime < 350) {
        rightTapCount++;
        if (rightTapCount >= 2 && superBar >= SUPER_MAX) {
          activateSuper(); rightTapCount = 0;
        }
      } else { rightTapCount = 1; }
      rightTapTime = now;
    }
  }
}

function handleTouchMove(e) {
  if (!gameRunning) return;
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === joystickId) {
      let dx = t.clientX - joyCenterX;
      let dy = t.clientY - joyCenterY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > JOY_RADIUS) {
        dx = dx / dist * JOY_RADIUS;
        dy = dy / dist * JOY_RADIUS;
      }
      joystickDx = dx / JOY_RADIUS;
      joystickDy = dy / JOY_RADIUS;
      joystickStick.style.transform = `translate(${dx}px,${dy}px)`;
    }
  }
}

function handleTouchEnd(e) {
  if (!gameRunning) return;
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === joystickId) {
      joystickActive = false;
      joystickDx = 0; joystickDy = 0;
      joystickId = null;
      joystickStick.style.transform = 'translate(0,0)';
      joystickZone.style.display = 'none';
    } else {
      fireBtnHeld = false;
    }
  }
}

// ─── WALL COLLISION ───────────────────────────────────────────
function circleWallCollide(cx, cy, radius) {
  for (const [wx, wy, ww, wh] of WALLS) {
    const nearX = Math.max(wx, Math.min(cx, wx + ww));
    const nearY = Math.max(wy, Math.min(cy, wy + wh));
    const dx = cx - nearX, dy = cy - nearY;
    if (dx*dx + dy*dy < radius*radius) return true;
  }
  return false;
}

function resolveWallCollision(cx, cy, radius) {
  let rx = cx, ry = cy;
  for (const [wx, wy, ww, wh] of WALLS) {
    const nearX = Math.max(wx, Math.min(rx, wx + ww));
    const nearY = Math.max(wy, Math.min(ry, wy + wh));
    const dx = rx - nearX, dy = ry - nearY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < radius && dist > 0) {
      const overlap = radius - dist;
      rx += dx / dist * overlap;
      ry += dy / dist * overlap;
    } else if (dist === 0) {
      // push right
      rx += radius;
    }
  }
  return [rx, ry];
}

// ─── HELPERS ──────────────────────────────────────────────────
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function dist2(ax, ay, bx, by) { return Math.sqrt((ax-bx)**2+(ay-by)**2); }
function rand(lo, hi) { return lo + Math.random()*(hi-lo); }

function showAnnouncement(text, duration=1500, color='#fff') {
  announcement.style.display = 'block';
  announcement.style.color = color;
  announcement.textContent = text;
  setTimeout(() => { announcement.style.display = 'none'; }, duration);
}

function spawnDamageNum(x, y, amount, color='#fff') {
  const el = document.createElement('div');
  el.className = 'damage-num';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.color = color;
  el.textContent = '-' + Math.round(amount);
  arena.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function screenShake(ms) {
  screenShakeTime = ms;
}

function updateHUD() {
  const pct = player.hp / PLAYER_HP;
  hpBar.style.width = (pct * 100) + '%';
  hpBar.style.background = pct > 0.6 ? 'linear-gradient(90deg,#4caf50,#8bc34a)' :
    pct > 0.3 ? 'linear-gradient(90deg,#ff9800,#ffc107)' :
    'linear-gradient(90deg,#f44336,#e91e63)';
  hpText.textContent = Math.max(0, Math.round(player.hp)) + '/' + PLAYER_HP;
  superBarEl.style.width = (superBar / SUPER_MAX * 100) + '%';
  waveInfo.textContent = 'WAVE ' + waveNum + '/5';
  enemiesLeft.textContent = '👾 ' + enemies.filter(e=>e.alive).length + ' left';
}

// ─── PLAYER ───────────────────────────────────────────────────
function createPlayer() {
  return {
    x: ARENA_W/2, y: ARENA_H/2,
    hp: PLAYER_HP,
    speed: PLAYER_SPEED,
    radius: PLAYER_RADIUS,
    fireTimer: 0,
    alive: true,
  };
}

function movePlayerEl() {
  playerEl.style.left = player.x + 'px';
  playerEl.style.top = player.y + 'px';
}

// ─── ENEMY FACTORY ────────────────────────────────────────────
let enemyIdCounter = 0;

function createEnemy(type, x, y) {
  const id = ++enemyIdCounter;
  const el = document.createElement('div');
  el.className = 'enemy';
  el.id = 'enemy-' + id;

  const hpWrap = document.createElement('div');
  hpWrap.className = 'enemy-hp-wrap';

  const nameLabel = document.createElement('div');
  nameLabel.className = 'enemy-name';

  const hpBg = document.createElement('div');
  hpBg.className = 'enemy-hp-bg';
  const hpBarEl = document.createElement('div');
  hpBarEl.className = 'enemy-hp-bar';
  hpBg.appendChild(hpBarEl);

  hpWrap.appendChild(nameLabel);
  hpWrap.appendChild(hpBg);
  el.appendChild(hpWrap);

  let enemy = {
    id, type, x, y, alive: true,
    el, hpBarEl, nameLabel,
    timer: 0,
    timer2: 0,
    state: 'idle',
    stateTimer: 0,
    chargeDx: 0, chargeDy: 0,
    chargeCooldown: 0,
    jumpCooldown: rand(0, 3),
    bombCooldown: rand(0, 2),
    vx: 0, vy: 0,
  };

  switch (type) {
    case 'colt':
      el.style.width = el.style.height = '48px';
      el.style.background = 'none';
      el.style.border = 'none';
      el.style.borderRadius = '0';
      el.innerHTML += '<img src="colt.png" style="width:48px;height:48px;object-fit:contain;position:absolute;top:0;left:0;mix-blend-mode:multiply;" onerror="this.style.display=\'none\';el.style.background=\'radial-gradient(circle at 40% 35%, #ffe082, #ffc107)\';el.style.border=\'3px solid #ff8f00\';el.style.borderRadius=\'50%\'">';
      nameLabel.textContent = 'COLT';
      enemy.hp = enemy.maxHp = 80;
      enemy.speed = 100;
      enemy.radius = 19;
      enemy.fireTimer = 0;
      break;
    case 'bull':
      el.style.width = el.style.height = '56px';
      el.style.background = 'none';
      el.style.border = 'none';
      el.style.borderRadius = '0';
      el.innerHTML += '<img src="bull.png" style="width:56px;height:56px;object-fit:contain;position:absolute;top:0;left:0;mix-blend-mode:multiply;">';
      nameLabel.textContent = 'BULL';
      enemy.hp = enemy.maxHp = 250;
      enemy.speed = 75;
      enemy.radius = 24;
      break;
    case 'elprimo':
      el.style.width = el.style.height = '56px';
      el.style.background = 'none';
      el.style.border = 'none';
      el.style.borderRadius = '0';
      el.innerHTML += '<img src="elprimo.png" style="width:56px;height:56px;object-fit:contain;position:absolute;top:0;left:0;mix-blend-mode:multiply;">';
      nameLabel.textContent = 'EL PRIMO';
      enemy.hp = enemy.maxHp = 180;
      enemy.speed = 110;
      enemy.radius = 23;
      break;
    case 'dynamike':
      el.style.width = el.style.height = '44px';
      el.style.background = 'none';
      el.style.border = 'none';
      el.style.borderRadius = '0';
      el.innerHTML += '<img src="dynamike.png" style="width:44px;height:44px;object-fit:contain;position:absolute;top:0;left:0;mix-blend-mode:multiply;">';
      nameLabel.textContent = 'DYNAMIKE';
      enemy.hp = enemy.maxHp = 100;
      enemy.speed = 90;
      enemy.radius = 17;
      break;
    case 'spike':
      el.style.width = el.style.height = '64px';
      el.style.background = 'none';
      el.style.border = 'none';
      el.style.borderRadius = '0';
      el.style.filter = 'drop-shadow(0 0 12px #76ff03)';
      el.style.animation = 'spikePulse 1.2s ease-in-out infinite';
      el.innerHTML += '<img src="spike.png" style="width:64px;height:64px;object-fit:contain;position:absolute;top:0;left:0;mix-blend-mode:multiply;">';
      nameLabel.textContent = '⚠ SPIKE';
      nameLabel.style.color = '#76ff03';
      nameLabel.style.fontSize = '10px';
      enemy.hp = enemy.maxHp = 350;
      enemy.speed = 65;
      enemy.radius = 29;
      break;
  }

  el.style.position = 'absolute';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  arena.appendChild(el);

  return enemy;
}

const styleTag = document.createElement('style');
styleTag.textContent = `
@keyframes spikePulse {
  0%,100%{box-shadow:0 0 20px #4caf50;}
  50%{box-shadow:0 0 35px #76ff03, 0 0 60px #4caf50;}
}`;
document.head.appendChild(styleTag);

function removeEnemy(enemy) {
  enemy.alive = false;
  enemy.el.remove();
}

// ─── BULLETS ──────────────────────────────────────────────────
function spawnBullet(x, y, angle, speed, type, damage) {
  const el = document.createElement('div');
  el.className = 'bullet ' + (type === 'player' ? 'player-bullet' : type === 'spike' ? 'spike-bullet' : 'enemy-bullet');
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  arena.appendChild(el);
  bullets.push({ x, y, angle, speed, type, damage, el, life: 1.5 });
}

function shootAtPlayer(enemy, spread=0, speed=280, type='enemy', damage=25) {
  const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x) + (spread * Math.PI/180);
  spawnBullet(enemy.x, enemy.y, angle, speed, type, damage);
}

// ─── BOMBS ────────────────────────────────────────────────────
function spawnBomb(enemy) {
  const tx = player.x, ty = player.y;
  const sx = enemy.x, sy = enemy.y;
  const el = document.createElement('div');
  el.className = 'bomb-div';
  el.style.left = sx + 'px';
  el.style.top = sy + 'px';
  arena.appendChild(el);
  bombs.push({ sx, sy, tx, ty, el, life: 1.0, age: 0 });
}

// ─── WAVE DEFINITIONS ─────────────────────────────────────────
function getWaveConfigs() {
  const W = ARENA_W, H = ARENA_H;
  return [
    // Wave 1
    [
      { type:'colt',     x:50,   y:50 },
      { type:'colt',     x:W-50, y:H-50 },
      { type:'bull',     x:50,   y:H-50 },
    ],
    // Wave 2
    [
      { type:'colt',     x:50,   y:50 },
      { type:'colt',     x:W-50, y:50 },
      { type:'elprimo',  x:50,   y:H-50 },
      { type:'elprimo',  x:W-50, y:H-50 },
      { type:'dynamike', x:W/2,  y:30 },
    ],
    // Wave 3
    [
      { type:'bull',     x:50,   y:H/2 },
      { type:'dynamike', x:50,   y:50 },
      { type:'dynamike', x:W-50, y:50 },
      { type:'elprimo',  x:W-50, y:H/2 },
      // spike spawned later
    ],
    // Wave 4
    [
      { type:'bull',     x:50,   y:50 },
      { type:'bull',     x:W-50, y:H-50 },
      { type:'colt',     x:W/2,  y:50 },
      { type:'colt',     x:W/2,  y:H-50 },
      { type:'elprimo',  x:50,   y:H-50 },
      { type:'elprimo',  x:W-50, y:50 },
      { type:'dynamike', x:W/4,  y:H/2 },
    ],
    // Wave 5 — FINAL WAVE
    [
      { type:'bull',     x:50,   y:H/3 },
      { type:'bull',     x:W-50, y:H*2/3 },
      { type:'elprimo',  x:50,   y:H*2/3 },
      { type:'elprimo',  x:W-50, y:H/3 },
      { type:'dynamike', x:W/3,  y:50 },
      { type:'dynamike', x:W*2/3,y:H-50 },
      { type:'colt',     x:W/4,  y:50 },
      { type:'colt',     x:W*3/4,y:H-50 },
      // spike spawned later
    ],
  ];
}
const WAVE_CONFIGS = null; // replaced by getWaveConfigs()

function spawnWave(waveIdx) {
  const configs = getWaveConfigs()[waveIdx];
  for (const cfg of configs) {
    enemies.push(createEnemy(cfg.type, cfg.x, cfg.y));
  }
  spikeBossSpawned = false;
}

// ─── GAME LOOP ────────────────────────────────────────────────
function buildWalls() {
  // Remove old walls
  document.querySelectorAll('.wall').forEach(w => w.remove());
  WALLS = [];
  const arena = document.getElementById('arena');
  WALLS_PCT.forEach(([px, py, pw, ph]) => {
    const x = Math.round(px * ARENA_W);
    const y = Math.round(py * ARENA_H);
    const w = Math.round(pw * ARENA_W);
    const h = Math.round(ph * ARENA_H);
    WALLS.push([x, y, w, h]);
    const div = document.createElement('div');
    div.className = 'wall';
    div.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px;`;
    arena.appendChild(div);
  });
}

function startGame() {
  overlay.style.display = 'none';
  resizeArena();
  buildWalls();
  _startGame();
}
function _startGame() {
  gameRunning = true;
  waveNum = 1;
  reviveUsed = false;
  superBar = 0;
  enemies = [];
  bullets = [];
  bombs = [];
  fireZones = [];
  explosions = [];
  player = createPlayer();
  movePlayerEl();
  // Joystick shown on first touch, hidden on touchend

  // clear old enemy els
  document.querySelectorAll('.enemy,.bullet,.bomb-div,.fire-zone,.explosion-div,.shadow-circle,.bull-trail').forEach(e=>e.remove());

  spawnWave(0);
  showAnnouncement('WAVE 1 — FIGHT!', 1500, '#ffd700');
  updateHUD();
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

function loop(ts) {
  if (!gameRunning) return;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  update(dt);
  render();
  updateHUD();
  requestAnimationFrame(loop);
}

// ─── UPDATE ───────────────────────────────────────────────────
function update(dt) {
  if (screenShakeTime > 0) {
    screenShakeTime -= dt;
    const shk = screenShakeTime > 0 ? (Math.random()-0.5)*8 : 0;
    arena.parentElement.style.transform = `translateX(${shk}px)`;
  } else {
    arena.parentElement.style.transform = '';
  }

  updatePlayer(dt);
  updateEnemies(dt);
  updateBullets(dt);
  updateBombs(dt);
  updateFireZones(dt);
  checkWaveComplete();
}

function updatePlayer(dt) {
  // Movement
  let dx = 0, dy = 0;
  if (keys['KeyW'] || keys['ArrowUp']) dy -= 1;
  if (keys['KeyS'] || keys['ArrowDown']) dy += 1;
  if (keys['KeyA'] || keys['ArrowLeft']) dx -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) dx += 1;
  if (joystickActive) { dx = joystickDx; dy = joystickDy; }

  const len = Math.sqrt(dx*dx+dy*dy);
  if (len > 0) { dx/=len; dy/=len; }

  let nx = player.x + dx * player.speed * dt;
  let ny = player.y + dy * player.speed * dt;
  nx = clamp(nx, player.radius, ARENA_W - player.radius);
  ny = clamp(ny, player.radius, ARENA_H - player.radius);
  [nx, ny] = resolveWallCollision(nx, ny, player.radius);
  nx = clamp(nx, player.radius, ARENA_W - player.radius);
  ny = clamp(ny, player.radius, ARENA_H - player.radius);
  player.x = nx; player.y = ny;

  // Auto-fire
  player.fireTimer -= dt;
  const isMoving = (len > 0.1);
  const wantFire = (keys['Space'] || keys['KeyQ'] === false && keys['Space']) || fireBtnHeld || isMoving;
  if (player.fireTimer <= 0 && enemies.some(e=>e.alive)) {
    firePlayerShot();
    player.fireTimer = 0.5;
  }

  // Contact damage from enemies
  if (playerInvincible > 0) { playerInvincible -= dt; }
  for (const e of enemies) {
    if (!e.alive) continue;
    const d = dist2(player.x, player.y, e.x, e.y);
    const minD = player.radius + e.radius;
    if (d < minD) {
      let dmgRate = 0;
      if (e.type === 'bull') dmgRate = 35;
      else if (e.type === 'elprimo') dmgRate = 25;
      else if (e.type === 'spike') dmgRate = 20;
      if (dmgRate > 0 && playerInvincible <= 0) {
        damagePlayer(dmgRate * dt, false);
      }
    }
  }
}

function firePlayerShot(isSuper=false) {
  const nearest = nearestEnemy();
  if (!nearest) return;
  const baseAngle = Math.atan2(nearest.y - player.y, nearest.x - player.x);

  if (isSuper) {
    for (let i = 0; i < 7; i++) {
      const a = baseAngle - (60*Math.PI/180) + i * (120*Math.PI/180) / 6;
      spawnBullet(player.x, player.y, a, 350, 'player', 50);
    }
    superBar = 0;
    showAnnouncement('💥 SUPER!', 800, '#ffd700');
  } else {
    for (let i = -1; i <= 1; i++) {
      const a = baseAngle + i * (15 * Math.PI/180);
      spawnBullet(player.x, player.y, a, 350, 'player', 35);
    }
    superBar = Math.min(SUPER_MAX, superBar + 8);
  }
}

function activateSuper() {
  if (superBar >= SUPER_MAX) {
    firePlayerShot(true);
  }
}

function nearestEnemy() {
  let best = null, bestD = Infinity;
  for (const e of enemies) {
    if (!e.alive) continue;
    const d = dist2(player.x, player.y, e.x, e.y);
    if (d < bestD) { bestD = d; best = e; }
  }
  return best;
}

function damagePlayer(amount, fromBullet=true) {
  if (!player.alive) return;
  player.hp -= amount;
  if (fromBullet) {
    spawnDamageNum(player.x + rand(-15,15), player.y - 30, amount, '#ff5252');
    superBar = Math.min(SUPER_MAX, superBar + 15);
  }
  updateHUD();

  if (player.hp <= 0) {
    if (!reviveUsed) {
      reviveUsed = true;
      player.hp = PLAYER_HP * 0.5;
      playerInvincible = 2;
      superBar = 0;
      showAnnouncement('💀 LAST STAND!', 2000, '#f44336');
    } else {
      player.alive = false;
      gameOver();
    }
  }
}

// ─── ENEMY UPDATE ─────────────────────────────────────────────
function updateEnemies(dt) {
  for (const e of enemies) {
    if (!e.alive) continue;
    switch (e.type) {
      case 'colt': updateColt(e, dt); break;
      case 'bull': updateBull(e, dt); break;
      case 'elprimo': updateElPrimo(e, dt); break;
      case 'dynamike': updateDynamike(e, dt); break;
      case 'spike': updateSpike(e, dt); break;
    }
    // Clamp to arena
    e.x = clamp(e.x, e.radius, ARENA_W - e.radius);
    e.y = clamp(e.y, e.radius, ARENA_H - e.radius);
    [e.x, e.y] = resolveWallCollision(e.x, e.y, e.radius);
    e.x = clamp(e.x, e.radius, ARENA_W - e.radius);
    e.y = clamp(e.y, e.radius, ARENA_H - e.radius);
  }
}

function moveToward(e, tx, ty, speed, dt) {
  const dx = tx - e.x, dy = ty - e.y;
  const d = Math.sqrt(dx*dx+dy*dy);
  if (d < 1) return;
  e.x += dx/d * speed * dt;
  e.y += dy/d * speed * dt;
}

function moveAway(e, tx, ty, speed, dt) {
  const dx = e.x - tx, dy = e.y - ty;
  const d = Math.sqrt(dx*dx+dy*dy);
  if (d < 1) return;
  e.x += dx/d * speed * dt;
  e.y += dy/d * speed * dt;
}

function updateColt(e, dt) {
  const d = dist2(player.x, player.y, e.x, e.y);
  if (d < 180) {
    moveAway(e, player.x, player.y, e.speed, dt);
  } else if (d > 220) {
    moveToward(e, player.x, player.y, e.speed, dt);
  }
  e.fireTimer = (e.fireTimer || 0) - dt;
  if (e.fireTimer <= 0) {
    shootAtPlayer(e, -3, 260, 'enemy', 25);
    shootAtPlayer(e, 3, 260, 'enemy', 25);
    e.fireTimer = 1.2;
  }
}

function updateBull(e, dt) {
  if (e.state === 'charge') {
    e.stateTimer -= dt;
    e.x += e.chargeDx * 300 * dt;
    e.y += e.chargeDy * 300 * dt;
    // Trail
    if (Math.random() < 0.4) {
      const trail = document.createElement('div');
      trail.className = 'bull-trail';
      trail.style.left = e.x + 'px';
      trail.style.top = e.y + 'px';
      arena.appendChild(trail);
      setTimeout(()=>trail.remove(), 500);
    }
    if (e.stateTimer <= 0 || circleWallCollide(e.x, e.y, e.radius)) {
      e.state = 'cooldown';
      e.stateTimer = 1.0;
    }
  } else if (e.state === 'cooldown') {
    e.stateTimer -= dt;
    if (e.stateTimer <= 0) e.state = 'idle';
  } else {
    const d = dist2(player.x, player.y, e.x, e.y);
    if (d < 280) {
      // Start charge
      const angle = Math.atan2(player.y - e.y, player.x - e.x);
      e.chargeDx = Math.cos(angle);
      e.chargeDy = Math.sin(angle);
      e.state = 'charge';
      e.stateTimer = 1.5;
    } else {
      moveToward(e, player.x, player.y, e.speed, dt);
    }
  }
}

function updateElPrimo(e, dt) {
  // Contact move toward player
  const d = dist2(player.x, player.y, e.x, e.y);
  if (d > e.radius + PLAYER_RADIUS + 5) {
    moveToward(e, player.x, player.y, e.speed, dt);
  }
  e.jumpCooldown -= dt;
  if (e.jumpCooldown <= 0) {
    e.jumpCooldown = 3;
    // Show shadow
    const tx = clamp(player.x + rand(-20,20), 30, ARENA_W-30);
    const ty = clamp(player.y + rand(-20,20), 30, ARENA_H-30);
    const shadow = document.createElement('div');
    shadow.className = 'shadow-circle';
    shadow.style.left = tx + 'px';
    shadow.style.top = ty + 'px';
    arena.appendChild(shadow);
    setTimeout(() => {
      shadow.remove();
      if (!e.alive) return;
      e.x = tx; e.y = ty;
      // AOE damage
      if (dist2(player.x, player.y, tx, ty) < 50) {
        damagePlayer(60, true);
        screenShake(0.25);
      }
    }, 600);
  }
}

function updateDynamike(e, dt) {
  const d = dist2(player.x, player.y, e.x, e.y);
  if (d < 200) {
    moveAway(e, player.x, player.y, e.speed, dt);
  } else if (d > 260) {
    moveToward(e, player.x, player.y, e.speed, dt);
  }
  e.bombCooldown -= dt;
  if (e.bombCooldown <= 0) {
    e.bombCooldown = 2;
    spawnBomb(e);
  }
}

function updateSpike(e, dt) {
  const d = dist2(player.x, player.y, e.x, e.y);
  if (d > 150) {
    moveToward(e, player.x, player.y, e.speed, dt);
  }
  e.fireTimer = (e.fireTimer || 0) - dt;
  if (e.fireTimer <= 0) {
    e.fireTimer = 2.5;
    for (let i = 0; i < 6; i++) {
      const angle = (i * 60) * Math.PI / 180;
      spawnBullet(e.x, e.y, angle, 220, 'spike', 30);
    }
  }
}

// ─── BULLETS UPDATE ───────────────────────────────────────────
function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += Math.cos(b.angle) * b.speed * dt;
    b.y += Math.sin(b.angle) * b.speed * dt;
    b.life -= dt;

    // Wall hit
    if (circleWallCollide(b.x, b.y, 5) || b.x < 0 || b.x > ARENA_W || b.y < 0 || b.y > ARENA_H || b.life <= 0) {
      b.el.remove();
      bullets.splice(i, 1);
      continue;
    }

    if (b.type === 'player') {
      // Check enemy hits
      let hit = false;
      for (const e of enemies) {
        if (!e.alive) continue;
        if (dist2(b.x, b.y, e.x, e.y) < e.radius + 6) {
          damageEnemy(e, b.damage);
          spawnDamageNum(e.x + rand(-10,10), e.y - 30, b.damage, '#fff');
          b.el.remove();
          bullets.splice(i, 1);
          hit = true;
          break;
        }
      }
      if (hit) continue;
    } else {
      // Player hit
      if (dist2(b.x, b.y, player.x, player.y) < PLAYER_RADIUS + 5) {
        const isSpike = b.type === 'spike';
        damagePlayer(b.damage, true);
        if (isSpike) screenShake(0.2);
        b.el.remove();
        bullets.splice(i, 1);
        continue;
      }
    }

    b.el.style.left = b.x + 'px';
    b.el.style.top = b.y + 'px';
  }
}

// ─── BOMBS UPDATE ─────────────────────────────────────────────
function updateBombs(dt) {
  for (let i = bombs.length - 1; i >= 0; i--) {
    const b = bombs[i];
    b.age += dt;
    const t = Math.min(b.age / b.life, 1);
    const cx = b.sx + (b.tx - b.sx) * t;
    const cy = b.sy + (b.ty - b.sy) * t - Math.sin(t * Math.PI) * 60; // arc
    b.el.style.left = cx + 'px';
    b.el.style.top = cy + 'px';

    if (b.age >= b.life) {
      b.el.remove();
      bombs.splice(i, 1);
      explode(b.tx, b.ty, 40);
      continue;
    }
  }
}

function explode(x, y, damage) {
  const el = document.createElement('div');
  el.className = 'explosion-div';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.width = el.style.height = '120px';
  el.style.background = 'radial-gradient(circle, rgba(255,200,0,0.9), rgba(255,87,34,0.6), transparent)';
  el.style.transform = 'translate(-50%,-50%)';
  arena.appendChild(el);
  requestAnimationFrame(()=>{ el.style.opacity = '1'; });
  setTimeout(()=>{ el.style.opacity = '0'; }, 200);
  setTimeout(()=>{ el.remove(); }, 600);

  // Damage player
  if (dist2(player.x, player.y, x, y) < 60) {
    damagePlayer(damage, true);
  }

  // Fire zone
  const fz = document.createElement('div');
  fz.className = 'fire-zone';
  fz.style.left = x + 'px';
  fz.style.top = y + 'px';
  arena.appendChild(fz);
  fireZones.push({ x, y, el: fz, life: 2.5 });
}

function updateFireZones(dt) {
  for (let i = fireZones.length - 1; i >= 0; i--) {
    const fz = fireZones[i];
    fz.life -= dt;
    if (fz.life <= 0) {
      fz.el.remove();
      fireZones.splice(i, 1);
      continue;
    }
    // Damage player if standing on it
    if (dist2(player.x, player.y, fz.x, fz.y) < 60) {
      damagePlayer(15 * dt, false);
    }
  }
}

// ─── ENEMY DAMAGE ─────────────────────────────────────────────
function damageEnemy(e, amount) {
  e.hp -= amount;
  const pct = Math.max(0, e.hp / e.maxHp);
  e.hpBarEl.style.width = (pct * 100) + '%';
  e.hpBarEl.style.background = pct > 0.6 ? '#4caf50' : pct > 0.3 ? '#ffc107' : '#f44336';
  if (e.hp <= 0) {
    removeEnemy(e);
    superBar = Math.min(SUPER_MAX, superBar + 5);
  }
}

// ─── RENDER ───────────────────────────────────────────────────
function render() {
  // Update player position
  movePlayerEl();

  // Update enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    e.el.style.left = e.x + 'px';
    e.el.style.top = e.y + 'px';
  }
}

// ─── WAVE COMPLETE ────────────────────────────────────────────
let wavePaused = false;

function checkWaveComplete() {
  if (wavePaused) return;
  const alive = enemies.filter(e=>e.alive);

  // Wave 3: Spike spawns after other enemies are dealt with (or after delay)
  if ((waveNum === 3 || waveNum === 5) && !spikeBossSpawned) {
    const nonSpike = alive.filter(e=>e.type !== 'spike');
    if (nonSpike.length === 0) {
      spikeBossSpawned = true;
      setTimeout(() => {
        showAnnouncement('⚠ BOSS INCOMING! ⚠', 2000, '#f44336');
        setTimeout(() => {
          const spike = createEnemy('spike', ARENA_W/2, 30);
          enemies.push(spike);
        }, 2000);
      }, 500);
    }
    return;
  }

  if (alive.length === 0) {
    if (waveNum >= 5) {
      winGame();
    } else {
      wavePaused = true;
      showAnnouncement('WAVE CLEAR! ✓', 1500, '#4caf50');
      setTimeout(() => {
        waveNum++;
        player.hp = PLAYER_HP;
        updateHUD();
        // clear projectiles etc
        for (const b of bullets) b.el.remove();
        bullets = [];
        for (const b of bombs) b.el.remove();
        bombs = [];
        for (const f of fireZones) f.el.remove();
        fireZones = [];
        document.querySelectorAll('.shadow-circle,.bull-trail').forEach(e=>e.remove());
        spawnWave(waveNum - 1);
        wavePaused = false;
        showAnnouncement('WAVE ' + waveNum + ' — FIGHT!', 1500, '#ffd700');
      }, 2000);
    }
  }
}

// ─── GAME OVER / WIN ─────────────────────────────────────────
function gameOver() {
  gameRunning = false;
  setTimeout(() => {
    overlay.style.display = 'flex';
    overlay.innerHTML = `
      <h1 style="color:#f44336;">GAME OVER 💀</h1>
      <p>You made it to Wave ${waveNum}</p>
      <button onclick="startGame()">TRY AGAIN</button>
    `;
  }, 800);
}

function winGame() {
  gameRunning = false;
  overlay.style.display = 'flex';
  overlay.innerHTML = `
    <h1 style="color:#ffd700;">YOU WIN! 🏆</h1>
    <p>You defeated all waves!</p>
    <button onclick="startGame()">PLAY AGAIN</button>
  `;
}

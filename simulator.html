    // ========== MONTE CARLO LOOKAHEAD ==========

    // Check if player p can hold tile t given knowledge constraints
    // cantHave[p] = set of numbers where player p is VOID (has no tiles with that number)
    // A tile is impossible if ANY of its numbers is in cantHave
    function canPlayerHold(p, t, knowledge) {
      if (knowledge.cantHave[p].has(t.left)) return false;
      if (knowledge.cantHave[p].has(t.right)) return false;
      return true;
    }

    // Soft-belief weighted shuffle: bias tile assignment toward play-pattern plausibility
    // Players who played many tiles with number N likely still hold more N-tiles
    function softWeightedShuffle(avail, player, knowledge, rng) {
      if (knowledge.played.size <= 4 || avail.length <= 1) { rng.shuffle(avail); return; }
      const str = knowledge.inferStrength(player);
      const hasSignal = str.some(s => s >= 2);
      if (!hasSignal) { rng.shuffle(avail); return; }
      // Weighted Fisher-Yates: pick each position by weighted random from remaining
      for (let i = avail.length - 1; i > 0; i--) {
        // Compute weights for positions 0..i
        let wSum = 0;
        for (let j = 0; j <= i; j++) {
          const t = avail[j];
          const w = 1 + 0.6 * ((str[t.left] || 0) + (str[t.right] || 0));
          avail[j]._sw = w;
          wSum += w;
        }
        let r = rng.random() * wSum;
        let pick = 0;
        for (; pick < i; pick++) {
          r -= avail[pick]._sw;
          if (r <= 0) break;
        }
        // Swap picked element to position i
        if (pick !== i) { const tmp = avail[i]; avail[i] = avail[pick]; avail[pick] = tmp; }
      }
      // Clean up temp property
      for (const t of avail) delete t._sw;
    }

    // Generate a belief-consistent deal (Phase 1 upgrade)
    // Uses BeliefSampler when belief model available, else rejection + backtracking (no greedy fallback)
    function generateConsistentDeal(myHand, handSizes, knowledge, myIdx, useBelief = true) {
      // If we have belief model + seedable RNG, use importance-weighted sampler
      if (useBelief && belief && solverRng) {
        const sampler = new BeliefSampler(solverRng);
        belief.syncFromKnowledge(knowledge);
        const { deals } = sampler.sampleDeals(myHand, handSizes, belief, myIdx, 1);
        if (deals.length > 0) return deals[0];
        // Fall through to rejection sampling if sampler fails
      }

      const myIds = new Set(myHand.map(t => t.id));
      const pool = [];
      for (const t of ALL_TILES) {
        if (knowledge.played.has(t.id) || myIds.has(t.id)) continue;
        pool.push(t);
      }
      const rng = getRng();
      const players = [0, 1, 2, 3].filter(p => p !== myIdx);

      // Pre-compute per-player eligible tiles
      const eligible = {};
      for (const p of players) {
        eligible[p] = pool.filter(t => canPlayerHold(p, t, knowledge));
      }

      // Primary strategy: constraint-propagation (most-constrained-first)
      // Sort players by slack (eligible.length - handSize) ascending
      const sortedPlayers = [...players].sort((a, b) =>
        (eligible[a].length - handSizes[a]) - (eligible[b].length - handSizes[b])
      );

      for (let attempt = 0; attempt < 100; attempt++) {
        const hands = [[], [], [], []];
        hands[myIdx] = myHand; // share ref — never mutated
        const assigned = new Set();
        let valid = true;

        for (const p of sortedPlayers) {
          const avail = eligible[p].filter(t => !assigned.has(t.id));
          if (avail.length < handSizes[p]) { valid = false; break; }
          softWeightedShuffle(avail, p, knowledge, rng);
          for (let i = 0; i < handSizes[p]; i++) {
            hands[p].push(avail[i]);
            assigned.add(avail[i].id);
          }
          // Validate during assignment — early reject
          for (const t of hands[p]) {
            if (!canPlayerHold(p, t, knowledge)) { valid = false; break; }
          }
          if (!valid) break;
        }
        if (valid) return hands;
      }

      // Fallback: rejection sampling with reused buffer (handles edge cases)
      const shuffled = new Array(pool.length);
      for (let attempt = 0; attempt < 200; attempt++) {
        for (let i = 0; i < pool.length; i++) shuffled[i] = pool[i];
        rng.shuffle(shuffled);
        const hands = [[], [], [], []];
        hands[myIdx] = myHand;
        let idx = 0, valid = true;
        for (const p of players) {
          for (let i = 0; i < handSizes[p]; i++) {
            if (idx >= shuffled.length) { valid = false; break; }
            const t = shuffled[idx++];
            if (!canPlayerHold(p, t, knowledge)) { valid = false; break; }
            hands[p].push(t);
          }
          if (!valid) break;
        }
        if (valid) return hands;
      }

      // Absolute last resort: return partial from constraint-propagation
      const hands = [[], [], [], []];
      hands[myIdx] = myHand;
      const assigned = new Set();
      for (const p of sortedPlayers) {
        const avail = eligible[p].filter(t => !assigned.has(t.id));
        rng.shuffle(avail);
        for (let i = 0; i < Math.min(handSizes[p], avail.length); i++) {
          hands[p].push(avail[i]);
          assigned.add(avail[i].id);
        }
      }
      return hands;
    }

    // Gibbs sampling: generate diverse deals from a base deal via local tile swaps
    // Starts from a known-valid deal, iteratively swaps tiles between two random players
    // Only accepts swaps that maintain cantHave constraints → Markov chain over valid deals
    function gibbsSampleDeal(baseDeal, knowledge, myIdx, rng, iterations = 50) {
      const players = [0, 1, 2, 3].filter(p => p !== myIdx);
      if (players.length < 2) return baseDeal;
      const deal = [null, null, null, null];
      for (let p = 0; p < 4; p++) {
        deal[p] = p === myIdx ? baseDeal[p] : [...baseDeal[p]];
      }
      for (let iter = 0; iter < iterations; iter++) {
        const a = players[rng.randomInt(players.length)];
        const b = players[rng.randomInt(players.length)];
        if (a === b || deal[a].length === 0 || deal[b].length === 0) continue;
        const ia = rng.randomInt(deal[a].length);
        const ib = rng.randomInt(deal[b].length);
        const tA = deal[a][ia];
        const tB = deal[b][ib];
        // Validate swap respects cantHave constraints
        if (!canPlayerHold(b, tA, knowledge) || !canPlayerHold(a, tB, knowledge)) continue;
        deal[a][ia] = tB;
        deal[b][ib] = tA;
      }
      return deal;
    }

    // Importance weight for a hypothetical deal based on play-pattern plausibility
    // Combines: (a) suit-strength signal — players who played many N-tiles likely hold more
    //           (b) avoidance signal — if player avoided playing a number, reduce weight for holding it
    //           (c) pass-adjacent penalty — tiles with one void number are less likely held
    function dealWeight(deal, knowledge) {
      let w = 1.0;
      for (let p = 0; p < 4; p++) {
        const str = knowledge.inferStrength(p);
        const voidNums = knowledge.cantHave[p];
        for (let n = 0; n < 7; n++) {
          const held = deal[p].filter(t => t.left === n || t.right === n).length;
          // (a) Suit strength: played 2+ tiles with N → likely holds more
          if (str[n] >= 2) {
            w *= 1.0 + 0.2 * held;
          }
          // (b) Pass-adjacent: player is void in N (passed on it)
          // Tiles where one end matches a void number are less likely held
          // (hard constraints already exclude tiles where BOTH ends are void)
          if (voidNums.has(n) && held > 0) {
            // These tiles have n on one end + non-void on other — still possible but less likely
            // Player would have played them if they could; discount
            w *= 0.7;
          }
        }
        // (c) Avoidance: if player played many tiles but never touched a number that's
        // still available on many tiles, they may be avoiding it (weak signal)
        if (knowledge.playsBy[p].length >= 3) {
          for (let n = 0; n < 7; n++) {
            if (voidNums.has(n) || str[n] > 0) continue; // already handled
            // Player played 3+ tiles, never touching N, and N isn't void
            const heldN = deal[p].filter(t => t.left === n || t.right === n).length;
            if (heldN >= 2) {
              w *= 0.85; // soft penalty — they might have N but haven't shown it
            }
          }
        }
      }
      // (d) Opponent style: heavy dumpers are less likely to still hold heavy tiles
      for (const p of [1, 2, 3]) {
        if (!opponentStyles[p] || opponentStyles[p].observations < 3) continue;
        const prof = opponentStyles[p].metrics;
        if (prof.heavyDump > 0.6) {
          for (const t of deal[p]) {
            if (t.left + t.right >= 9) w *= 0.85; // heavy dumpers shed these early
          }
        }
      }
      // (e) Sacrifice signal: if player dumped high-pip tiles in a suit, reduce belief they hold more
      for (let p = 0; p < 4; p++) {
        if (knowledge.sacrificeFlags[p].size === 0) continue;
        for (const t of deal[p]) {
          if (knowledge.sacrificeFlags[p].has(t.left) || knowledge.sacrificeFlags[p].has(t.right)) {
            if (t.left + t.right >= 7) w *= 0.9; // less likely to hold more heavy tiles in sacrificed suit
          }
        }
      }
      // (f) Opening suit signal: if player opened with suit X, they likely hold more X-tiles
      for (let p = 0; p < 4; p++) {
        const os = knowledge.openingSuits[p];
        if (os === null) continue;
        const heldOS = deal[p].filter(t => t.left === os || t.right === os).length;
        if (heldOS > 0) w *= 1.0 + 0.1 * heldOS; // boost deals where they hold their opening suit
      }
      return w;
    }

    // Compute Bayesian beliefs by importance-weighted Monte Carlo sampling
    // Generates unbiased deals, weights them by play-pattern plausibility,
    // then populates belief.marginals for use by BeliefSampler
    function computeBeliefs(knowledge, handSizes, myHand, myIdx, nSamples = 200) {
      if (!belief || knowledge.played.size < 4) return; // need play-pattern signal
      belief.syncFromKnowledge(knowledge);

      // Generate unbiased base samples (useBelief=false avoids circular sampling)
      const deals = [];
      const weights = [];
      for (let i = 0; i < nSamples; i++) {
        const deal = generateConsistentDeal(myHand, handSizes, knowledge, myIdx, false);
        deals.push(deal);
        weights.push(dealWeight(deal, knowledge));
      }

      // Normalize weights for importance sampling
      const wSum = weights.reduce((s, w) => s + w, 0);
      if (wSum > 0) {
        for (let i = 0; i < weights.length; i++) weights[i] /= wSum;
      }

      belief.updateMarginals(deals, weights, myIdx);
    }

    // Compute tile probabilities for a player using MC sampling
    function computeTileProbs(playerIdx, knowledge, handSizes, myHand, myIdx, numSamples = 500) {
      const probs = {};
      const counts = {};
      for (const t of ALL_TILES) {
        if (knowledge.played.has(t.id) || myHand.some(m => m.id === t.id)) continue;
        counts[t.id] = 0;
      }
      let validSamples = 0;
      for (let i = 0; i < numSamples; i++) {
        const deal = generateConsistentDeal(myHand, handSizes, knowledge, myIdx);
        validSamples++;
        for (const t of deal[playerIdx]) {
          if (counts[t.id] !== undefined) counts[t.id]++;
        }
      }
      if (validSamples === 0) return probs;
      for (const id of Object.keys(counts)) {
        probs[id] = counts[id] / validSamples;
      }
      return probs;
    }

    // Compute tile probabilities for ALL opponents from P0's perspective
    function computeAllTileProbs(snap, numSamples = PROB_SAMPLES_STUDY) {
      const knowledge = snap.knowledge;
      const p0Hand = snap.hands[0];
      const handSizes = snap.hands.map(h => h.length);
      const counts = {}; // { tileId: { 1: count, 2: count, 3: count } }
      for (const t of ALL_TILES) {
        if (knowledge.played.has(t.id) || p0Hand.some(m => m.id === t.id)) continue;
        counts[t.id] = { 1: 0, 2: 0, 3: 0 };
      }
      let validSamples = 0;
      for (let i = 0; i < numSamples; i++) {
        const deal = generateConsistentDeal(p0Hand, handSizes, knowledge, 0);
        validSamples++;
        for (const p of [1, 2, 3]) {
          for (const t of deal[p]) {
            if (counts[t.id]) counts[t.id][p]++;
          }
        }
      }
      if (validSamples === 0) return {};
      const probs = {};
      for (const id of Object.keys(counts)) {
        probs[id] = {};
        for (const p of [1, 2, 3]) {
          probs[id][p] = counts[id][p] / validSamples;
        }
        // Also compute "removed" probability (in the 4 discarded tiles)
        probs[id].removed = 1 - (probs[id][1] + probs[id][2] + probs[id][3]);
      }
      return probs;
    }

    // Generate deduction bullets from P0's perspective for a move
    function generateStudyDeductions(snap, prevSnap, player, tile, side, action) {
      const bullets = [];
      const pName = pn(player);
      const teamLabel = player % 2 === 0 ? 'your team' : 'opponent';
      const k = snap.knowledge;

      if (action === 'pass') {
        const lE = prevSnap.leftEnd, rE = prevSnap.rightEnd;
        bullets.push({
          type: 'CERTAIN', icon: '🚫',
          text: `${pName} PASSED on ends ${lE}/${rE} — has NO tiles with ${lE} or ${rE}`
        });
        // Count remaining tiles with those numbers
        const remL = k.remainingWithNumber(lE);
        const remR = k.remainingWithNumber(rE);
        if (remL === 0) bullets.push({ type: 'INFO', icon: '📊', text: `No tiles with ${lE} remain — ${lE}s exhausted` });
        else if (remL <= 2) bullets.push({ type: 'INFO', icon: '📊', text: `Only ${remL} tiles with ${lE} remain in play — ${lE}s are scarce` });
        if (rE !== lE && remR === 0) bullets.push({ type: 'INFO', icon: '📊', text: `No tiles with ${rE} remain — ${rE}s exhausted` });
        else if (rE !== lE && remR <= 2) bullets.push({ type: 'INFO', icon: '📊', text: `Only ${remR} tiles with ${rE} remain in play — ${rE}s are scarce` });
        if (player % 2 !== 0) {
          bullets.push({ type: 'STRATEGY', icon: '💡', text: `Keep ${lE} and ${rE} on the board to block ${pName}` });
        } else {
          bullets.push({ type: 'STRATEGY', icon: '💡', text: `Avoid leaving ${lE}/${rE} ends — partner can't play them` });
        }
        return bullets;
      }

      if (!tile) return bullets;

      // What did they play vs what was available?
      const lE = prevSnap.leftEnd, rE = prevSnap.rightEnd;
      const isDouble = tile.left === tile.right;

      // Side choice reasoning
      if (side === 'left' || side === 'right') {
        const playedEnd = side === 'left' ? lE : rE;
        const otherEnd = side === 'left' ? rE : lE;
        const tileNumbers = [tile.left, tile.right];
        const newEnd = tileNumbers.find(n => n !== playedEnd);
        if (newEnd !== undefined) {
          bullets.push({
            type: 'OBSERVATION', icon: '🎯',
            text: `${pName} played [${tile.left}|${tile.right}] on the ${side}, opening ${newEnd} and closing ${playedEnd}`
          });
        }
      }

      // Double play analysis
      if (isDouble) {
        const rem = k.remainingWithNumber(tile.left);
        bullets.push({
          type: 'INFO', icon: '🎲',
          text: `Double [${tile.left}|${tile.left}] played — ${rem} tiles with ${tile.left} remain`
        });
        if (rem <= 2) {
          bullets.push({ type: 'STRATEGY', icon: '⚠️', text: `${tile.left}s nearly exhausted — controlling the ${tile.left}-end is now very powerful` });
        }
      }

      // Avoidance detection
      const nb = snap.notebook;
      if (nb) {
        const pData = nb.players[player];
        for (const n of [lE, rE]) {
          if (n !== undefined && tile.left !== n && tile.right !== n) {
            const avoid = pData.avoidanceEvidence[n];
            if (avoid && avoid.count >= 2) {
              bullets.push({ type: 'LIKELY', icon: '🔍', text: `${pName} avoided ${n}s ${avoid.count} times — likely LOW on ${n}s` });
            }
          }
        }
      }

      // Void detection — check if this play reveals new voids
      const prevVoids = prevSnap.knowledge.cantHave[player];
      const newVoids = k.cantHave[player];
      for (const n of newVoids) {
        if (!prevVoids.has(n)) {
          bullets.push({ type: 'CERTAIN', icon: '🚫', text: `${pName} is now confirmed void in ${n}s` });
        }
      }

      return bullets;
    }

    // Generate strategic commentary for a move
    function generateStudyStrategy(snap, prevSnap, mcResults, probMatrix, player) {
      const notes = [];
      const pName = pn(player);
      const k = snap.knowledge;
      const lE = snap.leftEnd, rE = snap.rightEnd;

      // Board state
      notes.push({ icon: '📋', text: `Board ends: ${lE} / ${rE} — ${snap.board.length} tiles on board` });

      // Suit scarcity analysis
      for (let n = 0; n <= 6; n++) {
        const rem = k.remainingWithNumber(n);
        if (rem <= 2 && rem > 0) {
          const onEnd = (n === lE || n === rE);
          notes.push({ icon: '📉', text: `${n}s: only ${rem} left${onEnd ? ' — currently on an end!' : ''}` });
        } else if (rem === 0) {
          notes.push({ icon: '❌', text: `${n}s: EXHAUSTED — no tiles with ${n} remain` });
        }
      }

      // MC analysis summary
      if (mcResults && mcResults.length > 0) {
        const best = mcResults[0];
        const worst = mcResults[mcResults.length - 1];
        if (mcResults.length > 1) {
          const gap = best.expectedPoints - worst.expectedPoints;
          if (gap > 0.5) {
            notes.push({ icon: '⚡', text: `Critical decision: ${gap.toFixed(2)} EP gap between best and worst option` });
          } else if (gap < 0.05) {
            notes.push({ icon: '🤷', text: `Close decision: only ${gap.toFixed(2)} EP separates all options` });
          }
        }
        if (best.winRate > 0.7) notes.push({ icon: '💪', text: `${pName}'s team in strong position (${(best.winRate*100).toFixed(0)}% WR with best play)` });
        else if (best.winRate < 0.35) notes.push({ icon: '😰', text: `${pName}'s team struggling (${(best.winRate*100).toFixed(0)}% WR even with best play)` });
      }

      // Partner coordination
      if (player % 2 === 0) {
        // P0 or P2 (your team)
        const partnerVoids = [...k.cantHave[player === 0 ? 2 : 0]];
        if (partnerVoids.length > 0) {
          notes.push({ icon: '🤝', text: `Partner void in: {${partnerVoids.join(', ')}} — avoid leaving those ends` });
        }
      } else {
        // P1 or P3 (opponents)
        const oppPartnerVoids = [...k.cantHave[player === 1 ? 3 : 1]];
        if (oppPartnerVoids.length > 0) {
          notes.push({ icon: '🎯', text: `Opponent's partner void in: {${oppPartnerVoids.join(', ')}} — keep those ends to block them` });
        }
      }

      // High probability tiles
      if (probMatrix && Object.keys(probMatrix).length > 0) {
        for (const p of [1, 3]) { // opponents
          const highProb = [];
          for (const [tileId, probs] of Object.entries(probMatrix)) {
            if (probs[p] > 0.6) {
              highProb.push({ id: tileId, prob: probs[p] });
            }
          }
          if (highProb.length > 0) {
            highProb.sort((a, b) => b.prob - a.prob);
            const top3 = highProb.slice(0, 3).map(h => `[${h.id.replace('-','|')}] ${(h.prob*100).toFixed(0)}%`).join(', ');
            notes.push({ icon: '🔮', text: `${pn(p)} likely holds: ${top3}` });
          }
        }
      }

      return notes;
    }

    // Run study analysis for a specific step (async)
    function runStudyForStep(stepIdx) {
      if (!currentGame || stepIdx <= 0) return;
      if (studyCache[stepIdx]) return;
      if (studyRunning) return;

      const snap = currentGame.snapshots[stepIdx];
      const prevSnap = currentGame.snapshots[stepIdx - 1];
      if (!snap || !prevSnap) return;

      studyRunning = true;
      studyProgress = 'Analyzing...';
      render(); // single render to show spinner

      setTimeout(() => {
        try {
          // 1. MC evaluation (with Bayesian beliefs for better deal generation)
          let mcResults = null;
          if (snap.action === 'play' && prevSnap) {
            const studyHandSizes = prevSnap.hands.map(h => h.length);
            computeBeliefs(prevSnap.knowledge, studyHandSizes, prevSnap.hands[snap.player], snap.player, 200);
            mcResults = monteCarloEval(prevSnap, snap.player, MC_SIMS_STUDY);
          }
          // 2. Tile probability matrix
          const probMatrix = computeAllTileProbs(prevSnap, PROB_SAMPLES_STUDY);
          // 3. Deductions
          const deductions = generateStudyDeductions(snap, prevSnap, snap.player, snap.tile, snap.side, snap.action);
          // 4. Strategic notes
          const strategy = generateStudyStrategy(snap, prevSnap, mcResults, probMatrix, snap.player);
          // 5. Play grade
          let playGrade = null;
          if (mcResults && mcResults.length > 0 && snap.tile) {
            const best = mcResults[0];
            const played = mcResults.find(m => m.tile.id === snap.tile.id && m.side === snap.side)
                        || mcResults.find(m => m.tile.id === snap.tile.id);
            if (played && best) {
              const eqLoss = best.expectedPoints - played.expectedPoints;
              playGrade = {
                eqLoss,
                grade: eqLoss < 0.02 ? 'perfect' : eqLoss < 0.15 ? 'good' : eqLoss < 0.40 ? 'ok' : 'bad',
                bestTile: best.tile, bestSide: best.side, bestEP: best.expectedPoints,
                playedEP: played.expectedPoints, playedRank: mcResults.indexOf(played) + 1
              };
            }
          }
          cacheSet(studyCache, studyCacheKeys, stepIdx, { mcResults, probMatrix, deductions, strategy, playGrade });
        } catch (e) { /* study failed, cache stays empty */ }
        studyRunning = false;
        studyProgress = '';
        render(); // single render to show results
      }, 10);
    }

    // Rollout variant toggle (mutable so F1 diagnostic can swap at runtime)
    // "A" = fastAI-only (default, production), "B" = smartAI first N plies + fastAI
    let ROLLOUT_VARIANT = 'A';
    let ROLLOUT_SMARTAI_PLIES = 4;

    // F1 diagnostic: freeze MC early-stop so A/B get identical sample counts
    let _f1FreezeEarlyStop = false;

    // Diagnostic counters (reset per F1 run)
    let _rolloutStats = { smartAICalls: 0, fastAICalls: 0, totalPlies: 0, totalRollouts: 0 };

    // Fast rollout AI for MC simulations — ~5x faster than full smartAI
    // Uses simplified heuristic: suit control + pips + doubles + instant win
    function fastAI(hand, lE, rE, bLen, player, knowledge) {
      const playable = hand.filter(t => canPlay(t, lE, rE, bLen));
      if (playable.length === 0) return null;
      if (playable.length === 1) return { tile: playable[0], side: null };

      const partner = (player + 2) % 4;
      const opp1 = (player + 1) % 4, opp2 = (player + 3) % 4;

      // Pre-compute suit counts
      const sc = new Array(7).fill(0);
      for (const t of hand) { sc[t.left]++; if (t.left !== t.right) sc[t.right]++; }

      if (bLen === 0) {
        // Opening: suit strength + double bonus
        let best = null, bestS = -Infinity;
        for (const t of playable) {
          const s = sc[t.left] * 10 + sc[t.right] * 10 + (t.left === t.right ? 15 : 0) + (t.left + t.right) * 2;
          if (s > bestS) { bestS = s; best = t; }
        }
        return { tile: best, side: null };
      }

      // Phase-dependent pip multiplier (ported from smartAI)
      const deadMul = bLen <= 4 ? 0.4 : (bLen <= 14 ? 1.0 : 1.4);

      let bestTile = null, bestSide = null, bestScore = -Infinity;
      for (const tile of playable) {
        for (const side of ['left', 'right']) {
          const cS = side === 'left' ? (tile.left === lE || tile.right === lE) : (tile.left === rE || tile.right === rE);
          if (!cS) continue;

          let newEnd;
          if (side === 'left') newEnd = tile.left === lE ? tile.right : tile.left;
          else newEnd = tile.right === rE ? tile.left : tile.right;
          const otherEnd = side === 'left' ? rE : lE;

          let ss = 0;

          // Instant win check
          if (hand.length === 1) { return { tile, side }; }

          // Suit control (fast: just count matching tiles in hand)
          let mc = 0;
          for (const h of hand) {
            if (h.id === tile.id) continue;
            if (h.left === newEnd || h.right === newEnd || h.left === otherEnd || h.right === otherEnd) mc++;
          }
          ss += mc * 12;

          // Blocking (simplified: just cantHave check)
          if (knowledge.cantHave[opp1].has(newEnd) && knowledge.cantHave[opp1].has(otherEnd)) ss += 25;
          if (knowledge.cantHave[opp2].has(newEnd) && knowledge.cantHave[opp2].has(otherEnd)) ss += 18;

          // Partner void penalty
          if (knowledge.cantHave[partner].has(newEnd) && knowledge.cantHave[partner].has(otherEnd)) ss -= 15;

          // Pip weight (phase-dependent)
          ss += Math.round((tile.left + tile.right) * 2 * deadMul);

          // Double clearing
          if (tile.left === tile.right) ss += 10;

          // Dead number detection (ported from smartAI — highest-weighted strategic feature)
          {
            const remNew = knowledge.remainingWithNumber(newEnd);
            // remNew counts tiles with this number still unplayed (including the tile we're about to play)
            // After playing, remaining = remNew - (tile has newEnd ? 1 : 0) but tile always has newEnd
            const remNewAfter = remNew - 1;
            if (remNewAfter === 0 && newEnd !== otherEnd) {
              // newEnd will be dead after this play
              const tileHasOther = (tile.left === otherEnd || tile.right === otherEnd) ? 1 : 0;
              const remOther = knowledge.remainingWithNumber(otherEnd) - tileHasOther;
              if (remOther > 0) {
                // One end dead, other alive — board stalls on one end
                ss -= 30;
              } else {
                // Both ends dead — game will block. Evaluate our pip position.
                let myPips = 0;
                for (const h of hand) { if (h.id !== tile.id) myPips += h.left + h.right; }
                ss += myPips <= 6 ? 20 : -25;
              }
            }
          }

          // Near-close: 2 tiles → check if last tile can play
          if (hand.length === 2) {
            const last = hand.find(t => t.id !== tile.id);
            if (last && (last.left === newEnd || last.right === newEnd || last.left === otherEnd || last.right === otherEnd)) {
              ss += 60;
            } else {
              ss -= 30;
            }
          }

          // 3-tile closing check: can both remaining tiles play?
          if (hand.length === 3) {
            let coverCount = 0;
            for (const h of hand) {
              if (h.id === tile.id) continue;
              if (h.left === newEnd || h.right === newEnd || h.left === otherEnd || h.right === otherEnd) coverCount++;
            }
            if (coverCount === 2) ss += 20;
            else if (coverCount === 0) ss -= 15;
          }

          if (ss > bestScore) { bestScore = ss; bestTile = tile; bestSide = side; }
        }
      }
      return bestTile ? { tile: bestTile, side: bestSide } : { tile: playable[0], side: null };
    }

    // Simulate a game from a given position using fastAI for rollouts
    // Returns { winnerTeam, points, type } with full scoring
    function simulateFromPosition(hands, board, lE, rE, nextPlayer, knowledge, initBLen) {
      const simHands = hands.map(h => [...h]);
      let bLen = initBLen != null ? initBLen : (board ? board.length : 0);
      let simLE = lE, simRE = rE;
      let cur = nextPlayer;
      let passCount = 0;
      const simKnowledge = knowledge.clone();
      let prevLE, prevRE; // track ends before last move for scoring

      _rolloutStats.totalRollouts++;
      for (let move = 0; move < 100; move++) {
        let decision;
        if (ROLLOUT_VARIANT === 'B' && move < ROLLOUT_SMARTAI_PLIES) {
          decision = smartAI(simHands[cur], simLE, simRE, bLen, cur, simKnowledge);
          _rolloutStats.smartAICalls++;
        } else {
          decision = fastAI(simHands[cur], simLE, simRE, bLen, cur, simKnowledge);
          _rolloutStats.fastAICalls++;
        }
        _rolloutStats.totalPlies++;

        if (decision) {
          passCount = 0;
          const { tile, side: prefSide } = decision;
          let side = prefSide;
          if (!side) side = (tile.left === simLE || tile.right === simLE) ? 'left' : 'right';

          simHands[cur] = simHands[cur].filter(t => t.id !== tile.id);
          simKnowledge.recordPlay(cur, tile);

          prevLE = simLE; prevRE = simRE;
          if (bLen === 0) {
            simLE = tile.left; simRE = tile.right;
          } else if (side === 'left') {
            simLE = tile.left === simLE ? tile.right : tile.left;
          } else {
            simRE = tile.right === simRE ? tile.left : tile.right;
          }
          bLen++;

          if (simHands[cur].length === 0) {
            const w = scoreWin(tile, prevLE, prevRE, bLen);
            return { winnerTeam: cur % 2, points: w.pts, type: w.type.toLowerCase() };
          }
          cur = (cur + 1) % 4;
        } else {
          passCount++;
          simKnowledge.recordPass(cur, simLE, simRE);
          if (passCount >= 4) {
            const b = resolveBlock(simHands);
            return { winnerTeam: b.type === 'tie' ? -1 : b.team, points: b.points, type: b.type };
          }
          cur = (cur + 1) % 4;
        }
      }
      return { winnerTeam: -1, points: 0, type: 'tie' };
    }

    // ========== PERFECT ENDGAME SOLVER ==========
    // When total tiles in all hands ≤ ENDGAME_THRESHOLD, sample consistent deals
    // and solve each with minimax + alpha-beta for near-exact play.
    // Replaces heuristic rollouts with mathematically optimal evaluation per determinization.

    const ENDGAME_THRESHOLD = 16;     // trigger when total hand tiles ≤ this (bitmask solver + move ordering)
    const ENDGAME_BUDGET_MS = 500;    // hard time limit (graceful timeout — falls through to MC if exceeded)
    const ENDGAME_SAMPLE_COUNT = 300; // deals to sample and solve

    // Zobrist hashing for endgame transposition table
    const _ZOBRIST = (() => {
      const rng = new SplitMix64(0xDEADBEEF);
      const tp = []; // [tileIdx][player] — 28 × 4
      for (let t = 0; t < 28; t++) {
        tp[t] = [];
        for (let p = 0; p < 4; p++) tp[t][p] = rng.randomInt(0x7FFFFFFF);
      }
      const le = [], re = [];
      for (let n = 0; n < 7; n++) {
        le[n] = rng.randomInt(0x7FFFFFFF);
        re[n] = rng.randomInt(0x7FFFFFFF);
      }
      const np = [];
      for (let p = 0; p < 4; p++) np[p] = rng.randomInt(0x7FFFFFFF);
      const pc = [];
      for (let c = 0; c < 5; c++) pc[c] = rng.randomInt(0x7FFFFFFF);
      const bl = []; // board length 0-24
      for (let b = 0; b < 25; b++) bl[b] = rng.randomInt(0x7FFFFFFF);

    function _endgameHash(hands, lE, rE, bLen, nextPlayer, passCount) {
      let h = 0;
      for (let p = 0; p < 4; p++) {
        for (let i = 0; i < hands[p].length; i++) {
          h ^= _ZOBRIST.tp[TILE_INDEX[hands[p][i].id]][p];
        }
      }
      h ^= _ZOBRIST.bl[Math.min(bLen, 24)];
      // Only hash ends when board is non-empty (ends are defined)
      if (bLen > 0) {
        h ^= _ZOBRIST.le[lE];
        h ^= _ZOBRIST.re[rE];
      }
      h ^= _ZOBRIST.np[nextPlayer];
      h ^= _ZOBRIST.pc[Math.min(passCount, 4)];
      return h;
    }

    // Minimax with alpha-beta pruning for partnership domino (perfect info per deal)
    // Team 0 (P0+P2) maximizes, Team 1 (P1+P3) minimizes
    // Uses in-place mutation with undo for zero-allocation recursion
    // Returns ME delta relative to myTeam
    function _endgameMinimax(hands, lE, rE, bLen, nextPlayer, passCount, myTeam, alpha, beta, deadline, tt) {
      if (bLen === 0) throw new Error('Endgame solver invariant violated: bLen===0');
      if (lE < 0 || lE > 6 || rE < 0 || rE > 6) throw new Error(`Endgame solver invariant violated: ends out of range (lE=${lE}, rE=${rE})`);
      if (Date.now() > deadline) return 0;

      // Terminal: 4 consecutive passes → blocked game
      if (passCount >= 4) {
        const block = resolveBlock(hands);
        return block.type === 'tie' ? 0 : _rolloutToMEReward(block.team, block.points, myTeam);
      }

      // TT lookup
      const hash = _endgameHash(hands, lE, rE, bLen, nextPlayer, passCount);
      const ttEntry = tt.get(hash);
      if (ttEntry) {
        if (ttEntry.f === 0) return ttEntry.v; // EXACT
        if (ttEntry.f === 1 && ttEntry.v >= beta) return ttEntry.v; // LOWER bound
        if (ttEntry.f === 2 && ttEntry.v <= alpha) return ttEntry.v; // UPPER bound
        if (ttEntry.f === 1 && ttEntry.v > alpha) alpha = ttEntry.v;
        if (ttEntry.f === 2 && ttEntry.v < beta) beta = ttEntry.v;
      }
      const origAlpha = alpha;
      const origBeta = beta;

      const hand = hands[nextPlayer];
      // Build playable list inline (avoid allocation when possible)
      let hasPlayable = false;
      for (let i = 0; i < hand.length; i++) {
        if (canPlay(hand[i], lE, rE, bLen)) { hasPlayable = true; break; }
      }

      // No legal moves → pass
      if (!hasPlayable) {
        const val = _endgameMinimax(hands, lE, rE, bLen, (nextPlayer + 1) % 4, passCount + 1, myTeam, alpha, beta, deadline, tt);
        tt.set(hash, { v: val, f: 0 }); // pass-through is exact
        return val;
      }

      const isMax = (nextPlayer % 2) === myTeam;
      let bestVal = isMax ? -Infinity : Infinity;

      for (let ti = 0; ti < hand.length; ti++) {
        if (Date.now() > deadline) break;
        const tile = hand[ti];
        if (!canPlay(tile, lE, rE, bLen)) continue;

        // Determine playable sides
        const sides = [];
        if (bLen === 0) {
          sides.push(null);
        } else {
          if (tile.left === lE || tile.right === lE) sides.push('left');
          if ((tile.left === rE || tile.right === rE) && lE !== rE) sides.push('right');
          if (sides.length === 0 && (tile.left === rE || tile.right === rE)) sides.push('right');
        }

        for (let si = 0; si < sides.length; si++) {
          const side = sides[si];
          let newLE = lE, newRE = rE;
          if (bLen === 0) { newLE = tile.left; newRE = tile.right; }
          else if (side === 'left') { newLE = tile.left === lE ? tile.right : tile.left; }
          else { newRE = tile.right === rE ? tile.left : tile.right; }

          // Remove tile from hand (mutate)
          hand.splice(ti, 1);

          let val;
          if (hand.length === 0) {
            // Player went out — score the win
            const w = scoreWin(tile, lE, rE, bLen + 1);
            val = _rolloutToMEReward(nextPlayer % 2, w.pts, myTeam);
          } else {
            val = _endgameMinimax(hands, newLE, newRE, bLen + 1, (nextPlayer + 1) % 4, 0, myTeam, alpha, beta, deadline, tt);
          }

          // Undo: re-insert tile at original position
          hand.splice(ti, 0, tile);

          if (isMax) {
            if (val > bestVal) bestVal = val;
            if (bestVal > alpha) alpha = bestVal;
          } else {
            if (val < bestVal) bestVal = val;
            if (bestVal < beta) beta = bestVal;
          }

        }

      // Store in TT: determine bound type
      let flag;
      if (bestVal <= origAlpha) flag = 2; // UPPER bound (failed low)
      else if (bestVal >= origBeta) flag = 1; // LOWER bound (failed high)
      else flag = 0; // EXACT
      tt.set(hash, { v: bestVal, f: flag });

      return bestVal;
    }

    // ========== BITMASK ENDGAME SOLVER ==========
    // 15-18x faster than object-array solver via O(1) move/unmove and incremental hashing.

    function _egResolveBlock(handBits) {
      const pts = [0, 0, 0, 0];
      for (let p = 0; p < 4; p++) {
        let mask = handBits[p];
        while (mask) {
          const bit = mask & (-mask);
          pts[p] += _EG_TILE_PIPS[31 - Math.clz32(bit)];
          mask ^= bit;
        }
      }
      const min = Math.min(pts[0], pts[1], pts[2], pts[3]);
      const winners = [];
      for (let p = 0; p < 4; p++) { if (pts[p] === min) winners.push(p); }
      if (winners.length > 1 && winners.some(w => (w % 2) === 0) && winners.some(w => (w % 2) === 1)) {
        return { type: 'tie', points: 0 };
      }
      return { type: 'blocked', team: winners[0] % 2, points: 1 };
    }

    function _egScoreWin(tileIdx, prevLE, prevRE, boardLen) {
      const isD = _EG_TILE_DOUBLE[tileIdx];
      let wasBoth = false;
      if (boardLen > 1 && prevLE >= 0 && prevRE >= 0) {
        const tL = _EG_TILE_LEFT[tileIdx], tR = _EG_TILE_RIGHT[tileIdx];
        if (prevLE === prevRE) {
          wasBoth = (tL === prevLE && tR === prevLE);
        } else {
          wasBoth = (tL === prevLE || tR === prevLE) && (tL === prevRE || tR === prevRE);
        }
      }
      if (isD && wasBoth) return 4;
      if (isD) return 2;
      if (wasBoth) return 3;
      return 1;
    }

    function _egHashInit(handBits, lE, rE, bLen, nextPlayer, passCount) {
      let h = 0;
      for (let p = 0; p < 4; p++) {
        let mask = handBits[p];
        while (mask) {
          const bit = mask & (-mask);
          h ^= _ZOBRIST.tp[31 - Math.clz32(bit)][p];
          mask ^= bit;
        }
      }
      h ^= _ZOBRIST.bl[Math.min(bLen, 24)];
      if (bLen > 0) { h ^= _ZOBRIST.le[lE]; h ^= _ZOBRIST.re[rE]; }
      h ^= _ZOBRIST.np[nextPlayer];
      h ^= _ZOBRIST.pc[Math.min(passCount, 4)];
      return h;
    }

    // Move ordering: score moves for alpha-beta search efficiency.
    // Better ordering = more cutoffs = deeper search in same time budget.
    // Priority: instant wins > TT best move > doubles > high-pip > both-ends > rest
    function _egMoveScore(tileIdx, handAfter, lE, rE, bLen, ttBestTile) {
      let s = 0;
      if (handAfter === 0) s += 10000;              // instant win — always first
      if (tileIdx === ttBestTile) s += 5000;         // TT best move from previous search
      if (_EG_TILE_DOUBLE[tileIdx]) s += 100;        // doubles: high scoring potential
      s += _EG_TILE_PIPS[tileIdx] * 3;              // high-pip tiles: reduce hand value
      // Both-ends bonus (la-e-lo/cruzada potential)
      if (bLen > 0) {
        const tL = _EG_TILE_LEFT[tileIdx], tR = _EG_TILE_RIGHT[tileIdx];
        if ((tL === lE || tR === lE) && (tL === rE || tR === rE)) s += 50;
      }
      return s;
    }

    function _endgameMinimaxBit(handBits, lE, rE, bLen, nextPlayer, passCount, myTeam, alpha, beta, deadline, tt, hash) {
      if (Date.now() > deadline) return 0;

      if (passCount >= 4) {

        return block.type === 'tie' ? 0 : _rolloutToMEReward(block.team, block.points, myTeam);
      }

      // TT lookup — also extract best move for ordering
      let ttBestTile = -1;
      const ttEntry = tt.get(hash);
      if (ttEntry) {
        if (ttEntry.f === 0) return ttEntry.v;
        if (ttEntry.f === 1 && ttEntry.v >= beta) return ttEntry.v;
        if (ttEntry.f === 2 && ttEntry.v <= alpha) return ttEntry.v;
        if (ttEntry.f === 1 && ttEntry.v > alpha) alpha = ttEntry.v;
        if (ttEntry.f === 2 && ttEntry.v < beta) beta = ttEntry.v;

        ph ^= _ZOBRIST.np[nextPlayer]; ph ^= _ZOBRIST.np[newNext];
        ph ^= _ZOBRIST.pc[Math.min(passCount, 4)]; ph ^= _ZOBRIST.pc[Math.min(newPass, 4)];
        const val = _endgameMinimaxBit(handBits, lE, rE, bLen, newNext, newPass, myTeam, alpha, beta, deadline, tt, ph);

      const moves = [];

        rem ^= bit;
        const tL = _EG_TILE_LEFT[tileIdx], tR = _EG_TILE_RIGHT[tileIdx];

        const sides = [];
        if (bLen === 0) {
          sides.push(0);
        } else {
          if (tL === lE || tR === lE) sides.push(1);
          if ((tL === rE || tR === rE) && lE !== rE) sides.push(2);
          if (sides.length === 0 && (tL === rE || tR === rE)) sides.push(2);
        }

        for (let si = 0; si < sides.length; si++) {

      if (moves.length > 1) moves.sort((a, b) => b.score - a.score);

      const isMax = (nextPlayer % 2) === myTeam;
      let bestVal = isMax ? -Infinity : Infinity;
      let bestMove = -1;
      const newNext = (nextPlayer + 1) % 4;

      for (let mi = 0; mi < moves.length; mi++) {
        if (Date.now() > deadline) break;
        const { bit, tileIdx, tL, tR, side } = moves[mi];

        let newLE = lE, newRE = rE;
        if (side === 0) { newLE = tL; newRE = tR; }
        else if (side === 1) { newLE = (tL === lE) ? tR : tL; }
        else { newRE = (tR === rE) ? tL : tR; }

        handBits[nextPlayer] ^= bit;

        let val;
        if (handBits[nextPlayer] === 0) {
          const pts = _egScoreWin(tileIdx, lE, rE, bLen + 1);
          val = _rolloutToMEReward(nextPlayer % 2, pts, myTeam);
        } else {
          let mh = hash;
          mh ^= _ZOBRIST.tp[tileIdx][nextPlayer];
          mh ^= _ZOBRIST.bl[Math.min(bLen, 24)];
          if (bLen > 0) { mh ^= _ZOBRIST.le[lE]; mh ^= _ZOBRIST.re[rE]; }
          mh ^= _ZOBRIST.np[nextPlayer]; mh ^= _ZOBRIST.pc[Math.min(passCount, 4)];
          mh ^= _ZOBRIST.bl[Math.min(bLen + 1, 24)];

          mh ^= _ZOBRIST.np[newNext]; mh ^= _ZOBRIST.pc[0];

        handBits[nextPlayer] ^= bit;

        if (isMax) {
          if (val > bestVal) { bestVal = val; bestMove = tileIdx; }
          if (bestVal > alpha) alpha = bestVal;
        } else {
          if (val < bestVal) { bestVal = val; bestMove = tileIdx; }
          if (bestVal < beta) beta = bestVal;
        }
        if (beta <= alpha) break;
      }

      let flag;
      if (bestVal <= origAlpha) flag = 2;
      else if (bestVal >= origBeta) flag = 1;
      else flag = 0;
      tt.set(hash, { v: bestVal, f: flag, m: bestMove });
      return bestVal;
    }

    // Endgame solver entry point
    // Samples consistent deals, solves each with minimax, returns weighted-average move values
    // Output format matches monteCarloEval for seamless integration
    function endgameSolve(hand, lE, rE, bLen, player, knowledge, handSizes) {
      if (bLen === 0) throw new Error('endgameSolve invariant violated: bLen===0');
      if (lE < 0 || lE > 6 || rE < 0 || rE > 6) throw new Error(`endgameSolve invariant violated: ends out of range (lE=${lE}, rE=${rE})`);
      const deadline = Date.now() + ENDGAME_BUDGET_MS;
      const myTeam = player % 2;

      const playable = hand.filter(t => canPlay(t, lE, rE, bLen));
      if (playable.length === 0) return [];
      if (playable.length === 1) {
        return [{ tile: playable[0], side: null, expectedPoints: 0, winRate: 0.5,
                  sims: 0, endgame: true, blockRate: 0,
                  outcomes: { normal: 0, carroca: 0, laelo: 0, cruzada: 0, blocked: 0, tie: 0 },
                  variance: 0, stdDev: 0, ci95: 0, cvar5: 0 }];
      }

      // Sample consistent deals: first 10 via full generation, rest via Gibbs from base
      const deals = [];
      const weights = [];
      const rng = getRng();
      let baseDeal = null;
      for (let i = 0; i < ENDGAME_SAMPLE_COUNT && Date.now() < deadline; i++) {
        try {
          let deal;
          if (baseDeal && i >= 10) {
            deal = gibbsSampleDeal(baseDeal, knowledge, player, rng, 30 + (i % 40));
          } else {
            deal = generateConsistentDeal(hand, handSizes, knowledge, player);
            if (!baseDeal) baseDeal = deal;
          }
          deals.push(deal);
          weights.push(dealWeight(deal, knowledge));
        } catch(e) { /* skip failed samples */ }
      }
      if (deals.length === 0) return [];

      // Normalize weights
      let wSum = 0;
      for (let i = 0; i < weights.length; i++) wSum += weights[i];
      if (wSum > 0) { for (let i = 0; i < weights.length; i++) weights[i] /= wSum; }
      else { for (let i = 0; i < weights.length; i++) weights[i] = 1 / weights.length; }

      // Build move registry: all (tile, side) combinations
      const moveEntries = [];
      for (const tile of playable) {
        const sides = [];
        if (bLen === 0) {
          sides.push(null);
        } else {
          if (tile.left === lE || tile.right === lE) sides.push('left');
          if ((tile.left === rE || tile.right === rE) && lE !== rE) sides.push('right');
          if (sides.length === 0 && (tile.left === rE || tile.right === rE)) sides.push('right');
        }
        for (const side of sides) {
          moveEntries.push({ tile, side, totalME: 0, solvedWeight: 0, deals: 0 });
        }
      }

      // For each deal, convert to bitmasks and solve all moves via bitmask minimax
      for (let d = 0; d < deals.length && Date.now() < deadline; d++) {
        const deal = deals[d];
        const w = weights[d];
        const tt = new Map();

        // Convert deal to bitmasks once per deal
        const dealBits = new Int32Array(4);
        for (let p = 0; p < 4; p++) {
          let mask = 0;
          const src = (p === player) ? hand : deal[p];
          for (let i = 0; i < src.length; i++) mask |= (1 << TILE_INDEX[src[i].id]);
          dealBits[p] = mask;
        }

        for (let m = 0; m < moveEntries.length; m++) {
          if (Date.now() > deadline) break;
          const entry = moveEntries[m];
          const { tile, side } = entry;
          const tileIdx = TILE_INDEX[tile.id];
          const tileBit = 1 << tileIdx;

          let newLE = lE, newRE = rE;
          if (bLen === 0) { newLE = tile.left; newRE = tile.right; }
          else if (side === 'left') { newLE = tile.left === lE ? tile.right : tile.left; }
          else { newRE = tile.right === rE ? tile.left : tile.right; }

          // Apply move to bitmask copy
          const solveBits = new Int32Array(dealBits);
          solveBits[player] ^= tileBit;

          if (solveBits[player] === 0) {
            const pts = _egScoreWin(tileIdx, lE, rE, bLen + 1);
            const reward = _rolloutToMEReward(player % 2, pts, myTeam);
            entry.totalME += w * reward;
            entry.solvedWeight += w;
            entry.deals++;
            continue;
          }

          const initHash = _egHashInit(solveBits, newLE, newRE, bLen + 1, (player + 1) % 4, 0);
          const val = _endgameMinimaxBit(solveBits, newLE, newRE, bLen + 1, (player + 1) % 4, 0, myTeam, -Infinity, Infinity, deadline, tt, initHash);
          entry.totalME += w * val;
          entry.solvedWeight += w;
          entry.deals++;

      // Build results — pick best side per tile (matches MC output format)
      const tileResults = new Map();
      for (const entry of moveEntries) {
        if (entry.solvedWeight === 0) continue;
        const me = entry.totalME / entry.solvedWeight;
        const result = {
          tile: entry.tile, side: entry.side,
          winRate: Math.max(0, Math.min(1, 0.5 + me * 1.5)),
          expectedPoints: me * 4,
          sims: entry.deals, endgame: true,
          blockRate: 0,
          outcomes: { normal: 0, carroca: 0, laelo: 0, cruzada: 0, blocked: 0, tie: 0 },
          variance: 0, stdDev: 0, ci95: 0, cvar5: 0

        const tileKey = entry.tile.id;
        if (!tileResults.has(tileKey) || result.expectedPoints > tileResults.get(tileKey).expectedPoints) {

        }

      const results = [...tileResults.values()];
      results.sort((a, b) => b.expectedPoints - a.expectedPoints);

      for (let i = 0; i < hand.length; i++) {

      }

      if (!hasPlayable) {
        return _bruteForceMinimax(hands, lE, rE, bLen, (nextPlayer + 1) % 4, passCount + 1, myTeam);

      const isMax = (nextPlayer % 2) === myTeam;
      let bestVal = isMax ? -Infinity : Infinity;

      for (let ti = 0; ti < hand.length; ti++) {
        const tile = hand[ti];
        if (!canPlay(tile, lE, rE, bLen)) continue;

        const sides = [];
        if (bLen === 0) {
          sides.push(null);
        } else {
          if (tile.left === lE || tile.right === lE) sides.push('left');
          if ((tile.left === rE || tile.right === rE) && lE !== rE) sides.push('right');
          if (sides.length === 0 && (tile.left === rE || tile.right === rE)) sides.push('right');
        }

        for (let si = 0; si < sides.length; si++) {
          const side = sides[si];
          let newLE = lE, newRE = rE;
          if (bLen === 0) { newLE = tile.left; newRE = tile.right; }
          else if (side === 'left') { newLE = tile.left === lE ? tile.right : tile.left; }
          else { newRE = tile.right === rE ? tile.left : tile.right; }

          hand.splice(ti, 1);

          let val;
          if (hand.length === 0) {
            const w = scoreWin(tile, lE, rE, bLen + 1);
            val = _rolloutToMEReward(nextPlayer % 2, w.pts, myTeam);
          } else {
            val = _bruteForceMinimax(hands, newLE, newRE, bLen + 1, (nextPlayer + 1) % 4, 0, myTeam);
          }

          hand.splice(ti, 0, tile);

          if (isMax) { if (val > bestVal) bestVal = val; }
          else { if (val < bestVal) bestVal = val; }
        }
      }
      return bestVal;
    }

    function endgameVerify(numCases = 2000) {

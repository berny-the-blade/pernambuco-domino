    let liveHands = null, liveBoard = null, liveLeftEnd = null, liveRightEnd = null;
    let liveCurrentPlayer = null, livePassCount = 0, liveMoveNum = 0;
    let liveKnowledge = null, liveNotebook = null;

    // ========== COACH OVERLAY STATE ==========
    let coachEnabled = (() => { try { const v = localStorage.getItem('pernambuco_coach'); return v === null ? true : v === '1'; } catch(e) { return true; } })();
    let coachMessages = []; // [{type, text, phase, turn}]
    let coachCollapsed = (() => { try { return localStorage.getItem('pernambuco_coach_collapsed') === '1'; } catch(e) { return false; } })();
    let coachMCTimer = null;      // setTimeout handle for async MC batches
    let coachMCRunning = false;   // true while MC eval is in progress
    const COACH_MC_SIMS = 500;    // rollouts per tile option
    let MC_SIMS_PLAY_EXPERT = 800; // MC rollouts for Expert AI decisions

    // ========== DEEP STUDY STATE ==========
    let studyCache = {};
    let studyCacheKeys = [];    // FIFO order for eviction
    let studyRunning = false;
    let studyProgress = '';
    const MC_SIMS_STUDY = 1000;
    const PROB_SAMPLES_STUDY = 1000;
    const MAX_CACHE_SIZE = 15;

    // ========== PRO ANALYTICS STATE ==========
    let proCache = {};
    let proCacheKeys = [];
    let proRunning = false;
    let proProgress = '';
    const PRO_MC_SIMS = 50;
    const PRO_SAMPLES = 40;

    function cacheSet(cache, keys, key, value) {
      if (!cache[key]) {
        keys.push(key);
        if (keys.length > MAX_CACHE_SIZE) {
          const evict = keys.shift();
          delete cache[evict];
        }
      }
      cache[key] = value;
    }

    // ========== MATCH EQUITY TABLE (3D with dobrada) ==========
    // ME3D[s1][s2][dobIdx] = P(team1 wins match | scores s1 vs s2, dobrada multiplier)
    const MATCH_TARGET = 6;
    const POINT_DIST = [
      { pts: 1, prob: 0.70 },  // normal + blocked
      { pts: 2, prob: 0.16 },  // carroca
      { pts: 3, prob: 0.10 },  // la-e-lo
      { pts: 4, prob: 0.04 }   // cruzada
    ];
    const DOB_VALUES = [1, 2, 4, 8]; // dobrada multiplier levels

    const ME3D = (() => {
      const T = MATCH_TARGET;
      const S = T + 5;
      // me[s1][s2][dobIdx]
      const me = Array.from({length: S}, () =>
        Array.from({length: S}, () => new Float64Array(DOB_VALUES.length))
      );
      // Base cases
      for (let d = 0; d < DOB_VALUES.length; d++) {
        for (let s2 = 0; s2 < S; s2++) {
          for (let s1 = T; s1 < S; s1++) {
            me[s1][s2][d] = s2 >= T ? 0.5 : 1.0;
          }
        }
        for (let s1 = 0; s1 < T; s1++) {
          for (let s2 = T; s2 < S; s2++) {
            me[s1][s2][d] = 0.0;
          }
        }
      }
      // Fill bottom-up
      const TIE_PROB = 0.03; // ~3% of rounds are ties
      // Iterate d from highest to lowest so tie term references already-computed values
      for (let s1 = T - 1; s1 >= 0; s1--) {
        for (let s2 = T - 1; s2 >= 0; s2--) {
          for (let d = DOB_VALUES.length - 1; d >= 0; d--) {
            const dob = DOB_VALUES[d];
            let decisive = 0;
            for (const { pts: basePts, prob } of POINT_DIST) {
              const pts = basePts * dob;
              const s1w = Math.min(s1 + pts, T + 4);
              const s2w = Math.min(s2 + pts, T + 4);
              decisive += 0.5 * prob * me[s1w][s2][0] + 0.5 * prob * me[s1][s2w][0];
            }
            const nextDobIdx = Math.min(d + 1, DOB_VALUES.length - 1);
            if (d === DOB_VALUES.length - 1) {
              // Max dobrada: tie maps to self → solve: val = decisive*(1-t) + t*val
              // → val*(1-t) = decisive*(1-t) → val = decisive
              me[s1][s2][d] = decisive;
            } else {
              me[s1][s2][d] = decisive * (1 - TIE_PROB) + TIE_PROB * me[s1][s2][nextDobIdx];
            }
          }
        }
      }
      return me;
    })();

    // Backward-compat 2D ME wrapper (dob=1)
    const ME = (() => {
      const T = MATCH_TARGET;
      const S = T + 5;
      const tbl = Array.from({length: S}, () => new Float64Array(S));
      for (let s1 = 0; s1 < S; s1++)
        for (let s2 = 0; s2 < S; s2++)
          tbl[s1][s2] = ME3D[s1][s2][0];
      return tbl;
    })();

    function getMatchEquity(s1, s2) {
      const c1 = Math.min(s1, MATCH_TARGET + 4);
      const c2 = Math.min(s2, MATCH_TARGET + 4);
      return ME[c1][c2];
    }

    function getMatchEquity3D(s1, s2, dobMultiplier) {
      const dIdx = DOB_VALUES.indexOf(dobMultiplier);
      const d = dIdx >= 0 ? dIdx : 0;
      return ME3D[Math.min(s1, MATCH_TARGET + 4)][Math.min(s2, MATCH_TARGET + 4)][d];
    }

    // Convert round E[pts] to match equity change (dobrada-aware)
    function roundToMatchEquity(epts, myTeamScore, oppTeamScore, dob) {
      const d = dob || scoreMultiplier || 1;
      const currentME = getMatchEquity3D(myTeamScore, oppTeamScore, d);
      // Linear approximation: ME shift per expected point
      const mePerPt = getMatchEquity3D(Math.min(myTeamScore + d, MATCH_TARGET + 4), oppTeamScore, 1) - currentME;
      return epts * mePerPt;
    }

    // Convert rollout result to match equity delta for MC/ISMCTS reward
    function _rolloutToMEReward(winnerTeam, points, myTeam) {
      if (winnerTeam < 0) return 0; // tie
      const myScore = matchScore[myTeam], oppScore = matchScore[1 - myTeam];
      const dob = scoreMultiplier || 1;
      const currentME = getMatchEquity3D(myScore, oppScore, dob);
      const pts = points * dob;
      let newME;
      if (winnerTeam === myTeam) {
        newME = getMatchEquity3D(Math.min(myScore + pts, MATCH_TARGET + 4), oppScore, 1);
      } else {
        newME = getMatchEquity3D(myScore, Math.min(oppScore + pts, MATCH_TARGET + 4), 1);
      }
      return newME - currentME; // positive = good for us
    }

    let rightPanelTab = 'reasoning'; // 'reasoning' | 'probability' | 'stats' | 'guide'
    let deepAnalysis = false;        // Monte Carlo toggle
    let mcResults = null;            // cached MC results for current step
    let mcRunning = false;           // is MC currently computing?

    // Quiz state
    let quizWaiting = false;       // Are we waiting for user to pick a tile?
    let quizSidePick = null;       // {tile, canLeft, canRight} — waiting for side choice
    let quizResult = null;         // { userTile, userSide, aiTile, aiSide, grade, scoreDiff }
    let quizShowingResult = false;

    // Stats tracking (persists across games in session)
    let stats = {
      totalMoves: 0,
      optimalMoves: 0,
      goodMoves: 0,    // inaccuracy (small equity loss)
      okMoves: 0,      // mistake (medium equity loss)
      badMoves: 0,     // blunder (large equity loss)
      games: 0,
      totalEquityLoss: 0,  // cumulative E[pts] equity loss
      history: []  // last 30 decisions
    };

    // Load stats from localStorage
    try {
      const saved = localStorage.getItem('domino-trainer-stats');
      if (saved) stats = JSON.parse(saved);
    } catch(e) {}

    function saveStats() {
      try { localStorage.setItem('domino-trainer-stats', JSON.stringify(stats)); } catch(e) {}
    }

    // ========== GAME HISTORY DATABASE ==========

    let gameHistory = [];
    let historyView = 'list'; // 'list' | 'detail'
    let historyDetailIdx = null;

    try {
      const saved = localStorage.getItem('domino-game-history');
      if (saved) gameHistory = JSON.parse(saved);
    } catch(e) {}

    function saveGameHistory() {
      try {
        // Keep last 100 games to avoid localStorage bloat
        if (gameHistory.length > 100) gameHistory = gameHistory.slice(-100);
        localStorage.setItem('domino-game-history', JSON.stringify(gameHistory));
      } catch(e) {}
    }

    function recordGameToHistory(game, analysisCache) {
      if (!game || !game.snapshots || game.snapshots.length === 0) return;
      const o = game.outcome || {};
      // Extract compact move list
      const moves = game.snapshots.filter(s => s.action === 'play' || s.action === 'pass').map(s => ({
        m: s.move, p: s.player, a: s.action === 'play' ? 'p' : 'x',
        t: s.tile ? s.tile.id : null, s: s.side || null
      }));
      // Compute analysis summary
      let analysisSummary = null;
      if (analysisCache && analysisCache.length > 0) {
        const totalEL = analysisCache.reduce((s, a) => s + a.eqLoss, 0);
        const avgEL = totalEL / analysisCache.length;
        analysisSummary = {
          avgEL: Math.round(avgEL * 1000) / 1000,
          totalEL: Math.round(totalEL * 100) / 100,
          moves: analysisCache.length,
          perfect: analysisCache.filter(a => a.grade === 'perfect').length,
          good: analysisCache.filter(a => a.grade === 'good').length,
          ok: analysisCache.filter(a => a.grade === 'ok').length,
          bad: analysisCache.filter(a => a.grade === 'bad').length,
          // Per-move detail for leak detection
          moveDetails: analysisCache.map(a => ({
            move: a.move, grade: a.grade, eqLoss: Math.round(a.eqLoss * 1000) / 1000,
            tile: a.tile ? `${a.tile.left}|${a.tile.right}` : '',
            bestTile: a.bestTile ? `${a.bestTile.left}|${a.bestTile.right}` : '',
            side: a.side, bestSide: a.bestSide
          }))
        };
      }
      const record = {
        id: Date.now(),
        date: new Date().toISOString(),
        difficulty: { ...playDifficulty },
        outcome: {
          type: o.type || 'unknown', winner: o.winner, team: o.team,
          points: o.points || 0, winType: o.winType || null
        },
        matchScoreBefore: [...(game._matchScoreBefore || matchScore)],
        moves,
        originalHands: game.originalHands ? game.originalHands.map(h => h.map(t => t.id)) : null,
        analysis: analysisSummary
      };
      gameHistory.push(record);
      saveGameHistory();
    }

    function getAggregateStats() {
      const analyzed = gameHistory.filter(g => g.analysis);
      if (analyzed.length === 0) return null;
      const totalGames = analyzed.length;
      const totalMoves = analyzed.reduce((s, g) => s + g.analysis.moves, 0);
      const totalPerfect = analyzed.reduce((s, g) => s + g.analysis.perfect, 0);
      const totalGood = analyzed.reduce((s, g) => s + g.analysis.good, 0);
      const totalOk = analyzed.reduce((s, g) => s + g.analysis.ok, 0);
      const totalBad = analyzed.reduce((s, g) => s + g.analysis.bad, 0);
      const avgEL = totalMoves > 0 ? analyzed.reduce((s, g) => s + g.analysis.totalEL, 0) / totalMoves : 0;

      // Trend: compare last 5 vs previous 5
      const recent5 = analyzed.slice(-5);
      const prev5 = analyzed.slice(-10, -5);
      const recentAvgEL = recent5.length > 0 ? recent5.reduce((s, g) => s + g.analysis.avgEL, 0) / recent5.length : null;
      const prevAvgEL = prev5.length > 0 ? prev5.reduce((s, g) => s + g.analysis.avgEL, 0) / prev5.length : null;
      const trend = (recentAvgEL !== null && prevAvgEL !== null) ? prevAvgEL - recentAvgEL : null; // positive = improving

      // Win rate
      const wins = gameHistory.filter(g => g.outcome && g.outcome.team === 0).length;
      const losses = gameHistory.filter(g => g.outcome && g.outcome.team === 1).length;

      // Leak aggregation across all games
      let openingELSum = 0, openingCount = 0;
      let endgameELSum = 0, endgameCount = 0;
      let doubleErrors = 0, totalDoubles = 0;
      let blunderMoves = [];

      for (const g of analyzed) {
        const dets = g.analysis.moveDetails;
        if (!dets || dets.length === 0) continue;
        // Opening: first 2 moves
        const early = dets.slice(0, 2);
        early.forEach(d => { openingELSum += d.eqLoss; openingCount++; });
        // Endgame: last 2 moves
        const late = dets.slice(-2);
        late.forEach(d => { endgameELSum += d.eqLoss; endgameCount++; });
        // Doubles
        dets.forEach(d => {
          const parts = d.tile.split('|');
          if (parts[0] === parts[1]) {
            totalDoubles++;
            if (d.grade === 'ok' || d.grade === 'bad') doubleErrors++;
          }
        });
        // Collect all blunders
        dets.filter(d => d.grade === 'bad').forEach(d => blunderMoves.push(d));
      }

      return {
        totalGames, totalMoves, avgEL: Math.round(avgEL * 1000) / 1000,
        totalPerfect, totalGood, totalOk, totalBad,
        wins, losses, ties: gameHistory.length - wins - losses,
        recentAvgEL: recentAvgEL !== null ? Math.round(recentAvgEL * 1000) / 1000 : null,
        trend,
        openingAvgEL: openingCount > 0 ? Math.round((openingELSum / openingCount) * 1000) / 1000 : 0,
        endgameAvgEL: endgameCount > 0 ? Math.round((endgameELSum / endgameCount) * 1000) / 1000 : 0,
        doubleErrorRate: totalDoubles > 0 ? Math.round((doubleErrors / totalDoubles) * 100) : 0,
        totalDoubles, doubleErrors,
        blunderCount: blunderMoves.length,
        blunderMoves: blunderMoves.slice(-10) // last 10 blunders for display
      };
    }

    // ========== QUIZ LOGIC ==========

    function isQuizTurn() {
      if (gameMode !== 'quiz' || !currentGame) return false;
      const snap = currentGame.snapshots[currentStep];
      // We quiz on P0's turns (the next move to be revealed)
      // The snapshot at currentStep shows the state BEFORE this move
      // Actually, we need to check the NEXT snapshot's player
      const nextStep = currentStep + 1;
      if (nextStep >= currentGame.snapshots.length) return false;
      const nextSnap = currentGame.snapshots[nextStep];
      return nextSnap.player === 0;
    }

    function startQuiz() {
      quizWaiting = true;
      quizResult = null;
      quizShowingResult = false;
      quizSidePick = null;
      render();
    }

    function quizPickTile(tileId) {
      if (!quizWaiting || quizSidePick) return;
      const snap = currentGame.snapshots[currentStep];
      const tile = snap.hands[0].find(t => t.id === tileId);
      if (!tile) return;

      // Check if this tile can play on both sides
      const canLeft = canPlayOnSide(tile, snap.leftEnd);
      const canRight = canPlayOnSide(tile, snap.rightEnd);

      if (snap.leftEnd === snap.rightEnd) {
        // Both ends same number, only one effective side
        if (canLeft) {
          finishQuizPick(tile, 'left');
        } else {
          // tile can't play — user picked wrong
          finishQuizPick(tile, null);
        }
      } else if (canLeft && canRight) {
        // Tile can play both sides — ask which
        quizSidePick = { tile, canLeft, canRight };
        render();
      } else if (canLeft) {
        finishQuizPick(tile, 'left');
      } else if (canRight) {
        finishQuizPick(tile, 'right');
      }
    }

    function quizPickSide(side) {
      if (!quizSidePick) return;
      const tile = quizSidePick.tile;
      quizSidePick = null; // clear BEFORE render triggered by finishQuizPick
      finishQuizPick(tile, side);
    }

    function quizPass() {
      if (!quizWaiting) return;
      // Passing is always correct when you have no playable tiles — just advance
      quizWaiting = false;
      stepForward();
    }

    function finishQuizPick(userTile, userSide) {
      const nextSnap = currentGame.snapshots[currentStep + 1];
      const snap = currentGame.snapshots[currentStep];
      const aiTile = nextSnap.tile;
      const aiSide = nextSnap.side;
      const aiScore = nextSnap.score || 0;

      // Find user's tile score and reasons from allOptions
      const allOpts = nextSnap.allOptions || [];
      const userOpt = allOpts.find(o => o.tile.id === userTile.id && (o.side === userSide || !userSide));
      const aiOpt = allOpts.find(o => o.tile.id === aiTile.id && o.side === aiSide);
      const userScore = userOpt ? userOpt.score : -50;
      const scoreDiff = aiScore - userScore;

      // Run Monte Carlo for equity loss computation
      let quizMC = null;
      if (deepAnalysis) {
        const qHandSizes = snap.hands.map(h => h.length);
        computeBeliefs(snap.knowledge, qHandSizes, snap.hands[0], 0, 200);
        quizMC = monteCarloEval(snap, 0, puzzleMode ? MC_SIMS_PUZZLE : MC_SIMS_QUIZ);
      }

      // Compute equity loss from MC (primary) or heuristic (fallback)
      let equityLoss = 0;
      let equityLossSource = 'heuristic';
      const canP = canPlay(userTile, snap.leftEnd, snap.rightEnd, snap.board.length);

      if (!canP) {
        equityLoss = 99; // invalid play sentinel
      } else if (quizMC && quizMC.length > 0) {
        // MC-based equity loss: difference in E[pts] between best and user's choice
        const mcBest = quizMC[0]; // sorted by expectedPoints
        const mcUser = quizMC.find(m => m.tile.id === userTile.id);
        if (mcBest && mcUser) {
          equityLoss = mcBest.expectedPoints - mcUser.expectedPoints;
          equityLossSource = 'mc';
        } else if (mcBest) {
          equityLoss = Math.max(0, mcBest.expectedPoints); // can't find user tile in MC → big miss
          equityLossSource = 'mc';
        }
      } else {
        // Heuristic fallback: normalize score diff to E[pts] scale (~0-2 range)
        equityLoss = Math.max(0, scoreDiff) / 25; // rough mapping: 25 heuristic pts ≈ 1 E[pts]
      }

      // Grade based on equity loss (in expected points)
      let grade;
      if (!canP) {
        grade = 'bad';
      } else if (userTile.id === aiTile.id && userSide === aiSide) {
        grade = 'perfect';
      } else if (userTile.id === aiTile.id) {
        grade = equityLoss < 0.02 ? 'perfect' : 'good'; // right tile, suboptimal side
      } else if (equityLoss < 0.02) {
        grade = 'perfect'; // truly negligible — within MC noise
      } else if (equityLoss < 0.15) {
        grade = 'good';    // inaccuracy
      } else if (equityLoss < 0.40) {
        grade = 'ok';      // mistake
      } else {
        grade = 'bad';     // blunder
      }

      // Build detailed explanation context
      const knowledge = snap.knowledge;
      const hand = snap.hands[0];
      const lE = snap.leftEnd, rE = snap.rightEnd;

      // Compute what ends each choice creates
      const aiNewEnds = computeNewEnds(aiTile, aiSide, lE, rE);
      const userNewEnds = userSide ? computeNewEnds(userTile, userSide, lE, rE) : null;

      // Build detailed comparison
      const detail = buildDetailedExplanation({
        userTile, userSide, userScore, userReasons: userOpt ? userOpt.reasons : [],
        aiTile, aiSide, aiScore, aiReasons: aiOpt ? aiOpt.reasons : nextSnap.reasons || [],
        aiNewEnds, userNewEnds,
        hand, knowledge, lE, rE, grade, scoreDiff, allOptions: allOpts
      });

      // Match equity context
      const meNow = getMatchEquity(matchScore[0], matchScore[1]);
      const meShift = equityLossSource === 'mc' ? roundToMatchEquity(equityLoss, matchScore[0], matchScore[1]) : null;

      // Missed deductions from Coach notebook
      let missedDeductions = [];
      if (grade !== 'perfect' && snap.notebook) {
        try {
          missedDeductions = snap.notebook.getMissedDeductions(userTile, userSide, aiTile, aiSide, snap);
        } catch (e) { console.warn('getMissedDeductions error:', e); }
      }

      quizResult = {
        userTile, userSide, aiTile, aiSide, grade, scoreDiff, userScore, aiScore,
        allOptions: allOpts, detail, aiNewEnds, userNewEnds,
        userReasons: userOpt ? userOpt.reasons : [],
        aiReasons: aiOpt ? aiOpt.reasons : nextSnap.reasons || [],
        mcResults: quizMC,
        equityLoss: Math.round(equityLoss * 1000) / 1000,
        equityLossSource,
        matchEquity: meNow,
        matchEquityShift: meShift,
        missedDeductions
      };
      quizWaiting = false;
      quizShowingResult = true;

      // Track stats
      stats.totalMoves++;
      if (grade === 'perfect') stats.optimalMoves++;
      else if (grade === 'good') stats.goodMoves++;
      else if (grade === 'ok') stats.okMoves++;
      else stats.badMoves++;
      if (typeof stats.totalEquityLoss !== 'number') stats.totalEquityLoss = 0;
      stats.totalEquityLoss += equityLoss < 90 ? equityLoss : 0; // skip invalid-play sentinel
      stats.history.push({
        grade, scoreDiff, equityLoss: Math.round(equityLoss * 1000) / 1000,
        userTile: `${userTile.left}-${userTile.right}`,
        aiTile: `${aiTile.left}-${aiTile.right}`
      });
      if (stats.history.length > 30) stats.history.shift();
      saveStats();
      // Record to player profile
      _recordPlayerMove(grade, equityLoss < 90 ? equityLoss : 0, null);

      // Save puzzle completion (best grade)
      if (puzzleMode && puzzleDef) {
        const prev = puzzleCompletion[puzzleDef.id];
        const gradeRank = { perfect: 4, good: 3, ok: 2, bad: 1 };
        if (!prev || (gradeRank[grade] || 0) > (gradeRank[prev] || 0)) {
          puzzleCompletion[puzzleDef.id] = grade;
          savePuzzleCompletion();
        }
      }

      render();
    }

    function computeNewEnds(tile, side, lE, rE) {
      if (!side) return { newLeft: lE, newRight: rE };
      if (side === 'left') {
        const newL = tile.left === lE ? tile.right : tile.left;
        return { newLeft: newL, newRight: rE };
      } else {
        const newR = tile.right === rE ? tile.left : tile.right;
        return { newLeft: lE, newRight: newR };
      }
    }

    function buildDetailedExplanation(ctx) {
      const { userTile, userSide, userScore, userReasons, aiTile, aiSide, aiScore, aiReasons,
              aiNewEnds, userNewEnds, hand, knowledge, lE, rE, grade, scoreDiff, allOptions } = ctx;
      const lines = [];
      const pNames = PLAYER_NAMES_FULL;
      const pt = appLang === 'pt';

      if (grade === 'perfect') {
        if (userTile.id === aiTile.id) {
          lines.push({ type: 'success', text: pt ? `Jogada ótima! [${userTile.left}|${userTile.right}] no ${userSide || aiSide}. Muito bem.` : `You picked the optimal play! [${userTile.left}|${userTile.right}] on ${userSide || aiSide}. Well done.` });
        } else {
          lines.push({ type: 'success', text: pt ? `Ótima escolha! [${userTile.left}|${userTile.right}] no ${userSide} é equivalente a [${aiTile.left}|${aiTile.right}] (diferença negligível).` : `Great pick! [${userTile.left}|${userTile.right}] on ${userSide} is essentially equal to [${aiTile.left}|${aiTile.right}] (negligible difference).` });
        }
        if (aiReasons.length > 0) {
          lines.push({ type: 'info', text: `${pt ? 'Por que é melhor' : "Why it's best"}: ${aiReasons.map(r => _tr(r)).join('. ')}` });
        }
        return lines;
      }

      lines.push({ type: 'header', text: pt ? `Melhor jogada: [${aiTile.left}|${aiTile.right}] no ${aiSide}` : `Better play: [${aiTile.left}|${aiTile.right}] on ${aiSide}` });

      if (aiReasons.length > 0) {
        for (const r of aiReasons) {
          lines.push({ type: 'ai-reason', text: _tr(r) });
        }
      }

      lines.push({ type: 'header2', text: pt ? `Sua escolha: [${userTile.left}|${userTile.right}]${userSide ? ' no ' + userSide : ''}` : `Your pick: [${userTile.left}|${userTile.right}]${userSide ? ' on ' + userSide : ''}` });
      if (userReasons.length > 0) {
        for (const r of userReasons) {
          lines.push({ type: 'user-reason', text: _tr(r) });
        }
      }

      // === DETAILED COMPARISON ===

      // 1. Board ends comparison
      if (aiNewEnds && userNewEnds) {
        const aiEnds = `${aiNewEnds.newLeft}/${aiNewEnds.newRight}`;
        const userEnds = `${userNewEnds.newLeft}/${userNewEnds.newRight}`;
        if (aiEnds !== userEnds) {
          // Count how many tiles in remaining hand match each set of ends
          const remainingHand = hand.filter(t => t.id !== aiTile.id && t.id !== userTile.id);
          const aiMyFollow = hand.filter(t => t.id !== aiTile.id &&
            (t.left === aiNewEnds.newLeft || t.right === aiNewEnds.newLeft || t.left === aiNewEnds.newRight || t.right === aiNewEnds.newRight)).length;
          const userMyFollow = hand.filter(t => t.id !== userTile.id &&
            (t.left === userNewEnds.newLeft || t.right === userNewEnds.newLeft || t.left === userNewEnds.newRight || t.right === userNewEnds.newRight)).length;

          if (aiMyFollow > userMyFollow) {
            lines.push({ type: 'compare',
              text: pt ? `Pontas: IA deixa ${aiEnds} (você tem ${aiMyFollow} pedras de seguimento) vs sua escolha ${userEnds} (só ${userMyFollow}). Mais seguimentos = mais controle.`
                : `Board ends: AI leaves ${aiEnds} (you have ${aiMyFollow} follow-up tiles) vs your pick leaves ${userEnds} (only ${userMyFollow} follow-ups). More follow-ups = you stay in control.`
            });
          } else if (aiMyFollow < userMyFollow) {
            lines.push({ type: 'compare',
              text: pt ? `Pontas: Sua escolha ${userEnds} (${userMyFollow} seguimentos) vs IA ${aiEnds} (${aiMyFollow}). Suas pontas são melhores para controle, mas outros fatores pesam mais.`
                : `Board ends: Your pick leaves ${userEnds} (${userMyFollow} follow-ups) vs AI's ${aiEnds} (${aiMyFollow}). Your ends are actually better for suit control, but other factors matter more here.`
            });
          }
        }
      }

      // 2. Opponent analysis from passes
      for (const oppIdx of [1, 3]) {
        const dead = knowledge ? knowledge.deadNumbers(oppIdx) : [];
        if (dead.length === 0) continue;

        if (aiNewEnds) {
          const aiBlocksOpp = dead.includes(aiNewEnds.newLeft) && dead.includes(aiNewEnds.newRight);
          const userBlocksOpp = userNewEnds && dead.includes(userNewEnds.newLeft) && dead.includes(userNewEnds.newRight);

          if (aiBlocksOpp && !userBlocksOpp) {
            lines.push({ type: 'opponent',
              text: pt ? `${pNames[oppIdx]} passou e não tem {${dead.join(', ')}}. A IA deixa pontas ${aiNewEnds.newLeft}/${aiNewEnds.newRight} que BLOQUEIAM completamente — vai passar de novo. Sua escolha não consegue isso.`
                : `${pNames[oppIdx]} passed and can't have {${dead.join(', ')}}. The AI's play leaves ends ${aiNewEnds.newLeft}/${aiNewEnds.newRight} which BLOCKS them completely — they'll pass again. Your pick doesn't achieve this.`
            });
          }
        }
      }

      // 3. Partner analysis
      if (knowledge) {
        const partnerDead = knowledge.deadNumbers(2);
        const partnerStrength = knowledge.inferStrength(2);
        const partnerPlays = knowledge.playsBy[2] || [];

        if (aiNewEnds && userNewEnds) {
          // Does AI's play help partner more?
          const aiPartnerHelp = !partnerDead.includes(aiNewEnds.newLeft) || !partnerDead.includes(aiNewEnds.newRight);
          const userPartnerHurt = partnerDead.includes(userNewEnds.newLeft) && partnerDead.includes(userNewEnds.newRight);

          if (userPartnerHurt && aiPartnerHelp) {
            lines.push({ type: 'partner',
              text: pt ? `Parceiro não tem {${partnerDead.join(', ')}}. Sua escolha deixa pontas ${userNewEnds.newLeft}/${userNewEnds.newRight} que bloqueiam seu próprio parceiro! A IA evita isso.`
                : `Partner can't have {${partnerDead.join(', ')}}. Your pick leaves ends ${userNewEnds.newLeft}/${userNewEnds.newRight} which blocks your own partner! The AI avoids this.`
            });
          }

          // Partner suit affinity — only if tiles with that number are still out there
          const strongSuits = partnerStrength.map((v, i) => ({ suit: i, count: v })).filter(x => x.count >= 2).sort((a, b) => b.count - a.count);
          if (strongSuits.length > 0 && knowledge) {
            const topSuit = strongSuits[0].suit;
            const remaining = knowledge.remainingWithNumber(topSuit);
            const weHold = hand.filter(t => t.left === topSuit || t.right === topSuit).length;
            const othersCouldHave = remaining - weHold;
            if (othersCouldHave > 0 && !partnerDead.includes(topSuit)) {
              const aiHasPartnerSuit = aiNewEnds.newLeft === topSuit || aiNewEnds.newRight === topSuit;
              const userHasPartnerSuit = userNewEnds.newLeft === topSuit || userNewEnds.newRight === topSuit;
              if (aiHasPartnerSuit && !userHasPartnerSuit) {
                lines.push({ type: 'partner',
                  text: pt ? `Parceiro jogou ${strongSuits[0].count} pedras com ${topSuit} e ${othersCouldHave} pedras com ${topSuit} ainda não apareceram. IA deixa ponta ${topSuit} para parceiro jogar. Sua escolha não.`
                    : `Partner played ${strongSuits[0].count} tiles with ${topSuit}s and ${othersCouldHave} tiles with ${topSuit} are still unaccounted for (not in your hand or played). AI leaves a ${topSuit}-end so partner can likely play. Your pick doesn't.`
                });
              }
            }
          }
        }

        // Partner close to winning
        const estPartnerHand = Math.max(0, 6 - partnerPlays.length);
        if (estPartnerHand <= 2 && estPartnerHand > 0) {
          lines.push({ type: 'partner',
            text: pt ? `Parceiro tem ~${estPartnerHand} pedra${estPartnerHand > 1 ? 's' : ''} — está perto de ganhar! Priorize pontas que possa jogar.`
              : `Partner has ~${estPartnerHand} tile${estPartnerHand > 1 ? 's' : ''} left — they're close to winning! Prioritize leaving ends they can play, even at your own expense.`
          });
        }
      }

      // 4. Double management
      if (aiTile.left === aiTile.right && userTile.left !== userTile.right) {
        const aiDblNum = aiTile.left;
        const support = hand.filter(t => t.id !== aiTile.id && (t.left === aiDblNum || t.right === aiDblNum)).length;
        if (support === 0) {
          lines.push({ type: 'strategy',
            text: pt ? `A IA joga a carroça isolada [${aiDblNum}|${aiDblNum}] agora. Carroças só combinam com um número e ficam mais difíceis depois. Se segurar e o tabuleiro mudar, fica travado.`
              : `The AI plays the isolated double [${aiDblNum}|${aiDblNum}] now while it can. Doubles only match one number and become harder to play later. If you hold it and the board moves away from ${aiDblNum}s, you're stuck with it.`
          });
        } else {
          lines.push({ type: 'strategy',
            text: pt ? `A IA descarta a carroça [${aiDblNum}|${aiDblNum}] cedo — carroças são inflexíveis (conectam a um número só). Melhor jogar quando a oportunidade existe.`
              : `The AI clears the double [${aiDblNum}|${aiDblNum}] early — doubles are inflexible (only connect to one number). Better to play them when the opportunity is there.`
          });
        }
      }

      // 5. Heavy tile dumping
      if (aiTile.left + aiTile.right > userTile.left + userTile.right + 3) {
        lines.push({ type: 'strategy',
          text: pt ? `A IA descarta a pedra mais pesada (${aiTile.left + aiTile.right} pontos vs seus ${userTile.left + userTile.right}). Se trancar, o total de pontos decide quem perde.`
            : `The AI dumps the heavier tile (${aiTile.left + aiTile.right} pips vs your ${userTile.left + userTile.right} pips). If the game blocks, your team's total pips decide who loses. Getting rid of heavy tiles early is safer.`
        });
      }

      // 6. Scarcity warning
      if (knowledge && aiNewEnds) {
        const aiLeftRem = knowledge.remainingWithNumber(aiNewEnds.newLeft);
        const aiRightRem = knowledge.remainingWithNumber(aiNewEnds.newRight);
        if (userNewEnds) {
          const userLeftRem = knowledge.remainingWithNumber(userNewEnds.newLeft);
          const userRightRem = knowledge.remainingWithNumber(userNewEnds.newRight);
          if ((userLeftRem <= 1 || userRightRem <= 1) && aiLeftRem > 1 && aiRightRem > 1) {
            const scarce = userLeftRem <= 1 ? userNewEnds.newLeft : userNewEnds.newRight;
            lines.push({ type: 'warning',
              text: pt ? `Sua escolha cria uma ponta quase morta: só ${knowledge.remainingWithNumber(scarce)} pedra(s) restam com ${scarce}. O tabuleiro pode travar. A IA evita números escassos.`
                : `Your pick creates a near-dead end: only ${knowledge.remainingWithNumber(scarce)} tile(s) left with ${scarce}. The board could stall. The AI avoids scarce numbers as ends.`
            });
          }
        }
      }

      // If no detailed lines beyond header, add a generic one
      if (lines.filter(l => !l.type.includes('header') && l.type !== 'user-reason').length === 0) {
        lines.push({ type: 'info', text: pt ? 'A escolha da IA é mais forte por combinar controle de naipe, bloqueio de adversários e/ou apoio ao parceiro.' : `The AI's choice is stronger due to a combination of suit control, blocking opponents, and/or supporting your partner.` });
      }

      return lines;
    }

    // Convert raw AI score to human-readable quality label
    function scoreToQuality(score, allScores) {
      if (allScores.length <= 1) return { label: 'Only option', cls: 'text-slate-400' };
      const best = allScores[0];
      const worst = allScores[allScores.length - 1];
      const range = best - worst;
      if (range === 0) return { label: 'Equal', cls: 'text-slate-400' };
      const pct = range > 0 ? ((score - worst) / range * 100) : 50;
      if (pct >= 90) return { label: 'Best', cls: 'text-emerald-400' };
      if (pct >= 65) return { label: 'Good', cls: 'text-yellow-400' };
      if (pct >= 35) return { label: 'Okay', cls: 'text-orange-400' };
      return { label: 'Weak', cls: 'text-red-400' };
    }

    // Normalize raw heuristic score to 0-100 scale relative to options
    function scorePct(score, allScores) {
      if (allScores.length <= 1) return 100;
      const best = allScores[0], worst = allScores[allScores.length - 1];
      const range = best - worst;
      return range > 0 ? Math.round((score - worst) / range * 100) : 100;
    }

    // Color for a 0-100 score
    function scoreColor(pct) {
      if (pct >= 80) return '#22c55e';
      if (pct >= 50) return '#eab308';
      if (pct >= 25) return '#f97316';
      return '#ef4444';
    }

    function renderQuizResultBadge() {
      if (!quizResult) return '';
      const r = quizResult;
      const gradeText = { perfect: 'PERFECT', good: 'INACCURACY', ok: 'MISTAKE', bad: 'BLUNDER' }[r.grade];
      const gradeCls = { perfect: 'grade-perfect', good: 'grade-good', ok: 'grade-ok', bad: 'grade-bad' }[r.grade];

      // Use detail lines from buildDetailedExplanation
      const detailLines = r.detail || [];
      const allScores = (r.allOptions || []).map(o => o.score);

      // Icon map for detail line types
      const iconMap = {
        'success': '<span class="text-emerald-400">&#10004;</span>',
        'header': '<span class="text-emerald-400 font-bold">&#9733;</span>',
        'header2': '<span class="text-yellow-400 font-bold">&#9679;</span>',
        'ai-reason': '<span class="text-emerald-400">&#9654;</span>',
        'user-reason': '<span class="text-yellow-400">&#9654;</span>',
        'compare': '<span class="text-blue-400">&#8644;</span>',
        'opponent': '<span class="text-red-400">&#9888;</span>',

      const colorMap = {

        'header2': 'text-yellow-300 font-bold',
        'ai-reason': 'text-emerald-200',
        'user-reason': 'text-yellow-200',
        'compare': 'text-blue-200',
        'opponent': 'text-red-200',
        'partner': 'text-blue-200',

      // Equity loss display
      const eqLoss = r.equityLoss || 0;
      const eqSrc = r.equityLossSource || 'heuristic';
      const eqColor = eqLoss < 0.02 ? '#22c55e' : eqLoss < 0.15 ? '#86efac' : eqLoss < 0.4 ? '#eab308' : '#ef4444';

      // MC data for header

      return `<div class="mt-2 bg-slate-900 rounded-lg p-3 border ${r.grade === 'perfect' ? 'border-emerald-500' : r.grade === 'bad' ? 'border-red-500' : 'border-yellow-500'}" style="max-height: 320px; overflow-y: auto;">

            return `<span class="text-xs font-mono font-bold" style="color:${eqColor}">EL: ${eqLoss.toFixed(2)} pts</span>
              <span class="text-xs text-slate-600">(${eqSrc})</span>
              ${mcUser && mcBest ? `<span class="text-xs text-slate-500">|</span>
                <span class="text-xs text-slate-400">[${r.userTile.left}|${r.userTile.right}]</span>
                <span class="text-xs font-mono" style="color:${epColor(mcUser.expectedPoints)}">${fmtEP(mcUser.expectedPoints)}</span>
                <span class="text-xs text-slate-500">&rarr;</span>

                <span class="text-xs font-mono text-emerald-400">${fmtEP(mcBest.expectedPoints)}</span>` :
              `<span class="text-xs text-slate-500">|</span>
                <span class="text-xs text-slate-400">[${r.userTile.left}|${r.userTile.right}]</span>
                <span class="text-xs text-slate-500">&rarr;</span>
                <span class="text-xs text-slate-400">[${r.aiTile.left}|${r.aiTile.right}]</span>`}`;

    // ========== SCORING DIALS (fan-shaped, like real Pernambuco board) ==========
    // Blue (T1) = top-left corner, Red (T2) = bottom-right corner
    function renderScoringDial(teamScore, teamIdx) {
      const score = Math.min(teamScore, 6);
      const r = 38; // radius
      const W = 96, H = 62;
      const color = teamIdx === 0 ? '#3b82f6' : '#ef4444';
      const label = teamIdx === 0 ? 'T1' : 'T2';
      // T1 (blue) top-left: fan opens downward-right; T2 (red) bottom-right: fan opens upward-left
      const isTopLeft = teamIdx === 0;
      const cx = isTopLeft ? 8 : W - 8;
      const cy = isTopLeft ? 8 : H - 8;
      // Angles: T1 fans from 0 (right) to PI/2 (down); T2 fans from PI (left) to 3PI/2 (up)
      const startAngle = isTopLeft ? 0 : Math.PI;
      const endAngle = isTopLeft ? Math.PI / 2 : Math.PI * 1.5;

      let ticks = '';
      for (let i = 0; i <= 6; i++) {
        const frac = i / 6;
        const angle = startAngle + frac * (endAngle - startAngle);
        const x1 = cx + (r - 7) * Math.cos(angle);
        const y1 = cy + (r - 7) * Math.sin(angle);
        const x2 = cx + r * Math.cos(angle);
        const y2 = cy + r * Math.sin(angle);
        const tx = cx + (r + 12) * Math.cos(angle);
        const ty = cy + (r + 12) * Math.sin(angle);
        const isActive = i <= score;
        const isCurrent = i === score;
        ticks += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${isActive ? color : '#475569'}" stroke-width="${isCurrent ? 3 : 1.5}" />`;
        ticks += `<text x="${tx}" y="${ty}" fill="${isCurrent ? '#ffffff' : isActive ? color : '#cbd5e1'}" font-size="${isCurrent ? 16 : 13}" font-weight="${isCurrent ? 900 : 700}" font-family="monospace" text-anchor="middle" dominant-baseline="central" stroke="${isCurrent ? '#000' : 'none'}" stroke-width="${isCurrent ? 0.5 : 0}" paint-order="stroke">${i}</text>`;
      }
      // Pointer dot on current score
      const pointerAngle = startAngle + (score / 6) * (endAngle - startAngle);
      const px = cx + (r - 14) * Math.cos(pointerAngle);
      const py = cy + (r - 14) * Math.sin(pointerAngle);

      // Arc path for filled portion
      const arcEnd = pointerAngle;
      const sx = cx + (r - 3) * Math.cos(startAngle);
      const sy = cy + (r - 3) * Math.sin(startAngle);
      const ex = cx + (r - 3) * Math.cos(arcEnd);
      const ey = cy + (r - 3) * Math.sin(arcEnd);
      const largeArc = (arcEnd - startAngle) > Math.PI ? 1 : 0;
      const arcPath = score > 0 ? `<path d="M${sx},${sy} A${r-3},${r-3} 0 ${largeArc} 1 ${ex},${ey}" fill="none" stroke="${color}" stroke-width="3" opacity="0.6" />` : '';

      // Position: T1 top-left, T2 bottom-right
      const posStyle = isTopLeft ? 'top:2px;left:2px' : 'bottom:2px;right:2px';

      return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="position:absolute;${posStyle};pointer-events:none">
        ${arcPath}${ticks}
        <circle cx="${px}" cy="${py}" r="5" fill="${color}" stroke="#fff" stroke-width="2" />
        <text x="${isTopLeft ? 14 : W - 14}" y="${isTopLeft ? 20 : H - 20}" fill="${color}" font-size="11" font-weight="800" text-anchor="middle" opacity="1.0">${label}</text>
      </svg>`;
    }

    // ========== FACE-DOWN REMOVED TILES ==========
    function renderRemovedTiles() {

        ${[0,1,2,3].map(() => `<div style="width:26px;height:52px;border-radius:4px;background:#fef3c7;border:1.5px solid #78716c;box-shadow:inset 0 1px 3px rgba(0,0,0,0.15)"></div>`).join('')}

    function renderBoard(snap) {
      if (!snap.board || snap.board.length === 0)
        return `<div class="text-green-700 text-sm" style="display:flex;align-items:center;justify-content:center;height:100%">${_t('empty_board')}</div>`;

      // Build tile→player map from snapshot history
      const tilePlayerMap = {};
      if (currentGame) {
        // Opening tile
        if (currentGame.autoTile && currentGame.autoPlayedBy !== undefined) {
          tilePlayerMap[currentGame.autoTile.id] = currentGame.autoPlayedBy;
        }
        // All played moves up to current step
        for (let s = 0; s <= currentStep && s < currentGame.snapshots.length; s++) {
          const sn = currentGame.snapshots[s];
          if (sn.action === 'play' && sn.tile && sn.player >= 0) {
            tilePlayerMap[sn.tile.id] = sn.player;
          }
        }
      }

      // Tile dimensions must match CSS: board-tile-h = 52x26, board-tile-v = 26x52
      const HW = 52, VW = 26, GAP = 1;

      const boardEl = document.getElementById('board-area');
      const MAX_W = boardEl ? boardEl.clientWidth - 28 : 280;

      // Row-breaking: same proven logic as index.html
      const rows = [];
      let cur = [], w = 0;
      for (let i = 0; i < snap.board.length; i++) {
        const isD = snap.board[i].left === snap.board[i].right;
        const tw = isD ? VW : HW;
        const need = cur.length > 0 ? tw + GAP : tw;
        if (w + need > MAX_W && cur.length > 0) {
          rows.push(cur);
          cur = [i]; w = tw;
        } else {
          cur.push(i); w += need;
        }
      }
      if (cur.length > 0) rows.push(cur);

      const endBadge = num =>
        `<div style="display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;
          border-radius:10px;background:#14532d;border:2px solid #4ade80;color:#86efac;font-weight:700;font-size:11px;flex-shrink:0">${num}</div>`;

      const LB = endBadge(snap.leftEnd);
      const RB = endBadge(snap.rightEnd);

      const PLAYER_CLS = ['board-tile-p0', 'board-tile-p1', 'board-tile-p2', 'board-tile-p3'];
      const PLAYER_LABELS = PLAYER_NAMES;
      const playGameOver = gameMode === 'play' && snap.outcome;
      const showBorders = gameMode !== 'play' || playGameOver; // no borders during live play, show after game over

      const makeTile = (idx, forceVertical, flipped) => {
        const t = snap.board[idx];
        const isD = t.left === t.right;
        const orient = (isD || forceVertical) ? 'v' : 'h';
        const isNew = snap.action === 'play' && snap.tile && snap.tile.id === t.id;
        const tile = (flipped && orient === 'h') ? {left: t.right, right: t.left, id: t.id} : t;
        const player = showBorders ? tilePlayerMap[t.id] : undefined;
        const pCls = player !== undefined ? PLAYER_CLS[player] : '';
        const cls = (isNew ? 'board-tile-new' : '') + (pCls ? ' ' + pCls : '');
        const titleAttr = player !== undefined ? `${t.left}-${t.right} (${PLAYER_LABELS[player]})` : '';
        return tileHTML(tile, 'board', orient, cls, '', '', titleAttr);
      };

      // Single row — centered with end badges
      if (rows.length === 1) {
        const tiles = rows[0].map(idx => makeTile(idx, false, false)).join('');
        return `<div style="display:flex;align-items:center;justify-content:center;gap:${GAP}px">
          ${LB}${tiles}${RB}
        </div>`;
      }

      // Multi-row snake layout — chain-end turn tracking
      // Row 0: centered when short (<8 tiles), right-aligned when wrapping starts
      // Odd rows: row-reverse (chain turns back, connects at right edge)
      // Even rows >0: left-to-right (chain turns forward, connects at left edge)
      // Turn connector: LAST tile of each row (except final) turns down to next row
      let html = '';
      for (let rIdx = 0; rIdx < rows.length; rIdx++) {
        const row = rows[rIdx];
        const isOdd = rIdx % 2 === 1;
        let flexDir = 'row';
        let justify = 'center';
        if (rIdx === 0) { justify = (board.length < 8) ? 'center' : 'flex-end'; }
        else if (isOdd) { flexDir = 'row-reverse'; justify = 'flex-start'; }
        else { justify = 'flex-start'; }

        const tiles = row.map((idx, posInRow) => {
          // Chain-end turn: last tile of each row turns down to connect to next row
          const isTurn = rIdx < rows.length - 1 && posInRow === row.length - 1;
          return makeTile(idx, isTurn, isOdd);
        }).join('');

        let rowHTML = '';
        if (rIdx === 0) rowHTML = LB + tiles;
        else if (rIdx === rows.length - 1) rowHTML = tiles + RB;
        else rowHTML = tiles;

        html += `<div style="display:flex;flex-direction:${flexDir};justify-content:${justify};align-items:center;gap:${GAP}px;${rIdx < rows.length - 1 ? 'margin-bottom:'+GAP+'px' : ''}">
          ${rowHTML}
        </div>`;
      }
      return html;
    }

        <div class="bg-slate-900 rounded-lg p-2.5 mb-2 border border-slate-600">
          <div class="text-xs text-slate-400">
            ${pn(currentGame.autoPlayedBy)} ${_t('auto_plays')} [${currentGame.autoTile.left}|${currentGame.autoTile.right}] (${_t('highest_dbl_rule')}).
          </div>
        </div>` : puzzleMode ? `
        <div class="bg-slate-900 rounded-lg p-2.5 mb-2 border border-amber-600">
          <div class="text-xs text-amber-400 font-bold">${_t('pick_best')}</div>
        </div>` : ''}

        <!-- Monte Carlo Analysis -->
        ${renderMCPanel()}

        <!-- Teaching tip -->
        ${renderTeachingTip(snap)}

        <!-- Knowledge panel -->
        <div class="bg-slate-900 rounded-lg p-2 mb-2">
          <div class="text-xs font-bold text-slate-400 mb-1">${_t('intelligence')}</div>
          ${[0,1,2,3].map(p => {
            const dead = snap.knowledge ? snap.knowledge.deadNumbers(p) : [];
            if (dead.length === 0) return '';
            return `<div class="text-xs mb-0.5"><span style="color:${teamColors[p%2]}">${pn(p)}:</span> ${_t('cant_have')} <span class="text-red-400 font-mono">{${dead.join(', ')}}</span></div>`;
          }).join('')}
          ${snap.knowledge && [0,1,2,3].every(p => snap.knowledge.deadNumbers(p).length === 0) ? `<div class="text-xs text-slate-500">${_t('no_intel')}</div>` : ''}
        </div>

        <!-- Move log -->
        <div id="log-container" class="flex-1 overflow-y-auto space-y-0.5 max-h-[350px]">
          ${currentGame.snapshots.slice(1).map((s, i) => {
            const stepIdx = i + 1;
            const isCur = stepIdx === currentStep;
            const isPast = stepIdx < currentStep;
            return `<div class="log-entry rounded px-2 py-0.5 cursor-pointer text-xs ${isCur ? 'active' : isPast ? 'past' : ''}"
              onclick="goTo(${stepIdx})" id="log-${stepIdx}">
              <span class="font-mono text-slate-500">#${s.move}</span>
              <span class="font-bold" style="color:${teamColors[s.player%2]}">${pn(s.player)}</span>
              ${s.action === 'pass'
                ? `<span class="text-orange-400">${_t('passed_word')}</span>`
                : `<span class="text-emerald-400">[${s.tile.left}|${s.tile.right}]</span> <span class="text-slate-400">${s.side}</span>`}
              ${s.outcome ? `<span class="text-yellow-400 ml-1">${s.outcome.winType || s.outcome.type}</span>` : ''}
            </div>`;
          }).join('')}
        </div>
      `;
    }

    function renderTeachingTip(snap) {
      if (snap.move === 0) return '';
      const tips = [];
      const reasons = snap.reasons || [];
      const k = snap.knowledge;
      const pt = appLang === 'pt';

      // --- Analyze game state for context-aware tips ---
      const partner = 2, opp1 = 1, opp3 = 3;
      const handCounts = snap.hands.map(h => h.length);
      const partnerTiles = handCounts[partner];
      const opp1Tiles = handCounts[opp1];
      const opp3Tiles = handCounts[opp3];
      const myTiles = handCounts[0];
      const opp1Dead = k ? k.deadNumbers(opp1) : [];
      const opp3Dead = k ? k.deadNumbers(opp3) : [];
      const partnerDead = k ? k.deadNumbers(partner) : [];
      const partnerStr = k ? k.inferStrength(partner) : [0,0,0,0,0,0,0];
      const partnerStrongSuits = partnerStr.map((v, i) => ({ num: i, count: v })).filter(x => x.count >= 2).sort((a, b) => b.count - a.count);

      // === PASS TIPS ===
      if (snap.action === 'pass') {
        const dead = k ? k.deadNumbers(snap.player) : [];
        const pName = pn(snap.player);

        if (snap.player === opp1 || snap.player === opp3) {
          if (dead.length >= 4) {
            tips.push({ icon: '&#128270;', color: 'text-red-300',
              text: pt ? `${pName} já passou em ${dead.length}/7 números — está muito travado. Deixe as pontas em números que faltam e vai continuar passando.`
                : `${pName} has passed on ${dead.length}/7 numbers — they're badly stuck. Leave board ends on numbers they lack and they'll keep passing.`,
              rule: pt ? 'RASTREIE PASSES: Cada passe revela 2 números que o adversário não tem. Após 2 passes você sabe 4 números mortos — quase metade dos naipes!'
                : 'TRACK PASSES: Every pass reveals 2 numbers an opponent lacks. After 2 passes you know 4 dead numbers — nearly half the suits!'
            });
          } else if (dead.length >= 2) {
            tips.push({ icon: '&#128270;', color: 'text-orange-300',
              text: pt ? `${pName} não tem {${dead.join(', ')}}. Tente manter pelo menos um desses números como ponta.`
                : `${pName} can't have {${dead.join(', ')}}. Try to keep at least one of these numbers as a board end.`,
              rule: pt ? 'MEMORIZE PASSES: No jogo real, diga mentalmente: "Esquerda não joga 3 nem 6." Esta é a informação grátis mais valiosa no dominó.'
                : 'MEMORIZE PASSES: In real play, say it in your head: "Left can\'t play 3 or 6." This is the most valuable free information in domino.'
            });
          } else {
            tips.push({ icon: '&#128270;', color: 'text-yellow-300',
              text: pt ? `Primeiro passe de ${pName} — não tem ${snap.leftEnd} nem ${snap.rightEnd}. Guarde isso.`
                : `${pName}'s first pass — they lack both ${snap.leftEnd} and ${snap.rightEnd}. File this away.`,
              rule: pt ? 'PRIMEIRO PASSE = OURO: Na primeira vez que alguém passa, você aprende 2 números. Guarde na memória para o resto da rodada.'
                : 'FIRST PASS = GOLD: The first time someone passes, you learn 2 numbers. Keep these in memory for the rest of the round.'
            });
          }
        } else if (snap.player === partner) {
          tips.push({ icon: '&#128153;', color: 'text-blue-300',
            text: pt ? `Parceiro passou — não joga ${snap.leftEnd} nem ${snap.rightEnd}. No seu turno, tente mudar as pontas para números que o parceiro já jogou.`
              : `Partner passed — they can't play ${snap.leftEnd} or ${snap.rightEnd}. On your next turn, try to change the board ends to numbers partner has played before.`,
            rule: pt ? 'AJUDE SEU PARCEIRO: Quando parceiro passa, sua prioridade #1 é mudar o tabuleiro para números que ele PODE jogar. Parceiro passando é equipe perdendo.'
              : 'HELP YOUR PARTNER: When partner passes, your #1 priority is changing the board to numbers they CAN play. A passing partner is a losing team.'
          });
        } else if (snap.player === 0) {
          tips.push({ icon: '&#9888;', color: 'text-yellow-300',
            text: pt ? `Você passou — adversários agora sabem que você não tem ${snap.leftEnd} nem ${snap.rightEnd}. Vão tentar manter essas pontas para te trancar.`
              : `You passed — opponents now know you lack ${snap.leftEnd} and ${snap.rightEnd}. They'll try to keep these as ends to lock you out.`,
            rule: pt ? 'SEUS PASSES CUSTAM: Cada vez que passa, adversários ganham inteligência. Jogue pedras que te mantêm flexível para evitar passar.'
              : 'YOUR PASSES HURT: Every time you pass, opponents gain intelligence. Play tiles that keep you flexible to avoid passing.'
          });
        }
      }

      // === PLAY TIPS ===
      if (snap.action === 'play') {
        if (partnerTiles <= 2 && partnerTiles > 0) {
          tips.push({ icon: '&#127942;', color: 'text-emerald-300',
            text: pt ? `Parceiro tem só ${partnerTiles} pedra${partnerTiles > 1 ? 's' : ''}! Priorize deixar pontas que ele possa jogar — mesmo acima de bloquear adversários.`
              : `Partner has only ${partnerTiles} tile${partnerTiles > 1 ? 's' : ''} left! Prioritize leaving ends they can play over everything else — even over blocking opponents.`,
            rule: pt ? 'REGRA DO FINAL: Quando parceiro tem 1-2 pedras, ajudá-lo a bater é quase sempre a melhor jogada. Bloquear é inútil se sua equipe pode ganhar AGORA.'
              : 'ENDGAME RULE: When partner has 1-2 tiles, helping them go out is almost always the best play. Blocking is pointless if your team can win NOW. Count tiles: started with 6, played X, so they have 6-X.'
          });
        }

        if (opp1Tiles <= 2 || opp3Tiles <= 2) {
          const dangerOpp = opp1Tiles <= 2 ? opp1 : opp3;
          const dangerCount = Math.min(opp1Tiles, opp3Tiles);
          tips.push({ icon: '&#9888;', color: 'text-red-300',
            text: pt ? `${pn(dangerOpp)} tem só ${dangerCount} pedra${dangerCount > 1 ? 's' : ''} — perigo! Bloqueie ou vai ganhar. Deixe pontas em números que passou.`
              : `${pn(dangerOpp)} has only ${dangerCount} tile${dangerCount > 1 ? 's' : ''} left — danger! Block them or they'll win. Leave ends on numbers they've passed on.`,
            rule: pt ? 'CONTE PEDRAS DO ADVERSÁRIO: Se adversário tem 1-2 pedras, bloqueá-lo é crítico. Use o histórico de passes para deixar pontas que não pode jogar.'
              : 'COUNT OPPONENT TILES: If an opponent has 1-2 tiles, blocking them becomes critical. Use their pass history to leave ends they can\'t play.'
          });
        }

        if (partnerStrongSuits.length > 0 && reasons.some(r => r.includes('Partner played'))) {
          const top = partnerStrongSuits[0];
          tips.push({ icon: '&#128153;', color: 'text-blue-300',
            text: pt ? `Parceiro jogou ${top.count} pedras com ${top.num} — provavelmente tem mais. Deixar ponta ${top.num} permite que jogue.`
              : `Partner has played ${top.count} tiles with ${top.num}s — they likely have more. Leaving a ${top.num}-end lets them play.`,
            rule: pt ? `LEIA O NAIPE DO PARCEIRO: Quando parceiro joga 2+ pedras com o mesmo número, está sinalizando força. Mantenha esse número como ponta. "Parceiro gosta de ${top.num}" — simples mas poderoso.`
              : `READ PARTNER'S SUIT: When partner plays 2+ tiles with the same number, they're signaling strength. Keep that number as a board end. In real play: "Partner likes ${top.num}s" — simple but powerful.`
          });
        }

        if (reasons.some(r => r.includes('Blocks'))) {
          const blockedOpp = opp1Dead.includes(snap.leftEnd) && opp1Dead.includes(snap.rightEnd) ? opp1 :
                             opp3Dead.includes(snap.leftEnd) && opp3Dead.includes(snap.rightEnd) ? opp3 : -1;
          if (blockedOpp >= 0) {
            const blockedDead = blockedOpp === opp1 ? opp1Dead : opp3Dead;
            tips.push({ icon: '&#128683;', color: 'text-red-300',
              text: pt ? `${pn(blockedOpp)} totalmente bloqueado — ambas pontas (${snap.leftEnd}/${snap.rightEnd}) estão no conjunto morto {${blockedDead.join(', ')}}.`
                : `${pn(blockedOpp)} is fully blocked — both ends (${snap.leftEnd}/${snap.rightEnd}) are in their dead set {${blockedDead.join(', ')}}.`,
              rule: pt ? 'BLOQUEIO = TEMPO: Adversário bloqueado perde o turno. É como ganhar uma jogada extra grátis para sua equipe.'
                : 'BLOCKING = TEMPO: A blocked opponent loses their turn. That\'s like getting a free extra move for your team. The more passes they make, the more turns your team gets.'
            });
          }
        }

        for (const oppIdx of [opp1, opp3]) {
          const oppDead = k ? k.deadNumbers(oppIdx) : [];
          if (oppDead.length >= 5 && handCounts[oppIdx] >= 3) {
            tips.push({ icon: '&#128161;', color: 'text-amber-300',
              text: pt ? `${pn(oppIdx)} já está travado (não tem ${oppDead.length}/7 números, ainda com ${handCounts[oppIdx]} pedras). Não gaste jogadas bloqueando mais — foque em ajudar parceiro.`
                : `${pn(oppIdx)} is already stuck (can't have ${oppDead.length}/7 numbers, still holding ${handCounts[oppIdx]} tiles). No need to waste moves blocking them further — focus on helping partner or playing your strong suits.`,
              rule: pt ? 'BLOQUEIO MORTO: Se adversário já passou 3+ vezes, está travado de qualquer forma. Ajude seu parceiro ou descarte pedras pesadas.'
                : 'DEAD BLOCKING: If an opponent has passed 3+ times, they\'re stuck regardless. Don\'t waste moves blocking someone who\'s already dead. Help your partner or dump heavy tiles instead.'
            });
            break;
          }
        }

        if (snap.tile.left === snap.tile.right) {
          const dblNum = snap.tile.left;
          const support = snap.hands[snap.player] ? snap.hands[snap.player].filter(tl => tl.left === dblNum || tl.right === dblNum).length : 0;
          if (support === 0 && !tips.some(tp => tp.text.includes('double') || tp.text.includes('carroça'))) {
            tips.push({ icon: '&#9879;', color: 'text-purple-300',
              text: pt ? `Jogou a carroça [${dblNum}|${dblNum}]${snap.hands[snap.player] && snap.hands[snap.player].some(tl => tl.left === dblNum || tl.right === dblNum) ? '' : ' sem backup'}. Carroças só conectam a um número — jogue cedo antes que o tabuleiro mude.`
                : `Played the [${dblNum}|${dblNum}] double${snap.hands[snap.player] && snap.hands[snap.player].some(tl => tl.left === dblNum || tl.right === dblNum) ? '' : ' with no backup'}. Doubles only connect to one number — play them early before the board moves away.`,
              rule: pt ? 'CARROÇAS SÃO ARMADILHAS: Uma carroça [X|X] só conecta com X. Se segurar muito tempo e todas as pontas X sumirem, fica travado. Jogue carroças na primeira oportunidade.'
                : 'DOUBLES ARE TRAPS: A double [X|X] can only connect to X. If you hold it too long and all X-ends disappear, you\'re stuck. Play doubles at the first opportunity unless you have 2+ support tiles with that number.'
            });
          }
        }

        if (snap.tile.left + snap.tile.right >= 10 && reasons.some(r => r.includes('Dump heavy'))) {
          tips.push({ icon: '&#9878;', color: 'text-orange-300',
            text: pt ? `Descartou pedra pesada (${snap.tile.left + snap.tile.right} pontos). Se o jogo trancar, a equipe com menos pontos ganha.`
              : `Dumped a heavy tile (${snap.tile.left + snap.tile.right} pips). If the game blocks, the team with fewer total pips wins.`,
            rule: pt ? 'GESTÃO DE PONTOS: Em jogo trancado, cada ponto conta. Descarte [6|5]=11, [6|4]=10 cedo. Guarde pedras leves para depois. As 4 pedras "dorme" não distribuídas fazem trancadas comuns.'
              : 'PIP MANAGEMENT: In a blocked game, every pip counts. Dump [6|5]=11, [6|4]=10 early. Keep light tiles [0|1]=1, [0|2]=2 for later. The 4 "dorme" tiles (undealt) average ~14 pips, so a blocked game is common.'
          });
        }

        if (reasons.some(r => r.includes('Few tiles left'))) {
          tips.push({ icon: '&#9888;', color: 'text-orange-300',
            text: pt ? 'Criou uma ponta escassa — poucas pedras restam com esse número. Risco de trancar o tabuleiro.'
              : 'Created a scarce end — few tiles left with that number. This risks stalling the board.',
            rule: pt ? 'EVITE PONTAS MORTAS: Se 5+ das 7 pedras de um número foram jogadas, essa ponta está quase morta. Conte as pedras jogadas por número para evitar isso.'
              : 'AVOID DEAD ENDS: If 5+ of the 7 tiles with a number are played, that end is nearly dead. Creating it as a board end means nobody can play there. Count played tiles per number to avoid this.'
          });
        }

        if (snap.move <= 2 && !tips.length) {
          tips.push({ icon: '&#127919;', color: 'text-cyan-300',
            text: pt ? 'Início de jogo — foque em jogar pedras do seu naipe mais forte (o número que mais tem). Isso constrói controle de naipe.'
              : 'Early game — focus on playing tiles from your deepest suit (the number you have the most of). This builds suit control for later.',
            rule: pt ? 'ESTRATÉGIA DE ABERTURA: Jogue do seu naipe mais forte primeiro. Se tem 4 pedras com 3, jogue um 3 cedo para dominar essa ponta. Profundidade = controle.'
              : 'OPENING STRATEGY: Play from your strongest suit first. If you have 4 tiles with 3s, play a 3 early to claim that end. Suit depth = control. The player who dominates a suit forces others to play around them.'
          });
        }

        if (snap.move >= 8 && !tips.length) {
          const myTeamTiles = myTiles + partnerTiles;
          const oppTeamTiles = opp1Tiles + opp3Tiles;
          if (myTeamTiles < oppTeamTiles - 2) {
            tips.push({ icon: '&#128640;', color: 'text-emerald-300',
              text: pt ? `Sua equipe tem ${myTeamTiles} pedras vs ${oppTeamTiles} dos adversários — vocês estão na frente! Jogue agressivamente para ajudar parceiro a bater.`
                : `Your team has ${myTeamTiles} tiles vs opponents' ${oppTeamTiles} — you're ahead! Play aggressively to help partner finish.`,
              rule: pt ? '"QUEM ESTÁ GANHANDO?": Antes de cada jogada, conte: minhas pedras + parceiro vs ambos adversários. Se sua equipe tem menos, ajude parceiro a fechar.'
                : '"WHO\'S WINNING?" CHECK: Before each play, quickly count: my tiles + partner\'s tiles vs both opponents. If your team has fewer tiles, play to help partner close out. If behind, slow down and block.'
            });
          } else if (oppTeamTiles < myTeamTiles - 2) {
            tips.push({ icon: '&#9888;', color: 'text-red-300',
              text: pt ? `Adversários têm ${oppTeamTiles} pedras vs ${myTeamTiles} da sua equipe — estão na frente. Foque em bloquear e descartar pedras pesadas.`
                : `Opponents have ${oppTeamTiles} tiles vs your team's ${myTeamTiles} — they're ahead. Focus on blocking and dumping heavy tiles in case it blocks.`,
              rule: pt ? '"QUEM ESTÁ GANHANDO?": Quando adversários têm menos pedras, o jogo pode acabar a favor deles. Mude para bloqueio e descarte pedras pesadas.'
                : '"WHO\'S WINNING?" CHECK: When opponents have fewer tiles, the game might end soon in their favor. Shift to blocking (leave ends they can\'t play) and dump heavy tiles (reduce pip count for blocked game).'
            });
          }
        }
      }

      if (tips.length === 0) return '';

      return tips.slice(0, 2).map(tp => `
        <div class="bg-indigo-950 rounded-lg p-2 mb-2 border border-indigo-700">
          <div class="text-xs text-indigo-300 mb-1">
            <span>${tp.icon}</span> <span class="font-bold">${_t('situation')}</span> ${tp.text}
          </div>
          <div class="text-xs ${tp.color} bg-indigo-900/50 rounded px-2 py-1">
            <span class="font-bold">${_t('rule_mem')}</span> ${tp.rule}
          </div>
        </div>
      `).join('');
    }

    // Format E[pts] with sign and color
    function fmtEP(ep) {
      const sign = ep >= 0 ? '+' : '';
      return `${sign}${ep.toFixed(2)}`;
    }
    function epColor(ep) {
      if (ep >= 0.5) return '#22c55e';
      if (ep >= 0.1) return '#86efac';
      if (ep >= -0.1) return '#eab308';
      if (ep >= -0.5) return '#f97316';
      return '#ef4444';
    }

    function renderMCPanel() {
      if (!deepAnalysis) return '';
      if (mcRunning) {
        return `<div class="bg-blue-950 rounded-lg p-2.5 mb-2 border border-blue-700">
          <div class="text-xs text-blue-300 pulse flex items-center gap-2">
            <span class="inline-block w-3 h-3 border-2 border-blue-400 border-t-transparent rounded-full animate-spin"></span>
            Monte Carlo analyzing (${MC_SIMS_WATCH} simulations per tile)...
          </div>
        </div>`;
      }
      if (!mcResults || mcResults.length === 0) return '';

      const best = mcResults[0];
      const snap = currentGame.snapshots[currentStep];
      const heuristicBest = snap.allOptions && snap.allOptions.length > 0 ? snap.allOptions[0] : null;
      const disagree = heuristicBest && best.tile.id !== heuristicBest.tile.id;

      // Normalize E[pts] bars: map range [-4, +4] to [0%, 100%] with 50% = 0
      const epToPct = ep => Math.max(0, Math.min(100, 50 + ep * 12.5));

      return `<div class="bg-blue-950 rounded-lg p-2.5 mb-2 border ${disagree ? 'border-yellow-500' : 'border-blue-700'}">
        <div class="flex items-center justify-between mb-1.5">
          <span class="text-xs font-bold text-blue-300">Monte Carlo Analysis</span>
          ${disagree ? '<span class="text-xs text-yellow-400 font-bold">DISAGREES with heuristic</span>' : '<span class="text-xs text-emerald-400">Confirms heuristic</span>'}
        </div>
        <div class="text-xs text-slate-500 mb-1 flex gap-3">
          <span class="font-mono">E[pts] = expected points per round</span>
          <span class="text-slate-600">Match: ${matchScore[0]}-${matchScore[1]}</span>
        </div>
        <div class="space-y-1.5">
          ${mcResults.map((r, i) => {
            const winPct = (r.winRate * 100).toFixed(0);
            const ep = r.expectedPoints;
            const epBarPct = epToPct(ep);
            const col = epColor(ep);
            const isBest = i === 0;
            const isHeuristicPick = heuristicBest && r.tile.id === heuristicBest.tile.id;
            const eqLoss = best.expectedPoints - ep;
            // Outcome icons
            const oc = r.outcomes || {};
            const sims = r.sims || 80;
            const outcomeStr = [
              oc.carroca > 0 ? `C:${(oc.carroca/sims*100).toFixed(0)}%` : '',
              oc.laelo > 0 ? `L:${(oc.laelo/sims*100).toFixed(0)}%` : '',
              oc.cruzada > 0 ? `X:${(oc.cruzada/sims*100).toFixed(0)}%` : '',
              oc.blocked > 0 ? `B:${(oc.blocked/sims*100).toFixed(0)}%` : ''
            ].filter(Boolean).join(' ');
            return `<div class="text-xs">
              <div class="flex items-center gap-1.5">
                <span class="${isBest ? 'text-emerald-400 font-bold' : 'text-slate-400'} w-14">[${r.tile.left}|${r.tile.right}]</span>
                <span class="font-mono font-bold w-12 text-right" style="color:${col}">${fmtEP(ep)}</span>
                <div class="flex-1 bg-slate-700 rounded-full h-2 relative">
                  <div class="absolute top-0 left-1/2 w-px h-2 bg-slate-500"></div>
                  <div class="h-2 rounded-full absolute" style="left:${Math.min(50, epBarPct)}%;width:${Math.abs(epBarPct - 50)}%;background:${col}"></div>
                </div>
                <span class="w-9 text-right font-mono text-slate-500">${winPct}%</span>
                ${isBest ? '<span class="text-emerald-500 font-bold">BEST</span>' : eqLoss > 0.01 ? `<span class="font-mono text-red-400">-${eqLoss.toFixed(2)}</span>` : ''}
                ${isHeuristicPick && !isBest ? '<span class="text-yellow-600">H</span>' : ''}
              </div>
              ${outcomeStr ? `<div class="ml-16 text-slate-600 font-mono">${outcomeStr}</div>` : ''}
            </div>`;
          }).join('')}
        </div>
        <div class="text-xs text-slate-600 mt-1">E[pts] from ${mcResults[0]?.sims || 80} sims/tile | Block: ${(best.blockRate*100).toFixed(0)}%</div>

        ${(() => {
          // Uncertainty notice when top 2 are close
          const unc = explainUncertainty(mcResults);
          if (!unc) return '';
          return `<div class="bg-yellow-900/30 rounded p-1.5 mt-1.5 border border-yellow-800">
            <div class="text-xs text-yellow-300">${unc.message}</div>
            <div class="text-xs text-yellow-500">${unc.recommendation}</div>
          </div>`;
        })()}

        ${(() => {
          // Compute metrics for best move
          try {
            const metrics = computeAllMetrics(snap, snap.currentPlayer, best.tile, best.side);
            const explanation = explanationBuilder.explain(best, mcResults, snap, metrics);
            const motifs = explanation.motifs;
            if (motifs.length === 0 && !metrics.control) return '';

            return `<div class="border-t border-slate-700 pt-1.5 mt-1.5">
              ${motifs.length > 0 ? `
              <div class="flex flex-wrap gap-1 mb-1.5">
                ${motifs.map(m => `<span class="text-xs px-1.5 py-0.5 rounded-full bg-slate-800 border border-slate-600 text-slate-300" title="${m.evidence}">${m.icon || ''} ${m.name}</span>`).join('')}
              </div>` : ''}
              <div class="grid grid-cols-3 gap-1 text-xs">
                <div class="bg-slate-800 rounded p-1 text-center">
                  <div class="text-slate-500">Flex</div>
                  <div class="font-mono font-bold" style="color:${metrics.flexibility.flexibility > 0.5 ? '#22c55e' : metrics.flexibility.flexibility > 0.3 ? '#eab308' : '#ef4444'}">${(metrics.flexibility.flexibility * 100).toFixed(0)}%</div>
                </div>
                <div class="bg-slate-800 rounded p-1 text-center">
                  <div class="text-slate-500">Control</div>

    function renderProbabilityPanel(snap, pNames, teamColors) {
      const knowledge = snap.knowledge;
      if (!knowledge) return '<div class="text-xs text-slate-500">No data yet</div>';

      // Compute tile probabilities via MC sampling for gradient display
      const handSizes = snap.hands.map(h => h.length);
      const tileProbs = {};
      for (const p of [1, 2, 3]) {
        tileProbs[p] = computeTileProbs(p, knowledge, handSizes, snap.hands[0], 0, 200);
      }

      // Helper: probability to gradient color
      const probToColor = (prob) => {
        if (prob <= 0) return { bg: '#450a0a', txt: '#fca5a5' };  // eliminated
        if (prob >= 0.8) return { bg: '#14532d', txt: '#86efac' }; // very likely
        if (prob >= 0.5) return { bg: '#365314', txt: '#a3e635' }; // likely
        if (prob >= 0.25) return { bg: '#422006', txt: '#fbbf24' }; // medium
        return { bg: '#451a03', txt: '#fb923c' };                   // unlikely but possible
      };

      // Build probability grid for each opponent
      return `
        <div class="space-y-3 overflow-y-auto flex-1">
          ${[1, 2, 3].map(p => {
            const possible = knowledge.possibleTilesFor(p);
            const handSize = snap.hands[p].length;
            const dead = knowledge.deadNumbers(p);
            const probs = tileProbs[p];

            return `
              <div class="bg-slate-900 rounded-lg p-2">
                <div class="flex items-center justify-between mb-1.5">
                  <span class="text-xs font-bold" style="color:${teamColors[p%2]}">${pNames[p]}</span>
                  <span class="text-xs text-slate-400 tooltip">${handSize} in hand
                    <span class="tip-text">${pNames[p]} holds ${handSize} tiles. ${possible.length} tiles are still possible candidates (not yet eliminated by plays/passes). Probabilities from ${200} MC samples.</span>
                  </span>
                </div>
                ${dead.length > 0 ? `<div class="text-xs text-red-400 mb-1">Dead: {${dead.join(', ')}}</div>` : ''}
                <div class="grid gap-px" style="grid-template-columns: repeat(8, 1fr)">
                  <!-- Header row -->
                  <div class="prob-cell text-slate-600"></div>
                  ${[0,1,2,3,4,5,6].map(n => `<div class="prob-cell text-slate-400 font-bold">${n}</div>`).join('')}
                  <!-- Data rows -->
                  ${[0,1,2,3,4,5,6].map(row => `
                    <div class="prob-cell text-slate-400 font-bold">${row}</div>
                    ${[0,1,2,3,4,5,6].map(col => {
                      if (col < row) return '<div class="prob-cell"></div>';
                      const tid = `${row}-${col}`;
                      const isPlayed = knowledge.played.has(tid);
                      const isInMyHand = snap.hands[0].some(t => t.id === tid);
                      const prob = probs[tid] || 0;
                      let bg, txt, label;
                      if (isPlayed) { bg = '#1e293b'; txt = '#475569'; label = 'played'; }
                      else if (isInMyHand) { bg = '#1e3a5f'; txt = '#60a5fa'; label = 'your hand'; }
                      else {
                        const c = probToColor(prob);
                        bg = c.bg; txt = c.txt;
                        label = `${(prob * 100).toFixed(0)}% chance`;
                      }
                      const pctDisplay = !isPlayed && !isInMyHand && prob > 0 ? `${(prob * 100).toFixed(0)}` : `${row}${col}`;
                      return `<div class="prob-cell" style="background:${bg};color:${txt};opacity:${isPlayed ? 0.4 : isInMyHand ? 1 : 0.4 + prob * 0.6}" title="${row}-${col}: ${label}">${pctDisplay}</div>`;
                    }).join('')}
                  `).join('')}
                </div>
                <div class="flex gap-2 mt-1.5 text-xs flex-wrap">
                  <span class="flex items-center gap-1"><span class="w-2 h-2 rounded" style="background:#14532d"></span> &gt;80%</span>
                  <span class="flex items-center gap-1"><span class="w-2 h-2 rounded" style="background:#365314"></span> 50-80%</span>
                  <span class="flex items-center gap-1"><span class="w-2 h-2 rounded" style="background:#422006"></span> 25-50%</span>
                  <span class="flex items-center gap-1"><span class="w-2 h-2 rounded" style="background:#451a03"></span> &lt;25%</span>
                  <span class="flex items-center gap-1"><span class="w-2 h-2 rounded" style="background:#450a0a"></span> 0%</span>
                  <span class="flex items-center gap-1"><span class="w-2 h-2 rounded" style="background:#1e3a5f"></span> Yours</span>
                </div>
              </div>`;
          }).join('')}

          <!-- Suit exhaustion summary -->
          <div class="bg-slate-900 rounded-lg p-2">
            <div class="text-xs font-bold text-slate-400 mb-1 tooltip">Suit Exhaustion
              <span class="tip-text" style="white-space:normal;max-width:220px">How many tiles with each number (0-6) remain unplayed. Each number appears on 7 tiles total. Red = exhausted (no tiles left), Orange = scarce (1-2 left), Green = plenty available. Use this to read suits and predict opponent hands.</span>
            </div>
            <div class="grid grid-cols-7 gap-1">
              ${[0,1,2,3,4,5,6].map(n => {
                const rem = knowledge.remainingWithNumber(n);
                const total = 7; // each number appears on 7 tiles
                const played = total - rem;
                const pct = (played / total * 100).toFixed(0);
                const color = rem === 0 ? '#ef4444' : rem <= 2 ? '#f97316' : '#22c55e';
                return `<div class="text-center" title="Suit ${n}: ${played} of 7 played, ${rem} remaining${rem === 0 ? ' — EXHAUSTED, no one can play this number' : rem <= 2 ? ' — scarce, hard to match' : ''}">
                  <div class="text-xs font-bold" style="color:${color}">${n}</div>
                  <div class="bg-slate-700 rounded-full h-1.5 mt-0.5">
                    <div class="h-1.5 rounded-full" style="width:${pct}%;background:${color}"></div>
                  </div>
                  <div class="text-xs text-slate-500">${rem} left</div>
                </div>`;
              }).join('')}
            </div>
          </div>
        </div>
      `;
    }

    // ========== ANALYSIS TAB — Game Report + Leak Finder ==========

    let analysisRunning = false;

    function runAnalysisAsync(onComplete) {
      if (!currentGame || currentGame._analysisCache || analysisRunning) return;
      analysisRunning = true;
      currentGame._analysisPartial = [];
      const snapshots = currentGame.snapshots;
      const p0Steps = [];
      for (let i = 1; i < snapshots.length; i++) {
        if (snapshots[i].player === 0 && snapshots[i].action === 'play') p0Steps.push(i);
      }
      currentGame._analysisTotalMoves = p0Steps.length;
      let idx = 0;
      const game = currentGame; // capture reference

      function processNext() {
        if (game !== currentGame) { analysisRunning = false; return; } // game changed
        if (idx >= p0Steps.length) {
          game._analysisCache = game._analysisPartial;
          delete game._analysisPartial;
          delete game._analysisTotalMoves;
          analysisRunning = false;
          if (onComplete) onComplete();
          render();
          return;
        }
        const i = p0Steps[idx];
        const s = snapshots[i];
        const prevSnap = snapshots[i - 1];
        const aHandSizes = prevSnap.hands.map(h => h.length);
        computeBeliefs(prevSnap.knowledge, aHandSizes, prevSnap.hands[0], 0, 150);
        const mc = monteCarloEval(prevSnap, 0, MC_SIMS_ANALYSIS);
        const best = mc.length > 0 ? mc[0] : null;
        const played = mc.find(m => m.tile.id === s.tile.id && m.side === s.side)
                    || mc.find(m => m.tile.id === s.tile.id);
        const eqLoss = best && played ? best.expectedPoints - played.expectedPoints : 0;
        let grade;
        if (best && s.tile.id === best.tile.id && (!best.side || best.side === s.side)) grade = 'perfect';
        else if (eqLoss < 0.02) grade = 'perfect';
        else if (eqLoss < 0.15) grade = 'good';
        else if (eqLoss < 0.40) grade = 'ok';
        else grade = 'bad';
        // Get differential reasoning: only reasons that distinguish best from played
        const bestReasons = best && s.allOptions && grade !== 'perfect' ? (() => {
          const bestOpt = s.allOptions.find(o => o.tile.id === best.tile.id && o.side === best.side)
                       || s.allOptions.find(o => o.tile.id === best.tile.id);
          const playedOpt = s.allOptions.find(o => o.tile.id === s.tile.id && o.side === s.side)
                         || s.allOptions.find(o => o.tile.id === s.tile.id);
          if (!bestOpt) return [];
          const playedSet = new Set(playedOpt ? playedOpt.reasons : []);
          // Show reasons unique to the best move (not shared with played)
          const diff = bestOpt.reasons.filter(r => !playedSet.has(r));
          return diff.length > 0 ? diff.slice(0, 3) : [];
        })() : [];
        game._analysisPartial.push({
          move: s.move, tile: s.tile, side: s.side,
          bestTile: best ? best.tile : null, bestSide: best ? best.side : null,
          bestReasons,
          bestEP: best ? best.expectedPoints : 0,
          playedEP: played ? played.expectedPoints : 0,
          eqLoss, grade, stepIdx: i
        });
        idx++;
        if (idx % 3 === 0 || idx >= p0Steps.length) render(); // render every 3 moves, not every move
        setTimeout(processNext, 10);
      }
      setTimeout(processNext, 10);
    }

    function renderAnalysisPanel(snap, pNames, pTeams, teamColors) {

      if (!currentGame._analysisCache && !analysisRunning) {

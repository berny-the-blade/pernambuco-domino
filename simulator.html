      if (!currentGame._analysisCache) {
        const done = currentGame._analysisPartial ? currentGame._analysisPartial.length : 0;
        const total = currentGame._analysisTotalMoves || '?';

        if (!moveSnap) continue;
        const playedMove = { tile: a.tile, side: a.side };
        const bestMoveObj = a.bestTile ? { tile: a.bestTile, side: a.bestSide } : null;
        const leak = classifyLeak(playedMove, bestMoveObj, moveSnap, moveSnap.knowledge);
        if (leak) {
          leaks.push({ type: leak.label, desc: leak.desc, move: a.move, severity: leak.severity });
          leakCounts[leak.type] = (leakCounts[leak.type] || 0) + 1;

      // Add phase-based leaks (kept from original)
      if (analysis.length >= 4) {

        const lateEL = analysis.slice(-3).reduce((s, a) => s + a.eqLoss, 0) / 3;

      }

          </div>

          <!-- Move-by-move analysis -->
          <div class="bg-slate-900 rounded-lg p-2">
            <div class="text-xs font-bold text-slate-400 mb-1">Move-by-Move (Your decisions)</div>
            ${analysis.length === 0 ? '<div class="text-xs text-slate-500">Run a full game to see analysis</div>' : ''}
            <div class="space-y-0.5 max-h-[300px] overflow-y-auto">
              ${analysis.map(a => {
                const gradeLabel = { perfect: 'OK', good: 'INACC', ok: 'MSTK', bad: 'BLNDR' }[a.grade];
                const gradeColor = { perfect: 'text-emerald-400', good: 'text-green-300', ok: 'text-yellow-400', bad: 'text-red-400' }[a.grade];
                const showExplain = a.grade !== 'perfect' && a.bestTile;

                    ${a.grade !== 'perfect' && a.bestTile ? `<span class="text-slate-600">&rarr; [${a.bestTile.left}|${a.bestTile.right}] ${a.bestSide || ''}</span>` : ''}
                    <span class="font-mono ml-auto ${a.eqLoss > 0.01 ? 'text-red-400' : 'text-emerald-400'}">${a.eqLoss > 0.01 ? `-${a.eqLoss.toFixed(2)}` : '0.00'}</span>
                  </div>
                  ${showExplain ? `<div class="ml-14 mt-0.5 text-xs leading-tight"><span class="text-slate-600 font-mono">MC: ${a.bestEP.toFixed(2)} vs ${a.playedEP.toFixed(2)} E[pts]</span>${hasReasons ? '<br>' + a.bestReasons.map(r => '<span class="text-slate-600">- </span><span class="text-slate-500">' + r + '</span>').join('<br>') : ''}</div>` : ''}
                </div>`;
              }).join('')}
            </div>
          </div>

          ${leaks.length > 0 ? `

          <div class="bg-slate-900 rounded-lg p-2 border border-emerald-800">

          <div class="text-xs text-slate-600 text-center">Click any move to navigate to it</div>

          ${blunders > 0 ? `

              onclick="const n = generatePuzzlesFromLastGame(); this.textContent = n > 0 ? n + ' puzzle' + (n>1?'s':'') + ' generated!' : 'No significant mistakes found'; this.disabled = true; this.classList.add('opacity-50');">
              Generate Puzzles from Mistakes
            </button>
          </div>` : ''}
        </div>
      `;
    }

    // Deep explanation for every AI heuristic reason
    function getReasonExplanation(reason) {
      const def = { what: reason, math: '—', why: '—', color: 'border-slate-600', scoreLabel: '', scoreColor: 'text-slate-500' };

      // Opening move
      let m;
      if ((m = reason.match(/^Open: suit (\d)=(\d), suit (\d)=(\d)(.*double bonus.*)?$/))) {
        const [, s1, c1, s2, c2, dbl] = m;
        const suitScore = parseInt(c1)*10 + parseInt(c2)*10;
        const dblScore = dbl ? 15 : 0;
        const pips = parseInt(s1) + parseInt(s2);
        const total = suitScore + dblScore + pips*2;
        return {
          what: `<b>Opening tile selection.</b> The AI picks the opening tile by how well-connected it is to your hand. Tiles sharing suits with many hand tiles give you more future plays.`,
          math: `Score = suit_count(${s1})×10 + suit_count(${s2})×10${dbl ? ' + 15 (double)' : ''} + pips×2 = ${c1}×10 + ${c2}×10${dbl ? ' + 15' : ''} + ${pips}×2 = <b>+${total}</b>`,
          why: `Opening with a suit you're deep in means the board ends have numbers you can play. If you have 4 tiles with "3", opening a 3-tile means 3 remaining tiles already match. Doubles get +15 bonus because they're inflexible (connect to one number only) — better to lead them than get stuck later.`,
          color: 'border-blue-500', scoreLabel: `+${total}`, scoreColor: 'text-blue-400'
        };
      }

      // Suit control
      if ((m = reason.match(/^(\d+) more tiles? match new ends \[(\d+)\.\.(\d+)\]$/))) {
        const [, count, e1, e2] = m;
        const score = parseInt(count) * 15;
        return {
          what: `<b>Suit control (#1 factor).</b> After playing this tile, ${count} of your remaining tiles can play on the new board ends [${e1}, ${e2}].`,
          math: `Score = matching_tiles × 15 = ${count} × 15 = <b>+${score}</b>`,
          why: `The more hand tiles that match board ends, the more options you have next turn. Having 0 playable tiles = forced pass = lost tempo. Weighted at ×15 per tile (the highest factor) because suit control is the foundation of domino strategy. A player who always has plays controls the game.`,
          color: 'border-emerald-500', scoreLabel: `+${score}`, scoreColor: 'text-emerald-400'
        };
      }

      // Blocking opponent
      if ((m = reason.match(/^Blocks (.+)$/))) {
        const [, oppName] = m;
        return {
          what: `<b>Opponent block.</b> After this play, BOTH board ends have numbers that ${oppName} is void in (confirmed from earlier passes).`,
          math: `Score = <b>+25</b> (flat bonus per blocked opponent, +50 if both blocked)`,
          why: `When an opponent passed on a number, they have ZERO tiles with it — that's certain. If both board ends are their void numbers, they're guaranteed to pass again. Forcing passes gives your team extra turns. Blocking both opponents simultaneously is devastating and often game-winning.`,
          color: 'border-red-500', scoreLabel: '+25', scoreColor: 'text-red-400'
        };
      }

      // Partner support
      if ((m = reason.match(/^Partner played (.+) — may have more$/))) {
        const [, details] = m;
        // Count affinity from details like "3s (played 2x, 4 still out) & 5s (played 1x, 3 still out)"
        const playedCounts = [...details.matchAll(/played (\d+)x/g)].map(x => parseInt(x[1]));
        const totalAff = playedCounts.reduce((s,v) => s+v, 0);
        const score = totalAff * 8;
        return {
          what: `<b>Partner support.</b> Your partner previously played tiles with these numbers (${details}), suggesting they hold more. This play keeps those numbers on the board for partner.`,
          math: `Score = times_partner_played × 8 = ${totalAff} × 8 = <b>+${score}</b>. Only counts if: (a) tiles with that number still remain unplayed, and (b) partner isn't confirmed void in it.`,
          why: `Domino is a team game. If partner played two 5-tiles, they likely hold more 5s. Keeping a 5-end open lets them play. Closing a number partner is strong in cuts them off. This heuristic encodes "support your partner's suits" — a core Pernambuco principle.`,
          color: 'border-purple-500', scoreLabel: `+${score}`, scoreColor: 'text-purple-400'
        };
      }

      // Partner void
      if ((m = reason.match(/^Partner can't have (\d+)$/))) {
        const [, num] = m;
        return {
          what: `<b>Partner void penalty.</b> Partner is confirmed void in ${num}s (they passed when ${num} was an end). This play opens ${num} on the board — partner can't use it.`,
          math: `Score = <b>−10</b> (flat penalty)`,
          why: `Opening a number your partner can't play helps opponents — only they can use that end. Moderate penalty (−10, not huge) because sometimes it's unavoidable, and opponents might also be void. But all else equal, avoid opening partner's void numbers.`,
          color: 'border-orange-500', scoreLabel: '−10', scoreColor: 'text-orange-400'
        };
      }

      // Dump heavy tile
      if ((m = reason.match(/^Dump heavy tile \((\d+) pips\)$/))) {
        const [, pips] = m;
        const score = parseInt(pips) * 2;
        return {
          what: `<b>Pip dump (heavy).</b> This tile has ${pips} pips. In a blocked game (everyone passes 4x), the team with fewer total pips wins. Shedding heavy tiles reduces that risk.`,
          math: `Score = tile_pips × 2 = ${pips} × 2 = <b>+${score}</b>. Applied to every tile, but only shown when pips ≥ 9.`,
          why: `Every tile gets pips×2 in scoring. A [6|5]=11 pips gets +22 while [0|1]=1 pip gets +2. The 20-point difference nudges toward shedding heavy tiles when other factors are close. This matters most in blocked endgames where 1 pip decides the winner.`,
          color: 'border-amber-500', scoreLabel: `+${score}`, scoreColor: 'text-amber-400'
        };
      }

      // Sheds pips
      if ((m = reason.match(/^Sheds (\d+) pips$/))) {
        const [, pips] = m;
        const score = parseInt(pips) * 2;
        return {
          what: `<b>Pip weight (medium).</b> This tile has ${pips} pips. Playing it reduces hand pip total, lowering risk in blocked-game scenarios.`,
          math: `Score = tile_pips × 2 = ${pips} × 2 = <b>+${score}</b>. The ×2 weight is low by design — pip weight is a tiebreaker, not a dominant factor. Shown when pips = 6–8.`,
          why: `If the game blocks (4 consecutive passes), the team with fewer total pips in hand wins 1 point. Shedding medium-weight tiles is insurance. But suit control (+15/tile) and blocking (+25) matter more — pips only decide close calls.`,
          color: 'border-slate-500', scoreLabel: `+${score}`, scoreColor: 'text-slate-400'
        };
      }

      // Clear inflexible double
      if (reason === 'Clear inflexible double') {
        return {
          what: `<b>Double clearance.</b> Doubles are "inflexible" — [3|3] connects ONLY to 3s, while [3|5] connects to 3s OR 5s. The AI prefers playing doubles early while options exist.`,
          math: `Score = <b>+12</b> (flat bonus for any double played mid-game)`,
          why: `Doubles are the most dangerous tiles to hold late. They connect to only one number, so you need that exact number on the board to play them. If that number gets exhausted, your double is permanently stuck — you'll pass every turn while it rots in your hand. Playing doubles early, while many tiles are unplayed, maximizes the chance the number is available.`,
          color: 'border-yellow-500', scoreLabel: '+12', scoreColor: 'text-yellow-400'
        };
      }

      // Isolated double setup
      if ((m = reason.match(/^Sets up isolated \[(\d+)\|(\d+)\]$/))) {
        const [, d1] = m;
        return {
          what: `<b>Isolated double rescue.</b> You hold [${d1}|${d1}] with NO other tiles containing ${d1}. This play puts ${d1} on a board end, giving that trapped double a way to be played next.`,
          math: `Score = <b>+20</b> (high priority). "Isolated double" = double where you have zero other tiles with that number. AI checks: after this play, is ${d1} on either board end? If yes → +20.`,
          why: `An isolated double is a ticking time bomb. With no supporting tiles, you can never "steer" the board toward that number yourself. If the board never shows ${d1}, the double is permanently stuck. +20 is higher than suit control for 1 tile because rescuing a trapped double is critical — it's the difference between playing and passing for the rest of the game.`,
          color: 'border-yellow-500', scoreLabel: '+20', scoreColor: 'text-yellow-400'
        };
      }

      // Board counting — nearly exhausted
      if ((m = reason.match(/^(\d+)s nearly exhausted \((\d+) out\)$/))) {
        const [, num, out] = m;
        const opp = parseInt(out);
        const score = (2 - opp) * 6;
        return {
          what: `<b>Board counting (favorable).</b> This play opens ${num} on the board. Only ~${out} tile${opp!==1?'s':''} with ${num} are estimated in opponents' hands — this end is very hard for them to play on.`,
          math: `Score = (2 − opp_expected) × 6 = (2 − ${out}) × 6 = <b>+${score}</b>. "opp_expected" = (unplayed with ${num} − you hold − 1 for tile played) × (total_unknown − 4 removed) / total_unknown. This adjusts for the 4 face-down removed tiles. Gradient: 0 → +12, 1 → +6, 2 → 0, 3 → −6, 4+ → −12.`,
          why: `This is board control by counting — one of the most skill-intensive concepts. Each number appears on exactly 7 of the 28 tiles. As tiles are played, numbers get scarcer. 4 tiles are removed face-down at deal time, so not all unplayed tiles are in opponents' hands. If only ~${out} tile${opp!==1?'s':''} with ${num} are expected in opponent hands, putting ${num} on the board is a soft block. Advanced players constantly track which numbers are scarce.`,
          color: 'border-emerald-500', scoreLabel: `+${score}`, scoreColor: 'text-emerald-400'
        };
      }

      // Board counting — heavy
      if ((m = reason.match(/^(\d+)s heavy — (\d+) still out for opponents$/))) {
        const [, num, out] = m;
        const opp = parseInt(out);
        const score = (2 - opp) * 6;
        return {
          what: `<b>Board counting (unfavorable).</b> This play opens ${num} on the board, but ~${out} tiles with ${num} are estimated in opponents' hands — many can likely play on this end.`,
          math: `Score = (2 − opp_expected) × 6 = (2 − ${out}) × 6 = <b>${score}</b>. "opp_expected" = (unplayed with ${num} − you hold − 1 for tile played) × (total_unknown − 4 removed) / total_unknown. At ~${out} in opponent hands, this is a significant penalty. Compare: 1 out → +6, but ${out} out → ${score}.`,
          why: `Opening a "heavy" number (many tiles estimated in opponents' hands) is the opposite of board control — you're giving opponents easy plays. The formula adjusts for the 4 face-down removed tiles (not all unplayed tiles are available to opponents). The best players track which numbers are scarce and steer the board toward them.`,
          color: 'border-red-500', scoreLabel: `${score}`, scoreColor: 'text-red-400'
        };
      }

      // GO OUT
      if ((m = reason.match(/^GO OUT! Win (\d+)pt(.*)?$/))) {
        const [, pts, typeInfo] = m;
        const p = parseInt(pts);
        const score = 200 + p * 30;
        return {
          what: `<b>INSTANT WIN!</b> Playing this tile empties your hand — you go out and your team scores ${pts} point${p>1?'s':''}${typeInfo || ''}. Game over!`,
          math: `Score = 200 + points × 30 = 200 + ${pts} × 30 = <b>+${score}</b>. Dominates all other factors. Win types: normal=1pt, carroca (finish with double)=2pt, la-e-lo (tile plays on both ends)=3pt, cruzada (double + both ends)=4pt.`,
          why: `Going out is the ultimate play. The +200 base ensures it always beats any other option. The ×30 per point bonus means the AI prefers higher-scoring finishes — e.g., save a double for last if it scores carroca (2pt) vs normal (1pt). Always check if you can go out before considering anything else!`,
          color: 'border-emerald-500', scoreLabel: `+${score}`, scoreColor: 'text-emerald-400'
        };
      }

      // Near-close: sets up going out
      if ((m = reason.match(/^Sets up going out next turn with \[(\d+)\|(\d+)\]$/))) {
        const [, t1, t2] = m;
        return {
          what: `<b>Near-close setup.</b> Playing this tile leaves just [${t1}|${t2}], and that last tile can play on the resulting board ends. If opponents don't change the ends, you go out next turn!`,
          math: `Score = <b>+80</b>. AI checks: after this play, do new board ends include ${t1} or ${t2}? Yes → last tile is playable → +80. This is huge (more than 5× suit control) because winning next turn is nearly as good as winning now.`,
          why: `Being one tile from victory with a playable last tile is extremely powerful. Even if opponents change one end, you might still connect. In Pernambuco (4-player), 3 opponents play between your turns, but partner might preserve your end. This is why endgame counting is critical — when down to 2 tiles, every play is life or death.`,
          color: 'border-emerald-500', scoreLabel: '+80', scoreColor: 'text-emerald-400'
        };
      }

      // Near-close: stranded
      if ((m = reason.match(/^STRANDS last tile \[(\d+)\|(\d+)\]/))) {
        const [, t1, t2] = m;
        return {
          what: `<b>Stranding penalty.</b> Playing this leaves [${t1}|${t2}] as your last tile, but it can't play on either resulting board end. You'll be stuck passing every turn.`,
          math: `Score = <b>−30</b>. AI checks: does [${t1}|${t2}] match either new end? No → stranded → −30. This is a heavy penalty (equivalent to losing 2 suit-control tiles) because holding an unplayable tile means passing until the game ends.`,
          why: `Stranding your last tile is a classic beginner mistake. You play what "looks good" now but leave yourself with a tile that matches nothing. The board might never show your numbers again — 3 opponents will reshape it before your turn. Always check: "if I play this, can my remaining tiles still play?"`,
          color: 'border-red-500', scoreLabel: '−30', scoreColor: 'text-red-400'
        };
      }

      // 2-tile coverage good
      if (reason === 'Both remaining tiles playable on new ends') {
        return {
          what: `<b>Full coverage (3→2 tiles).</b> After playing this, both remaining tiles can play on the new board ends. Maximum flexibility — you can't be locked out next turn.`,
          math: `Score = <b>+25</b>. AI counts how many of 2 remaining tiles match either end: 2 = +25, 1 = 0 (neutral), 0 = −15.`,
          why: `With 3 tiles in hand, the choice of which to play determines whether you get stuck. If both remaining tiles are playable, you're guaranteed another play no matter what opponents do. This becomes critical as hands shrink — in the endgame, one wrong play can mean passing for the rest of the game.`,
          color: 'border-emerald-500', scoreLabel: '+25', scoreColor: 'text-emerald-400'
        };
      }

      // 2-tile coverage bad
      if (reason === 'Neither remaining tile matches new ends') {
        return {
          what: `<b>No coverage (3→2 tiles).</b> After playing this, NEITHER remaining tile matches the new board ends. You'll pass unless opponents change the ends for you.`,
          math: `Score = <b>−15</b>. Zero of 2 remaining tiles match the new ends. You're essentially playing your last useful tile and gambling that the board rotates back to your numbers.`,
          why: `Playing yourself into a dead position is dangerous. You'll pass while opponents keep playing, and each play could end the game before the board helps you. The −15 penalty is moderate because sometimes ALL options leave you stuck — the AI weighs it against other factors rather than making it absolute.`,
          color: 'border-red-500', scoreLabel: '−15', scoreColor: 'text-red-400'
        };
      }

      // MC override
      if ((m = reason.match(/^MC override/))) {
        return {
          what: `<b>Monte Carlo override.</b> The heuristic AI wanted a different tile, but the MC simulation (playing out hundreds of random complete games) found this tile gives better expected points.`,
          math: `When ≤3 tiles remain, the AI runs MC simulations per option. Each sim randomly deals hidden hands (consistent with known voids) and plays the game to completion. The tile with the highest average points wins.`,
          why: `Heuristics are fast but imperfect rules of thumb. In the endgame (few tiles left), exact simulation is feasible and more accurate. MC corrects heuristic errors — especially in complex positions where blocking, board counting, and partner support interact in non-obvious ways.`,
          color: 'border-blue-500', scoreLabel: 'MC', scoreColor: 'text-blue-400'
        };
      }

      return def;
    }

    function renderStudyPanel(snap, pNames, pTeams, teamColors) {

            <div class="text-xs text-slate-500 mt-2">All hands are visible. Each move is evaluated with ${MC_SIMS_STUDY} MC rollouts.</div>

      // Auto-trigger study computation

      // Show loading state
      if (studyRunning || !studyCache[currentStep]) {
        return `<div class="space-y-3 flex-1 overflow-y-auto">
          <div class="text-center py-6">
            <div class="inline-block w-6 h-6 border-2 border-indigo-400 border-t-transparent rounded-full animate-spin mb-2"></div>
            <div class="text-xs text-indigo-300">${studyProgress || 'Analyzing position...'}</div>
          </div>
        </div>`;
      }

      const study = studyCache[currentStep];
      const { mcResults: mc, probMatrix, deductions, strategy, playGrade } = study;
      const player = snap.player;
      const pColor = teamColors[player % 2];
      const pColors = ['#60a5fa','#f87171','#a78bfa','#fbbf24'];

      // Move header
      let moveHeader = '';
      if (snap.action === 'play') {
        const gradeHtml = playGrade ? (() => {
          const gc = { perfect: '#22c55e', good: '#86efac', ok: '#eab308', bad: '#ef4444' }[playGrade.grade];
          const gl = { perfect: 'OPTIMAL', good: 'GOOD', ok: 'MISTAKE', bad: 'BLUNDER' }[playGrade.grade];
          return `<span class="px-2 py-0.5 rounded text-xs font-bold" style="background:${gc};color:#0f172a">${gl}</span>`;
        })() : '';
        moveHeader = `
          <div class="bg-slate-900 rounded-lg p-2.5 border border-indigo-600">
            <div class="flex items-center gap-2 mb-1">
              <span class="text-xs font-bold px-2 py-0.5 rounded" style="background:${pColor}">${pn(player)}</span>
              <span class="text-xs font-bold text-indigo-300">plays [${snap.tile.left}|${snap.tile.right}] on ${snap.side}</span>
              ${gradeHtml}
            </div>
            ${playGrade && playGrade.grade !== 'perfect' ? `
            <div class="text-xs text-slate-400 mt-1">
              Best was [${playGrade.bestTile.left}|${playGrade.bestTile.right}] ${playGrade.bestSide || ''}
              <span class="text-emerald-400 font-mono">EP ${playGrade.bestEP >= 0 ? '+' : ''}${playGrade.bestEP.toFixed(2)}</span>
              vs played <span class="text-red-400 font-mono">EP ${playGrade.playedEP >= 0 ? '+' : ''}${playGrade.playedEP.toFixed(2)}</span>
              <span class="text-red-400 font-bold">(−${playGrade.eqLoss.toFixed(2)})</span>
            </div>` : ''}
          </div>`;
      } else if (snap.action === 'pass') {
        moveHeader = `
          <div class="bg-slate-900 rounded-lg p-2.5 border border-orange-600">
            <div class="flex items-center gap-2">
              <span class="text-xs font-bold px-2 py-0.5 rounded" style="background:${pColor}">${pn(player)}</span>
              <span class="text-xs font-bold text-orange-400">PASSES</span>
            </div>
          </div>`;
      }

      // MC Results section — enriched with heuristic reasons from snapshot
      const allOpts = snap.allOptions || [];
      let mcHtml = '';
      if (mc && mc.length > 0) {
        mcHtml = `
          <div class="bg-slate-900 rounded-lg p-2">
            <div class="text-xs font-bold text-indigo-400 mb-1">MC Evaluation (${MC_SIMS_STUDY} sims/option)</div>
            <div class="space-y-1">
              ${mc.map((r, i) => {
                const isPlayed = snap.tile && r.tile.id === snap.tile.id;
                const epCol = r.expectedPoints > 0.2 ? '#22c55e' : r.expectedPoints > 0 ? '#86efac' : r.expectedPoints > -0.2 ? '#eab308' : '#ef4444';
                // Find matching heuristic option for reasons + score
                const hOpt = allOpts.find(o => o.tile.id === r.tile.id && o.side === r.side)
                           || allOpts.find(o => o.tile.id === r.tile.id);
                const hScore = hOpt ? hOpt.score : null;
                const hReasons = hOpt ? hOpt.reasons : [];
                return `<div class="${isPlayed ? 'bg-indigo-950/40 rounded border border-indigo-700' : ''} px-1 py-0.5">
                  <div class="flex items-center gap-1.5 text-xs cursor-pointer" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
                    <span class="font-mono w-3 ${i === 0 ? 'text-emerald-400 font-bold' : 'text-slate-500'}">${i+1}.</span>
                    <span class="${i === 0 ? 'text-emerald-400 font-bold' : 'text-slate-300'}">[${r.tile.left}|${r.tile.right}]</span>
                    <span class="text-slate-500 w-8">${r.side || 'open'}</span>
                    <span class="font-mono font-bold" style="color:${epCol}">${r.expectedPoints >= 0 ? '+' : ''}${r.expectedPoints.toFixed(2)}</span>
                    <span class="text-slate-600 font-mono text-xs">${(r.winRate*100).toFixed(0)}%</span>
                    ${hScore !== null ? `<span class="text-slate-600 font-mono text-xs">(H:${hScore})</span>` : ''}
                    ${isPlayed ? '<span class="text-indigo-400 text-xs ml-auto">← played</span>' : ''}
                    ${i === 0 && !isPlayed ? '<span class="text-emerald-400 text-xs ml-auto">★ best</span>' : ''}
                  </div>
                  <div style="display:none" class="ml-4 mt-0.5 mb-1 space-y-1">
                    ${hReasons.map(reason => {
                      const ex = getReasonExplanation(reason);
                      return `<div class="border-l-2 ${ex.color} pl-1.5">
                        <div class="text-xs text-slate-400">▸ ${reason} <span class="font-mono ${ex.scoreColor}">${ex.scoreLabel}</span></div>
                      </div>`;
                    }).join('') || '<div class="text-xs text-slate-600 italic">No heuristic reasons available</div>'}
                  </div>
                </div>`;
              }).join('')}
            </div>
          </div>`;
      }

      // Deductions section
      let deductHtml = '';
      if (deductions && deductions.length > 0) {
        deductHtml = `
          <div class="bg-slate-900 rounded-lg p-2">
            <div class="text-xs font-bold text-amber-400 mb-1">Deductions (from P0's view)</div>
            <div class="space-y-1">
              ${deductions.map(d => {
                const borderColor = d.type === 'CERTAIN' ? 'border-red-500' : d.type === 'LIKELY' ? 'border-amber-500' : d.type === 'STRATEGY' ? 'border-emerald-500' : 'border-slate-600';
                return `<div class="text-xs text-slate-300 border-l-2 ${borderColor} pl-2 py-0.5">
                  <span>${d.icon}</span> ${d.text}
                </div>`;
              }).join('')}
            </div>
          </div>`;
      }

      // Tile probability matrix
      let probHtml = '';
      if (probMatrix && Object.keys(probMatrix).length > 0) {
        // Group by numbers for a cleaner display — show top uncertain tiles
        const entries = Object.entries(probMatrix)
          .map(([id, probs]) => ({ id, ...probs }))
          .filter(e => {
            // Skip tiles that are certainly in one place (>95%)
            const max = Math.max(e[1], e[2], e[3], e.removed);
            return max < 0.95;
          })
          .sort((a, b) => {
            // Sort by uncertainty (most evenly distributed first)
            const maxA = Math.max(a[1], a[2], a[3]);
            const maxB = Math.max(b[1], b[2], b[3]);
            return maxA - maxB;
          });

        if (entries.length > 0) {
          const shown = entries.slice(0, 12);
          probHtml = `
            <div class="bg-slate-900 rounded-lg p-2">
              <div class="text-xs font-bold text-purple-400 mb-1">Tile Probabilities (P0's view)</div>
              <div class="text-xs text-slate-600 mb-1">Who likely holds each unknown tile?</div>
              <table class="w-full text-xs">
                <tr class="text-slate-500">
                  <td class="pb-0.5">Tile</td>
                  <td class="pb-0.5 text-center" style="color:${pColors[1]}">P1</td>
                  <td class="pb-0.5 text-center" style="color:${pColors[2]}">P2</td>
                  <td class="pb-0.5 text-center" style="color:${pColors[3]}">P3</td>
                  <td class="pb-0.5 text-center text-slate-600">Out</td>
                </tr>
                ${shown.map(e => {
                  const probCell = (p) => {
                    const v = e[p];
                    const bg = v > 0.5 ? 'rgba(139,92,246,0.3)' : v > 0.3 ? 'rgba(139,92,246,0.15)' : 'transparent';
                    const col = v > 0.5 ? '#a78bfa' : v > 0.3 ? '#8b5cf6' : '#64748b';
                    return `<td class="text-center font-mono py-0.5" style="background:${bg};color:${col}">${v > 0.01 ? (v*100).toFixed(0) + '%' : '—'}</td>`;
                  };
                  const outV = e.removed;
                  return `<tr>
                    <td class="text-slate-300 font-mono py-0.5">[${e.id.replace('-','|')}]</td>
                    ${probCell(1)}${probCell(2)}${probCell(3)}
                    <td class="text-center font-mono py-0.5 text-slate-600">${outV > 0.01 ? (outV*100).toFixed(0) + '%' : '—'}</td>
                  </tr>`;
                }).join('')}
              </table>
              ${entries.length > 12 ? `<div class="text-xs text-slate-600 mt-1">+${entries.length - 12} more tiles tracked</div>` : ''}
            </div>`;
        }
      }

      // Strategy notes
      let stratHtml = '';
      if (strategy && strategy.length > 0) {
        stratHtml = `
          <div class="bg-slate-900 rounded-lg p-2">
            <div class="text-xs font-bold text-emerald-400 mb-1">Strategic Notes</div>
            <div class="space-y-0.5">
              ${strategy.map(s => `<div class="text-xs text-slate-300">${s.icon} ${s.text}</div>`).join('')}
            </div>
          </div>`;
      }

      // Heuristic reasoning with deep explanations
      let reasonsHtml = '';
      if (snap.reasons && snap.reasons.length > 0) {
        reasonsHtml = `
          <div class="bg-slate-900 rounded-lg p-2">
            <div class="text-xs font-bold text-slate-400 mb-1">${appLang==='pt'?'Raciocínio Heurístico da IA (clique para expandir)':'AI Heuristic Reasoning (click to expand)'}</div>
            <div class="space-y-1.5">
              ${snap.reasons.map((r, ri) => {
                const ex = getReasonExplanation(r);
                return `<div class="border-l-2 ${ex.color} pl-2">
                  <div class="text-xs text-slate-300 cursor-pointer" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
                    ▸ ${_tr(r)} <span class="font-mono font-bold ${ex.scoreColor}">${ex.scoreLabel}</span>
                  </div>
                  <div class="mt-1 text-xs leading-relaxed bg-slate-950/50 rounded p-1.5" style="display:none">
                    <div class="text-slate-300 mb-1">${ex.what}</div>
                    <div class="text-indigo-300 mb-1"><b>Math:</b> ${ex.math}</div>
                    <div class="text-emerald-300"><b>Why it matters:</b> ${ex.why}</div>
                  </div>
                </div>`;
              }).join('')}
            </div>
          </div>`;
      }

      return `
        <div class="space-y-2 flex-1 overflow-y-auto">
          <div class="text-xs text-indigo-300 font-bold">DEEP STUDY — Move #${snap.move}</div>
          ${moveHeader}
          ${mcHtml}
          ${deductHtml}
          ${probHtml}
          ${stratHtml}
          ${reasonsHtml}
        </div>`;
    }

    // ========== PRO ANALYTICS ENGINE ==========

    function normalCDF(x) {
      if (x < -6) return 0; if (x > 6) return 1;
      const a1=0.254829592, a2=-0.284496736, a3=1.421413741, a4=-1.453152027, a5=1.061405429, p=0.3275911;
      const sign = x < 0 ? -1 : 1;
      const ax = Math.abs(x) / Math.sqrt(2);
      const t = 1.0 / (1.0 + p * ax);
      const y = 1.0 - (((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-ax*ax);
      return 0.5 * (1.0 + sign * y);
    }

    function computeProAnalytics(snap, player, mcResults) {
      const hand = snap.hands[player];
      const knowledge = snap.knowledge;
      const handSizes = snap.hands.map(h => h.length);
      const samples = [];
      for (let i = 0; i < PRO_SAMPLES; i++) {
        try { samples.push(generateConsistentDeal(hand, handSizes, knowledge, player)); }
        catch(e) { break; }
      }
      return computeProAnalyticsFromSamples(snap, player, mcResults, samples);
    }

    function computeProAnalyticsFromSamples(snap, player, mcResults, samples) {
      const hand = snap.hands[player];
      const lE = snap.leftEnd, rE = snap.rightEnd;
      const knowledge = snap.knowledge;
      const partner = (player + 2) % 4;
      const opp1 = (player + 1) % 4, opp2 = (player + 3) % 4;
      const N = samples.length || 1;

      // --- Single-pass: compute ALL per-sample metrics at once ---
      const suitMass = Array.from({length: 4}, () => new Array(7).fill(0));
      const voidProb = Array.from({length: 4}, () => new Array(7).fill(0));
      const doubleThreats = Array.from({length: 4}, () => new Array(7).fill(0));
      const mobilitySum = new Array(4).fill(0);
      const goOutRaw = Array.from({length: 4}, () => ({ gop1: 0, gop2: 0 }));
      const dealSuits = new Array(N);
      let oppTeamPipsSum = 0;
      const invN = 1 / N;

      for (let i = 0; i < N; i++) {
        const deal = samples[i];
        const ds_s = [0, 0, 0, 0];
        const ds_c = [new Uint8Array(7), new Uint8Array(7), new Uint8Array(7), new Uint8Array(7)];
        for (let p = 0; p < 4; p++) {
          if (p === player) continue;
          const h = deal[p];
          let suitBits = 0;
          for (let j = 0; j < h.length; j++) {
            const t = h[j], tl = t.left, tr = t.right;
            suitMass[p][tl]++;
            if (tl !== tr) suitMass[p][tr]++;
            if (tl === tr) doubleThreats[p][tl]++;
            suitBits |= (1 << tl) | (1 << tr);
            ds_c[p][tl]++;
            if (tl !== tr) ds_c[p][tr]++;
            if (tl === lE || tr === lE || tl === rE || tr === rE) mobilitySum[p]++;
            if (p === opp1 || p === opp2) oppTeamPipsSum += tl + tr;
          }
          ds_s[p] = suitBits;
          for (let v = 0; v <= 6; v++) {
            if (!(suitBits & (1 << v))) voidProb[p][v]++;
          }
          // Go-out threats
          if (h.length === 0) { goOutRaw[p].gop1++; goOutRaw[p].gop2++; }
          else if (h.length === 1) {
            const t = h[0];
            if (t.left === lE || t.right === lE || t.left === rE || t.right === rE) {
              goOutRaw[p].gop1++; goOutRaw[p].gop2++;
            }
          } else if (h.length === 2) {
            for (let k = 0; k < 2; k++) {
              const first = h[k], second = h[1-k];
              if (!(first.left === lE || first.right === lE || first.left === rE || first.right === rE)) continue;
              let nL = lE, nR = rE;
              if (first.left === lE || first.right === lE) { nL = first.left === lE ? first.right : first.left; }
              else { nR = first.right === rE ? first.left : first.right; }
              if (second.left === nL || second.right === nL || second.left === nR || second.right === nR) {
                goOutRaw[p].gop2++; break;
              }
            }
          }
        }
        dealSuits[i] = { s: ds_s, c: ds_c };
      }

      // Normalize accumulated counts → probabilities / expected values
      for (let p = 0; p < 4; p++) {
        if (p === player) continue;
        for (let v = 0; v <= 6; v++) {
          suitMass[p][v] *= invN;
          voidProb[p][v] *= invN;
          doubleThreats[p][v] *= invN;
        }
      }
      // Player's own known data
      for (const t of hand) {
        suitMass[player][t.left]++;
        if (t.left !== t.right) suitMass[player][t.right]++;
        if (t.left === t.right) doubleThreats[player][t.left] = 1;
      }
      const mobility = new Array(4);
      for (let p = 0; p < 4; p++) {
        mobility[p] = p === player
          ? hand.filter(t => t.left === lE || t.right === lE || t.left === rE || t.right === rE).length
          : mobilitySum[p] * invN;
      }
      const goOut = Array.from({length: 4}, () => ({ gop1: 0, gop2: 0 }));
      for (let p = 0; p < 4; p++) {
        if (p === player) continue;
        goOut[p].gop1 = goOutRaw[p].gop1 * invN;
        goOut[p].gop2 = goOutRaw[p].gop2 * invN;
      }
      // P0's go-out from known hand
      if (hand.length <= 2) {
        if (hand.length === 0) { goOut[player] = { gop1: 1, gop2: 1 }; }
        else if (hand.length === 1) {
          const t = hand[0];
          if (t.left === lE || t.right === lE || t.left === rE || t.right === rE) {
            goOut[player] = { gop1: 1, gop2: 1 };
          }
        } else {
          for (let i = 0; i < 2; i++) {
            const first = hand[i], second = hand[1-i];
            if (!(first.left === lE || first.right === lE || first.left === rE || first.right === rE)) continue;
            let nL = lE, nR = rE;
            if (first.left === lE || first.right === lE) { nL = first.left === lE ? first.right : first.left; }
            else { nR = first.right === rE ? first.left : first.right; }
            if (second.left === nL || second.right === nL || second.left === nR || second.right === nR) {
              goOut[player].gop2 = 1; break;
            }
          }
        }
      }

      // --- Per-move flow metrics (OPP / PPP / ECV / Bait) ---
      // Build move options: from MC if available, otherwise compute playable tiles directly
      let moveOptions;
      if (mcResults && mcResults.length > 0) {
        moveOptions = mcResults.map(mc => ({ tile: mc.tile, side: mc.side, ep: mc.expectedPoints, winRate: mc.winRate, cvar5: mc.cvar5, blockRate: mc.blockRate, hasMC: true }));
      } else {
        moveOptions = [];
        const playable = hand.filter(t => canPlay(t, lE, rE, snap.board.length));
        for (const tile of playable) {
          if (snap.board.length === 0) { moveOptions.push({ tile, side: null, ep: 0, winRate: 0.5, cvar5: 0, blockRate: 0, hasMC: false }); continue; }
          if (tile.left === lE || tile.right === lE) moveOptions.push({ tile, side: 'left', ep: 0, winRate: 0.5, cvar5: 0, blockRate: 0, hasMC: false });
          if ((tile.left === rE || tile.right === rE) && lE !== rE) moveOptions.push({ tile, side: 'right', ep: 0, winRate: 0.5, cvar5: 0, blockRate: 0, hasMC: false });
          if (moveOptions.length === 0 || moveOptions[moveOptions.length-1].tile.id !== tile.id) {
            if (tile.left === rE || tile.right === rE) moveOptions.push({ tile, side: 'right', ep: 0, winRate: 0.5, cvar5: 0, blockRate: 0, hasMC: false });
          }
        }
      }
      const flowMetrics = [];
      for (const mo of moveOptions) {
        const { newLeft, newRight } = applyMove(snap, mo.tile, mo.side);
        const mask = (1 << newLeft) | (1 << newRight);
        let oppCount = 0, partnerCount = 0;
        let oppMob = 0, partnerMob = 0;
        for (let i = 0; i < N; i++) {
          const ds = dealSuits[i];
          if ((ds.s[opp1] & mask) || (ds.s[opp2] & mask)) oppCount++;
          if (ds.s[partner] & mask) partnerCount++;
          oppMob += ds.c[opp1][newLeft] + ds.c[opp1][newRight];
          partnerMob += ds.c[partner][newLeft] + ds.c[partner][newRight];
        }
        const opp = oppCount * invN;
        const ppp = partnerCount * invN;
        oppMob *= invN;
        partnerMob *= invN;
        flowMetrics.push({
          tile: mo.tile, side: mo.side, ep: mo.ep, winRate: mo.winRate,
          cvar5: mo.cvar5, blockRate: mo.blockRate, hasMC: mo.hasMC,
          opp, ppp, ecv: ppp - opp, bait: opp - ppp,
          oppMobility: oppMob, partnerMobility: partnerMob
        });
      }

      // --- Structural Tension ---
      let activeSuits = 0;
      for (let v = 0; v <= 6; v++) {
        if (knowledge.remainingWithNumber(v) > 0) activeSuits++;
      }
      const tension = 1 - activeSuits / 7;

      // --- Block pip advantage (oppTeamPipsSum already computed in single pass) ---
      const myTeamPips = [player, partner].reduce((s, p) =>
        s + snap.hands[p].reduce((a, t) => a + t.left + t.right, 0), 0);
      const oppTeamPipsEst = oppTeamPipsSum * invN;
      const blockPipAdv = oppTeamPipsEst - myTeamPips;

      // --- Decision Robustness ---
      let robustness = 1, indifferenceGap = 0;
      if (mcResults && mcResults.length >= 2) {
        const m1 = mcResults[0], m2 = mcResults[1];
        indifferenceGap = m1.expectedPoints - m2.expectedPoints;
        const varDiff = (m1.variance || 0) / Math.max(1, m1.sims) + (m2.variance || 0) / Math.max(1, m2.sims);
        if (varDiff > 0.0001) {
          robustness = normalCDF(indifferenceGap / Math.sqrt(varDiff));
        } else {
          robustness = indifferenceGap > 0.01 ? 1 : 0.5;
        }
      }

      // --- Mistake classification ---
      let mistakeClass = null;
      if (snap.tile && mcResults && mcResults.length > 0) {
        const best = mcResults[0];
        const played = mcResults.find(m => m.tile.id === snap.tile.id && m.side === snap.side)
                    || mcResults.find(m => m.tile.id === snap.tile.id);
        if (played && best && (best.tile.id !== played.tile.id || best.side !== played.side)) {
          const eqLoss = best.expectedPoints - played.expectedPoints;
          if (eqLoss > 0.05) {
            const bestFlow = flowMetrics.find(f => f.tile.id === best.tile.id);
            const playedFlow = flowMetrics.find(f => f.tile.id === played.tile.id);
            if (bestFlow && playedFlow) {
              const oppDelta = playedFlow.opp - bestFlow.opp;
              const pppDelta = bestFlow.ppp - playedFlow.ppp;
              const baitDelta = playedFlow.bait - bestFlow.bait;
              const riskDelta = (bestFlow.cvar5 || 0) - (playedFlow.cvar5 || 0);
              if (oppDelta > 0.12) mistakeClass = { type: 'feeding', label: 'Feeding Error', color: '#f87171', detail: `Opened ends opponents play ${(oppDelta*100).toFixed(0)}% more often` };
              else if (pppDelta > 0.12) mistakeClass = { type: 'starvation', label: 'Partner Starvation', color: '#fb923c', detail: `Partner plays ${(pppDelta*100).toFixed(0)}% less often on your ends` };
              else if (baitDelta > 0.15) mistakeClass = { type: 'trap_blind', label: 'Trap Blind', color: '#f472b6', detail: `Walked into high-bait end (bait +${(baitDelta*100).toFixed(0)}%)` };
              else if (riskDelta > 0.3) mistakeClass = { type: 'risk_blind', label: 'Risk Blind', color: '#c084fc', detail: `Chose riskier line (CVaR ${riskDelta.toFixed(2)} worse)` };
              else mistakeClass = { type: 'positional', label: 'Positional Error', color: '#94a3b8', detail: `Suboptimal by ${eqLoss.toFixed(2)} EP` };
            }
          }
        }
      }

      return {
        suitMass, voidProb, doubleThreats, mobility, goOut,
        flowMetrics, tension, blockPipAdv, myTeamPips, oppTeamPipsEst,
        robustness, indifferenceGap, mistakeClass, sampleCount: N
      };
    }

    function runProForStep(stepIdx) {
      if (proCache[stepIdx]) { render(); return; }
      if (proRunning) return;

      const snap = currentGame.snapshots[stepIdx];
      const player = snap.currentPlayer;
      if (player < 0 || player > 3 || !snap.hands[player] || snap.hands[player].length === 0) {
        proCache[stepIdx] = { empty: true };
        render();
        return;
      }

      proRunning = true;
      proProgress = 'Sampling...';
      render();

      const hand = snap.hands[player];
      const knowledge = snap.knowledge;
      const handSizes = snap.hands.map(h => h.length);

      // Async batched sampling — generate 5 deals per frame to avoid freezing UI
      const samples = [];
      const BATCH = 5;
      let idx = 0;

      function sampleBatch() {
        const batchEnd = Math.min(idx + BATCH, PRO_SAMPLES);
        for (; idx < batchEnd; idx++) {
          try { samples.push(generateConsistentDeal(hand, handSizes, knowledge, player)); }
          catch(e) { idx = PRO_SAMPLES; break; }
        }
        proProgress = `Sampling ${samples.length}/${PRO_SAMPLES}...`;
        if (idx < PRO_SAMPLES) {
          setTimeout(sampleBatch, 0);
        } else {
          // All samples ready — compute analytics synchronously (fast part)
          try {
            const mcResults = (studyCache[stepIdx] && studyCache[stepIdx].mcResults) || null;
            const analytics = computeProAnalyticsFromSamples(snap, player, mcResults, samples);
            cacheSet(proCache, proCacheKeys, stepIdx, { mcResults, ...analytics });
          } catch(e) { /* silently fail */ }
          proRunning = false;
          proProgress = '';
          render();
        }
      }
      setTimeout(sampleBatch, 10);
    }

    function renderProPanel(snap, pNames, pTeams, teamColors) {
      if (!snap || !currentGame) return '<div class="text-slate-500 text-xs p-4">No game loaded.</div>';

      const stepIdx = currentStep;
      const data = proCache[stepIdx];

      if (!data) {
        if (proRunning) {
          return `<div class="p-4 text-center">
            <div class="animate-spin inline-block w-6 h-6 border-2 border-cyan-400 border-t-transparent rounded-full mb-2"></div>
            <div class="text-xs text-cyan-300">${proProgress || 'Computing...'}</div>
          </div>`;
        }
        // Auto-trigger computation
        setTimeout(() => runProForStep(stepIdx), 50);
        return `<div class="p-4 text-center text-xs text-slate-500">Loading Pro Analytics...</div>`;
      }

      if (data.empty) {
        return `<div class="p-4 text-center text-xs text-slate-500">No analytics for this position (game over or opening).<br>Use ◀ Back to navigate to a move.</div>`;
      }

      const player = snap.currentPlayer;
      const partner = (player + 2) % 4;
      const opp1 = (player + 1) % 4, opp2 = (player + 3) % 4;
      const mc = data.mcResults || [];
      const fm = data.flowMetrics || [];
      const knowledge = snap.knowledge;

      // Color helpers
      const pctColor = (v, flip) => {
        const x = flip ? 1-v : v;
        return x > 0.7 ? '#22c55e' : x > 0.4 ? '#eab308' : '#ef4444';
      };
      const epColor = v => v > 0.3 ? '#22c55e' : v > 0 ? '#86efac' : v > -0.3 ? '#fbbf24' : '#ef4444';
      const baitLabel = b => b > 0.2 ? '<span style="color:#ef4444">HIGH</span>' : b > 0.05 ? '<span style="color:#eab308">MED</span>' : '<span style="color:#22c55e">LOW</span>';

      // ===== BLOCK 1: Decision Quality =====
      const hasMC = mc.length > 0;
      let b1 = `<div class="bg-slate-900/50 rounded-lg p-2 mb-2">
        <div class="text-xs font-bold text-cyan-400 mb-1">1. DECISION QUALITY</div>`;
      if (hasMC && mc.length >= 2) {
        const gap = data.indifferenceGap;
        const rob = data.robustness;
        const robPct = (rob * 100).toFixed(0);
        const robColor = rob > 0.9 ? '#22c55e' : rob > 0.7 ? '#eab308' : '#ef4444';
        b1 += `<div class="grid grid-cols-2 gap-2 text-xs">
          <div><span class="text-slate-400">Indifference Gap:</span> <span style="color:${gap > 0.2 ? '#22c55e' : gap > 0.05 ? '#eab308' : '#ef4444'}" class="font-bold">${gap.toFixed(3)} EP</span></div>
          <div><span class="text-slate-400">Robustness:</span> <span style="color:${robColor}" class="font-bold">${robPct}%</span></div>
        </div>
        <div class="mt-1 bg-slate-700 rounded-full h-1.5">
          <div class="h-1.5 rounded-full" style="width:${robPct}%;background:${robColor}"></div>
        </div>`;
        if (gap < 0.05) b1 += `<div class="text-xs text-slate-500 mt-1">Top moves are statistically indistinguishable — pick the one that fits your strategy.</div>`;
      } else if (fm.length >= 2) {
        // Sort flow metrics by ECV (best structural move)
        const sorted = [...fm].sort((a,b) => b.ecv - a.ecv);
        const bestEcv = sorted[0];
        b1 += `<div class="text-xs"><span class="text-slate-400">Options:</span> <span class="font-bold text-slate-300">${fm.length} moves</span>
          <span class="text-slate-500 ml-2">Best ECV:</span> <span style="color:${bestEcv.ecv > 0 ? '#22c55e' : '#ef4444'}" class="font-bold">[${bestEcv.tile.left}|${bestEcv.tile.right}] ${bestEcv.ecv >= 0 ? '+' : ''}${(bestEcv.ecv*100).toFixed(0)}%</span>
        </div>`;
        if (!hasMC) b1 += `<div class="text-xs text-slate-600 mt-1">Use Study tab for EP/Robustness metrics (requires MC)</div>`;
      } else if (fm.length === 1) {
        b1 += `<div class="text-xs text-slate-500">Only 1 playable tile — forced move.</div>`;
      } else {
        b1 += `<div class="text-xs text-slate-500">Pass — no legal moves.</div>`;
      }
      if (data.mistakeClass) {
        const m = data.mistakeClass;
        b1 += `<div class="mt-1 px-2 py-1 rounded text-xs font-bold" style="background:${m.color}22;color:${m.color};border:1px solid ${m.color}44">
          ${m.label}: ${m.detail}
        </div>`;
      }
      b1 += '</div>';

      // ===== BLOCK 2: Risk & Tail =====
      let b2 = `<div class="bg-slate-900/50 rounded-lg p-2 mb-2">
        <div class="text-xs font-bold text-red-400 mb-1">2. RISK & TAIL</div>`;
      if (hasMC) {
        const best = mc[0];
        b2 += `<div class="grid grid-cols-3 gap-1 text-xs mb-1">
          <div><span class="text-slate-400">CVaR 5%:</span> <span style="color:${epColor(best.cvar5)}" class="font-bold">${best.cvar5 >= 0 ? '+' : ''}${best.cvar5.toFixed(2)}</span></div>
          <div><span class="text-slate-400">Block%:</span> <span class="font-bold text-amber-400">${(best.blockRate*100).toFixed(0)}%</span></div>
          <div><span class="text-slate-400">Pip Edge:</span> <span style="color:${data.blockPipAdv > 0 ? '#22c55e' : '#ef4444'}" class="font-bold">${data.blockPipAdv >= 0 ? '+' : ''}${data.blockPipAdv.toFixed(1)}</span></div>
        </div>`;
      } else {
        b2 += `<div class="text-xs mb-1"><span class="text-slate-400">Pip Edge:</span> <span style="color:${data.blockPipAdv > 0 ? '#22c55e' : '#ef4444'}" class="font-bold">${data.blockPipAdv >= 0 ? '+' : ''}${data.blockPipAdv.toFixed(1)}</span>
          <span class="text-slate-500 ml-1">(our team ${data.myTeamPips} pips vs est. ${data.oppTeamPipsEst.toFixed(0)} opp)</span></div>`;
      }
      // Go-out threats
      b2 += `<div class="text-xs text-slate-400 mt-1 mb-0.5 font-bold">Go-Out Threats</div>
        <div class="grid grid-cols-4 gap-1 text-xs">
          <div class="text-slate-500"></div><div class="text-slate-500 text-center">≤1 turn</div><div class="text-slate-500 text-center">≤2 turns</div><div class="text-slate-500 text-center">Mobility</div>`;
      for (const p of [opp1, partner, opp2]) {
        const g = data.goOut[p];
        const isPartner = p === partner;
        const nameColor = isPartner ? '#818cf8' : '#f87171';
        const mi = data.mobility[p];
        b2 += `<div style="color:${nameColor}" class="font-bold truncate">${pNames[p]}</div>
          <div class="text-center" style="color:${g.gop1 > 0.2 ? '#ef4444' : g.gop1 > 0.05 ? '#eab308' : '#22c55e'}">${(g.gop1*100).toFixed(0)}%</div>
          <div class="text-center" style="color:${g.gop2 > 0.3 ? '#ef4444' : g.gop2 > 0.1 ? '#eab308' : '#22c55e'}">${(g.gop2*100).toFixed(0)}%</div>
          <div class="text-center" style="color:${mi > 2 ? '#22c55e' : mi > 1 ? '#eab308' : '#ef4444'}">${mi.toFixed(1)}</div>`;
      }
      b2 += '</div></div>';

      // ===== BLOCK 3: Structural Control =====
      let b3 = `<div class="bg-slate-900/50 rounded-lg p-2 mb-2">
        <div class="text-xs font-bold text-emerald-400 mb-1">3. STRUCTURAL CONTROL</div>
        <div class="text-xs mb-1">
          <span class="text-slate-400">Tension:</span> <span style="color:${data.tension > 0.3 ? '#ef4444' : data.tension > 0.1 ? '#eab308' : '#22c55e'}" class="font-bold">${(data.tension*100).toFixed(0)}%</span>
          <span class="text-slate-500 ml-2">(${data.tension > 0.3 ? 'tight — near block' : data.tension > 0.1 ? 'moderate' : 'open'})</span>
        </div>`;
      // Sort flow metrics by ECV (best structural position)
      const fmSorted = [...fm].sort((a,b) => b.ecv - a.ecv);
      if (fmSorted.length > 0) {
        b3 += `<div class="text-xs text-slate-400 font-bold mb-0.5">Move Flow Analysis</div>
          <table class="w-full text-xs"><tr class="text-slate-500">
            <td>Tile</td><td class="text-center">OPP</td><td class="text-center">PPP</td><td class="text-center">ECV</td><td class="text-center">Bait</td>${hasMC ? '<td class="text-center">EP</td>' : ''}
          </tr>`;
        for (const f of fmSorted.slice(0, 6)) {
          const isBest = hasMC && f.tile.id === mc[0]?.tile.id;
          const isPlayed = snap.tile && f.tile.id === snap.tile.id;
          const rowBg = isBest ? 'background:#22c55e11' : isPlayed ? 'background:#818cf811' : '';
          const mark = isBest ? '<span class="text-emerald-400">★</span>' : isPlayed ? '<span class="text-indigo-400">▶</span>' : '';
          b3 += `<tr style="${rowBg}">
            <td class="font-mono">${mark}[${f.tile.left}|${f.tile.right}]${f.side ? f.side[0].toUpperCase() : ''}</td>
            <td class="text-center" style="color:${pctColor(f.opp, true)}">${(f.opp*100).toFixed(0)}%</td>
            <td class="text-center" style="color:${pctColor(f.ppp, false)}">${(f.ppp*100).toFixed(0)}%</td>
            <td class="text-center" style="color:${f.ecv > 0 ? '#22c55e' : '#ef4444'}">${f.ecv >= 0 ? '+' : ''}${(f.ecv*100).toFixed(0)}%</td>
            <td class="text-center">${baitLabel(f.bait)}</td>${hasMC ? `<td class="text-center" style="color:${epColor(f.ep)}">${f.ep >= 0 ? '+' : ''}${f.ep.toFixed(2)}</td>` : ''}
          </tr>`;
        }
        b3 += '</table>';
        // Best move ECV highlight
        const bestFlow = fmSorted[0];
        if (bestFlow) {
          b3 += `<div class="text-xs mt-1 text-slate-500">Best move ECV: <span style="color:${bestFlow.ecv > 0 ? '#22c55e' : '#ef4444'}" class="font-bold">${bestFlow.ecv >= 0 ? '+' : ''}${(bestFlow.ecv*100).toFixed(0)}%</span>
            — partner plays ${(bestFlow.ppp*100).toFixed(0)}%, opponents ${(bestFlow.opp*100).toFixed(0)}%</div>`;
        }
      }
      b3 += '</div>';

      // ===== BLOCK 4: Probabilistic Inference =====
      let b4 = `<div class="bg-slate-900/50 rounded-lg p-2 mb-2">
        <div class="text-xs font-bold text-purple-400 mb-1">4. PROBABILISTIC INFERENCE</div>
        <div class="text-xs text-slate-400 font-bold mb-0.5">Expected Suit Mass</div>
        <table class="w-full text-xs mb-1"><tr class="text-slate-500">
          <td></td>${[0,1,2,3,4,5,6].map(v => `<td class="text-center w-6">${v}</td>`).join('')}
        </tr>`;
      for (const p of [opp1, partner, opp2]) {
        const isP = p === partner;
        b4 += `<tr><td style="color:${isP ? '#818cf8' : '#f87171'}" class="font-bold truncate">${pNames[p].substring(0, 4)}</td>`;
        for (let v = 0; v <= 6; v++) {
          const val = data.suitMass[p][v];
          const bg = val > 1.5 ? '#22c55e33' : val > 0.8 ? '#eab30833' : val > 0.3 ? '#64748b22' : '#ef444422';
          b4 += `<td class="text-center" style="background:${bg}" title="${pNames[p]}: ${val.toFixed(2)} tiles with ${v}">${val.toFixed(1)}</td>`;
        }
        b4 += '</tr>';
      }
      b4 += '</table>';

      // Double Threats
      const threats = [];
      for (let v = 0; v <= 6; v++) {
        if (knowledge.played.has(`${v}-${v}`)) continue;
        // Check if player already holds it
        if (hand.some(t => t.left === v && t.right === v)) continue;
        const oppProb = Math.min(1, data.doubleThreats[opp1][v] + data.doubleThreats[opp2][v]);
        const partProb = data.doubleThreats[partner][v];
        if (oppProb > 0.1 || partProb > 0.1) {
          threats.push({ v, oppProb, partProb, onEnd: v === snap.leftEnd || v === snap.rightEnd });
        }
      }
      if (threats.length > 0) {
        b4 += `<div class="text-xs text-slate-400 font-bold mb-0.5">Double Threats</div>`;
        for (const th of threats.sort((a,b) => b.oppProb - a.oppProb).slice(0, 4)) {
          const icon = th.onEnd ? '🔒' : '🎲';
          b4 += `<div class="text-xs">${icon} [${th.v}|${th.v}] — opp: <span style="color:${th.oppProb > 0.3 ? '#ef4444' : '#eab308'}">${(th.oppProb*100).toFixed(0)}%</span>`;
          if (th.partProb > 0.05) b4 += ` partner: <span class="text-indigo-400">${(th.partProb*100).toFixed(0)}%</span>`;
          if (th.onEnd) b4 += ` <span class="text-red-400 font-bold">ON END</span>`;
          b4 += '</div>';
        }
      }

      // Key void probabilities (high-confidence only)
      const keyVoids = [];
      for (const p of [opp1, opp2, partner]) {
        for (let v = 0; v <= 6; v++) {
          if (knowledge.cantHave[p].has(v)) continue; // already known
          if (data.voidProb[p][v] > 0.6) {
            keyVoids.push({ p, v, prob: data.voidProb[p][v] });
          }
        }
      }
      if (keyVoids.length > 0) {
        b4 += `<div class="text-xs text-slate-400 font-bold mt-1 mb-0.5">Likely Voids (Unconfirmed)</div>`;
        for (const kv of keyVoids.sort((a,b) => b.prob - a.prob).slice(0, 4)) {
          b4 += `<div class="text-xs"><span style="color:${kv.p === partner ? '#818cf8' : '#f87171'}">${pNames[kv.p]}</span> void in ${kv.v}: <span class="text-amber-400 font-bold">${(kv.prob*100).toFixed(0)}%</span></div>`;
        }
      }
      b4 += '</div>';

      // ===== BLOCK 5: Trap Radar =====
      let b5 = `<div class="bg-slate-900/50 rounded-lg p-2 mb-2">
        <div class="text-xs font-bold text-pink-400 mb-1">5. TRAP RADAR</div>`;
      const highBait = fm.filter(f => f.bait > 0.1).sort((a,b) => b.bait - a.bait);
      const suitLocks = threats.filter(t => t.onEnd && t.oppProb > 0.2);
      if (highBait.length > 0) {
        b5 += `<div class="text-xs text-slate-400 font-bold mb-0.5">High Bait Moves (avoid)</div>`;
        for (const hb of highBait.slice(0, 3)) {
          b5 += `<div class="text-xs px-1 py-0.5 rounded mb-0.5" style="background:#ef444415;border-left:2px solid #ef4444">
            [${hb.tile.left}|${hb.tile.right}]${hb.side ? hb.side[0].toUpperCase() : ''} — OPP ${(hb.opp*100).toFixed(0)}% vs PPP ${(hb.ppp*100).toFixed(0)}%
            <span class="text-red-400 font-bold ml-1">Bait ${(hb.bait*100).toFixed(0)}%</span>
          </div>`;
        }
      }
      if (suitLocks.length > 0) {
        b5 += `<div class="text-xs text-slate-400 font-bold mb-0.5 mt-1">Suit Lock Threats</div>`;
        for (const sl of suitLocks) {
          b5 += `<div class="text-xs"><span class="text-red-400">🔒</span> ${sl.v} on end — opponent holds [${sl.v}|${sl.v}] at ${(sl.oppProb*100).toFixed(0)}% chance</div>`;
        }
      }
      if (highBait.length === 0 && suitLocks.length === 0) {
        b5 += `<div class="text-xs text-slate-500">No significant traps detected. Position is clean.</div>`;
      }
      b5 += '</div>';

      // ===== BLOCK 6: Game Performance =====
      let b6 = `<div class="bg-slate-900/50 rounded-lg p-2 mb-2">
        <div class="text-xs font-bold text-amber-400 mb-1">6. GAME PERFORMANCE</div>`;
      // Scan all steps for mistakes in this game
      let totalDecisions = 0, perfects = 0, goods = 0, mistakes = 0, blunders = 0;
      let totalEL = 0;
      const mistakeTypes = { feeding: 0, starvation: 0, trap_blind: 0, risk_blind: 0, positional: 0 };
      for (let i = 0; i < (currentGame?.snapshots?.length || 0); i++) {
        const s = currentGame.snapshots[i];
        if (s.currentPlayer !== 0 || !s.tile) continue; // only P0 decisions
        const cached = proCache[i];
        if (!cached || !cached.mcResults || cached.mcResults.length === 0) continue;
        totalDecisions++;
        const best = cached.mcResults[0];
        const played = cached.mcResults.find(m => m.tile.id === s.tile.id && m.side === s.side)
                    || cached.mcResults.find(m => m.tile.id === s.tile.id);
        if (!played) continue;
        const el = best.expectedPoints - played.expectedPoints;
        totalEL += el;
        if (el < 0.02) perfects++;
        else if (el < 0.15) goods++;
        else if (el < 0.40) mistakes++;
        else blunders++;
        if (cached.mistakeClass) mistakeTypes[cached.mistakeClass.type]++;
      }
      if (totalDecisions > 0) {
        const avgEL = totalEL / totalDecisions;
        const rating = avgEL < 0.05 ? 'Expert' : avgEL < 0.10 ? 'Advanced' : avgEL < 0.20 ? 'Intermediate' : 'Beginner';
        const ratingColor = avgEL < 0.05 ? '#22c55e' : avgEL < 0.10 ? '#3b82f6' : avgEL < 0.20 ? '#eab308' : '#ef4444';
        b6 += `<div class="grid grid-cols-2 gap-1 text-xs mb-1">
          <div><span class="text-slate-400">Avg EL:</span> <span style="color:${ratingColor}" class="font-bold">${avgEL.toFixed(3)}</span></div>
          <div><span class="text-slate-400">Rating:</span> <span style="color:${ratingColor}" class="font-bold">${rating}</span></div>
          <div><span class="text-slate-400">Decisions:</span> <span class="font-bold text-slate-300">${totalDecisions}</span></div>
          <div>
            <span class="text-emerald-400">${perfects}★</span>
            <span class="text-green-400 ml-1">${goods}✓</span>
            <span class="text-yellow-400 ml-1">${mistakes}!</span>
            <span class="text-red-400 ml-1">${blunders}✗</span>
          </div>
        </div>`;
        // Mistake type breakdown
        const typeEntries = Object.entries(mistakeTypes).filter(([,v]) => v > 0);
        if (typeEntries.length > 0) {
          b6 += `<div class="text-xs text-slate-400 font-bold mb-0.5">${appLang==='pt'?'Tipos de Erro':'Mistake Types'}</div>`;
          const typeLabels = appLang==='pt' ? { feeding: 'Alimentou', starvation: 'Parceiro Fome', trap_blind: 'Armadilha', risk_blind: 'Risco Cego', positional: 'Posicional' }
            : { feeding: 'Feeding', starvation: 'Partner Starve', trap_blind: 'Trap Blind', risk_blind: 'Risk Blind', positional: 'Positional' };
          const typeColors = { feeding: '#f87171', starvation: '#fb923c', trap_blind: '#f472b6', risk_blind: '#c084fc', positional: '#94a3b8' };
          for (const [type, count] of typeEntries.sort((a,b) => b[1] - a[1])) {
            const pct = (count / totalDecisions * 100).toFixed(0);
            b6 += `<div class="flex items-center gap-1 text-xs">
              <div class="w-2 h-2 rounded-full" style="background:${typeColors[type]}"></div>
              <span style="color:${typeColors[type]}">${typeLabels[type]}: ${count}</span>
              <div class="flex-1 bg-slate-700 rounded-full h-1"><div class="h-1 rounded-full" style="width:${pct}%;background:${typeColors[type]}"></div></div>
            </div>`;
          }
        }
      } else {
        b6 += `<div class="text-xs text-slate-500">Navigate through moves to build game performance data. Each P0 decision will be analyzed.</div>`;
      }
      b6 += '</div>';

      return `<div class="space-y-1 flex-1 overflow-y-auto">
        <div class="text-xs text-cyan-300 font-bold">PRO ANALYTICS — Move #${snap.move} (${data.sampleCount} samples)</div>
        ${b1}${b2}${b3}${b4}${b5}${b6}
      </div>`;
    }

    // ========== PROFILE PANEL ==========

    function renderProfilePanel() {
      const player = getActivePlayer();
      const allPlayers = getAllPlayers();
      const playerList = Object.values(allPlayers);

      // Player selector UI
      let selectorHTML = `<div class="bg-slate-900 rounded-lg p-3 mb-3">
        <div class="flex items-center justify-between mb-2">
          <div class="text-xs font-bold text-amber-400">${_t('profile_title')}</div>
          <button class="btn btn-gray text-xs" onclick="promptNewPlayer()">${_t('new_player')}</button>
        </div>`;

      if (playerList.length === 0) {
        selectorHTML += `<div class="text-center py-3">
          <div class="text-slate-400 text-sm mb-2">${_t('no_data_yet')}</div>
          <button class="btn btn-yellow text-sm" onclick="promptNewPlayer()">${_t('new_player')}</button>
        </div></div>`;
        return `<div class="space-y-3 flex-1 overflow-y-auto">${selectorHTML}</div>`;
      }

      selectorHTML += `<div class="flex flex-wrap gap-1">`;
      for (const p of playerList) {
        const isActive = player && player.id === p.id;
        selectorHTML += `<button class="text-xs px-2 py-1 rounded ${isActive ? 'bg-amber-600 text-white font-bold' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}" onclick="switchPlayer('${p.id}')">${p.name}</button>`;
      }
      selectorHTML += `</div></div>`;

      if (!player) return `<div class="space-y-3 flex-1 overflow-y-auto">${selectorHTML}</div>`;

      const ps = _loadPlayerStats(player.id);
      if (!ps || ps.totalGames === 0) {
        return `<div class="space-y-3 flex-1 overflow-y-auto">${selectorHTML}
          <div class="bg-slate-900 rounded-lg p-4 text-center">
            <div class="text-2xl font-bold text-amber-400 mb-1">${player.name}</div>
            <div class="text-slate-400 text-sm">${_t('no_data_yet')}</div>
          </div>
        </div>`;
      }

      const totalMoves = ps.totalMoves || 1;
      const accuracy = ((ps.optimalMoves + ps.goodMoves) / totalMoves * 100).toFixed(1);
      const perfectPct = (ps.optimalMoves / totalMoves * 100).toFixed(0);

      // Section A: Overview Card
      const overviewHTML = `<div class="bg-slate-900 rounded-lg p-3 text-center">
        <div class="text-xl font-bold text-amber-400 mb-1">${player.name}</div>
        <div class="grid grid-cols-3 gap-2 text-center">
          <div>
            <div class="text-2xl font-bold ${parseFloat(accuracy) >= 60 ? 'text-emerald-400' : parseFloat(accuracy) >= 40 ? 'text-yellow-400' : 'text-red-400'}">${accuracy}%</div>
            <div class="text-xs text-slate-400">${_t('accuracy')}</div>
          </div>
          <div>
            <div class="text-2xl font-bold text-blue-400">${ps.totalGames}</div>
            <div class="text-xs text-slate-400">${_t('games_played')}</div>
          </div>
          <div>
            <div class="text-2xl font-bold text-purple-400">${eloRatings.player}</div>
            <div class="text-xs text-slate-400">Elo</div>
          </div>
        </div>
        ${ps.totalMoves > 0 ? `<div class="text-xs text-slate-500 mt-1">${_t('perfect')}: ${perfectPct}% | Avg EL: ${(ps.totalEquityLoss / totalMoves).toFixed(3)}</div>` : ''}
      </div>`;

      // Section B: Accuracy Trend (canvas-based)
      let trendHTML = '';
      if (ps.sessions.length >= 3 || ps.recentGames.length >= 5) {
        const trendId = 'profile-trend-' + Date.now();
        const dataPoints = ps.sessions.length >= 3
          ? ps.sessions.map(s => s.accuracy * 100)
          : ps.recentGames.slice(-20).map(g => g.accuracy * 100);
        const labels = ps.sessions.length >= 3
          ? ps.sessions.map(s => s.date.slice(5))
          : ps.recentGames.slice(-20).map((g, i) => '' + (i + 1));
        // Determine trend direction
        const recent = dataPoints.slice(-5);
        const prev = dataPoints.slice(-10, -5);
        const recentAvg = recent.reduce((a, b) => a + b, 0) / recent.length;
        const prevAvg = prev.length > 0 ? prev.reduce((a, b) => a + b, 0) / prev.length : recentAvg;
        const trendDir = recentAvg > prevAvg + 2 ? _t('improving') : recentAvg < prevAvg - 2 ? _t('declining') : _t('stable');
        const trendColor = recentAvg > prevAvg + 2 ? 'text-emerald-400' : recentAvg < prevAvg - 2 ? 'text-red-400' : 'text-slate-400';

        trendHTML = `<div class="bg-slate-900 rounded-lg p-3">
          <div class="flex justify-between items-center mb-2">
            <div class="text-xs font-bold text-slate-400">${_t('accuracy_trend')}</div>
            <div class="text-xs ${trendColor}">${trendDir}</div>
          </div>
          <canvas id="${trendId}" width="280" height="80" style="width:100%;height:80px"></canvas>
        </div>`;

        // Schedule canvas draw after render
        setTimeout(() => {
          const c = document.getElementById(trendId);
          if (!c) return;
          const ctx = c.getContext('2d');
          const W = c.width, H = c.height;
          ctx.clearRect(0, 0, W, H);
          const minV = Math.max(0, Math.min(...dataPoints) - 10);
          const maxV = Math.min(100, Math.max(...dataPoints) + 10);
          const range = maxV - minV || 1;
          const n = dataPoints.length;
          const xStep = (W - 10) / Math.max(n - 1, 1);

          // Grid lines
          ctx.strokeStyle = '#334155'; ctx.lineWidth = 0.5;
          for (let y = 0; y <= 4; y++) {
            const yy = 5 + (H - 10) * y / 4;
            ctx.beginPath(); ctx.moveTo(5, yy); ctx.lineTo(W - 5, yy); ctx.stroke();
          }

          // Line
          ctx.strokeStyle = recentAvg > prevAvg + 2 ? '#22c55e' : recentAvg < prevAvg - 2 ? '#ef4444' : '#94a3b8';
          ctx.lineWidth = 2;
          ctx.beginPath();
          for (let i = 0; i < n; i++) {
            const x = 5 + i * xStep;
            const y = H - 5 - ((dataPoints[i] - minV) / range) * (H - 10);
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.stroke();

          // Points
          for (let i = 0; i < n; i++) {
            const x = 5 + i * xStep;
            const y = H - 5 - ((dataPoints[i] - minV) / range) * (H - 10);
            ctx.fillStyle = dataPoints[i] >= 60 ? '#22c55e' : dataPoints[i] >= 40 ? '#eab308' : '#ef4444';
            ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
          }
        }, 50);
      }

      // Section C: Mistake Breakdown
      const leakEntries = Object.entries(ps.leaks).filter(([k, v]) => v > 0).sort((a, b) => b[1] - a[1]);
      const totalLeaks = leakEntries.reduce((s, [k, v]) => s + v, 0);
      let mistakeHTML = '';
      if (totalLeaks > 0) {
        const leakColors = { BLOCKING_MISS: '#ef4444', FEED_ERROR: '#f97316', DOUBLE_TIMING: '#eab308', DEAD_END: '#a855f7', PIP_WASTE: '#3b82f6', PARTNER_IGNORE: '#ec4899' };
        const topMistake = leakEntries[0];
        mistakeHTML = `<div class="bg-slate-900 rounded-lg p-3">
          <div class="text-xs font-bold text-slate-400 mb-2">${_t('mistake_breakdown')}</div>
          <div class="space-y-1.5">
            ${leakEntries.map(([type, count]) => {
              const pct = Math.round(count / totalLeaks * 100);
              const color = leakColors[type] || '#94a3b8';
              const label = LEAK_TYPES[type] || type;
              return `<div class="flex items-center gap-2">
                <span class="text-xs w-20 truncate" style="color:${color}">${label}</span>
                <div class="flex-1 bg-slate-700 rounded-full h-2">
                  <div class="h-2 rounded-full" style="width:${pct}%;background:${color}"></div>
                </div>
                <span class="text-xs text-slate-400 w-8 text-right">${count}</span>
              </div>`;
            }).join('')}
          </div>
          <div class="text-xs text-orange-400 mt-2 border-t border-slate-700 pt-1">${_t('most_common_mistake')}: <b>${LEAK_TYPES[topMistake[0]]}</b> (${topMistake[1]}x)</div>
        </div>`;
      }

      // Section D: Move Quality Distribution
      const qualityHTML = `<div class="bg-slate-900 rounded-lg p-3">
        <div class="text-xs font-bold text-slate-400 mb-2">${_t('move_quality')}</div>
        <div class="space-y-1.5">
          ${[
            { label: _t('perfect'), count: ps.optimalMoves, color: '#22c55e' },
            { label: appLang==='pt'?'Imprecisão':'Inaccuracy', count: ps.goodMoves, color: '#86efac' },
            { label: _t('mistake'), count: ps.okMoves, color: '#eab308' },
            { label: _t('blunder'), count: ps.badMoves, color: '#ef4444' }
          ].map(g => {
            const pct = (g.count / totalMoves * 100).toFixed(0);
            return `<div class="flex items-center gap-2">
              <span class="text-xs w-16" style="color:${g.color}">${g.label}</span>
              <div class="flex-1 bg-slate-700 rounded-full h-2">
                <div class="h-2 rounded-full" style="width:${pct}%;background:${g.color}"></div>
              </div>
              <span class="text-xs text-slate-400 w-14 text-right">${g.count} (${pct}%)</span>
            </div>`;
          }).join('')}
        </div>
      </div>`;

      // Section E: Start vs Roll Stats
      let startRollHTML = '';
      if (ps.startRoll && (ps.startRoll.startGames > 0 || ps.startRoll.rollGames > 0)) {
        const sr = ps.startRoll;
        const startWR = sr.startGames > 0 ? (sr.startWins / sr.startGames * 100).toFixed(0) : '—';
        const rollWR = sr.rollGames > 0 ? (sr.rollWins / sr.rollGames * 100).toFixed(0) : '—';
        const totalSR = sr.startGames + sr.rollGames;
        const recommendation = totalSR >= 20
          ? (sr.startGames > 0 && sr.rollGames > 0
            ? (sr.startWins / sr.startGames > sr.rollWins / sr.rollGames ? 'Starting seems stronger for you' : 'Rolling seems stronger for you')
            : '')
          : `${20 - totalSR} more games needed for recommendation`;

        startRollHTML = `<div class="bg-slate-900 rounded-lg p-3">
          <div class="text-xs font-bold text-slate-400 mb-2">${_t('start_vs_roll')}</div>
          <div class="grid grid-cols-2 gap-3 text-center">
            <div class="bg-slate-800 rounded p-2">
              <div class="text-lg font-bold text-emerald-400">${startWR}%</div>
              <div class="text-xs text-slate-400">${_t('start_decision')} (${sr.startGames})</div>
            </div>
            <div class="bg-slate-800 rounded p-2">
              <div class="text-lg font-bold text-blue-400">${rollWR}%</div>
              <div class="text-xs text-slate-400">${_t('roll_decision')} (${sr.rollGames})</div>
            </div>
          </div>
          ${recommendation ? `<div class="text-xs text-slate-500 mt-1 text-center">${recommendation}</div>` : ''}
        </div>`;
      }

      // Recent games list
      const recentGames = ps.recentGames.slice(-10).reverse();
      let recentHTML = '';
      if (recentGames.length > 0) {
        recentHTML = `<div class="bg-slate-900 rounded-lg p-2">
          <div class="text-xs font-bold text-slate-400 mb-1">${appLang==='pt'?'Jogos Recentes':'Recent Games'}</div>
          <div class="space-y-0.5 max-h-[150px] overflow-y-auto">
            ${recentGames.map(g => {
              const d = new Date(g.date);
              const dateStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
              const resultColor = g.result === 'win' ? 'text-emerald-400' : g.result === 'tie' ? 'text-yellow-400' : 'text-red-400';
              const resultText = g.result === 'win' ? 'W' : g.result === 'tie' ? 'T' : 'L';
              const accColor = g.accuracy >= 0.6 ? 'text-emerald-400' : g.accuracy >= 0.4 ? 'text-yellow-400' : 'text-red-400';
              return `<div class="flex items-center gap-2 py-0.5 text-xs">
                <span class="text-slate-500 w-14">${dateStr}</span>
                <span class="font-bold ${resultColor} w-4">${resultText}</span>
                <span class="${accColor} font-mono w-10">${(g.accuracy*100).toFixed(0)}%</span>
                ${g.worstMistake ? `<span class="text-red-400">EL:${g.worstMistake.eqLoss.toFixed(2)}</span>` : '<span class="text-emerald-400">clean</span>'}
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }

      // Delete button
      const deleteHTML = `<div class="text-center mt-2">
        <button class="text-xs text-red-500 hover:text-red-400" onclick="if(confirm('${_t('confirm_delete').replace(/'/g, "\\'")}')) deletePlayer('${player.id}')">${_t('delete_player')}</button>
      </div>`;

      return `<div class="space-y-3 flex-1 overflow-y-auto">
        ${selectorHTML}
        ${overviewHTML}
        ${trendHTML}
        ${qualityHTML}
        ${mistakeHTML}
        ${startRollHTML}
        ${recentHTML}
        ${deleteHTML}
      </div>`;
    }

      const name = prompt(_t('enter_name'));
      if (name && name.trim()) createPlayer(name.trim());
    }

    function renderStatsPanel() {

      return `

          <div class="bg-slate-900 rounded-lg p-3 text-center">

            <div class="text-xs text-slate-400">Perfect Play Rate</div>
            <div class="text-lg font-bold text-blue-400 mt-1">${goodPct}%</div>
            <div class="text-xs text-slate-400">Perfect or Inaccuracy</div>

          <!-- Equity Loss summary -->
          <div class="bg-slate-900 rounded-lg p-3 text-center">

            <div class="text-xs text-slate-500 mt-1">
              ${parseFloat(avgEL) < 0.05 ? 'Expert level' :
                parseFloat(avgEL) < 0.10 ? (appLang==='pt'?'Avançado':'Advanced') :
                parseFloat(avgEL) < 0.20 ? (appLang==='pt'?'Intermediário':'Intermediate') : (appLang==='pt'?'Iniciante — foque nos erros grandes':'Beginner — focus on big blunders')}
            </div>
            <div class="text-xs text-slate-600 mt-1">Match: ${matchScore[0]}-${matchScore[1]} | ME: ${(getMatchEquity(matchScore[0], matchScore[1]) * 100).toFixed(0)}%</div>
          </div>

          <div class="bg-slate-900 rounded-lg p-2">
            <div class="text-xs font-bold text-slate-400 mb-2">${appLang==='pt'?`Detalhes (${total} jogadas, ${stats.games} jogos)`:`Breakdown (${total} moves, ${stats.games} games)`}</div>
            <div class="space-y-1.5">
              ${[
                { label: _t('perfect'), count: stats.optimalMoves, color: '#22c55e', cls: 'grade-perfect' },
                { label: appLang==='pt'?'Imprecisão':'Inaccuracy', count: stats.goodMoves, color: '#86efac', cls: 'grade-good' },
                { label: _t('mistake'), count: stats.okMoves, color: '#eab308', cls: 'grade-ok' },
                { label: _t('blunder'), count: stats.badMoves, color: '#ef4444', cls: 'grade-bad' }
              ].map(g => {
                const pct = total > 0 ? (g.count / total * 100).toFixed(0) : 0;
                return `<div class="flex items-center gap-2">
                  <span class="grade-badge ${g.cls} w-16 text-center" style="font-size:10px">${g.label}</span>
                  <div class="flex-1 bg-slate-700 rounded-full h-2">
                    <div class="h-2 rounded-full" style="width:${pct}%;background:${g.color}"></div>
                  </div>
                  <span class="text-xs text-slate-400 w-12 text-right">${g.count} (${pct}%)</span>
                </div>`;
              }).join('')}
            </div>
          </div>

          <!-- Recent decisions -->
          <div class="bg-slate-900 rounded-lg p-2">
            <div class="text-xs font-bold text-slate-400 mb-1">${appLang==='pt'?'Decisões Recentes':'Recent Decisions'}</div>
            <div class="space-y-0.5 max-h-[200px] overflow-y-auto">
              ${stats.history.length === 0 ? '<div class="text-xs text-slate-500">Play quiz mode to track decisions</div>' : ''}
              ${[...stats.history].reverse().map((h, i) => {
                const gradeLabel = { perfect: 'PERFECT', good: 'INACC', ok: 'MSTK', bad: 'BLNDR' }[h.grade] || h.grade.toUpperCase();
                const el = h.equityLoss;

                  <span class="grade-badge grade-${h.grade}" style="font-size:9px">${gradeLabel}</span>
                  <span class="text-slate-400">[${h.userTile}]</span>
                  ${h.grade !== 'perfect' ? `<span class="text-slate-500">[${h.aiTile}]</span>` : ''}
                  ${el > 0 ? `<span class="font-mono text-red-400">EL:${el.toFixed(2)}</span>` : ''}
                </div>`;
              }).join('')}

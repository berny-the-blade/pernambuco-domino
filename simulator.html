            if (t1 < t0) return { winnerTeam: 1, points: 1, type: 'blocked' };
            return { winnerTeam: -1, points: 0, type: 'tie' };
          }
          cur = (cur + 1) % 4;
        }
      }
      return { winnerTeam: -1, points: 0, type: 'tie' };
    }

    // Run Monte Carlo evaluation for all playable tiles from current position
    // Returns rich results: E[pts], win%, block%, outcome distribution
    function monteCarloEval(snap, player, numSims = 80) {
      const hand = snap.hands[player];
      const lE = snap.leftEnd, rE = snap.rightEnd;
      const board = snap.board;
      const knowledge = snap.knowledge;

      const playable = hand.filter(t => canPlay(t, lE, rE, board.length));
      if (playable.length === 0) return [];
      if (playable.length === 1) {
        return [{ tile: playable[0], winRate: 0.5, expectedPoints: 0, sims: 0, side: null,
                  blockRate: 0, outcomes: { normal: 0, carroca: 0, laelo: 0, cruzada: 0, blocked: 0, tie: 0 },
                  variance: 0, stdDev: 0, ci95: 0, cvar5: 0 }];
      }

      // Check cache
      const cacheKey = [lE, rE, hand.map(t=>t.id).sort().join(','),
        snap.hands.map(h=>h.length).join(','),
        [...knowledge.played].sort().join(',')].join('::');
      if (mcCache.has(cacheKey)) return mcCache.get(cacheKey);

      const handSizes = snap.hands.map(h => h.length);
      const myTeam = player % 2;
      const results = [];

      for (const tile of playable) {
        const sides = [];
        if (board.length === 0) {
          sides.push(null);
        } else {
          if (tile.left === lE || tile.right === lE) sides.push('left');
          if ((tile.left === rE || tile.right === rE) && lE !== rE) sides.push('right');
          if (sides.length === 0 && (tile.left === rE || tile.right === rE)) sides.push('right');
        }

        let bestResult = null;

        for (const side of sides) {
          let wins = 0, totalPts = 0, sumPtsSq = 0, blocks = 0, ties = 0;
          const outcomes = { normal: 0, carroca: 0, laelo: 0, cruzada: 0, blocked: 0, tie: 0 };
          const ptsArray = []; // for CVaR computation

          let newLE = lE, newRE = rE;
          const newBLen = board.length + 1;
          if (board.length === 0) {
            newLE = tile.left; newRE = tile.right;
          } else if (side === 'left') {
            newLE = tile.left === lE ? tile.right : tile.left;
          } else {
            newRE = tile.right === rE ? tile.left : tile.right;
          }

          const newHandSizes = [...handSizes];
          newHandSizes[player]--;

          // Check instant win
          if (newHandSizes[player] === 0) {
            const isD = tile.left === tile.right;
            const wasBoth = board.length > 0 && couldPlayBothEnds(tile, lE, rE);
            let pts = 1, type = 'normal';
            if (isD && wasBoth) { pts = 4; type = 'cruzada'; }
            else if (isD) { pts = 2; type = 'carroca'; }
            else if (wasBoth) { pts = 3; type = 'laelo'; }
            bestResult = {
              tile, side,
              winRate: 1.0, expectedPoints: pts,
              blockRate: 0, outcomes: { normal: 0, carroca: 0, laelo: 0, cruzada: 0, blocked: 0, tie: 0, [type]: numSims },
              sims: numSims, variance: 0, stdDev: 0, ci95: 0, cvar5: pts
            };
            break;
          }

          const newKnowledge = knowledge.clone();
          newKnowledge.recordPlay(player, tile);
          const myNewHand = hand.filter(t => t.id !== tile.id);

          for (let sim = 0; sim < numSims; sim++) {
            const simHands = generateConsistentDeal(myNewHand, newHandSizes, newKnowledge, player);
            const result = simulateFromPosition(simHands, null, newLE, newRE, (player + 1) % 4, newKnowledge, newBLen);

            const signedPts = result.winnerTeam === myTeam ? result.points :
                              result.winnerTeam >= 0 ? -result.points : 0;

            if (result.winnerTeam === myTeam) wins++;
            totalPts += signedPts;
            sumPtsSq += signedPts * signedPts;
            ptsArray.push(signedPts);
            if (result.type === 'blocked' || result.type === 'tie') blocks++;
            if (result.type === 'tie') ties++;
            if (outcomes[result.type] !== undefined) outcomes[result.type]++;
          }

          const ep = numSims > 0 ? totalPts / numSims : 0;
          const wr = numSims > 0 ? wins / numSims : 0.5;
          const variance = numSims > 1 ? (sumPtsSq / numSims) - ep * ep : 0;
          const stdDev = Math.sqrt(Math.max(0, variance));
          const ci95 = numSims > 1 ? 1.96 * stdDev / Math.sqrt(numSims) : 0;

          // CVaR 5%: expected value of worst 5% of outcomes
          ptsArray.sort((a, b) => a - b);
          const cvarCount = Math.max(1, Math.ceil(numSims * 0.05));
          let cvarSum = 0;
          for (let i = 0; i < cvarCount; i++) cvarSum += ptsArray[i];
          const cvar5 = cvarSum / cvarCount;

          const thisResult = {
            tile, side,
            winRate: wr, expectedPoints: ep,
            blockRate: blocks / numSims,
            outcomes,
            sims: numSims,
            variance, stdDev, ci95, cvar5
          };

          if (!bestResult || ep > bestResult.expectedPoints) {
            bestResult = thisResult;
          }
        }

        if (bestResult) results.push(bestResult);
      }

      results.sort((a, b) => b.expectedPoints - a.expectedPoints || b.winRate - a.winRate);
      mcCache.set(cacheKey, results);
      return results;
    }

    // ========== STATE ==========

    let currentGame = null;
    let currentStep = 0;
    let autoPlayTimer = null;
    let autoPlaySpeed = 1500;
    let gameMode = 'watch'; // 'watch' | 'quiz'
    let scoreMultiplier = 1; // dobrada: doubles after tied block
    let matchScore = [0, 0];  // team0 vs team1 score, first to 6 wins match
    let lastWinTeam = null;   // null = first game of match, 0 or 1 = team that won last
    let starterChoicePending = false; // true when waiting for user to pick starter
    let pendingHands = null; // pre-dealt hands shown during starter choice

    // ========== MATCH EQUITY TABLE (3D with dobrada) ==========
    // ME3D[s1][s2][dobIdx] = P(team1 wins match | scores s1 vs s2, dobrada multiplier)
    const MATCH_TARGET = 6;
    const POINT_DIST = [
      { pts: 1, prob: 0.70 },  // normal + blocked
      { pts: 2, prob: 0.16 },  // carroca
      { pts: 3, prob: 0.10 },  // la-e-lo
      { pts: 4, prob: 0.04 }   // cruzada
    ];
    const DOB_VALUES = [1, 2, 4, 8]; // dobrada multiplier levels

    const ME3D = (() => {
      const T = MATCH_TARGET;
      const S = T + 5;
      // me[s1][s2][dobIdx]
      const me = Array.from({length: S}, () =>
        Array.from({length: S}, () => new Float64Array(DOB_VALUES.length))
      );
      // Base cases
      for (let d = 0; d < DOB_VALUES.length; d++) {
        for (let s2 = 0; s2 < S; s2++) {
          for (let s1 = T; s1 < S; s1++) {
            me[s1][s2][d] = s2 >= T ? 0.5 : 1.0;
          }
        }
        for (let s1 = 0; s1 < T; s1++) {
          for (let s2 = T; s2 < S; s2++) {
            me[s1][s2][d] = 0.0;
          }
        }
      }
      // Fill bottom-up
      const TIE_PROB = 0.03; // ~3% of rounds are ties
      // Iterate d from highest to lowest so tie term references already-computed values
      for (let s1 = T - 1; s1 >= 0; s1--) {
        for (let s2 = T - 1; s2 >= 0; s2--) {
          for (let d = DOB_VALUES.length - 1; d >= 0; d--) {
            const dob = DOB_VALUES[d];
            let decisive = 0;
            for (const { pts: basePts, prob } of POINT_DIST) {
              const pts = basePts * dob;
              const s1w = Math.min(s1 + pts, T + 4);
              const s2w = Math.min(s2 + pts, T + 4);
              decisive += 0.5 * prob * me[s1w][s2][0] + 0.5 * prob * me[s1][s2w][0];
            }
            const nextDobIdx = Math.min(d + 1, DOB_VALUES.length - 1);
            if (d === DOB_VALUES.length - 1) {
              // Max dobrada: tie maps to self → solve: val = decisive*(1-t) + t*val
              // → val*(1-t) = decisive*(1-t) → val = decisive
              me[s1][s2][d] = decisive;
            } else {
              me[s1][s2][d] = decisive * (1 - TIE_PROB) + TIE_PROB * me[s1][s2][nextDobIdx];
            }
          }
        }
      }
      return me;
    })();

    // Backward-compat 2D ME wrapper (dob=1)
    const ME = (() => {
      const T = MATCH_TARGET;
      const S = T + 5;
      const tbl = Array.from({length: S}, () => new Float64Array(S));
      for (let s1 = 0; s1 < S; s1++)
        for (let s2 = 0; s2 < S; s2++)
          tbl[s1][s2] = ME3D[s1][s2][0];
      return tbl;
    })();

    function getMatchEquity(s1, s2) {
      const c1 = Math.min(s1, MATCH_TARGET + 4);
      const c2 = Math.min(s2, MATCH_TARGET + 4);
      return ME[c1][c2];
    }

    function getMatchEquity3D(s1, s2, dobMultiplier) {
      const dIdx = DOB_VALUES.indexOf(dobMultiplier);
      const d = dIdx >= 0 ? dIdx : 0;
      return ME3D[Math.min(s1, MATCH_TARGET + 4)][Math.min(s2, MATCH_TARGET + 4)][d];
    }

    // Convert round E[pts] to match equity change (dobrada-aware)
    function roundToMatchEquity(epts, myTeamScore, oppTeamScore, dob) {
      const d = dob || scoreMultiplier || 1;
      const currentME = getMatchEquity3D(myTeamScore, oppTeamScore, d);
      // Improved: weight by actual point distribution × dobrada
      let meAfter = 0;
      for (const { pts: basePts, prob } of POINT_DIST) {
        const pts = basePts * d;
        if (epts >= 0) {
          // Positive: probability of us winning with these pts
          const frac = prob; // weight this outcome type
          meAfter += frac * getMatchEquity3D(
            Math.min(myTeamScore + pts, MATCH_TARGET + 4), oppTeamScore, 1);
        } else {
          meAfter += prob * getMatchEquity3D(
            myTeamScore, Math.min(oppTeamScore + pts, MATCH_TARGET + 4), 1);
        }
      }
      // Scale by magnitude of epts (epts is signed expected pts)
      const mePerPt = getMatchEquity3D(Math.min(myTeamScore + d, MATCH_TARGET + 4), oppTeamScore, 1) - currentME;
      return epts * mePerPt;
    }

    let rightPanelTab = 'reasoning'; // 'reasoning' | 'probability' | 'stats' | 'guide'
    let deepAnalysis = false;        // Monte Carlo toggle
    let mcResults = null;            // cached MC results for current step
    let mcRunning = false;           // is MC currently computing?

    // Quiz state
    let quizWaiting = false;       // Are we waiting for user to pick a tile?
    let quizSidePick = null;       // {tile, canLeft, canRight} — waiting for side choice
    let quizResult = null;         // { userTile, userSide, aiTile, aiSide, grade, scoreDiff }
    let quizShowingResult = false;

    // Stats tracking (persists across games in session)
    let stats = {
      totalMoves: 0,
      optimalMoves: 0,
      goodMoves: 0,    // inaccuracy (small equity loss)
      okMoves: 0,      // mistake (medium equity loss)
      badMoves: 0,     // blunder (large equity loss)
      games: 0,
      totalEquityLoss: 0,  // cumulative E[pts] equity loss
      history: []  // last 30 decisions
    };

    // Load stats from localStorage
    try {
      const saved = localStorage.getItem('domino-trainer-stats');
      if (saved) stats = JSON.parse(saved);
    } catch(e) {}

    function saveStats() {
      try { localStorage.setItem('domino-trainer-stats', JSON.stringify(stats)); } catch(e) {}
    }

    // ========== QUIZ LOGIC ==========

    function isQuizTurn() {
      if (gameMode !== 'quiz' || !currentGame) return false;
      const snap = currentGame.snapshots[currentStep];
      // We quiz on P0's turns (the next move to be revealed)
      // The snapshot at currentStep shows the state BEFORE this move
      // Actually, we need to check the NEXT snapshot's player
      const nextStep = currentStep + 1;
      if (nextStep >= currentGame.snapshots.length) return false;
      const nextSnap = currentGame.snapshots[nextStep];
      return nextSnap.player === 0;
    }

    function startQuiz() {
      quizWaiting = true;
      quizResult = null;
      quizShowingResult = false;
      quizSidePick = null;
      render();
    }

    function quizPickTile(tileId) {
      if (!quizWaiting || quizSidePick) return;
      const snap = currentGame.snapshots[currentStep];
      const tile = snap.hands[0].find(t => t.id === tileId);
      if (!tile) return;

      // Check if this tile can play on both sides
      const canLeft = canPlayOnSide(tile, snap.leftEnd);
      const canRight = canPlayOnSide(tile, snap.rightEnd);

      if (snap.leftEnd === snap.rightEnd) {
        // Both ends same number, only one effective side
        if (canLeft) {
          finishQuizPick(tile, 'left');
        } else {
          // tile can't play — user picked wrong
          finishQuizPick(tile, null);
        }
      } else if (canLeft && canRight) {
        // Tile can play both sides — ask which
        quizSidePick = { tile, canLeft, canRight };
        render();
      } else if (canLeft) {
        finishQuizPick(tile, 'left');
      } else if (canRight) {
        finishQuizPick(tile, 'right');
      }
    }

    function quizPickSide(side) {
      if (!quizSidePick) return;
      const tile = quizSidePick.tile;
      quizSidePick = null; // clear BEFORE render triggered by finishQuizPick
      finishQuizPick(tile, side);
    }

    function quizPass() {
      if (!quizWaiting) return;
      // Passing is always correct when you have no playable tiles — just advance
      quizWaiting = false;
      stepForward();
    }

    function finishQuizPick(userTile, userSide) {
      const nextSnap = currentGame.snapshots[currentStep + 1];
      const snap = currentGame.snapshots[currentStep];
      const aiTile = nextSnap.tile;
      const aiSide = nextSnap.side;
      const aiScore = nextSnap.score || 0;

      // Find user's tile score and reasons from allOptions
      const allOpts = nextSnap.allOptions || [];
      const userOpt = allOpts.find(o => o.tile.id === userTile.id && (o.side === userSide || !userSide));
      const aiOpt = allOpts.find(o => o.tile.id === aiTile.id && o.side === aiSide);
      const userScore = userOpt ? userOpt.score : -50;
      const scoreDiff = aiScore - userScore;

      // Run Monte Carlo for equity loss computation
      let quizMC = null;
      if (deepAnalysis) {
        quizMC = monteCarloEval(snap, 0, MC_SIMS_QUIZ);
      }

      // Compute equity loss from MC (primary) or heuristic (fallback)
      let equityLoss = 0;
      let equityLossSource = 'heuristic';
      const canP = canPlay(userTile, snap.leftEnd, snap.rightEnd, snap.board.length);

      if (!canP) {
        equityLoss = 99; // invalid play sentinel
      } else if (quizMC && quizMC.length > 0) {
        // MC-based equity loss: difference in E[pts] between best and user's choice
        const mcBest = quizMC[0]; // sorted by expectedPoints
        const mcUser = quizMC.find(m => m.tile.id === userTile.id);
        if (mcBest && mcUser) {
          equityLoss = mcBest.expectedPoints - mcUser.expectedPoints;
          equityLossSource = 'mc';
        } else if (mcBest) {
          equityLoss = Math.max(0, mcBest.expectedPoints); // can't find user tile in MC → big miss
          equityLossSource = 'mc';
        }
      } else {
        // Heuristic fallback: normalize score diff to E[pts] scale (~0-2 range)
        equityLoss = Math.max(0, scoreDiff) / 25; // rough mapping: 25 heuristic pts ≈ 1 E[pts]
      }

      // Grade based on equity loss (in expected points)
      let grade;
      if (!canP) {
        grade = 'bad';
      } else if (userTile.id === aiTile.id && userSide === aiSide) {
        grade = 'perfect';
      } else if (userTile.id === aiTile.id) {
        grade = equityLoss < 0.02 ? 'perfect' : 'good'; // right tile, suboptimal side
      } else if (equityLoss < 0.02) {
        grade = 'perfect'; // truly negligible — within MC noise
      } else if (equityLoss < 0.15) {
        grade = 'good';    // inaccuracy
      } else if (equityLoss < 0.40) {
        grade = 'ok';      // mistake
      } else {
        grade = 'bad';     // blunder
      }

      // Build detailed explanation context
      const knowledge = snap.knowledge;
      const hand = snap.hands[0];
      const lE = snap.leftEnd, rE = snap.rightEnd;

      // Compute what ends each choice creates
      const aiNewEnds = computeNewEnds(aiTile, aiSide, lE, rE);
      const userNewEnds = userSide ? computeNewEnds(userTile, userSide, lE, rE) : null;

      // Build detailed comparison
      const detail = buildDetailedExplanation({
        userTile, userSide, userScore, userReasons: userOpt ? userOpt.reasons : [],
        aiTile, aiSide, aiScore, aiReasons: aiOpt ? aiOpt.reasons : nextSnap.reasons || [],
        aiNewEnds, userNewEnds,
        hand, knowledge, lE, rE, grade, scoreDiff, allOptions: allOpts
      });

      // Match equity context
      const meNow = getMatchEquity(matchScore[0], matchScore[1]);
      const meShift = equityLossSource === 'mc' ? roundToMatchEquity(equityLoss, matchScore[0], matchScore[1]) : null;

      // Missed deductions from Coach notebook
      let missedDeductions = [];
      if (grade !== 'perfect' && snap.notebook) {
        try {
          missedDeductions = snap.notebook.getMissedDeductions(userTile, userSide, aiTile, aiSide, snap);
        } catch (e) { console.warn('getMissedDeductions error:', e); }
      }

      quizResult = {
        userTile, userSide, aiTile, aiSide, grade, scoreDiff, userScore, aiScore,
        allOptions: allOpts, detail, aiNewEnds, userNewEnds,
        userReasons: userOpt ? userOpt.reasons : [],
        aiReasons: aiOpt ? aiOpt.reasons : nextSnap.reasons || [],
        mcResults: quizMC,
        equityLoss: Math.round(equityLoss * 1000) / 1000,
        equityLossSource,
        matchEquity: meNow,
        matchEquityShift: meShift,
        missedDeductions
      };
      quizWaiting = false;
      quizShowingResult = true;

      // Track stats
      stats.totalMoves++;
      if (grade === 'perfect') stats.optimalMoves++;
      else if (grade === 'good') stats.goodMoves++;
      else if (grade === 'ok') stats.okMoves++;
      else stats.badMoves++;
      if (typeof stats.totalEquityLoss !== 'number') stats.totalEquityLoss = 0;
      stats.totalEquityLoss += equityLoss < 90 ? equityLoss : 0; // skip invalid-play sentinel
      stats.history.push({
        grade, scoreDiff, equityLoss: Math.round(equityLoss * 1000) / 1000,
        userTile: `${userTile.left}-${userTile.right}`,
        aiTile: `${aiTile.left}-${aiTile.right}`
      });
      if (stats.history.length > 30) stats.history.shift();
      saveStats();

      render();
    }

    function computeNewEnds(tile, side, lE, rE) {
      if (!side) return { newLeft: lE, newRight: rE };
      if (side === 'left') {
        const newL = tile.left === lE ? tile.right : tile.left;
        return { newLeft: newL, newRight: rE };
      } else {
        const newR = tile.right === rE ? tile.left : tile.right;
        return { newLeft: lE, newRight: newR };
      }
    }

    function buildDetailedExplanation(ctx) {
      const { userTile, userSide, userScore, userReasons, aiTile, aiSide, aiScore, aiReasons,
              aiNewEnds, userNewEnds, hand, knowledge, lE, rE, grade, scoreDiff, allOptions } = ctx;
      const lines = [];
      const pNames = PLAYER_NAMES_FULL;

      if (grade === 'perfect') {
        if (userTile.id === aiTile.id) {
          lines.push({ type: 'success', text: `You picked the optimal play! [${userTile.left}|${userTile.right}] on ${userSide || aiSide}. Well done.` });
        } else {
          lines.push({ type: 'success', text: `Great pick! [${userTile.left}|${userTile.right}] on ${userSide} is essentially equal to [${aiTile.left}|${aiTile.right}] (negligible difference).` });
        }
        if (aiReasons.length > 0) {
          lines.push({ type: 'info', text: `Why it's best: ${aiReasons.join('. ')}` });
        }
        return lines;
      }

      // === HEADER: What AI chose and why ===
      lines.push({ type: 'header', text: `Better play: [${aiTile.left}|${aiTile.right}] on ${aiSide}` });

      // AI's reasons
      if (aiReasons.length > 0) {
        for (const r of aiReasons) {
          lines.push({ type: 'ai-reason', text: r });
        }
      }

      // === What you chose and its shortcomings ===
      lines.push({ type: 'header2', text: `Your pick: [${userTile.left}|${userTile.right}]${userSide ? ' on ' + userSide : ''}` });
      if (userReasons.length > 0) {
        for (const r of userReasons) {
          lines.push({ type: 'user-reason', text: r });
        }
      }

      // === DETAILED COMPARISON ===

      // 1. Board ends comparison
      if (aiNewEnds && userNewEnds) {
        const aiEnds = `${aiNewEnds.newLeft}/${aiNewEnds.newRight}`;
        const userEnds = `${userNewEnds.newLeft}/${userNewEnds.newRight}`;
        if (aiEnds !== userEnds) {
          // Count how many tiles in remaining hand match each set of ends
          const remainingHand = hand.filter(t => t.id !== aiTile.id && t.id !== userTile.id);
          const aiMyFollow = hand.filter(t => t.id !== aiTile.id &&
            (t.left === aiNewEnds.newLeft || t.right === aiNewEnds.newLeft || t.left === aiNewEnds.newRight || t.right === aiNewEnds.newRight)).length;
          const userMyFollow = hand.filter(t => t.id !== userTile.id &&
            (t.left === userNewEnds.newLeft || t.right === userNewEnds.newLeft || t.left === userNewEnds.newRight || t.right === userNewEnds.newRight)).length;

          if (aiMyFollow > userMyFollow) {
            lines.push({ type: 'compare',
              text: `Board ends: AI leaves ${aiEnds} (you have ${aiMyFollow} follow-up tiles) vs your pick leaves ${userEnds} (only ${userMyFollow} follow-ups). More follow-ups = you stay in control.`
            });
          } else if (aiMyFollow < userMyFollow) {
            lines.push({ type: 'compare',
              text: `Board ends: Your pick leaves ${userEnds} (${userMyFollow} follow-ups) vs AI's ${aiEnds} (${aiMyFollow}). Your ends are actually better for suit control, but other factors matter more here.`
            });
          }
        }
      }

      // 2. Opponent analysis from passes
      for (const oppIdx of [1, 3]) {
        const dead = knowledge ? knowledge.deadNumbers(oppIdx) : [];
        if (dead.length === 0) continue;

        if (aiNewEnds) {
          const aiBlocksOpp = dead.includes(aiNewEnds.newLeft) && dead.includes(aiNewEnds.newRight);
          const userBlocksOpp = userNewEnds && dead.includes(userNewEnds.newLeft) && dead.includes(userNewEnds.newRight);

          if (aiBlocksOpp && !userBlocksOpp) {
            lines.push({ type: 'opponent',
              text: `${pNames[oppIdx]} passed and can't have {${dead.join(', ')}}. The AI's play leaves ends ${aiNewEnds.newLeft}/${aiNewEnds.newRight} which BLOCKS them completely — they'll pass again. Your pick doesn't achieve this.`
            });
          }
        }
      }

      // 3. Partner analysis
      if (knowledge) {
        const partnerDead = knowledge.deadNumbers(2);
        const partnerStrength = knowledge.inferStrength(2);
        const partnerPlays = knowledge.playsBy[2] || [];

        if (aiNewEnds && userNewEnds) {
          // Does AI's play help partner more?
          const aiPartnerHelp = !partnerDead.includes(aiNewEnds.newLeft) || !partnerDead.includes(aiNewEnds.newRight);
          const userPartnerHurt = partnerDead.includes(userNewEnds.newLeft) && partnerDead.includes(userNewEnds.newRight);

          if (userPartnerHurt && aiPartnerHelp) {
            lines.push({ type: 'partner',
              text: `Partner can't have {${partnerDead.join(', ')}}. Your pick leaves ends ${userNewEnds.newLeft}/${userNewEnds.newRight} which blocks your own partner! The AI avoids this.`
            });
          }

          // Partner suit affinity — only if tiles with that number are still out there
          const strongSuits = partnerStrength.map((v, i) => ({ suit: i, count: v })).filter(x => x.count >= 2).sort((a, b) => b.count - a.count);
          if (strongSuits.length > 0 && knowledge) {
            const topSuit = strongSuits[0].suit;
            const remaining = knowledge.remainingWithNumber(topSuit);
            const weHold = hand.filter(t => t.left === topSuit || t.right === topSuit).length;
            const othersCouldHave = remaining - weHold;
            if (othersCouldHave > 0 && !partnerDead.includes(topSuit)) {
              const aiHasPartnerSuit = aiNewEnds.newLeft === topSuit || aiNewEnds.newRight === topSuit;
              const userHasPartnerSuit = userNewEnds.newLeft === topSuit || userNewEnds.newRight === topSuit;
              if (aiHasPartnerSuit && !userHasPartnerSuit) {
                lines.push({ type: 'partner',
                  text: `Partner played ${strongSuits[0].count} tiles with ${topSuit}s and ${othersCouldHave} tiles with ${topSuit} are still unaccounted for (not in your hand or played). AI leaves a ${topSuit}-end so partner can likely play. Your pick doesn't.`
                });
              }
            }
          }
        }

        // Partner close to winning
        const estPartnerHand = Math.max(0, 6 - partnerPlays.length);
        if (estPartnerHand <= 2 && estPartnerHand > 0) {
          lines.push({ type: 'partner',
            text: `Partner has ~${estPartnerHand} tile${estPartnerHand > 1 ? 's' : ''} left — they're close to winning! Prioritize leaving ends they can play, even at your own expense.`
          });
        }
      }

      // 4. Double management
      if (aiTile.left === aiTile.right && userTile.left !== userTile.right) {
        const aiDblNum = aiTile.left;
        const support = hand.filter(t => t.id !== aiTile.id && (t.left === aiDblNum || t.right === aiDblNum)).length;
        if (support === 0) {
          lines.push({ type: 'strategy',
            text: `The AI plays the isolated double [${aiDblNum}|${aiDblNum}] now while it can. Doubles only match one number and become harder to play later. If you hold it and the board moves away from ${aiDblNum}s, you're stuck with it.`
          });
        } else {
          lines.push({ type: 'strategy',
            text: `The AI clears the double [${aiDblNum}|${aiDblNum}] early — doubles are inflexible (only connect to one number). Better to play them when the opportunity is there.`
          });
        }
      }

      // 5. Heavy tile dumping
      if (aiTile.left + aiTile.right > userTile.left + userTile.right + 3) {
        lines.push({ type: 'strategy',
          text: `The AI dumps the heavier tile (${aiTile.left + aiTile.right} pips vs your ${userTile.left + userTile.right} pips). If the game blocks, your team's total pips decide who loses. Getting rid of heavy tiles early is safer.`
        });
      }

      // 6. Scarcity warning
      if (knowledge && aiNewEnds) {
        const aiLeftRem = knowledge.remainingWithNumber(aiNewEnds.newLeft);
        const aiRightRem = knowledge.remainingWithNumber(aiNewEnds.newRight);
        if (userNewEnds) {
          const userLeftRem = knowledge.remainingWithNumber(userNewEnds.newLeft);
          const userRightRem = knowledge.remainingWithNumber(userNewEnds.newRight);
          if ((userLeftRem <= 1 || userRightRem <= 1) && aiLeftRem > 1 && aiRightRem > 1) {
            const scarce = userLeftRem <= 1 ? userNewEnds.newLeft : userNewEnds.newRight;
            lines.push({ type: 'warning',
              text: `Your pick creates a near-dead end: only ${knowledge.remainingWithNumber(scarce)} tile(s) left with ${scarce}. The board could stall. The AI avoids scarce numbers as ends.`
            });
          }
        }
      }

      // If no detailed lines beyond header, add a generic one
      if (lines.filter(l => !l.type.includes('header') && l.type !== 'user-reason').length === 0) {
        lines.push({ type: 'info', text: `The AI's choice is stronger due to a combination of suit control, blocking opponents, and/or supporting your partner.` });
      }

      return lines;
    }

    function quizContinue() {
      quizShowingResult = false;
      quizResult = null;
      stepForward();
    }

        startQuiz();
      }
    }

    function renderOutcomeOverlay(snap, pTeams) {

      const nextDobrada = o.type === 'tie' ? `<div class="text-xs text-orange-300 mt-1">Next game is DOBRADA (x${scoreMultiplier} points)!</div>` : '';

    function renderPlayerArea(playerIdx, snap, names, teams, colors) {
      const hand = snap.hands[playerIdx] || [];
      const isActive = snap.currentPlayer === playerIdx;
      const justPassed = snap.action === 'pass' && snap.player === playerIdx;
      const justPlayed = snap.action === 'play' && snap.player === playerIdx;
      const autoPlayed = snap.move === 0 && currentGame && currentGame.autoPlayedBy === playerIdx;
      const highlight = autoPlayed || justPlayed;

      return `
        <div class="player-area bg-slate-800 rounded-xl p-2.5 border-2 ${justPassed ? 'border-red-500' : highlight ? 'border-yellow-500' : isActive ? 'active-turn border-emerald-500' : 'border-slate-700'} relative">

          ${justPassed ? `<div class="absolute inset-0 flex items-center justify-center pointer-events-none"><span class="text-red-400 font-black text-2xl animate-pulse drop-shadow-lg" style="text-shadow: 0 0 12px rgba(248,113,113,0.6)">PASSED!</span></div>` : ''}

    function renderPlayerAreaP0(snap, names, teams, colors, shouldQuiz) {

      const justPassed = snap.action === 'pass' && snap.player === 0;

      const getTileCls = (t) => {

          if (t.id === quizResult.aiTile.id) return 'tile-optimal';
          if (t.id === quizResult.userTile.id && quizResult.grade === 'bad') return 'tile-wrong';
          if (t.id === quizResult.userTile.id) return 'tile-good';
        }
        if (quizWaiting && isActive) {
          if (canPlay(t, snap.leftEnd, snap.rightEnd, snap.board.length)) return 'tile-playable';

        return '';
      };

      const getTileClick = (t) => {
        if (quizWaiting && canPlay(t, snap.leftEnd, snap.rightEnd, snap.board.length)) {

        return '';
      };

      const autoPlayed = snap.move === 0 && currentGame && currentGame.autoPlayedBy === 0;

      return `

          ${autoPlayed ? `<div class="text-center mb-1"><span class="text-yellow-400 font-bold text-sm" style="text-shadow: 0 0 10px rgba(250,204,21,0.5)">You opened with [${currentGame.autoTile.left}|${currentGame.autoTile.right}]</span></div>` : ''}
          <div class="flex flex-wrap gap-1.5 justify-center min-h-[72px]">

    function renderSidePickOverlay() {

      return `<div class="text-center mt-2 bg-slate-900 rounded-lg p-2 border border-purple-500">

    // Convert raw AI score to human-readable quality label
    function scoreToQuality(score, allScores) {
      if (allScores.length <= 1) return { label: 'Only option', cls: 'text-slate-400' };
      const best = allScores[0];
      const worst = allScores[allScores.length - 1];
      const range = best - worst;
      if (range === 0) return { label: 'Equal', cls: 'text-slate-400' };
      const pct = range > 0 ? ((score - worst) / range * 100) : 50;
      if (pct >= 90) return { label: 'Best', cls: 'text-emerald-400' };
      if (pct >= 65) return { label: 'Good', cls: 'text-yellow-400' };
      if (pct >= 35) return { label: 'Okay', cls: 'text-orange-400' };
      return { label: 'Weak', cls: 'text-red-400' };
    }

    // Normalize raw heuristic score to 0-100 scale relative to options
    function scorePct(score, allScores) {
      if (allScores.length <= 1) return 100;
      const best = allScores[0], worst = allScores[allScores.length - 1];
      const range = best - worst;
      return range > 0 ? Math.round((score - worst) / range * 100) : 100;
    }

    // Color for a 0-100 score
    function scoreColor(pct) {
      if (pct >= 80) return '#22c55e';
      if (pct >= 50) return '#eab308';
      if (pct >= 25) return '#f97316';
      return '#ef4444';
    }

              ${mcUser && mcBest ? `<span class="text-xs text-slate-500">|</span>

        ${r.allOptions && r.allOptions.length > 1 ? `
        <div class="border-t border-slate-700 pt-1.5 mt-1.5">
          <div class="text-xs text-slate-500 mb-1 flex items-center gap-3">

                  ${tileLoss !== null && tileLoss > 0.01 ? `<span class="font-mono text-red-400 w-10 text-right">-${tileLoss.toFixed(2)}</span>` : tileLoss !== null ? `<span class="font-mono text-emerald-400 w-10 text-right">BEST</span>` : ''}
                  ${tag ? `<span class="font-mono text-xs px-1 rounded ${isAi ? 'bg-emerald-900 text-emerald-300' : 'bg-yellow-900 text-yellow-300'}">${tag}</span>` : ''}
                </div>

            }).join('');
          })()}

        ${r.mcResults && r.mcResults.length > 0 ? `
        <div class="border-t border-blue-800 pt-1.5 mt-1.5">
          <div class="text-xs text-blue-400 font-bold mb-1">Monte Carlo verdict:</div>
          <div class="text-xs text-blue-300">Best: [${r.mcResults[0].tile.left}|${r.mcResults[0].tile.right}] E[pts]: ${fmtEP(r.mcResults[0].expectedPoints)} | Win: ${(r.mcResults[0].winRate*100).toFixed(0)}%</div>
          ${r.mcResults[0].tile.id !== r.aiTile.id ? '<div class="text-xs text-yellow-400">MC disagrees with heuristic — simulation sees deeper!</div>' : '<div class="text-xs text-emerald-400">MC confirms the heuristic choice</div>'}
        </div>` : ''}

        ${(() => {
          // Motif tags for the best move
          try {

            const bestMC = r.mcResults[0];
            const metrics = computeAllMetrics(snap, 0, bestMC.tile, bestMC.side);

            if (explanation.motifs.length === 0) return '';
            return `<div class="flex flex-wrap gap-1 mt-1.5">
              ${explanation.motifs.map(m => `<span class="text-xs px-1.5 py-0.5 rounded-full bg-slate-800 border border-slate-600 text-slate-300" title="${m.evidence}">${m.icon || ''} ${m.name}</span>`).join('')}

        ${r.missedDeductions && r.missedDeductions.length > 0 ? `

    function renderSidePlayer(playerIdx, snap, names, teams, colors) {

      const justPlayed = snap.action === 'play' && snap.player === playerIdx;

      const highlight = autoPlayed || justPlayed;

      const borderCls = justPassed ? 'border-red-500' : highlight ? 'border-yellow-500' : isActive ? 'active-turn border-emerald-500' : 'border-slate-700';
      const statusText = autoPlayed ? `<div class="text-xs text-yellow-400 text-center mt-1 font-bold">OPENED</div>`
        : justPassed ? `<div class="text-xs text-red-400 text-center mt-1 font-bold animate-pulse">PASSED!</div>`
        : justPlayed ? `<div class="text-xs text-yellow-400 text-center mt-1 font-bold">PLAYED</div>`
        : isActive ? '<div class="text-xs text-emerald-400 text-center mt-1 font-bold">Playing</div>' : '';

      return `
        <div class="player-area bg-slate-800 rounded-xl p-2 border-2 h-full flex flex-col ${borderCls}">
          <div class="text-xs font-bold text-center mb-1" style="color:${colors[playerIdx%2]}">${names[playerIdx].split('(')[0].trim()}</div>
          <div class="text-xs text-center text-slate-400 mb-1">${teams[playerIdx]} - ${hand.length}</div>
          <div class="flex flex-col gap-0.5 items-center flex-1 justify-center">

          </div>
          ${statusText}
        </div>`;
    }

    function renderBoard(snap) {
      if (!snap.board || snap.board.length === 0)
        return '<div class="text-green-700 text-sm" style="display:flex;align-items:center;justify-content:center;height:100%">Empty board</div>';

      // Tile dimensions must match CSS: board-tile-h = 52x26, board-tile-v = 26x52
      const HW = 52, VW = 26, GAP = 3;

      const boardEl = document.getElementById('board-area');
      const MAX_W = boardEl ? boardEl.clientWidth - 28 : 280;

      // Row-breaking: same proven logic as index.html
      const rows = [];
      let cur = [], w = 0;
      for (let i = 0; i < snap.board.length; i++) {
        const isD = snap.board[i].left === snap.board[i].right;
        const tw = isD ? VW : HW;
        const need = cur.length > 0 ? tw + GAP : tw;
        if (w + need > MAX_W && cur.length > 0) {
          rows.push(cur);
          cur = [i]; w = tw;
        } else {
          cur.push(i); w += need;
        }
      }
      if (cur.length > 0) rows.push(cur);

      const endBadge = num =>
        `<div style="display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;
          border-radius:10px;background:#14532d;border:2px solid #4ade80;color:#86efac;font-weight:700;font-size:11px;flex-shrink:0">${num}</div>`;

      const LB = endBadge(snap.leftEnd);
      const RB = endBadge(snap.rightEnd);

      const makeTile = (idx, forceVertical, flipped) => {
        const t = snap.board[idx];
        const isD = t.left === t.right;
        const orient = (isD || forceVertical) ? 'v' : 'h';
        const isNew = snap.action === 'play' && snap.tile && snap.tile.id === t.id;
        // In reversed (odd) rows, flip horizontal tiles so chain reads correctly
        const tile = (flipped && orient === 'h') ? {left: t.right, right: t.left, id: t.id} : t;
        return tileHTML(tile, 'board', orient, isNew ? 'board-tile-new' : '');
      };

      // Single row — centered with end badges
      if (rows.length === 1) {
        const tiles = rows[0].map(idx => makeTile(idx, false, false)).join('');
        return `<div style="display:flex;align-items:center;justify-content:center;gap:${GAP}px">
          ${LB}${tiles}${RB}
        </div>`;
      }

      // Multi-row snake layout (matches index.html proven logic)
      // Row 0: left-to-right, right-aligned (chain starts, pushed to right edge)
      // Odd rows: row-reverse, right-aligned (chain turns back, connects at right edge)
      // Even rows >0: left-to-right, left-aligned (chain turns forward, connects at left edge)
      // First tile of each row after row 0 is rendered VERTICAL (turn connector)
      let html = '';
      for (let rIdx = 0; rIdx < rows.length; rIdx++) {
        const row = rows[rIdx];
        const isOdd = rIdx % 2 === 1;
        let flexDir = 'row';
        let justify = 'center';
        if (rIdx === 0) { justify = 'flex-end'; }
        else if (isOdd) { flexDir = 'row-reverse'; justify = 'flex-start'; }
        else { justify = 'flex-start'; }

        const tiles = row.map((idx, posInRow) => {
          const isTurn = posInRow === 0 && rIdx > 0;
          return makeTile(idx, isTurn, isOdd);
        }).join('');

        let rowHTML = '';
        if (rIdx === 0) rowHTML = LB + tiles;
        else if (rIdx === rows.length - 1) rowHTML = tiles + RB;
        else rowHTML = tiles;

        html += `<div style="display:flex;flex-direction:${flexDir};justify-content:${justify};align-items:center;gap:${GAP}px;${rIdx < rows.length - 1 ? 'margin-bottom:'+GAP+'px' : ''}">
          ${rowHTML}
        </div>`;
      }
      return html;
    }

    function renderHandStrength(hs, tileCount) {
      if (tileCount === 0) return '';
      const score = hs.score;
      const color = score >= 65 ? '#22c55e' : score >= 45 ? '#eab308' : score >= 30 ? '#f97316' : '#ef4444';
      const label = score >= 65 ? 'Strong' : score >= 45 ? 'Average' : score >= 30 ? 'Weak' : 'Danger';

      return `<div class="bg-slate-800 rounded-lg px-3 py-1.5 mt-2 flex items-center gap-3">
        <span class="text-xs text-slate-400 w-20">Hand Strength</span>
        <div class="flex-1 bg-slate-700 rounded-full h-2.5">
          <div class="strength-bar" style="width:${score}%; background:${color}"></div>
        </div>
        <span class="text-xs font-bold w-16 text-right" style="color:${color}">${score.toFixed(0)}% ${label}</span>
        <div class="flex gap-2 ml-2">
          ${Object.values(hs.metrics).map(m =>
            `<span class="text-xs tooltip ${m.good ? 'text-slate-400' : 'text-orange-400'}">
              ${m.label.split(':')[0].split(' ')[0]}
              <span class="tip-text">${m.label}</span>
            </span>`
          ).join('')}
        </div>
      </div>`;
    }

    // ========== RIGHT PANEL TABS ==========

    function renderReasoningPanel(snap, pNames, pTeams, teamColors) {
      const allScores = (snap.allOptions || []).map(o => o.score);
      return `
        <!-- Current move detail -->
        ${snap.move > 0 ? `
        <div class="bg-slate-900 rounded-lg p-2.5 mb-2 border ${snap.action === 'pass' ? 'border-orange-500' : 'border-emerald-500'}">
          <div class="flex items-center gap-2 mb-1">
            <span class="text-xs font-bold px-2 py-0.5 rounded" style="background:${teamColors[snap.player%2]}">${pn(snap.player)}</span>
            <span class="text-xs font-bold ${snap.action === 'pass' ? 'text-orange-400' : 'text-emerald-400'}">
              ${snap.action === 'pass' ? 'PASSES' : `plays [${snap.tile.left}|${snap.tile.right}] on ${snap.side}`}
            </span>
          </div>
          <div class="text-xs text-slate-500 mb-1">Why this tile:</div>
          <div class="space-y-0.5">
            ${(snap.reasons || []).map(r => `<div class="text-xs text-slate-300 flex items-start gap-1">
              <span class="text-emerald-400 mt-0.5">&#9654;</span> ${r}
            </div>`).join('')}
          </div>
          ${snap.allOptions && snap.allOptions.length > 1 ? `
          <div class="mt-2 pt-1.5 border-t border-slate-700">
            <div class="text-xs text-slate-500 mb-1">All options (best to worst):</div>
            ${(() => {
              const opts = snap.allOptions.slice(0, 6).map(o => {
                const mc = mcResults ? mcResults.find(m => m.tile.id === o.tile.id) : null;
                return { ...o, mc };
              });
              // Sort by MC E[pts] if available
              if (mcResults) opts.sort((a, b) => (b.mc ? b.mc.expectedPoints : -99) - (a.mc ? a.mc.expectedPoints : -99));
              const bestEP = opts[0]?.mc?.expectedPoints;
              return opts.map((o, i) => {
                const hPct = scorePct(o.score, allScores);
                const hCol = scoreColor(hPct);
                const mc = o.mc;
                const ep = mc ? mc.expectedPoints : null;
                const epCol = mc ? epColor(ep) : '';
                const tileLoss = mc && bestEP !== undefined ? bestEP - ep : null;
                return `<div class="text-xs ${i === 0 ? 'text-emerald-400 font-bold' : 'text-slate-500'} mb-1">
                  <div class="flex items-center gap-1">
                    <span class="font-mono w-3">${i+1}.</span>
                    <span class="w-14">[${o.tile.left}|${o.tile.right}]${o.side ? ' '+o.side : ''}</span>
                    <span class="font-mono font-bold w-7 text-right" style="color:${hCol}">${hPct}</span>
                    ${ep !== null ? `<span class="font-mono font-bold w-12 text-right" style="color:${epCol}">${fmtEP(ep)}</span>
                    ${tileLoss !== null && tileLoss > 0.01 ? `<span class="font-mono text-red-400 w-10 text-right">-${tileLoss.toFixed(2)}</span>` : `<span class="font-mono text-emerald-400 w-10">BEST</span>`}` :
                    `<div class="bg-slate-700 rounded-full h-1.5 mx-1" style="width:50px"><div class="h-1.5 rounded-full" style="width:${hPct}%;background:${hCol}"></div></div>`}
                  </div>
                  ${o.reasons.length > 0 ? `<div class="ml-4 text-slate-600">${o.reasons.map(r => '· ' + r).join('<br>')}</div>` : ''}
                </div>`;
              }).join('');
            })()}
          </div>` : ''}
        </div>` : `
        <div class="bg-slate-900 rounded-lg p-2.5 mb-2 border border-slate-600">
          <div class="text-xs text-slate-400">
            ${pn(currentGame.autoPlayedBy)} auto-plays [${currentGame.autoTile.left}|${currentGame.autoTile.right}] (highest double — first round rule).
          </div>
        </div>`}

        <!-- Monte Carlo Analysis -->
        ${renderMCPanel()}

        <!-- Teaching tip -->
        ${renderTeachingTip(snap)}

        <!-- Knowledge panel -->
        <div class="bg-slate-900 rounded-lg p-2 mb-2">
          <div class="text-xs font-bold text-slate-400 mb-1">Intelligence</div>
          ${[0,1,2,3].map(p => {
            const dead = snap.knowledge ? snap.knowledge.deadNumbers(p) : [];
            if (dead.length === 0) return '';
            return `<div class="text-xs mb-0.5"><span style="color:${teamColors[p%2]}">${pn(p)}:</span> can't have <span class="text-red-400 font-mono">{${dead.join(', ')}}</span></div>`;
          }).join('')}
          ${snap.knowledge && [0,1,2,3].every(p => snap.knowledge.deadNumbers(p).length === 0) ? '<div class="text-xs text-slate-500">No intelligence yet</div>' : ''}
        </div>

        <!-- Move log -->
        <div id="log-container" class="flex-1 overflow-y-auto space-y-0.5 max-h-[350px]">
          ${currentGame.snapshots.slice(1).map((s, i) => {
            const stepIdx = i + 1;
            const isCur = stepIdx === currentStep;
            const isPast = stepIdx < currentStep;
            return `<div class="log-entry rounded px-2 py-0.5 cursor-pointer text-xs ${isCur ? 'active' : isPast ? 'past' : ''}"
              onclick="goTo(${stepIdx})" id="log-${stepIdx}">
              <span class="font-mono text-slate-500">#${s.move}</span>
              <span class="font-bold" style="color:${teamColors[s.player%2]}">${pn(s.player)}</span>
              ${s.action === 'pass'
                ? '<span class="text-orange-400">passes</span>'
                : `<span class="text-emerald-400">[${s.tile.left}|${s.tile.right}]</span> <span class="text-slate-400">${s.side}</span>`}
              ${s.outcome ? `<span class="text-yellow-400 ml-1">${s.outcome.winType || s.outcome.type}</span>` : ''}
            </div>`;
          }).join('')}
        </div>
      `;
    }

    function renderTeachingTip(snap) {
      if (snap.move === 0) return '';
      const tips = [];
      const reasons = snap.reasons || [];
      const k = snap.knowledge;

      // --- Analyze game state for context-aware tips ---
      const partner = 2, opp1 = 1, opp3 = 3;

      // Count tiles each player likely has
      const handCounts = snap.hands.map(h => h.length);
      const partnerTiles = handCounts[partner];
      const opp1Tiles = handCounts[opp1];
      const opp3Tiles = handCounts[opp3];
      const myTiles = handCounts[0];

      // Opponent pass data
      const opp1Dead = k ? k.deadNumbers(opp1) : [];
      const opp3Dead = k ? k.deadNumbers(opp3) : [];
      const partnerDead = k ? k.deadNumbers(partner) : [];

      // Partner strength (which numbers they've played a lot)
      const partnerStr = k ? k.inferStrength(partner) : [0,0,0,0,0,0,0];
      const partnerStrongSuits = partnerStr.map((v, i) => ({ num: i, count: v })).filter(x => x.count >= 2).sort((a, b) => b.count - a.count);

      // === PASS TIPS ===
      if (snap.action === 'pass') {
        const dead = k ? k.deadNumbers(snap.player) : [];
        const pName = pn(snap.player);

        if (snap.player === opp1 || snap.player === opp3) {
          // Opponent passed
          if (dead.length >= 4) {
            tips.push({ icon: '&#128270;', color: 'text-red-300',
              text: `${pName} has passed on ${dead.length}/7 numbers — they're badly stuck. Leave board ends on numbers they lack and they'll keep passing.`,
              rule: 'TRACK PASSES: Every pass reveals 2 numbers an opponent lacks. After 2 passes you know 4 dead numbers — nearly half the suits!'
            });
          } else if (dead.length >= 2) {
            tips.push({ icon: '&#128270;', color: 'text-orange-300',
              text: `${pName} can't have {${dead.join(', ')}}. Try to keep at least one of these numbers as a board end.`,
              rule: 'MEMORIZE PASSES: In real play, say it in your head: "Left can\'t play 3 or 6." This is the most valuable free information in domino.'
            });
          } else {
            tips.push({ icon: '&#128270;', color: 'text-yellow-300',
              text: `${pName}'s first pass — they lack both ${snap.leftEnd} and ${snap.rightEnd}. File this away.`,
              rule: 'FIRST PASS = GOLD: The first time someone passes, you learn 2 numbers. Keep these in memory for the rest of the round.'
            });
          }
        } else if (snap.player === partner) {
          tips.push({ icon: '&#128153;', color: 'text-blue-300',
            text: `Partner passed — they can't play ${snap.leftEnd} or ${snap.rightEnd}. On your next turn, try to change the board ends to numbers partner has played before.`,
            rule: 'HELP YOUR PARTNER: When partner passes, your #1 priority is changing the board to numbers they CAN play. A passing partner is a losing team.'
          });
        } else if (snap.player === 0) {
          tips.push({ icon: '&#9888;', color: 'text-yellow-300',
            text: `You passed — opponents now know you lack ${snap.leftEnd} and ${snap.rightEnd}. They'll try to keep these as ends to lock you out.`,
            rule: 'YOUR PASSES HURT: Every time you pass, opponents gain intelligence. Play tiles that keep you flexible to avoid passing.'
          });
        }
      }

      // === PLAY TIPS ===
      if (snap.action === 'play') {

        // --- Partner close to winning ---
        if (partnerTiles <= 2 && partnerTiles > 0) {
          tips.push({ icon: '&#127942;', color: 'text-emerald-300',
            text: `Partner has only ${partnerTiles} tile${partnerTiles > 1 ? 's' : ''} left! Prioritize leaving ends they can play over everything else — even over blocking opponents.`,
            rule: 'ENDGAME RULE: When partner has 1-2 tiles, helping them go out is almost always the best play. Blocking is pointless if your team can win NOW. Count tiles: started with 6, played X, so they have 6-X.'
          });
        }

        // --- Opponent close to winning ---
        if (opp1Tiles <= 2 || opp3Tiles <= 2) {
          const dangerOpp = opp1Tiles <= 2 ? opp1 : opp3;
          const dangerCount = Math.min(opp1Tiles, opp3Tiles);
          tips.push({ icon: '&#9888;', color: 'text-red-300',
            text: `${pn(dangerOpp)} has only ${dangerCount} tile${dangerCount > 1 ? 's' : ''} left — danger! Block them or they'll win. Leave ends on numbers they've passed on.`,
            rule: 'COUNT OPPONENT TILES: If an opponent has 1-2 tiles, blocking them becomes critical. Use their pass history to leave ends they can\'t play.'
          });
        }

        // --- Partner suit reading ---
        if (partnerStrongSuits.length > 0 && reasons.some(r => r.includes('Partner played'))) {
          const top = partnerStrongSuits[0];
          tips.push({ icon: '&#128153;', color: 'text-blue-300',
            text: `Partner has played ${top.count} tiles with ${top.num}s — they likely have more. Leaving a ${top.num}-end lets them play.`,
            rule: `READ PARTNER'S SUIT: When partner plays 2+ tiles with the same number, they're signaling strength. Keep that number as a board end. In real play: "Partner likes ${top.num}s" — simple but powerful.`
          });
        }

        // --- Blocking play ---
        if (reasons.some(r => r.includes('Blocks'))) {
          const blockedOpp = opp1Dead.includes(snap.leftEnd) && opp1Dead.includes(snap.rightEnd) ? opp1 :
                             opp3Dead.includes(snap.leftEnd) && opp3Dead.includes(snap.rightEnd) ? opp3 : -1;
          if (blockedOpp >= 0) {
            const blockedDead = blockedOpp === opp1 ? opp1Dead : opp3Dead;
            tips.push({ icon: '&#128683;', color: 'text-red-300',
              text: `${pn(blockedOpp)} is fully blocked — both ends (${snap.leftEnd}/${snap.rightEnd}) are in their dead set {${blockedDead.join(', ')}}.`,
              rule: 'BLOCKING = TEMPO: A blocked opponent loses their turn. That\'s like getting a free extra move for your team. The more passes they make, the more turns your team gets.'
            });
          }
        }

        // --- Dead blocking (opponent already stuck, blocking is wasteful) ---
        for (const oppIdx of [opp1, opp3]) {
          const oppDead = k ? k.deadNumbers(oppIdx) : [];
          if (oppDead.length >= 5 && handCounts[oppIdx] >= 3) {
            tips.push({ icon: '&#128161;', color: 'text-amber-300',
              text: `${pn(oppIdx)} is already stuck (can't have ${oppDead.length}/7 numbers, still holding ${handCounts[oppIdx]} tiles). No need to waste moves blocking them further — focus on helping partner or playing your strong suits.`,
              rule: 'DEAD BLOCKING: If an opponent has passed 3+ times, they\'re stuck regardless. Don\'t waste moves blocking someone who\'s already dead. Help your partner or dump heavy tiles instead.'
            });
            break; // only one dead blocking tip
          }
        }

        // --- Double management ---
        if (snap.tile.left === snap.tile.right) {
          const dblNum = snap.tile.left;
          const support = snap.hands[snap.player] ? snap.hands[snap.player].filter(t => t.left === dblNum || t.right === dblNum).length : 0;
          if (support === 0 && !tips.some(t => t.text.includes('double'))) {
            tips.push({ icon: '&#9879;', color: 'text-purple-300',
              text: `Played the [${dblNum}|${dblNum}] double${snap.hands[snap.player] && snap.hands[snap.player].some(t => t.left === dblNum || t.right === dblNum) ? '' : ' with no backup'}. Doubles only connect to one number — play them early before the board moves away.`,
              rule: 'DOUBLES ARE TRAPS: A double [X|X] can only connect to X. If you hold it too long and all X-ends disappear, you\'re stuck. Play doubles at the first opportunity unless you have 2+ support tiles with that number.'
            });
          }
        }

        // --- Heavy tile dump ---
        if (snap.tile.left + snap.tile.right >= 10 && reasons.some(r => r.includes('Dump heavy'))) {
          tips.push({ icon: '&#9878;', color: 'text-orange-300',
            text: `Dumped a heavy tile (${snap.tile.left + snap.tile.right} pips). If the game blocks, the team with fewer total pips wins.`,
            rule: 'PIP MANAGEMENT: In a blocked game, every pip counts. Dump [6|5]=11, [6|4]=10 early. Keep light tiles [0|1]=1, [0|2]=2 for later. The 4 "dorme" tiles (undealt) average ~14 pips, so a blocked game is common.'
          });
        }

        // --- Scarcity awareness ---
        if (reasons.some(r => r.includes('Few tiles left'))) {
          tips.push({ icon: '&#9888;', color: 'text-orange-300',
            text: 'Created a scarce end — few tiles left with that number. This risks stalling the board.',
            rule: 'AVOID DEAD ENDS: If 5+ of the 7 tiles with a number are played, that end is nearly dead. Creating it as a board end means nobody can play there. Count played tiles per number to avoid this.'
          });
        }

        // --- Opening move tip ---
        if (snap.move <= 2 && !tips.length) {
          tips.push({ icon: '&#127919;', color: 'text-cyan-300',
            text: 'Early game — focus on playing tiles from your deepest suit (the number you have the most of). This builds suit control for later.',
            rule: 'OPENING STRATEGY: Play from your strongest suit first. If you have 4 tiles with 3s, play a 3 early to claim that end. Suit depth = control. The player who dominates a suit forces others to play around them.'
          });
        }

        // --- Who's winning check ---
        if (snap.move >= 8 && !tips.length) {
          const myTeamTiles = myTiles + partnerTiles;
          const oppTeamTiles = opp1Tiles + opp3Tiles;
          if (myTeamTiles < oppTeamTiles - 2) {
            tips.push({ icon: '&#128640;', color: 'text-emerald-300',
              text: `Your team has ${myTeamTiles} tiles vs opponents' ${oppTeamTiles} — you're ahead! Play aggressively to help partner finish.`,
              rule: '"WHO\'S WINNING?" CHECK: Before each play, quickly count: my tiles + partner\'s tiles vs both opponents. If your team has fewer tiles, play to help partner close out. If behind, slow down and block.'
            });
          } else if (oppTeamTiles < myTeamTiles - 2) {
            tips.push({ icon: '&#9888;', color: 'text-red-300',
              text: `Opponents have ${oppTeamTiles} tiles vs your team's ${myTeamTiles} — they're ahead. Focus on blocking and dumping heavy tiles in case it blocks.`,
              rule: '"WHO\'S WINNING?" CHECK: When opponents have fewer tiles, the game might end soon in their favor. Shift to blocking (leave ends they can\'t play) and dump heavy tiles (reduce pip count for blocked game).'
            });
          }
        }
      }

      // Nothing to show
      if (tips.length === 0) return '';

      // Show up to 2 tips
      return tips.slice(0, 2).map(t => `
        <div class="bg-indigo-950 rounded-lg p-2 mb-2 border border-indigo-700">
          <div class="text-xs text-indigo-300 mb-1">
            <span>${t.icon}</span> <span class="font-bold">Situation:</span> ${t.text}
          </div>
          <div class="text-xs ${t.color} bg-indigo-900/50 rounded px-2 py-1">
            <span class="font-bold">Rule to memorize:</span> ${t.rule}
          </div>
        </div>
      `).join('');
    }

    // Format E[pts] with sign and color
    function fmtEP(ep) {
      const sign = ep >= 0 ? '+' : '';
      return `${sign}${ep.toFixed(2)}`;
    }
    function epColor(ep) {
      if (ep >= 0.5) return '#22c55e';
      if (ep >= 0.1) return '#86efac';
      if (ep >= -0.1) return '#eab308';
      if (ep >= -0.5) return '#f97316';
      return '#ef4444';
    }

    function renderMCPanel() {
      if (!deepAnalysis) return '';
      if (mcRunning) {
        return `<div class="bg-blue-950 rounded-lg p-2.5 mb-2 border border-blue-700">
          <div class="text-xs text-blue-300 pulse flex items-center gap-2">
            <span class="inline-block w-3 h-3 border-2 border-blue-400 border-t-transparent rounded-full animate-spin"></span>
            Monte Carlo analyzing (${MC_SIMS_WATCH} simulations per tile)...
          </div>
        </div>`;
      }
      if (!mcResults || mcResults.length === 0) return '';

      const best = mcResults[0];
      const snap = currentGame.snapshots[currentStep];
      const heuristicBest = snap.allOptions && snap.allOptions.length > 0 ? snap.allOptions[0] : null;
      const disagree = heuristicBest && best.tile.id !== heuristicBest.tile.id;

      // Normalize E[pts] bars: map range [-4, +4] to [0%, 100%] with 50% = 0
      const epToPct = ep => Math.max(0, Math.min(100, 50 + ep * 12.5));

      return `<div class="bg-blue-950 rounded-lg p-2.5 mb-2 border ${disagree ? 'border-yellow-500' : 'border-blue-700'}">
        <div class="flex items-center justify-between mb-1.5">
          <span class="text-xs font-bold text-blue-300">Monte Carlo Analysis</span>
          ${disagree ? '<span class="text-xs text-yellow-400 font-bold">DISAGREES with heuristic</span>' : '<span class="text-xs text-emerald-400">Confirms heuristic</span>'}
        </div>
        <div class="text-xs text-slate-500 mb-1 flex gap-3">
          <span class="font-mono">E[pts] = expected points per round</span>
          <span class="text-slate-600">Match: ${matchScore[0]}-${matchScore[1]}</span>
        </div>
        <div class="space-y-1.5">
          ${mcResults.map((r, i) => {
            const winPct = (r.winRate * 100).toFixed(0);
            const ep = r.expectedPoints;
            const epBarPct = epToPct(ep);
            const col = epColor(ep);
            const isBest = i === 0;
            const isHeuristicPick = heuristicBest && r.tile.id === heuristicBest.tile.id;
            const eqLoss = best.expectedPoints - ep;
            // Outcome icons
            const oc = r.outcomes || {};
            const sims = r.sims || 80;
            const outcomeStr = [
              oc.carroca > 0 ? `C:${(oc.carroca/sims*100).toFixed(0)}%` : '',
              oc.laelo > 0 ? `L:${(oc.laelo/sims*100).toFixed(0)}%` : '',
              oc.cruzada > 0 ? `X:${(oc.cruzada/sims*100).toFixed(0)}%` : '',
              oc.blocked > 0 ? `B:${(oc.blocked/sims*100).toFixed(0)}%` : ''
            ].filter(Boolean).join(' ');
            return `<div class="text-xs">
              <div class="flex items-center gap-1.5">
                <span class="${isBest ? 'text-emerald-400 font-bold' : 'text-slate-400'} w-14">[${r.tile.left}|${r.tile.right}]</span>
                <span class="font-mono font-bold w-12 text-right" style="color:${col}">${fmtEP(ep)}</span>
                <div class="flex-1 bg-slate-700 rounded-full h-2 relative">
                  <div class="absolute top-0 left-1/2 w-px h-2 bg-slate-500"></div>
                  <div class="h-2 rounded-full absolute" style="left:${Math.min(50, epBarPct)}%;width:${Math.abs(epBarPct - 50)}%;background:${col}"></div>
                </div>
                <span class="w-9 text-right font-mono text-slate-500">${winPct}%</span>
                ${isBest ? '<span class="text-emerald-500 font-bold">BEST</span>' : eqLoss > 0.01 ? `<span class="font-mono text-red-400">-${eqLoss.toFixed(2)}</span>` : ''}
                ${isHeuristicPick && !isBest ? '<span class="text-yellow-600">H</span>' : ''}
              </div>
              ${outcomeStr ? `<div class="ml-16 text-slate-600 font-mono">${outcomeStr}</div>` : ''}
            </div>`;
          }).join('')}
        </div>
        <div class="text-xs text-slate-600 mt-1">E[pts] from ${mcResults[0]?.sims || 80} sims/tile | Block: ${(best.blockRate*100).toFixed(0)}%</div>

        ${(() => {
          // Uncertainty notice when top 2 are close
          const unc = explainUncertainty(mcResults);
          if (!unc) return '';
          return `<div class="bg-yellow-900/30 rounded p-1.5 mt-1.5 border border-yellow-800">
            <div class="text-xs text-yellow-300">${unc.message}</div>
            <div class="text-xs text-yellow-500">${unc.recommendation}</div>
          </div>`;
        })()}

        ${(() => {
          // Compute metrics for best move
          try {
            const metrics = computeAllMetrics(snap, snap.currentPlayer, best.tile, best.side);
            const explanation = explanationBuilder.explain(best, mcResults, snap, metrics);
            const motifs = explanation.motifs;
            if (motifs.length === 0 && !metrics.control) return '';

            return `<div class="border-t border-slate-700 pt-1.5 mt-1.5">
              ${motifs.length > 0 ? `
              <div class="flex flex-wrap gap-1 mb-1.5">
                ${motifs.map(m => `<span class="text-xs px-1.5 py-0.5 rounded-full bg-slate-800 border border-slate-600 text-slate-300" title="${m.evidence}">${m.icon || ''} ${m.name}</span>`).join('')}
              </div>` : ''}
              <div class="grid grid-cols-3 gap-1 text-xs">
                <div class="bg-slate-800 rounded p-1 text-center">
                  <div class="text-slate-500">Flex</div>
                  <div class="font-mono font-bold" style="color:${metrics.flexibility.flexibility > 0.5 ? '#22c55e' : metrics.flexibility.flexibility > 0.3 ? '#eab308' : '#ef4444'}">${(metrics.flexibility.flexibility * 100).toFixed(0)}%</div>
                </div>
                <div class="bg-slate-800 rounded p-1 text-center">
                  <div class="text-slate-500">Control</div>
                  <div class="font-mono font-bold text-blue-400">${metrics.control.myEndTiles}</div>
                </div>
                <div class="bg-slate-800 rounded p-1 text-center">
                  <div class="text-slate-500">Squeeze</div>
                  <div class="font-mono font-bold" style="color:${metrics.control.squeezeValue === 'high' ? '#ef4444' : metrics.control.squeezeValue === 'medium' ? '#eab308' : '#64748b'}">${metrics.control.expectedForcedPasses.toFixed(1)}</div>
                </div>
              </div>
              <div class="text-xs text-slate-600 mt-1">${explanation.tldr}</div>
            </div>`;
          } catch(e) { return ''; }
        })()}
      </div>`;
    }

    function renderProbabilityPanel(snap, pNames, teamColors) {
      const knowledge = snap.knowledge;
      if (!knowledge) return '<div class="text-xs text-slate-500">No data yet</div>';

      // Compute tile probabilities via MC sampling for gradient display
      const handSizes = snap.hands.map(h => h.length);
      const tileProbs = {};
      for (const p of [1, 2, 3]) {
        tileProbs[p] = computeTileProbs(p, knowledge, handSizes, snap.hands[0], 0, 200);
      }

      // Helper: probability to gradient color
      const probToColor = (prob) => {
        if (prob <= 0) return { bg: '#450a0a', txt: '#fca5a5' };  // eliminated
        if (prob >= 0.8) return { bg: '#14532d', txt: '#86efac' }; // very likely
        if (prob >= 0.5) return { bg: '#365314', txt: '#a3e635' }; // likely
        if (prob >= 0.25) return { bg: '#422006', txt: '#fbbf24' }; // medium
        return { bg: '#451a03', txt: '#fb923c' };                   // unlikely but possible
      };

      // Build probability grid for each opponent
      return `
        <div class="space-y-3 overflow-y-auto flex-1">
          ${[1, 2, 3].map(p => {
            const possible = knowledge.possibleTilesFor(p);
            const handSize = snap.hands[p].length;
            const dead = knowledge.deadNumbers(p);
            const probs = tileProbs[p];

            return `
              <div class="bg-slate-900 rounded-lg p-2">
                <div class="flex items-center justify-between mb-1.5">
                  <span class="text-xs font-bold" style="color:${teamColors[p%2]}">${pNames[p]}</span>
                  <span class="text-xs text-slate-400 tooltip">${handSize} in hand
                    <span class="tip-text">${pNames[p]} holds ${handSize} tiles. ${possible.length} tiles are still possible candidates (not yet eliminated by plays/passes). Probabilities from ${200} MC samples.</span>
                  </span>
                </div>
                ${dead.length > 0 ? `<div class="text-xs text-red-400 mb-1">Dead: {${dead.join(', ')}}</div>` : ''}
                <div class="grid gap-px" style="grid-template-columns: repeat(8, 1fr)">
                  <!-- Header row -->

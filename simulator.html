          </div>

          <!-- Elo Rating -->
          <div class="bg-slate-900 rounded-lg p-2">
            <div class="text-xs font-bold text-slate-400 mb-1">Elo Rating</div>
            <div class="flex justify-center gap-6 text-center">
              <div>
                <div class="text-lg font-bold font-mono text-blue-400">${eloRatings.player}</div>
                <div class="text-xs text-slate-500">You</div>

              <div>

          <div class="text-center">
            <button class="btn btn-red text-xs" onclick="resetStats()">Reset Stats</button>
          </div>
        </div>
      `;

              </div>
              <div>
                <div class="text-lg font-bold text-emerald-400">${agg.wins}</div>

              <div>
                <div class="text-lg font-bold text-red-400">${agg.losses}</div>
                <div class="text-xs text-slate-500">${appLang==='pt'?'Derrotas':'Losses'}</div>

            ${agg.recentAvgEL !== null ? `<div class="text-xs text-slate-400 text-center">${appLang==='pt'?'Últimos 5 avg':'Last 5 avg'}: <span class="font-mono">${agg.recentAvgEL.toFixed(3)}</span> ${trendArrow}</div>` : ''}
            <div class="grid grid-cols-4 gap-1 mt-2 text-center text-xs">
              <div><span class="text-emerald-400 font-bold">${agg.totalPerfect}</span><br><span class="text-slate-600">${_t('perfect')}</span></div>
              <div><span class="text-green-300 font-bold">${agg.totalGood}</span><br><span class="text-slate-600">${appLang==='pt'?'Imprec':'Inacc'}</span></div>
              <div><span class="text-yellow-400 font-bold">${agg.totalOk}</span><br><span class="text-slate-600">${_t('mistake')}</span></div>
              <div><span class="text-red-400 font-bold">${agg.totalBad}</span><br><span class="text-slate-600">${_t('blunder')}</span></div>
            </div>
          </div>

          <div class="bg-slate-900 rounded-lg p-2 mb-3">
            <div class="text-xs font-bold text-slate-400 mb-1">${appLang==='pt'?'Áreas de Fraqueza':'Weakness Areas'}</div>
            <div class="space-y-1 text-xs">
              <div class="flex justify-between" title="Avg equity loss on your first 2 moves each game. High = poor opening tile selection or early suit management.">

                <span class="font-mono ${agg.openingAvgEL > 0.2 ? 'text-red-400' : agg.openingAvgEL > 0.1 ? 'text-yellow-400' : 'text-emerald-400'}">${agg.openingAvgEL.toFixed(3)} EL</span>
              </div>
              <div class="flex justify-between" title="Avg equity loss on your last 2 moves each game. High = mistakes under pressure when few tiles remain.">
                <span class="text-slate-300">Endgame moves <span class="text-slate-600 cursor-help">&#9432;</span></span>
                <span class="font-mono ${agg.endgameAvgEL > 0.2 ? 'text-red-400' : agg.endgameAvgEL > 0.1 ? 'text-yellow-400' : 'text-emerald-400'}">${agg.endgameAvgEL.toFixed(3)} EL</span>
              </div>
              <div class="flex justify-between" title="How often you misplayed a double tile (e.g. 3|3, 5|5). Doubles connect to only one number — timing and placement matter.">
                <span class="text-slate-300">Doubles errors <span class="text-slate-600 cursor-help">&#9432;</span></span>
                <span class="font-mono ${agg.doubleErrorRate > 30 ? 'text-red-400' : agg.doubleErrorRate > 15 ? 'text-yellow-400' : 'text-emerald-400'}">${agg.doubleErrorRate}% (${agg.doubleErrors}/${agg.totalDoubles})</span>
              </div>
              <div class="flex justify-between">
                <span class="text-slate-300">Total blunders</span>
                <span class="font-mono text-red-400">${agg.blunderCount}</span>

        `;

      const gameListHTML = games.map((g, revIdx) => {
        const idx = gameHistory.length - 1 - revIdx;
        const d = new Date(g.date);
        const dateStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;

        const aEl = g.analysis ? g.analysis.avgEL.toFixed(3) : '—';

        const blunders = g.analysis ? g.analysis.bad : 0;

          <span class="text-xs text-slate-500 w-14 flex-shrink-0">${dateStr}</span>
          <span class="font-bold ${resultColor} w-5 text-center">${resultText}</span>
          <span class="text-xs text-slate-400 flex-1 truncate">${winType}${pts > 1 ? ' +'+pts+'pt' : ''}</span>
          ${analyzing ? '<span class="text-xs text-blue-400 animate-pulse">...</span>' : `<span class="text-xs font-mono ${aColor}">${aEl}</span>`}
          ${blunders > 0 ? `<span class="text-xs text-red-400">${blunders}B</span>` : ''}
        </div>`;
      }).join('');

      return `
        <div class="space-y-2 flex-1 overflow-y-auto">
          ${aggHTML}
          <div class="bg-slate-900 rounded-lg p-2">
            <div class="flex justify-between items-center mb-1">
              <div class="text-xs font-bold text-slate-400">Game History (${gameHistory.length})</div>
              ${gameHistory.length > 0 ? `<button class="text-xs text-red-400 hover:text-red-300" onclick="clearGameHistory()">Clear</button>` : ''}
            </div>
            <div class="space-y-0.5 max-h-[300px] overflow-y-auto">
              ${gameListHTML || '<div class="text-xs text-slate-500">No games yet</div>'}
            </div>
          </div>
        </div>
      `;
    }

    function renderELTrendChart() {
      const analyzed = gameHistory.filter(g => g.analysis);
      if (analyzed.length < 3) return '';
      // Simple sparkline using CSS bars
      const vals = analyzed.map(g => g.analysis.avgEL);
      const max = Math.max(...vals, 0.5);
      const barW = Math.min(12, Math.floor(280 / vals.length));
      const bars = vals.map((v, i) => {
        const h = Math.max(2, Math.round((v / max) * 40));
        const color = v < 0.05 ? '#22c55e' : v < 0.15 ? '#eab308' : '#ef4444';
        return `<div style="width:${barW}px;height:${h}px;background:${color};border-radius:1px" title="Game ${i+1}: ${v.toFixed(3)}"></div>`;
      }).join('');
      return `<div class="bg-slate-900 rounded-lg p-2 mb-3">
        <div class="text-xs font-bold text-slate-400 mb-1">Equity Loss Trend</div>
        <div class="flex items-end gap-px justify-center" style="height:44px">${bars}</div>
        <div class="flex justify-between text-xs text-slate-600 mt-1">
          <span>oldest</span><span>newest</span>
        </div>
      </div>`;
    }

    function renderHistoryDetail() {
      const g = gameHistory[historyDetailIdx];
      if (!g) { historyView = 'list'; return renderHistoryPanel(); }
      const d = new Date(g.date);
      const dateStr = `${d.toLocaleDateString()} ${d.toLocaleTimeString()}`;
      const isWin = g.outcome && g.outcome.team === 0;
      const isTie = g.outcome && g.outcome.type === 'tie';

      let movesHTML = '<div class="text-xs text-slate-500">Analysis not available</div>';
      if (g.analysis && g.analysis.moveDetails) {
        const gradeColors = { perfect: '#22c55e', good: '#86efac', ok: '#eab308', bad: '#ef4444' };
        const gradeLabels = { perfect: 'OK', good: 'INACC', ok: 'MSTK', bad: 'BLNDR' };
        movesHTML = g.analysis.moveDetails.map(m => {
          const color = gradeColors[m.grade] || '#64748b';
          const label = gradeLabels[m.grade] || m.grade;
          const altTile = m.grade !== 'perfect' && m.bestTile ? ` → [${m.bestTile}] ${m.bestSide || ''}` : '';
          return `<div class="flex items-center gap-2 text-xs py-0.5">
            <span class="font-mono text-slate-500 w-5">#${m.move}</span>
            <span class="font-bold px-1 rounded" style="color:${color};font-size:10px">${label}</span>
            <span class="text-white">[${m.tile}] ${m.side || ''}</span>
            <span class="text-slate-500">${altTile}</span>
            ${m.eqLoss > 0.01 ? `<span class="font-mono text-red-400 ml-auto">-${m.eqLoss.toFixed(2)}</span>` : ''}
          </div>`;
        }).join('');
      }

      const diffLabel = (v) => {
        const p = Object.values(getDifficultyPresets()).find(p => p.value === v);
        return p ? p.label : v;
      };

      return `
        <div class="space-y-2 flex-1 overflow-y-auto">
          <button class="text-xs text-blue-400 hover:text-blue-300 mb-1" onclick="historyView='list';historyDetailIdx=null;render();">&larr; Back to list</button>
          <div class="bg-slate-900 rounded-lg p-3 text-center">
            <div class="text-xs text-slate-500">${dateStr}</div>
            <div class="text-2xl font-bold ${isWin ? 'text-emerald-400' : isTie ? 'text-yellow-400' : 'text-red-400'}">
              ${isWin ? 'WIN' : isTie ? 'TIE' : 'LOSS'}
            </div>
            <div class="text-sm text-slate-300">${g.outcome.winType || g.outcome.type} ${g.outcome.points ? '+' + g.outcome.points + 'pt' : ''}</div>
            <div class="text-xs text-slate-500">vs ${diffLabel(g.difficulty.opponents)} opponents, ${diffLabel(g.difficulty.partner)} partner</div>
            ${g.analysis ? `
              <div class="mt-2 text-lg font-bold font-mono" style="color:${g.analysis.avgEL < 0.05 ? '#22c55e' : g.analysis.avgEL < 0.15 ? '#eab308' : '#ef4444'}">${g.analysis.avgEL.toFixed(3)}</div>
              <div class="text-xs text-slate-400">Avg EL over ${g.analysis.moves} decisions</div>
              <div class="flex justify-center gap-3 mt-1 text-xs">
                <span class="text-emerald-400">${g.analysis.perfect}P</span>
                <span class="text-green-300">${g.analysis.good}I</span>
                <span class="text-yellow-400">${g.analysis.ok}M</span>
                <span class="text-red-400">${g.analysis.bad}B</span>
              </div>
            ` : '<div class="text-xs text-slate-500 mt-2">Analysis pending...</div>'}
          </div>
          <div class="bg-slate-900 rounded-lg p-2">
            <div class="text-xs font-bold text-slate-400 mb-1">Move-by-Move</div>
            <div class="space-y-0.5 max-h-[250px] overflow-y-auto">
              ${movesHTML}
            </div>
          </div>
          <div class="text-center">
            <button class="btn text-xs" style="background:#3b82f6;color:white" onclick="replayHistoryGame(${historyDetailIdx})">Replay This Game</button>
          </div>
        </div>
      `;
    }

    function loadHistoryGame(idx) {
      historyView = 'detail';
      historyDetailIdx = idx;
      render();
    }

    function replayHistoryGame(idx) {
      const g = gameHistory[idx];
      if (!g || !g.originalHands) return;
      // Reconstruct game by re-simulating with the same hands
      const hands = g.originalHands.map(handIds => handIds.map(id => {
        const parts = id.split('-');
        return { left: parseInt(parts[0]), right: parseInt(parts[1]), id };
      }));
      // Switch to watch mode and generate game with these hands
      gameMode = 'watch';
      stopPlayAI();
      currentGame = generateGame(null, false, hands);
      currentStep = 0;
      rightPanelTab = 'analysis';
      historyView = 'list';
      historyDetailIdx = null;
      render();
    }

    function clearGameHistory() {
      if (!confirm('Clear all game history? This cannot be undone.')) return;
      gameHistory = [];
      saveGameHistory();
      render();
    }

    // ========== OPENING QUIZ ==========

    let showingOpeningQuiz = false;
    let oqHand = null;           // P0's 6 tiles for current question
    let oqAllHands = null;       // All 4 hands (for display after answer)
    let oqState = 'choosing';    // 'choosing' | 'evaluating' | 'result'
    let oqResult = null;         // { p0EP, p2EP, correct, chosen, margin, handFeatures }
    let oqStats = { correct: 0, total: 0, streak: 0, bestStreak: 0, history: [] };

    try {
      const saved = localStorage.getItem('domino-opening-quiz-stats');
      if (saved) oqStats = JSON.parse(saved);
    } catch(e) {}

    function saveOQStats() {
      try { localStorage.setItem('domino-opening-quiz-stats', JSON.stringify(oqStats)); } catch(e) {}
    }

    function startOpeningQuiz() {
      showingOpeningQuiz = true;
      nextOpeningQuestion();
    }

    function nextOpeningQuestion() {
      oqState = 'choosing';
      oqResult = null;
      newSeed();
      const deck = shuffleDeck(ALL_TILES);
      oqAllHands = [[],[],[],[]];
      for (let i = 0; i < 24; i++) oqAllHands[i%4].push({...deck[i]});
      oqHand = oqAllHands[0].map(t => ({...t}));
      render();
    }

    let oqSimsDone = 0, oqSimsTarget = 0;

    function oqChoose(choice) {
      // choice: 'me' or 'partner'
      oqState = 'evaluating';
      render();

      // Paired MC: same deal, both openers. 200 sims with early stopping.
      const MAX_SIMS = 200;
      const BATCH = 5;
      const diffs = []; // paired differences (P0_EP - P2_EP)
      let p0Total = 0, p2Total = 0;
      oqSimsDone = 0;
      oqSimsTarget = MAX_SIMS;

      function runBatch() {
        for (let b = 0; b < BATCH && oqSimsDone < MAX_SIMS; b++, oqSimsDone++) {
          const remaining = ALL_TILES.filter(t => !oqHand.some(h => h.id === t.id));
          const shuffled = shuffleDeck(remaining.map(t => ({...t})));
          const hands = [
            oqHand.map(t => ({...t})),
            shuffled.slice(0, 6),
            shuffled.slice(6, 12),
            shuffled.slice(12, 18)
          ];

          let ep0 = 0, ep2 = 0;
          try {
            const g0 = generateGame(0, true, hands.map(h => [...h]));
            if (g0.outcome) ep0 = g0.outcome.team === 0 ? (g0.outcome.points || 1) : -(g0.outcome.points || 1);
          } catch(e) {}
          try {
            const g2 = generateGame(2, true, hands.map(h => [...h]));
            if (g2.outcome) ep2 = g2.outcome.team === 0 ? (g2.outcome.points || 1) : -(g2.outcome.points || 1);
          } catch(e) {}

          p0Total += ep0;
          p2Total += ep2;
          diffs.push(ep0 - ep2);
        }

        // Early stopping: if after 60+ sims the evidence is clear, stop early
        if (oqSimsDone >= 60 && oqSimsDone < MAX_SIMS) {
          const st = pairedTStat(diffs);
          const m = Math.abs(st.mean);
          // Stop if overwhelming evidence (|t| > 2.5 with meaningful margin)
          if (Math.abs(st.t) > 2.5 && m > 0.12) { oqSimsTarget = oqSimsDone; finishOQ(); return; }
          // Also stop early if clearly a close call (tiny margin after enough sims)
          if (oqSimsDone >= 120 && m < 0.04) { oqSimsTarget = oqSimsDone; finishOQ(); return; }
        }

        if (oqSimsDone < MAX_SIMS) {
          if (oqSimsDone % 20 === 0) render(); // update progress bar every 20 sims
          setTimeout(runBatch, 0);
        } else {
          finishOQ();
        }
      }

      function finishOQ() {
        const N = diffs.length;
        const p0EP = p0Total / N;
        const p2EP = p2Total / N;
        const better = p0EP >= p2EP ? 'me' : 'partner';
        const margin = Math.abs(p0EP - p2EP);

        // Paired t-test: diffs = P0_EP - P2_EP, so positive mean = P0 opening is better
        const st = pairedTStat(diffs);
        const pTwoSided = 2 * Math.min(st.p, 1 - st.p);
        // Practical significance: margin must be meaningful (>0.08 EP) AND have some
        // statistical evidence (p < 0.25). Pure close calls: margin < 0.08 regardless.
        const significant = margin > 0.08 && pTwoSided < 0.25;
        const isCorrect = !significant || (choice === better);

        const handFeatures = analyzeOpeningHand(oqHand);

        oqResult = {
          p0EP, p2EP, correct: isCorrect, chosen: choice, better, margin, handFeatures,
          ci95: st.ci95, pValue: pTwoSided, tStat: st.t, nSims: N, significant
        };

        oqStats.total++;
        if (isCorrect) {
          oqStats.correct++;
          oqStats.streak++;
          if (oqStats.streak > oqStats.bestStreak) oqStats.bestStreak = oqStats.streak;
        } else {
          oqStats.streak = 0;
        }
        oqStats.history.push({
          date: Date.now(), correct: isCorrect, chosen: choice, better,
          margin: Math.round(margin * 100) / 100,
          p0EP: Math.round(p0EP * 100) / 100,
          p2EP: Math.round(p2EP * 100) / 100,
          features: handFeatures
        });
        if (oqStats.history.length > 50) oqStats.history.shift();
        saveOQStats();

        oqState = 'result';
        render();
      }
      setTimeout(runBatch, 10);
    }

    // Paired t-test: compute t-statistic, p-value, and 95% CI for mean difference
    function pairedTStat(diffs) {
      const N = diffs.length;
      if (N < 2) return { t: 0, p: 0.5, ci95: 0, mean: 0, se: 0 };
      const mean = diffs.reduce((s, d) => s + d, 0) / N;
      const variance = diffs.reduce((s, d) => s + (d - mean) ** 2, 0) / (N - 1);
      const se = Math.sqrt(variance / N);
      const t = se > 0.0001 ? mean / se : (mean > 0 ? 10 : mean < 0 ? -10 : 0);
      // One-sided p-value: P(P0-opening advantage > 0) using normalCDF (good approx for N >= 30)
      const p = 1 - normalCDF(t);
      const ci95 = 1.96 * se;
      return { t, p, ci95, mean, se };
    }

    function analyzeOpeningHand(hand) {
      const doubles = hand.filter(t => t.left === t.right);
      const totalPips = hand.reduce((s, t) => s + t.left + t.right, 0);

      // Suit depth: how many tiles touch each number
      const suitDepth = {};
      for (let n = 0; n <= 6; n++) suitDepth[n] = hand.filter(t => t.left === n || t.right === n).length;
      const maxSuitDepth = Math.max(...Object.values(suitDepth));
      const deepSuit = parseInt(Object.entries(suitDepth).sort((a,b) => b[1] - a[1])[0][0]);
      const uniqueSuits = new Set();
      hand.forEach(t => { uniqueSuits.add(t.left); uniqueSuits.add(t.right); });

      // Connectivity: can tiles chain well?
      let chains = 0;
      for (let i = 0; i < hand.length; i++) {
        for (let j = i+1; j < hand.length; j++) {
          const a = hand[i], b = hand[j];
          if (a.left === b.left || a.left === b.right || a.right === b.left || a.right === b.right) chains++;
        }
      }

      // Heavy tiles (pip sum >= 9)
      const heavyTiles = hand.filter(t => t.left + t.right >= 9).length;

      // Reasons based on 1M-game empirical study — qualitative indicators
      const reasons = [];
      let heuristicScore = 0; // net direction: >0 favors open, <0 favors pass
      const signal = (v) => {
        heuristicScore += v;
        if (v > 0.05) return '<span style="color:#22c55e;font-weight:bold">strong open</span>';
        if (v > 0.01) return '<span style="color:#86efac;font-weight:bold">favors open</span>';
        if (v > -0.01) return '<span style="color:#94a3b8;font-weight:bold">neutral</span>';
        if (v > -0.05) return '<span style="color:#fbbf24;font-weight:bold">slight pass</span>';
        return '<span style="color:#ef4444;font-weight:bold">favors pass</span>';
      };

      // #1 predictor: Max Suit Depth
      if (maxSuitDepth >= 5) reasons.push(`<b>Suit Depth:</b> Dominant ${deepSuit}s (${suitDepth[deepSuit]} tiles) — ${signal(0.20)}`);
      else if (maxSuitDepth >= 4) reasons.push(`<b>Suit Depth:</b> Deep ${deepSuit}s (${suitDepth[deepSuit]} tiles) — ${signal(0.05)}`);
      else if (maxSuitDepth === 3) reasons.push(`<b>Suit Depth:</b> Moderate (${deepSuit}s: ${suitDepth[deepSuit]} tiles) — ${signal(-0.01)}`);
      else reasons.push(`<b>Suit Depth:</b> No deep suit (max ${maxSuitDepth}) — ${signal(-0.01)}`);

      // #2 predictor: Number of Doubles
      if (doubles.length === 1) reasons.push(`<b>Doubles:</b> 1 double — ideal opener count — ${signal(0.04)}`);
      else if (doubles.length === 0) reasons.push(`<b>Doubles:</b> None — ${signal(-0.09)}`);
      else if (doubles.length === 2) reasons.push(`<b>Doubles:</b> 2 doubles — ${signal(0.00)}`);
      else reasons.push(`<b>Doubles:</b> ${doubles.length} doubles — too many — ${signal(doubles.length === 3 ? -0.05 : -0.07)}`);

      // #3 predictor: Suit Coverage
      if (uniqueSuits.size <= 4) reasons.push(`<b>Suit Coverage:</b> Only ${uniqueSuits.size} suits — narrow hand — ${signal(-0.15)}`);
      else if (uniqueSuits.size === 5) reasons.push(`<b>Suit Coverage:</b> ${uniqueSuits.size} suits — somewhat narrow — ${signal(-0.05)}`);
      else if (uniqueSuits.size === 6) reasons.push(`<b>Suit Coverage:</b> ${uniqueSuits.size} suits — decent flexibility — ${signal(0.01)}`);
      else reasons.push(`<b>Suit Coverage:</b> All 7 suits — maximum flexibility — ${signal(0.02)}`);

      return {
        doubles: doubles.length, totalPips, maxSuitDepth, deepSuit,
        suitCoverage: uniqueSuits.size, connectivity: chains,
        heavyTiles, reasons, heuristicScore
      };
    }

    function renderOpeningQuiz() {
      if (!oqHand) return '<div>Loading...</div>';

      const tilesHTML = oqHand.map(t =>
        tileHTML(t, '', 'v', '', '', 'transform:scale(1.3);margin:4px')
      ).join('');

      // Hand analysis summary (always show)
      const fa = oqResult ? oqResult.handFeatures : analyzeOpeningHand(oqHand);
      const featureBadges = `
        <div class="flex gap-2 flex-wrap justify-center text-xs mt-2">
          <span class="px-2 py-0.5 rounded bg-slate-700 text-slate-300">${fa.doubles}D</span>
          <span class="px-2 py-0.5 rounded bg-slate-700 text-slate-300">${fa.totalPips}pips</span>
          <span class="px-2 py-0.5 rounded bg-slate-700 text-slate-300">${fa.suitCoverage} suits</span>
          <span class="px-2 py-0.5 rounded bg-slate-700 text-slate-300">deep ${fa.deepSuit}s(${fa.maxSuitDepth})</span>
          <span class="px-2 py-0.5 rounded bg-slate-700 text-slate-300">${fa.connectivity} links</span>
        </div>`;

      let body = '';

      if (oqState === 'choosing') {
        body = `
          <div class="text-lg text-slate-300 mb-4">Your team won the last game. Who should open?</div>
          <div class="flex gap-2 justify-center mb-4 flex-wrap">${tilesHTML}</div>
          ${featureBadges}
          <div class="text-xs text-slate-500 mt-3 mb-4">The opener can play any tile. Look at your hand and decide.</div>
          <div class="flex gap-4 justify-center">
            <button class="btn btn-green text-lg px-8 py-3" onclick="oqChoose('me')">I'll Open</button>
            <button class="btn btn-blue text-lg px-8 py-3" onclick="oqChoose('partner')">Partner Opens</button>
          </div>
        `;
      } else if (oqState === 'evaluating') {
        const pct = oqSimsTarget > 0 ? Math.round(oqSimsDone / oqSimsTarget * 100) : 0;
        body = `
          <div class="flex gap-2 justify-center mb-4 flex-wrap">${tilesHTML}</div>
          ${featureBadges}
          <div class="text-center py-8">
            <div class="inline-block w-8 h-8 border-2 border-blue-400 border-t-transparent rounded-full animate-spin mb-3"></div>
            <div class="text-blue-300 text-sm">Paired MC: ${oqSimsDone}/${oqSimsTarget} simulations...</div>
            <div class="text-xs text-slate-500">Same deal tested with both openers</div>
            <div class="w-48 mx-auto mt-2 bg-slate-700 rounded-full h-1.5">
              <div class="bg-blue-400 h-1.5 rounded-full transition-all" style="width:${pct}%"></div>
            </div>
          </div>
        `;
      } else if (oqState === 'result') {
        const r = oqResult;
        const isClose = !r.significant;
        const correctColor = r.correct ? 'text-emerald-400' : 'text-red-400';
        const verdictText = r.correct ? (isClose ? 'CLOSE CALL — Both OK!' : 'CORRECT!') : 'WRONG!';
        const verdictIcon = r.correct ? (isClose ? '~' : '+') : 'X';

        const betterLabel = r.better === 'me' ? 'You open' : 'Partner opens';
        const chosenLabel = r.chosen === 'me' ? 'You open' : 'Partner opens';

        body = `
          <div class="flex gap-2 justify-center mb-3 flex-wrap">${tilesHTML}</div>
          ${featureBadges}
          <div class="bg-slate-900 rounded-lg p-4 mt-3 text-center">
            <div class="text-3xl font-bold ${correctColor} mb-1">${verdictIcon} ${verdictText}</div>
            <div class="text-sm text-slate-300 mb-3">You chose: <b>${chosenLabel}</b></div>
            <div class="grid grid-cols-2 gap-4 mb-3">
              <div class="bg-slate-800 rounded-lg p-3 ${r.better === 'me' ? 'ring-2 ring-emerald-500' : ''}">
                <div class="text-xs text-slate-500 mb-1">You Open</div>
                <div class="text-xl font-bold font-mono ${r.p0EP > 0 ? 'text-emerald-400' : 'text-red-400'}">${r.p0EP > 0 ? '+' : ''}${r.p0EP.toFixed(2)}</div>
                <div class="text-xs text-slate-500">avg EP</div>
              </div>
              <div class="bg-slate-800 rounded-lg p-3 ${r.better === 'partner' ? 'ring-2 ring-emerald-500' : ''}">
                <div class="text-xs text-slate-500 mb-1">Partner Opens</div>
                <div class="text-xl font-bold font-mono ${r.p2EP > 0 ? 'text-emerald-400' : 'text-red-400'}">${r.p2EP > 0 ? '+' : ''}${r.p2EP.toFixed(2)}</div>
                <div class="text-xs text-slate-500">avg EP</div>
              </div>
            </div>
            ${!isClose ? `<div class="text-sm text-slate-300 mb-1"><b>${betterLabel}</b> is better by <span class="text-yellow-400 font-mono">${r.margin.toFixed(2)}</span> expected pts</div>` : `<div class="text-sm text-slate-400 mb-1">Not statistically significant (p=${r.pValue ? r.pValue.toFixed(2) : '?'}) — either choice is fine</div>`}
            <div class="text-xs text-slate-500 mb-2 font-mono">${r.nSims} paired sims | 95% CI: ${r.better === 'me' ? '+' : '-'}${(r.margin - (r.ci95 || 0)).toFixed(2)} to ${r.better === 'me' ? '+' : '-'}${(r.margin + (r.ci95 || 0)).toFixed(2)} | p=${(r.pValue != null ? (r.pValue < 0.001 ? '<0.001' : r.pValue.toFixed(3)) : '?')}</div>
            <div class="text-left bg-slate-800 rounded-lg p-2 mt-2">
              <div class="text-xs font-bold text-slate-400 mb-1">Hand Features <span class="text-slate-600 font-normal">(rules of thumb — MC simulation above is the actual verdict)</span></div>
              ${r.handFeatures.reasons.map(r => `<div class="text-xs text-slate-300">- ${r}</div>`).join('')}
              ${(() => {
                const hs = r.handFeatures.heuristicScore || 0;
                const mcSaysOpen = r.p0EP > r.p2EP;
                const heuristicSaysOpen = hs > 0;
                if (!isClose && mcSaysOpen !== heuristicSaysOpen) {
                  return '<div class="text-xs text-amber-400 mt-1 pt-1 border-t border-slate-700">Note: These heuristics disagree with the MC result. The simulation accounts for specific tile interactions that simple rules miss.</div>';
                }
                return '';
              })()}
            </div>
          </div>
          <div class="flex gap-3 justify-center mt-4">

    const MC_SIMS_WATCH = 120;  // sims per tile in watch mode

    function runMCForCurrentStep() {
      if (!currentGame || !deepAnalysis) return;
      const snap = currentGame.snapshots[currentStep];
      if (snap.move === 0 || snap.action !== 'play') { mcResults = null; return; }
      mcRunning = true;
      render();
      // Use setTimeout to let UI update with "Analyzing..." before blocking
      setTimeout(() => {
        // Run MC from the state BEFORE this move was made
        const prevSnap = currentGame.snapshots[currentStep - 1];
        const wHandSizes = prevSnap.hands.map(h => h.length);
        computeBeliefs(prevSnap.knowledge, wHandSizes, prevSnap.hands[snap.player], snap.player, 150);
        mcResults = monteCarloEval(prevSnap, snap.player, MC_SIMS_WATCH);

    function newGame() {
      if (gameMode === 'play') { startPlayGame(); return; }

      quizResult = null;
      quizShowingResult = false;
      quizSidePick = null;

      studyRunning = false;
      proCache = {}; proCacheKeys = [];
      proRunning = false;
      studyProgress = '';
      mcCache.clear(); // clear MC cache between games

      // Seed new PRNG for this game
      newSeed();
      belief = new BeliefModel();
      notebook = new DeductionNotebook();

      // Dobrada (after tied/locked game): highest double rule, like first game
      if (scoreMultiplier > 1) {
        launchGame(null, false);
        return;
      }

      // Winning team chooses starter with free tile choice
      if (lastWinTeam !== null) {
        if (lastWinTeam === 0) {
          // User's team won — pre-deal hands so user can see their tiles, then ask
          const deck = shuffleDeck(ALL_TILES);
          pendingHands = [[],[],[],[]];
          for (let i = 0; i < 24; i++) pendingHands[i%4].push(deck[i]);
          // Create a preview game state showing the new hand + empty board
          const k = new Knowledge();
          currentGame = {
            snapshots: [{
              hands: pendingHands.map(h => [...h]),
              board: [], leftEnd: null, rightEnd: null,
              currentPlayer: -1, action: 'deal', player: -1, move: 0,
              knowledge: k, tile: null, side: null,
              allOptions: [], reasons: [], score: 0
            }],
            outcome: null
          };
          currentStep = 0;
          starterChoicePending = true;
          render();
          return;
        } else {
          // AI team won — auto-pick using seeded RNG
          const aiStarter = solverRng.random() < 0.5 ? 1 : 3;
          launchGame(aiStarter, true);
          return;
        }
      }
      launchGame(null, false); // first game of match — highest double rule
    }

    function chooseStarter(player) {
      starterChoicePending = false;
      // Track start/roll decision: player 0 or 2 = our team starts, otherwise roll
      _currentStartDecision = (player === 0 || player === 2) ? 'start' : 'roll';
      const hands = pendingHands;
      pendingHands = null;
      launchGame(player, true, hands); // free choice of opening tile with pre-dealt hands
    }

    function launchGame(forcedStarter, freeChoice = false, predealtHands = null) {
      stats.games++;
      saveStats();
      currentGame = generateGame(forcedStarter, freeChoice, predealtHands);
      // Apply dobrada multiplier to outcome points
      const o = currentGame.outcome;
      if (o && o.points) {
        o.basePoints = o.points;
        o.points = o.points * scoreMultiplier;
        o.multiplier = scoreMultiplier;
      }
      if (o && o.type === 'tie') {
        o.multiplier = scoreMultiplier;
      }
      // Sync multiplier to last snapshot's outcome (overlay reads from snap.outcome)
      const lastSnap = currentGame.snapshots[currentGame.snapshots.length - 1];
      if (lastSnap && lastSnap.outcome) {
        lastSnap.outcome = o;
      }
      // Update match score and track winning team
      if (o && o.winner !== undefined && o.points) {
        const winTeam = o.winner % 2;
        matchScore[winTeam] += o.points;
        lastWinTeam = winTeam;
        // Check for match win — reset if match over
        if (matchScore[0] >= MATCH_TARGET || matchScore[1] >= MATCH_TARGET) {
          // Update Elo on match completion (quiz mode only)
          if (gameMode === 'quiz') {
            updateElo(matchScore[0] >= MATCH_TARGET); // true if player's team won
          }
          matchScore = [0, 0];
          scoreMultiplier = 1;
          lastWinTeam = null; // new match starts fresh
        }
      } else if (o && o.type === 'tie') {
        // Tie — same team gets to choose again (lastWinTeam unchanged)
        // If first game tied, lastWinTeam stays null → highest double next
      }
      // Update multiplier for NEXT game
      if (o && o.type === 'tie') {
        scoreMultiplier *= 2;
      } else if (!o || o.type !== 'tie') {
        scoreMultiplier = 1;
      }
      currentStep = 0;
      render();
    }

    function handleNext() {
      if (quizShowingResult) {
        quizContinue();
        return;
      }
      if (quizWaiting) return; // blocked until user picks
      stepForward();
    }

    function stepForward() {
      if (!currentGame || currentStep >= currentGame.snapshots.length - 1) return;
      currentStep++;
      quizResult = null;
      quizShowingResult = false;
      quizSidePick = null;
      mcResults = null;
      render();
      if (deepAnalysis) runMCForCurrentStep();
    }

    function stepBack() {
      if (!currentGame || currentStep <= 0) return;
      if (gameMode === 'play' && !currentGame.outcome) return; // no stepping during live play
      currentStep--;
      quizWaiting = false;
      quizResult = null;
      quizShowingResult = false;
      quizSidePick = null;
      mcResults = null;
      render();
      if (deepAnalysis) runMCForCurrentStep();
    }

    function goTo(step) {
      if (!currentGame) return;
      if (gameMode === 'play' && !currentGame.outcome) return; // no stepping during live play
      quizWaiting = false;
      quizResult = null;
      quizShowingResult = false;
      quizSidePick = null;
      mcResults = null;
      currentStep = Math.max(0, Math.min(step, currentGame.snapshots.length - 1));
      render();
      if (deepAnalysis) runMCForCurrentStep();
    }

    function toggleAutoPlay() {
      if (autoPlayTimer) { stopAutoPlay(); render(); }
      else { startAutoPlay(); }
    }

    function startAutoPlay() {
      stopAutoPlay();
      autoPlayTimer = setInterval(() => {
        if (currentStep >= currentGame.snapshots.length - 1) { stopAutoPlay(); render(); return; }
        stepForward();
      }, autoPlaySpeed);
      render();
    }

    function stopAutoPlay() {
      if (autoPlayTimer) { clearInterval(autoPlayTimer); autoPlayTimer = null; }
    }

    function setSpeed(ms) {
      autoPlaySpeed = ms;
      if (autoPlayTimer) { stopAutoPlay(); startAutoPlay(); }
      else render();

    function resetStats() {
      stats = { totalMoves: 0, optimalMoves: 0, goodMoves: 0, okMoves: 0, badMoves: 0, games: 0, totalEquityLoss: 0, history: [] };
      saveStats();

    }

    // Keyboard controls — throttle rapid arrow keys to max ~20fps
    let _keyRenderPending = false;
    function throttledRender() {
      if (_keyRenderPending) return;
      _keyRenderPending = true;
      requestAnimationFrame(() => { _keyRenderPending = false; render(); });
    }
    document.addEventListener('keydown', e => {
      if (gameMode === 'play') {
        if (e.key === 'n') startPlayGame();
        if (currentGame && currentGame.outcome) {
          if (e.key === 'ArrowRight') { e.preventDefault(); if (currentStep < currentGame.snapshots.length - 1) { currentStep++; throttledRender(); } }
          if (e.key === 'ArrowLeft') { e.preventDefault(); if (currentStep > 0) { currentStep--; throttledRender(); } }
        }
        return;
      }
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); handleNext(); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); stepBack(); }
      else if (e.key === 'n') newGame();
      else if (e.key === 'p') { if (gameMode === 'watch') toggleAutoPlay(); }
    });

    // Re-render on window resize so board snake adapts to container width
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(render, 150);

    validateAllPuzzles();

    loadPuzzleCompletion();

    // Initial render
    render();

    // ========== SELF-PLAY AI BENCHMARK ==========
    // Usage: open browser console, run runAIBenchmark(200)
    // Plays N games: "Heuristic-only" team vs "MC-Expert" team, then swaps sides and repeats.
    // Reports win rates, points/game, and estimated Elo difference.
    window.runAIBenchmark = async function(numGames = 100) {
      const MC_SIMS_BENCH = MC_SIMS_PLAY_EXPERT; // 200
      let heuristicWins = 0, mcWins = 0, ties = 0;
      let heuristicPts = 0, mcPts = 0;
      const totalGames = numGames * 2; // play both sides

      function benchmarkGame(mcTeam) {
        // Deal random hands (24 tiles, 4 removed)
        const deck = shuffleDeck(ALL_TILES);
        const hands = [[], [], [], []];
        for (let i = 0; i < 24; i++) hands[i % 4].push(deck[i]);

        // Find highest double for opener
        let hp = -1, ht = null, hd = -1;
        for (let p = 0; p < 4; p++)
          for (const t of hands[p])
            if (t.left === t.right && t.left > hd) { hd = t.left; hp = p; ht = t; }
        if (!ht) return null; // no doubles dealt (rare edge)

        // Play opening tile
        hands[hp] = hands[hp].filter(t => t.id !== ht.id);
        let lE = ht.left, rE = ht.right, bLen = 1;
        const knowledge = new Knowledge();
        knowledge.recordPlay(hp, ht);

        let cur = (hp + 1) % 4, passCount = 0;
        for (let move = 0; move < 200; move++) {
          const isOnMCTeam = (cur % 2) === mcTeam;
          const allOpts = smartAI(hands[cur], lE, rE, bLen, cur, knowledge, true);
          let decision = allOpts.length > 0 ? allOpts[0] : null;

          // MC team uses monteCarloEval for all positions with multiple options
          if (isOnMCTeam && decision && allOpts.length > 1) {
            try {
              // Compute Bayesian beliefs for MC deal quality
              const handSizes = hands.map(h => h.length);
              computeBeliefs(knowledge, handSizes, hands[cur], cur, 100);
              const snap = { hands, leftEnd: lE, rightEnd: rE, board: new Array(bLen), knowledge };
              const mcRes = monteCarloEval(snap, cur, MC_SIMS_BENCH);
              if (mcRes.length > 0) {
                const best = mcRes[0];
                const matched = allOpts.find(o => o.tile.id === best.tile.id && o.side === best.side)
                             || allOpts.find(o => o.tile.id === best.tile.id);
                if (matched) decision = matched;
              }
            } catch (e) { /* keep heuristic */ }
          }

          if (decision) {
            passCount = 0;
            const { tile, side: prefSide } = decision;
            let side = prefSide;
            if (bLen > 0 && !side) side = (tile.left === lE || tile.right === lE) ? 'left' : 'right';

            hands[cur] = hands[cur].filter(t => t.id !== tile.id);
            knowledge.recordPlay(cur, tile);

            const pL = lE, pR = rE;
            if (bLen === 0) { lE = tile.left; rE = tile.right; }
            else if (side === 'left') { lE = tile.left === lE ? tile.right : tile.left; }
            else { rE = tile.right === rE ? tile.left : tile.right; }
            bLen++;

            if (hands[cur].length === 0) {
              const w = scoreWin(tile, pL, pR, bLen);
              return { winnerTeam: cur % 2, points: w.pts, type: w.type.toLowerCase() };
            }
            cur = (cur + 1) % 4;
          } else {
            passCount++;
            knowledge.recordPass(cur, lE, rE);
            if (passCount >= 4) {
              const b = resolveBlock(hands);
              return { winnerTeam: b.type === 'tie' ? -1 : b.team, points: b.points, type: b.type };
            }
            cur = (cur + 1) % 4;
          }
        }
        return { winnerTeam: -1, points: 0, type: 'tie' };
      }

      const nnOn = USE_NN_LEAF_VALUE && _nnModel;
      const cfgC = nnOn ? 0.7 : ISMCTS_C;
      const cfgBias = nnOn ? false : ISMCTS_PROG_BIAS;
      console.log(`%c🎲 AI Benchmark: ${totalGames} games (${numGames} per side)`, 'font-size:14px;font-weight:bold');
      console.log(`Heuristic-only vs MC-Expert (${MC_SIMS_BENCH} sims/move)`);
      console.log(`Config: NN-leaf=${!!nnOn}, PUCT=${!!nnOn}, C=${cfgC}, progBias=${cfgBias}, pool=${ISMCTS_POOL_SIZE}${nnOn ? ', gen=' + _nnModel.generation : ''}`);
      console.log('Running...');
      const t0 = performance.now();

      for (let phase = 0; phase < 2; phase++) {
        const mcTeam = phase; // phase 0: MC=team0, phase 1: MC=team1
        for (let g = 0; g < numGames; g++) {
          const result = benchmarkGame(mcTeam);
          if (!result) continue;

          if (result.winnerTeam === mcTeam) { mcWins++; mcPts += result.points; }
          else if (result.winnerTeam >= 0) { heuristicWins++; heuristicPts += result.points; }
          else ties++;

          // Progress every 50 games
          if ((g + 1) % 50 === 0) {
            const done = phase * numGames + g + 1;
            console.log(`  ... ${done}/${totalGames} games`);
          }

          // Yield to UI every 10 games
          if (g % 10 === 9) await new Promise(r => setTimeout(r, 0));
        }
      }

      const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
      const played = mcWins + heuristicWins + ties;
      const mcWR = played > 0 ? mcWins / (mcWins + heuristicWins) : 0.5;
      const hWR = 1 - mcWR;
      // Elo: E_diff = 400 × log10(WR / (1-WR))
      const eloDiff = mcWR > 0 && mcWR < 1 ? Math.round(400 * Math.log10(mcWR / hWR)) : (mcWR >= 1 ? 999 : -999);
      const mcPPG = played > 0 ? (mcPts / played).toFixed(2) : '0';
      const hPPG = played > 0 ? (heuristicPts / played).toFixed(2) : '0';

      console.log(`\n%c📊 BENCHMARK RESULTS (${played} games, ${elapsed}s)`, 'font-size:13px;font-weight:bold;color:#22c55e');
      console.log(`┌─────────────────────┬────────┬────────┬────────┐`);
      console.log(`│ AI                  │  Wins  │ Win%   │ Pts/G  │`);
      console.log(`├─────────────────────┼────────┼────────┼────────┤`);
      console.log(`│ MC-Expert (${MC_SIMS_BENCH} sims) │ ${String(mcWins).padStart(5)}  │ ${(mcWR*100).toFixed(1).padStart(5)}% │ ${mcPPG.padStart(5)}  │`);
      console.log(`│ Heuristic-only      │ ${String(heuristicWins).padStart(5)}  │ ${(hWR*100).toFixed(1).padStart(5)}% │ ${hPPG.padStart(5)}  │`);
      console.log(`│ Ties                │ ${String(ties).padStart(5)}  │        │        │`);
      console.log(`└─────────────────────┴────────┴────────┴────────┘`);
      console.log(`%cElo difference: MC-Expert is ~${eloDiff > 0 ? '+' : ''}${eloDiff} Elo stronger`, 'font-weight:bold;color:#eab308');
      console.log(`(Played both sides to eliminate positional advantage)`);

      return { mcWins, heuristicWins, ties, mcWR, eloDiff, mcPPG, hPPG, elapsed };
    };

    // ========== SPRT EVALUATION HARNESS ==========
    // Sequential Probability Ratio Test for A/B engine comparison.
    // Usage: runSPRT({ engineA: 'heuristic', engineB: 'mc', elo0: 0, elo1: 30, alpha: 0.05, beta: 0.05, maxGames: 2000 })
    // Stops as soon as statistical significance is reached.
    window.runSPRT = async function(opts = {}) {
      const elo0 = opts.elo0 ?? 0;     // H0: engines differ by at most elo0 Elo
      const elo1 = opts.elo1 ?? 30;    // H1: engines differ by at least elo1 Elo
      const alpha = opts.alpha ?? 0.05; // type I error
      const beta = opts.beta ?? 0.05;   // type II error
      const maxGames = opts.maxGames ?? 2000;
      const mcSimsA = opts.mcSimsA ?? 0;             // 0 = heuristic only
      const mcSimsB = opts.mcSimsB ?? MC_SIMS_PLAY_EXPERT;

      // SPRT boundaries
      const lnA = Math.log(beta / (1 - alpha));
      const lnB = Math.log((1 - beta) / alpha);

      // Elo to win probability: p = 1/(1+10^(-elo/400))
      const eloToP = e => 1 / (1 + Math.pow(10, -e / 400));
      const p0 = eloToP(elo0);
      const p1 = eloToP(elo1);

      let wins = 0, losses = 0, draws = 0;
      let llr = 0; // log-likelihood ratio
      let result = 'inconclusive';

      const savedSeed = currentSeed;
      const savedRng = solverRng;
      const savedBelief = belief;

      console.log(`%cSPRT Engine Comparison`, 'font-size:14px;font-weight:bold');
      console.log(`H0: Elo diff <= ${elo0} | H1: Elo diff >= ${elo1} | alpha=${alpha} beta=${beta}`);
      console.log(`Engine A: ${mcSimsA === 0 ? 'Heuristic' : `MC(${mcSimsA})`} vs Engine B: ${mcSimsB === 0 ? 'Heuristic' : `MC(${mcSimsB})`}`);
      console.log(`Boundaries: accept H0 if LLR <= ${lnA.toFixed(3)}, accept H1 if LLR >= ${lnB.toFixed(3)}`);

      function playOneSPRTGame(engineBTeam) {
        currentSeed = Math.floor(Math.random() * 0xFFFFFFFF);
        solverRng = new SplitMix64(currentSeed);
        belief = new BeliefModel();

        const deck = shuffleDeck([...ALL_TILES]);
        const hands = [[], [], [], []];
        for (let i = 0; i < 24; i++) hands[i % 4].push(deck[i]);

        let hp = -1, ht = null, hd = -1;
        for (let p = 0; p < 4; p++)
          for (const t of hands[p])
            if (t.left === t.right && t.left > hd) { hd = t.left; hp = p; ht = t; }
        if (!ht) return null;

        hands[hp] = hands[hp].filter(t => t.id !== ht.id);
        let lE = ht.left, rE = ht.right, bLen = 1;
        const knowledge = new Knowledge();
        knowledge.recordPlay(hp, ht);
        belief.recordPlay(ht.id);

        let cur = (hp + 1) % 4, passCount = 0;
        for (let move = 0; move < 200; move++) {
          const isEngineB = (cur % 2) === engineBTeam;
          const mcSims = isEngineB ? mcSimsB : mcSimsA;
          const allOpts = smartAI(hands[cur], lE, rE, bLen, cur, knowledge, true);
          let decision = allOpts.length > 0 ? allOpts[0] : null;

          if (mcSims > 0 && decision && allOpts.length > 1) {
            try {
              const handSizes = hands.map(h => h.length);
              computeBeliefs(knowledge, handSizes, hands[cur], cur, 80);
              const snap = { hands, leftEnd: lE, rightEnd: rE, board: new Array(bLen), knowledge };
              const mcRes = monteCarloEval(snap, cur, mcSims);
              if (mcRes.length > 0) {
                const best = mcRes[0];
                const matched = allOpts.find(o => o.tile.id === best.tile.id && o.side === best.side)
                             || allOpts.find(o => o.tile.id === best.tile.id);
                if (matched) decision = matched;
              }
            } catch (e) { /* keep heuristic */ }
          }

          if (decision) {
            passCount = 0;
            const { tile, side: prefSide } = decision;
            let side = prefSide;
            if (bLen > 0 && !side) side = (tile.left === lE || tile.right === lE) ? 'left' : 'right';
            hands[cur] = hands[cur].filter(t => t.id !== tile.id);
            knowledge.recordPlay(cur, tile);
            belief.recordPlay(tile.id);
            if (bLen === 0) { lE = tile.left; rE = tile.right; }
            else if (side === 'left') { lE = tile.left === lE ? tile.right : tile.left; }
            else { rE = tile.right === rE ? tile.left : tile.right; }
            bLen++;
            if (hands[cur].length === 0) {
              return { winnerTeam: cur % 2, type: 'domino' };
            }
            cur = (cur + 1) % 4;
          } else {
            passCount++;
            knowledge.recordPass(cur, lE, rE);
            if (passCount >= 4) {
              const b = resolveBlock(hands);
              return { winnerTeam: b.type === 'tie' ? -1 : b.team, type: b.type };
            }
            cur = (cur + 1) % 4;
          }
        }
        return { winnerTeam: -1, type: 'tie' };
      }

      const t0 = performance.now();
      let played = 0;

      for (let g = 0; g < maxGames; g++) {
        // Alternate sides to eliminate positional bias
        const engineBTeam = g % 2;
        const r = playOneSPRTGame(engineBTeam);
        if (!r) continue;
        played++;

        if (r.winnerTeam === engineBTeam) wins++;
        else if (r.winnerTeam >= 0) losses++;
        else draws++;

        // Update LLR (Wald's SPRT for Bernoulli outcomes, draws counted as 0.5)
        const n = wins + losses + draws;
        const score = (wins + draws * 0.5) / n;
        if (score > 0 && score < 1) {
          llr = n * (score * Math.log(score / p0) + (1 - score) * Math.log((1 - score) / (1 - p0)))
              - n * (score * Math.log(score / p1) + (1 - score) * Math.log((1 - score) / (1 - p1)));
          // Flip sign: positive LLR favors H1
          llr = -llr;
        }

        // Check stopping conditions
        if (llr <= lnA) { result = 'H0'; break; }
        if (llr >= lnB) { result = 'H1'; break; }

        // Progress report
        if (played % 50 === 0) {
          const wr = n > 0 ? (wins + draws * 0.5) / n : 0.5;
          const elo = wr > 0 && wr < 1 ? Math.round(400 * Math.log10(wr / (1 - wr))) : 0;
          console.log(`  Game ${played}: B wins ${wins}/${n} (${(wr*100).toFixed(1)}%), LLR=${llr.toFixed(3)} [${lnA.toFixed(2)}, ${lnB.toFixed(2)}], ~${elo > 0 ? '+' : ''}${elo} Elo`);
        }

        // Yield to UI every 10 games
        if (g % 10 === 9) await new Promise(r => setTimeout(r, 0));
      }

      const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
      const n = wins + losses + draws;
      const wr = n > 0 ? (wins + draws * 0.5) / n : 0.5;
      const elo = wr > 0 && wr < 1 ? Math.round(400 * Math.log10(wr / (1 - wr))) : 0;

      console.log(`\n%cSPRT Result: ${result} after ${played} games (${elapsed}s)`, 'font-size:13px;font-weight:bold;color:#22c55e');
      console.log(`Engine B: ${wins}W / ${losses}L / ${draws}D = ${(wr*100).toFixed(1)}% (~${elo > 0 ? '+' : ''}${elo} Elo)`);
      console.log(`Final LLR: ${llr.toFixed(3)} | Boundaries: [${lnA.toFixed(2)}, ${lnB.toFixed(2)}]`);
      if (result === 'H0') console.log(`%cConclusion: No significant difference (Elo diff < ${elo1})`, 'color:#eab308');
      else if (result === 'H1') console.log(`%cConclusion: Engine B is significantly stronger (Elo diff >= ${elo1})`, 'color:#22c55e');
      else console.log(`%cInconclusive after ${maxGames} games — increase maxGames or relax thresholds`, 'color:#ef4444');

      // Restore state
      currentSeed = savedSeed;
      solverRng = savedRng;
      belief = savedBelief;

      return { result, played, wins, losses, draws, winRate: wr, elo, llr, elapsed };
    };

    // ========== F1 DIAGNOSTIC: ROLLOUT BIAS ISOLATION ==========
    // Usage: runF1Diagnostic(200)
    // Compares Variant A (fastAI rollouts) vs Variant B (smartAI first 4 plies + fastAI).
    // Same determinization, same sim budget, early-stop frozen for equal sample counts.
    // Metrics: Elo shift, top-1 agreement, ranking flips, rollout call counters.
    window.runF1Diagnostic = async function(numSeeds = 200) {
      const MC_SIMS_F1 = MC_SIMS_PLAY_EXPERT;
      const savedVariant = ROLLOUT_VARIANT;
      let aWins = 0, bWins = 0, ties = 0;
      let aPts = 0, bPts = 0;
      let top1Agree = 0, top1Disagree = 0;
      let totalPositions = 0;

      // Freeze early-stop for fair comparison (both variants get identical sample counts)
      _f1FreezeEarlyStop = true;

      // Track per-variant rollout stats
      const statsA = { smartAICalls: 0, fastAICalls: 0, totalPlies: 0, totalRollouts: 0 };
      const statsB = { smartAICalls: 0, fastAICalls: 0, totalPlies: 0, totalRollouts: 0 };

      function f1Game(seed, variant) {
        const rng = new SplitMix64(seed);
        const deck = [...ALL_TILES];
        rng.shuffle(deck);
        const hands = [deck.slice(0, 6), deck.slice(6, 12), deck.slice(12, 18), deck.slice(18, 24)];

        let hp = -1, ht = null, hd = -1;
        for (let p = 0; p < 4; p++)
          for (const t of hands[p])
            if (t.left === t.right && t.left > hd) { hd = t.left; hp = p; ht = t; }
        if (!ht) return null;

        hands[hp] = hands[hp].filter(t => t.id !== ht.id);
        let lE = ht.left, rE = ht.right, bLen = 1;
        const knowledge = new Knowledge();
        knowledge.recordPlay(hp, ht);

        let cur = (hp + 1) % 4, passCount = 0;
        for (let move = 0; move < 200; move++) {
          const allOpts = smartAI(hands[cur], lE, rE, bLen, cur, knowledge, true);
          let decision = allOpts.length > 0 ? allOpts[0] : null;

          if (decision && allOpts.length > 1) {
            try {
              const handSizes = hands.map(h => h.length);
              computeBeliefs(knowledge, handSizes, hands[cur], cur, 100);
              const snap = { hands, leftEnd: lE, rightEnd: rE, board: new Array(bLen), knowledge };

              ROLLOUT_VARIANT = variant;
              _rolloutStats = { smartAICalls: 0, fastAICalls: 0, totalPlies: 0, totalRollouts: 0 };
              const mcRes = monteCarloEval(snap, cur, MC_SIMS_F1);
              // Accumulate stats
              const accum = variant === 'B' ? statsB : statsA;
              accum.smartAICalls += _rolloutStats.smartAICalls;
              accum.fastAICalls += _rolloutStats.fastAICalls;
              accum.totalPlies += _rolloutStats.totalPlies;
              accum.totalRollouts += _rolloutStats.totalRollouts;
              ROLLOUT_VARIANT = 'A'; // restore

              if (mcRes.length > 0) {
                const best = mcRes[0];
                const matched = allOpts.find(o => o.tile.id === best.tile.id && o.side === best.side)
                             || allOpts.find(o => o.tile.id === best.tile.id);
                if (matched) decision = matched;
              }
            } catch (e) { ROLLOUT_VARIANT = 'A'; }
          }

          if (decision) {
            passCount = 0;
            const { tile, side: prefSide } = decision;
            let side = prefSide;
            if (bLen > 0 && !side) side = (tile.left === lE || tile.right === lE) ? 'left' : 'right';

            hands[cur] = hands[cur].filter(t => t.id !== tile.id);
            knowledge.recordPlay(cur, tile);

            const pL = lE, pR = rE;
            if (bLen === 0) { lE = tile.left; rE = tile.right; }
            else if (side === 'left') { lE = tile.left === lE ? tile.right : tile.left; }
            else { rE = tile.right === rE ? tile.left : tile.right; }
            bLen++;

            if (hands[cur].length === 0) {
              const w = scoreWin(tile, pL, pR, bLen);
              return { winnerTeam: cur % 2, points: w.pts };
            }
            cur = (cur + 1) % 4;
          } else {
            passCount++;
            knowledge.recordPass(cur, lE, rE);
            if (passCount >= 4) {
              const b = resolveBlock(hands);
              return { winnerTeam: b.type === 'tie' ? -1 : b.team, points: b.points };
            }
            cur = (cur + 1) % 4;
          }
        }
        return { winnerTeam: -1, points: 0 };
      }

      // Top-1 agreement: advance to a MID-GAME multi-option position, then compare A vs B.
      // Tests positions with 2-4 tiles in hand (where lock/block decisions matter).
      // BUG FIX: clears mcCache between A/B evals (cache key doesn't include rollout variant).
      function f1TopOne(seed) {
        const rng = new SplitMix64(seed);
        const deck = [...ALL_TILES];
        rng.shuffle(deck);
        const hands = [deck.slice(0, 6), deck.slice(6, 12), deck.slice(12, 18), deck.slice(18, 24)];

        let hp = -1, ht = null, hd = -1;
        for (let p = 0; p < 4; p++)
          for (const t of hands[p])
            if (t.left === t.right && t.left > hd) { hd = t.left; hp = p; ht = t; }
        if (!ht) return null;

        hands[hp] = hands[hp].filter(t => t.id !== ht.id);
        let lE = ht.left, rE = ht.right, bLen = 1;
        const knowledge = new Knowledge();
        knowledge.recordPlay(hp, ht);

        let cur = (hp + 1) % 4;
        let movesPlayed = 0;
        for (let move = 0; move < 60; move++) {
          const playable = hands[cur].filter(t => canPlay(t, lE, rE, bLen));

          // Only test mid-game positions: >=5 moves played AND 2-4 tiles in hand
          if (playable.length > 1 && movesPlayed >= 5 && hands[cur].length <= 4) {
            try {
              const handSizes = hands.map(h => h.length);
              computeBeliefs(knowledge, handSizes, hands[cur], cur, 100);
              const snap = { hands, leftEnd: lE, rightEnd: rE, board: new Array(bLen), knowledge };

              // Evaluate with Variant A — clear cache first
              mcCache.clear();
              ROLLOUT_VARIANT = 'A';
              _rolloutStats = { smartAICalls: 0, fastAICalls: 0, totalPlies: 0, totalRollouts: 0 };
              const mcA = monteCarloEval(snap, cur, MC_SIMS_F1);
              const statsCheckA = { smart: _rolloutStats.smartAICalls, fast: _rolloutStats.fastAICalls };

              if (mcA.length > 0 && mcB.length > 0) {

                const evGapB = mcB.length > 1 ? mcB[0].expectedPoints - mcB[1].expectedPoints : 999;

      console.log(`%c F1 Diagnostic: Rollout Bias Isolation`, 'font-size:14px;font-weight:bold');

    // Headless game for CMA-ES tuner: plays a full game using smartAI with current AI_WEIGHTS
    // Returns {winnerTeam, points, type}. Deterministic given seed.
    window.headlessGame = function(seed) {
      const rng = new SplitMix64(seed);
      const deck = [...ALL_TILES];

      const hands = [deck.slice(0, 6), deck.slice(6, 12), deck.slice(12, 18), deck.slice(18, 24)];
      // Find highest double for opener

          if (t.left === t.right && t.left > hd) { hd = t.left; hp = p; ht = t; }
      if (!ht) return { winnerTeam: -1, points: 0, type: 'none' };
      hands[hp] = hands[hp].filter(t => t.id !== ht.id);
      let lE = ht.left, rE = ht.right, bLen = 1;
      const knowledge = new Knowledge();
      knowledge.recordPlay(hp, ht);
      let cur = (hp + 1) % 4, passCount = 0;
      for (let move = 0; move < 200; move++) {
        const allOpts = smartAI(hands[cur], lE, rE, bLen, cur, knowledge, true);
        const decision = allOpts.length > 0 ? allOpts[0] : null;
        if (decision) {
          passCount = 0;
          const { tile, side: prefSide } = decision;
          let side = prefSide;
          if (bLen > 0 && !side) side = (tile.left === lE || tile.right === lE) ? 'left' : 'right';
          hands[cur] = hands[cur].filter(t => t.id !== tile.id);
          knowledge.recordPlay(cur, tile);
          const pL = lE, pR = rE;
          if (bLen === 0) { lE = tile.left; rE = tile.right; }
          else if (side === 'left') { lE = tile.left === lE ? tile.right : tile.left; }
          else { rE = tile.right === rE ? tile.left : tile.right; }
          bLen++;
          if (hands[cur].length === 0) {
            const w = scoreWin(tile, pL, pR, bLen);
            return { winnerTeam: cur % 2, points: w.pts, type: w.type.toLowerCase() };
          }
          cur = (cur + 1) % 4;
        } else {
          passCount++;
          knowledge.recordPass(cur, lE, rE);
          if (passCount >= 4) {
            const b = resolveBlock(hands);
            return { winnerTeam: b.type === 'tie' ? -1 : b.team, points: b.points, type: b.type };
          }
          cur = (cur + 1) % 4;
        }
      }
      return { winnerTeam: -1, points: 0, type: 'tie' };
    };
    window.AI_WEIGHTS = AI_WEIGHTS;

    // ========== CMA-ES Weight Optimizer (Full Covariance) ==========
    // Usage: optimizeWeights(30, 16, 150) — 30 generations, pop 16, 150 games/eval
    // Uses adversarial evaluation: candidate weights vs champion weights head-to-head
    // Full covariance matrix adaptation with Jacobi eigendecomposition (Hansen 2016)

    // Component 1: Full-covariance CMA-ES engine
    class CMAES {
      constructor(initialMean, sigma, popSize) {
        this.dim = initialMean.length;
        this.mean = initialMean.slice();
        this.sigma = sigma;
        this.popSize = popSize || 4 + Math.floor(3 * Math.log(this.dim));
        this.mu = Math.floor(this.popSize / 2);

        // Weights for recombination
        this.weights = [];
        for (let i = 0; i < this.mu; i++) {
          this.weights.push(Math.log(this.mu + 0.5) - Math.log(i + 1));
        }
        const wSum = this.weights.reduce((a, b) => a + b, 0);
        this.weights = this.weights.map(w => w / wSum);

        const mueff = 1.0 / this.weights.reduce((a, w) => a + w * w, 0);
        this.mueff = mueff;

        // Adaptation rates
        this.cc = (4 + mueff / this.dim) / (this.dim + 4 + 2 * mueff / this.dim);
        this.cs = (mueff + 2) / (this.dim + mueff + 5);
        this.c1 = 2 / ((this.dim + 1.3) ** 2 + mueff);
        this.cmu = Math.min(1 - this.c1, 2 * (mueff - 2 + 1 / mueff) / ((this.dim + 2) ** 2 + mueff));
        this.damps = 1 + 2 * Math.max(0, Math.sqrt((mueff - 1) / (this.dim + 1)) - 1) + this.cs;

        // State
        this.pc = new Array(this.dim).fill(0);
        this.ps = new Array(this.dim).fill(0);
        this.C = [];
        for (let i = 0; i < this.dim; i++) {
          this.C.push(new Array(this.dim).fill(0));
          this.C[i][i] = 1;
        }
        this.eigenUpdate = 0;
        this.gen = 0;
        this.chiN = Math.sqrt(this.dim) * (1 - 1 / (4 * this.dim) + 1 / (21 * this.dim * this.dim));
      }

      samplePopulation() {
        // Eigendecompose C
        const eigVals = new Array(this.dim).fill(0);
        const eigVecs = this.C.map(row => row.slice());
        // Jacobi eigendecomposition for small matrices
        this._jacobiEigen(eigVecs, eigVals);
        this._eigVecs = eigVecs;
        this._eigVals = eigVals;

        const pop = [];
        for (let k = 0; k < this.popSize; k++) {
          const z = new Array(this.dim);
          for (let i = 0; i < this.dim; i++) z[i] = this._randn();
          const y = new Array(this.dim).fill(0);
          for (let i = 0; i < this.dim; i++) {
            for (let j = 0; j < this.dim; j++) {
              y[i] += eigVecs[i][j] * Math.sqrt(Math.max(eigVals[j], 1e-20)) * z[j];
            }
          }
          const x = this.mean.map((m, i) => m + this.sigma * y[i]);
          pop.push(x);
        }
        return pop;
      }

      update(pop, fitnesses) {
        // Sort by fitness (DESCENDING — higher is better)
        const indexed = fitnesses.map((f, i) => ({ f, i }));
        indexed.sort((a, b) => b.f - a.f);

        // New mean
        const oldMean = this.mean.slice();
        this.mean = new Array(this.dim).fill(0);
        for (let k = 0; k < this.mu; k++) {
          const idx = indexed[k].i;
          for (let i = 0; i < this.dim; i++) {
            this.mean[i] += this.weights[k] * pop[idx][i];
          }
        }

        // Evolution paths
        const ymean = this.mean.map((m, i) => (m - oldMean[i]) / this.sigma);
        const invsqrtC = this._invertSqrtC();
        const zmean = new Array(this.dim).fill(0);
        for (let i = 0; i < this.dim; i++) {
          for (let j = 0; j < this.dim; j++) zmean[i] += invsqrtC[i][j] * ymean[j];
        }

        const csn = Math.sqrt(this.cs * (2 - this.cs) * this.mueff);
        const ccn = Math.sqrt(this.cc * (2 - this.cc) * this.mueff);

        for (let i = 0; i < this.dim; i++) {
          this.ps[i] = (1 - this.cs) * this.ps[i] + csn * zmean[i];
          this.pc[i] = (1 - this.cc) * this.pc[i] + ccn * ymean[i];
        }

        // Covariance update
        for (let i = 0; i < this.dim; i++) {
          for (let j = 0; j <= i; j++) {
            let cmu_sum = 0;
            for (let k = 0; k < this.mu; k++) {
              const idx = indexed[k].i;
              const yi = (pop[idx][i] - oldMean[i]) / this.sigma;
              const yj = (pop[idx][j] - oldMean[j]) / this.sigma;
              cmu_sum += this.weights[k] * yi * yj;
            }
            this.C[i][j] = (1 - this.c1 - this.cmu) * this.C[i][j]
              + this.c1 * this.pc[i] * this.pc[j]
              + this.cmu * cmu_sum;
            this.C[j][i] = this.C[i][j];
          }
        }

        // Sigma update
        const psNorm = Math.sqrt(this.ps.reduce((a, v) => a + v * v, 0));
        this.sigma *= Math.exp((this.cs / this.damps) * (psNorm / this.chiN - 1));
        this.gen++;
      }

      _randn() {
        const u1 = Math.random(), u2 = Math.random();
        return Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
      }

      _jacobiEigen(A, eigenvalues) {
        const n = A.length;
        const V = A.map(row => row.slice());
        // Initialize V as identity
        for (let i = 0; i < n; i++) {
          for (let j = 0; j < n; j++) V[i][j] = i === j ? 1 : 0;
        }
        const S = this.C.map(row => row.slice());

        for (let iter = 0; iter < 100; iter++) {
          let offDiag = 0;
          for (let i = 0; i < n; i++)
            for (let j = i + 1; j < n; j++) offDiag += S[i][j] ** 2;
          if (offDiag < 1e-20) break;

          for (let p = 0; p < n - 1; p++) {
            for (let q = p + 1; q < n; q++) {
              if (Math.abs(S[p][q]) < 1e-20) continue;
              const tau = (S[q][q] - S[p][p]) / (2 * S[p][q]);
              const t = Math.sign(tau) / (Math.abs(tau) + Math.sqrt(1 + tau * tau));
              const c = 1 / Math.sqrt(1 + t * t);
              const s = t * c;

              const Spp = S[p][p], Sqq = S[q][q], Spq = S[p][q];
              S[p][p] = c * c * Spp - 2 * s * c * Spq + s * s * Sqq;
              S[q][q] = s * s * Spp + 2 * s * c * Spq + c * c * Sqq;
              S[p][q] = S[q][p] = 0;

              for (let i = 0; i < n; i++) {
                if (i !== p && i !== q) {
                  const Sip = S[i][p], Siq = S[i][q];
                  S[i][p] = S[p][i] = c * Sip - s * Siq;
                  S[i][q] = S[q][i] = s * Sip + c * Siq;
                }
              }
              for (let i = 0; i < n; i++) {
                const Vip = V[i][p], Viq = V[i][q];
                V[i][p] = c * Vip - s * Viq;
                V[i][q] = s * Vip + c * Viq;
              }
            }
          }
        }
        for (let i = 0; i < n; i++) eigenvalues[i] = S[i][i];
        for (let i = 0; i < n; i++)
          for (let j = 0; j < n; j++) A[i][j] = V[i][j];
      }

      _invertSqrtC() {
        const n = this.dim;
        const result = Array.from({ length: n }, () => new Array(n).fill(0));
        if (!this._eigVecs || !this._eigVals) return result.map((r, i) => { r[i] = 1; return r; });
        for (let i = 0; i < n; i++) {
          for (let j = 0; j < n; j++) {
            let sum = 0;
            for (let k = 0; k < n; k++) {
              sum += this._eigVecs[i][k] * (1 / Math.sqrt(Math.max(this._eigVals[k], 1e-20))) * this._eigVecs[j][k];
            }
            result[i][j] = sum;
          }
        }
        return result;
      }
    }

    // Component 2: Parameter keys and bounds
    const _CMA_PARAM_KEYS = [
      'deadEndPenalty', 'lockFavorable', 'lockUnfavorable',
      'chicoteSelf', 'chicotePartner', 'chicoteOpponent', 'chicoteDorme',
      'lockApproachGood', 'lockApproachBad',
      'monopolyBonus', 'boardCountGradient', 'captiveEndBonus', 'probDeadPenalty'
    ];
    const _CMA_BOUNDS = {
      deadEndPenalty: [10, 70], lockFavorable: [15, 80], lockUnfavorable: [20, 100],
      chicoteSelf: [10, 50], chicotePartner: [5, 35], chicoteOpponent: [10, 50],
      chicoteDorme: [3, 25], lockApproachGood: [5, 45], lockApproachBad: [5, 40],
      monopolyBonus: [8, 45], boardCountGradient: [2, 15], captiveEndBonus: [8, 45],
      probDeadPenalty: [10, 50]
    };

    // Component 2b: Adversarial headless game — team 0 uses weightsA, team 1 uses weightsB
    function _headlessAdversarial(seed, weightsA, weightsB) {
      const rng = new SplitMix64(seed);
      const deck = [...ALL_TILES];
      rng.shuffle(deck);
      const hands = [deck.slice(0, 6), deck.slice(6, 12), deck.slice(12, 18), deck.slice(18, 24)];
      let hp = -1, ht = null, hd = -1;
      for (let p = 0; p < 4; p++)
        for (const t of hands[p])
          if (t.left === t.right && t.left > hd) { hd = t.left; hp = p; ht = t; }
      if (!ht) return { winnerTeam: -1, points: 0 };
      hands[hp] = hands[hp].filter(t => t.id !== ht.id);
      let lE = ht.left, rE = ht.right, bLen = 1;
      const knowledge = new Knowledge();
      knowledge.recordPlay(hp, ht);
      let cur = (hp + 1) % 4, passCount = 0;

      function applyWeights(vec) {
        for (let i = 0; i < _CMA_PARAM_KEYS.length; i++) {
          AI_WEIGHTS[_CMA_PARAM_KEYS[i]] = vec[i];
        }
      }

      for (let move = 0; move < 200; move++) {
        // Apply the appropriate weights for this player's team
        applyWeights(cur % 2 === 0 ? weightsA : weightsB);
        const allOpts = smartAI(hands[cur], lE, rE, bLen, cur, knowledge, true);
        const decision = allOpts.length > 0 ? allOpts[0] : null;
        if (decision) {
          passCount = 0;
          const { tile, side: prefSide } = decision;
          let side = prefSide;
          if (bLen > 0 && !side) side = (tile.left === lE || tile.right === lE) ? 'left' : 'right';
          hands[cur] = hands[cur].filter(t => t.id !== tile.id);
          knowledge.recordPlay(cur, tile);
          const pL = lE, pR = rE;
          if (bLen === 0) { lE = tile.left; rE = tile.right; }
          else if (side === 'left') { lE = tile.left === lE ? tile.right : tile.left; }
          else { rE = tile.right === rE ? tile.left : tile.right; }
          bLen++;
          if (hands[cur].length === 0) {
            const w = scoreWin(tile, pL, pR, bLen);
            return { winnerTeam: cur % 2, points: w.pts };
          }
          cur = (cur + 1) % 4;
        } else {
          passCount++;
          knowledge.recordPass(cur, lE, rE);
          if (passCount >= 4) {
            const b = resolveBlock(hands);
            return { winnerTeam: b.type === 'tie' ? -1 : b.team, points: b.points };
          }
          cur = (cur + 1) % 4;
        }
      }
      return { winnerTeam: -1, points: 0 };
    }

    // Component 3: optimizeWeights — console-callable CMA-ES weight optimizer
    window.optimizeWeights = async function(generations = 30, popSize = 16, gamesPerEval = 150) {
      const dim = _CMA_PARAM_KEYS.length;
      const champion = _CMA_PARAM_KEYS.map(k => AI_WEIGHTS[k]);
      const savedWeights = [...champion];

      console.log('%cCMA-ES Weight Optimizer (Full Covariance)', 'font-weight:bold; font-size:14px');
      console.log(`Population: ${popSize} | Games/eval: ${gamesPerEval} | Generations: ${generations}`);
      console.log(`Optimizing ${dim} parameters: ${_CMA_PARAM_KEYS.join(', ')}`);
      console.log(`Each candidate plays ${gamesPerEval} games vs champion (${gamesPerEval / 2} seeds x both sides)`);

      const cma = new CMAES(champion, 5, popSize);
      let globalBest = [...champion], globalBestFit = -Infinity;
      let staleCount = 0;
      const t0 = performance.now();

      for (let gen = 0; gen < generations; gen++) {
        const population = cma.samplePopulation();
        const fitnesses = [];

        for (let ci = 0; ci < population.length; ci++) {
          // Clamp to bounds
          for (let j = 0; j < dim; j++) {
            const [lo, hi] = _CMA_BOUNDS[_CMA_PARAM_KEYS[j]];
            population[ci][j] = Math.max(lo, Math.min(hi, population[ci][j]));
          }

          // Adversarial evaluation: play each seed from BOTH sides for fairness
          const vec = population[ci].slice ? population[ci].slice() : Array.from(population[ci]);
          let netScore = 0;
          const half = Math.floor(gamesPerEval / 2);
          for (let g = 0; g < half; g++) {
            const seed = (gen * popSize * gamesPerEval + ci * gamesPerEval + g) >>> 0;
            // Candidate = team 0
            const r1 = _headlessAdversarial(seed, vec, champion);
            if (r1.winnerTeam === 0) netScore += r1.points;
            else if (r1.winnerTeam === 1) netScore -= r1.points;
            // Candidate = team 1 (swap sides, different seed offset)
            const r2 = _headlessAdversarial(seed + 0x80000000, champion, vec);
            if (r2.winnerTeam === 1) netScore += r2.points;
            else if (r2.winnerTeam === 0) netScore -= r2.points;
          }
          fitnesses.push(netScore / gamesPerEval);

          // Yield to UI every 4 candidates
          if (ci % 4 === 3) await new Promise(r => setTimeout(r, 0));
        }

        cma.update(population, fitnesses);

        const bestIdx = fitnesses.indexOf(Math.max(...fitnesses));
        const genBest = fitnesses[bestIdx];
        const avg = (fitnesses.reduce((s, f) => s + f, 0) / fitnesses.length).toFixed(3);
        const elapsed = ((performance.now() - t0) / 1000).toFixed(1);

        if (genBest > globalBestFit) {
          globalBestFit = genBest;
          globalBest = population[bestIdx].slice ? population[bestIdx].slice() : Array.from(population[bestIdx]);
          staleCount = 0;
        } else {
          staleCount++;
        }

        console.log(`Gen ${String(gen + 1).padStart(3)} | Best: ${genBest.toFixed(3)} | Avg: ${avg} | \u03c3: ${cma.sigma.toFixed(2)} | Global: ${globalBestFit.toFixed(3)} | ${elapsed}s`);

        // Convergence: step size collapsed or stale for 5 gens
        if (cma.sigma < 0.5 || staleCount >= 5) {
          console.log(`Converged (${cma.sigma < 0.5 ? '\u03c3 collapsed' : 'stale 5 gens'})`);
          break;
        }
      }

      // Restore original weights
      for (let i = 0; i < dim; i++) AI_WEIGHTS[_CMA_PARAM_KEYS[i]] = savedWeights[i];

      // Print results table
      console.log('\n%cOptimization Results:', 'font-weight:bold; font-size:13px; color:#22c55e');
      console.table(_CMA_PARAM_KEYS.reduce((obj, k, i) => {
        obj[k] = {
          Default: savedWeights[i],
          Optimized: Math.round(globalBest[i] * 10) / 10,
          Change: ((globalBest[i] - savedWeights[i]) / Math.max(Math.abs(savedWeights[i]), 1) * 100).toFixed(0) + '%'
        };
        return obj;
      }, {}));

      // Print paste-ready format
      console.log('\n%c// Paste into AI_WEIGHTS:', 'color: #22c55e');
      const lines = _CMA_PARAM_KEYS.map((k, i) => {
        const val = Math.round(globalBest[i] * 10) / 10;
        const pad = ' '.repeat(Math.max(0, 22 - k.length));
        return `  ${k}:${pad}${val},`;
      }).join('\n');
      console.log(`const AI_WEIGHTS = {\n${lines}\n};`);

      const totalTime = ((performance.now() - t0) / 1000).toFixed(1);
      console.log(`\nTotal: ${totalTime}s | Global best fitness: ${globalBestFit.toFixed(4)} (net pts/game vs champion)`);
      return { best: globalBest, fitness: globalBestFit, keys: _CMA_PARAM_KEYS };
    };

    // ========== ENCODER PARITY TEST ==========
    // Console: _testEncoderParity()       — run all built-in scenarios
    // Console: _testEncoderParity(json)   — compare against Python parity_expected.json
    // Console: _encodeSnapshot(snap)      — encode a single v1 snapshot

    // Encode a canonical v1 snapshot → {state, mask}
    window._encodeSnapshot = function(snap) {
      if (snap.version !== 1) throw new Error('Unknown snapshot version: ' + snap.version);

      const k = new Knowledge();
      const me = snap.player;

      // Replay plays: rebuild knowledge from plays_by
      for (const [pStr, tiles] of Object.entries(snap.plays_by)) {
        const p = parseInt(pStr);
        for (const tIdx of tiles) {
          k.recordPlay(p, ALL_TILES[tIdx]);
        }
      }

      // Replay passes: derive from cant_have
      // cantHave entries tell us which numbers a player can't have.
      // Apply them to knowledge
      for (const [pStr, nums] of Object.entries(snap.cant_have)) {
        const p = parseInt(pStr);
        for (const n of nums) {
          k.cantHave[p].add(n);
        }
      }

      // Also update nnBelief for cantHave constraints not covered by recordPass
      // (since we don't have exact pass events, apply constraints directly)
      for (const [pStr, nums] of Object.entries(snap.cant_have)) {
        const p = parseInt(pStr);
        for (const n of nums) {
          for (let ti = 0; ti < 28; ti++) {
            const tile = ALL_TILES[ti];
            if (tile.left === n || tile.right === n) {
              k.nnBelief[ti * 5 + p] = 0.0;
            }
          }
        }
      }
      // Re-normalize nnBelief after applying constraints
      for (let ti = 0; ti < 28; ti++) {
        let total = 0;
        for (let z = 0; z < 5; z++) total += k.nnBelief[ti * 5 + z];
        if (total > 0) {
          for (let z = 0; z < 5; z++) k.nnBelief[ti * 5 + z] /= total;
        }
      }

      const hand = snap.hand.map(i => ALL_TILES[i]);

      // Save/restore globals
      const savedScore = [...matchScore];
      const savedMul = scoreMultiplier;
      matchScore[0] = snap.match_score[0];
      matchScore[1] = snap.match_score[1];
      scoreMultiplier = snap.score_multiplier;

      const state = _nnEncodeState(hand, snap.left_end, snap.right_end, snap.board_length, me, k);
      const mask = _nnActionMask(hand, snap.left_end, snap.right_end, snap.board_length);

      matchScore[0] = savedScore[0]; matchScore[1] = savedScore[1];
      scoreMultiplier = savedMul;

      return { state: Array.from(state), mask: Array.from(mask) };
    };

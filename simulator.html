            hands: hands.map(h => h.map(t => ({...t}))),
            board: board.map(t => ({...t})), leftEnd: lE, rightEnd: rE,
            currentPlayer: outcome ? -1 : (cur + 1) % 4,
            knowledge: knowledge.clone(), notebook: nb.clone(),
            outcome
          });

          if (outcome) return { snapshots, outcome };
          cur = (cur + 1) % 4;
        }
      }
      return { snapshots, outcome: { type: 'abort' } };
    }

    // Pick best opening tile when player has free choice (no highest-double rule)
    function pickOpeningTile(hand) {
      // Count suit depth for each number
      const suitCount = {};
      for (let n = 0; n <= 6; n++) suitCount[n] = hand.filter(t => t.left === n || t.right === n).length;

      // Score each tile: prefer doubles, deep suits, high pips
      return hand.slice().sort((a, b) => {
        const aIsD = a.left === a.right ? 1 : 0;
        const bIsD = b.left === b.right ? 1 : 0;
        if (bIsD !== aIsD) return bIsD - aIsD; // doubles first
        const aDepth = Math.max(suitCount[a.left], suitCount[a.right]);
        const bDepth = Math.max(suitCount[b.left], suitCount[b.right]);
        if (bDepth !== aDepth) return bDepth - aDepth; // deepest suit
        return (b.left + b.right) - (a.left + a.right); // highest pips
      })[0];
    }

    function generateGame(forcedStarter = null, freeChoice = false, predealtHands = null) {
      let hands;
      if (predealtHands) {
        hands = predealtHands.map(h => h.map(t => ({...t})));
      } else {
        const deck = shuffleDeck(ALL_TILES);
        hands = [[],[],[],[]];
        for (let i = 0; i < 24; i++) hands[i%4].push(deck[i]);
      }

      let hp, ht;
      if (forcedStarter !== null && freeChoice) {
        // Winning team chose this player — free choice of opening tile
        hp = forcedStarter;
        ht = pickOpeningTile(hands[hp]);
      } else {
        // First game of match OR dobrada: highest double across all players
        let hd = -1;
        hp = 0; ht = null;
        for (let p = 0; p < 4; p++)
          for (const t of hands[p])
            if (t.left === t.right && t.left > hd) { hd = t.left; hp = p; ht = t; }
      }

      const autoTile = {...ht};
      hands[hp] = hands[hp].filter(t => t.id !== ht.id);
      const starter = (hp + 1) % 4;

      return {
        originalHands: hands.map(h => h.map(t => ({...t}))),
        autoPlayedBy: hp,
        autoTile,
        ...simulateFullRound(hands, starter, [autoTile], autoTile.left, autoTile.right, hp)
      };
    }

    // ========== LIVE PLAY ENGINE ==========

    function startPlayGame() {
      stopPlayAI();
      playWaiting = false;
      playSidePick = null;
      playHint = null;
      playLastMove = null;
      playOpeningPending = null;
      mcResults = null;
      quizWaiting = false;
      quizResult = null;
      quizShowingResult = false;
      puzzleMode = false;
      puzzleDef = null;

      newSeed();
      belief = new BeliefModel();

      // Deal hands (Pernambuco rule: 24 tiles dealt, 4 removed from game)
      const deck = shuffleDeck(ALL_TILES);
      liveHands = [[], [], [], []];
      for (let i = 0; i < 24; i++) liveHands[i % 4].push(deck[i]);

      // Find highest double opener
      let hp = -1, ht = null, hd = -1;
      for (let p = 0; p < 4; p++)
        for (const t of liveHands[p])
          if (t.left === t.right && t.left > hd) { hd = t.left; hp = p; ht = t; }

      if (hp < 0) { // no doubles — redeal
        startPlayGame();
        return;
      }

      // Auto-play the opening tile
      const autoTile = { ...ht };
      liveHands[hp] = liveHands[hp].filter(t => t.id !== ht.id);
      liveBoard = [autoTile];
      liveLeftEnd = autoTile.left;
      liveRightEnd = autoTile.right;
      liveCurrentPlayer = (hp + 1) % 4;
      livePassCount = 0;
      liveMoveNum = 0;
      liveKnowledge = new Knowledge();
      liveNotebook = new DeductionNotebook();
      liveKnowledge.recordPlay(hp, autoTile);
      liveNotebook.recordPlay(hp, 0, autoTile, null, undefined, undefined);

      currentGame = {
        originalHands: liveHands.map(h => h.map(t => ({ ...t }))),
        autoPlayedBy: hp,
        autoTile,
        snapshots: [{
          move: 0, player: -1, action: 'start', tile: null, side: null,
          reasons: ['Game begins'],
          hands: liveHands.map(h => h.map(t => ({ ...t }))),
          board: liveBoard.map(t => ({ ...t })),
          leftEnd: liveLeftEnd, rightEnd: liveRightEnd,
          currentPlayer: liveCurrentPlayer,
          knowledge: liveKnowledge.clone(), notebook: liveNotebook.clone()
        }],
        outcome: null
      };
      currentStep = 0;
      gameMode = 'play';
      stats.games++;
      saveStats();

      render();
      // If P0 opened, show confirmation overlay before AI starts
      if (hp === 0) {
        playOpeningPending = { tile: autoTile };
        render();
      } else {
        scheduleNextMove();
      }
    }

    function dismissOpeningOverlay() {
      playOpeningPending = null;
      render();
      scheduleNextMove();
    }

    function scheduleNextMove() {
      if (currentGame && currentGame.outcome) return;
      if (liveCurrentPlayer === 0) {
        playWaiting = true;
        playSidePick = null;
        render();
        return;
      }
      playAITimer = setTimeout(() => {
        playAITimer = null;
        executeAIMove();
      }, playAIDelay * 1000);
    }

    function executeAIMove() {
      if (!liveHands || currentGame.outcome) return;
      const player = liveCurrentPlayer;
      const hand = liveHands[player];
      const allOptions = smartAI(hand, liveLeftEnd, liveRightEnd, liveBoard.length, player, liveKnowledge, true);

      const difficulty = getDifficultyForPlayer(player);
      const decision = allOptions.length > 0 ? selectMoveByDifficulty(allOptions, difficulty) : null;

      if (decision) {
        playLastMove = { player, tile: decision.tile, side: decision.side, pass: false };
        recordLivePlay(player, decision.tile, decision.side, decision.reasons, decision.score, allOptions);
      } else {
        playLastMove = { player, tile: null, side: null, pass: true };
        recordLivePass(player);
      }

      render();
      scheduleNextMove();
    }

    function recordLivePlay(player, tile, prefSide, reasons, score, allOptions) {
      liveMoveNum++;
      let side = prefSide;
      if (liveBoard.length > 0 && !side) {
        side = (tile.left === liveLeftEnd || tile.right === liveLeftEnd) ? 'left' : 'right';
      }

      const playedTile = { ...tile };
      liveHands[player] = liveHands[player].filter(t => t.id !== tile.id);
      liveKnowledge.recordPlay(player, tile);
      liveNotebook.recordPlay(player, liveMoveNum, tile, side, liveLeftEnd, liveRightEnd);
      livePassCount = 0;

      const pL = liveLeftEnd, pR = liveRightEnd;

      if (liveBoard.length === 0) {
        liveBoard = [playedTile];
        liveLeftEnd = tile.left;
        liveRightEnd = tile.right;
      } else {
        let placed = { ...tile };
        if (side === 'left') {
          if (tile.left === liveLeftEnd) placed = { left: tile.right, right: tile.left, id: tile.id };
          liveBoard.unshift(placed);
          liveLeftEnd = placed.left;
        } else {
          if (tile.right === liveRightEnd) placed = { left: tile.right, right: tile.left, id: tile.id };
          liveBoard.push(placed);
          liveRightEnd = placed.right;
        }
      }

      let outcome = null;
      if (liveHands[player].length === 0) {
        const isD = tile.left === tile.right;
        const wasBoth = couldPlayBothEnds(tile, pL, pR);
        let pts, type;
        if (isD && wasBoth) { pts = 4; type = 'CRUZADA'; }
        else if (isD) { pts = 2; type = 'CARROCA'; }
        else if (wasBoth) { pts = 3; type = 'LA E LO'; }
        else { pts = 1; type = 'NORMAL'; }
        outcome = { type: 'win', winner: player, team: player % 2, points: pts, winType: type };
      }

      liveCurrentPlayer = outcome ? -1 : (player + 1) % 4;

      currentGame.snapshots.push({
        move: liveMoveNum, player, action: 'play', tile: playedTile, side: side || 'first',
        reasons: reasons || [], score: score || 0,
        allOptions: (allOptions || []).map(o => ({ tile: { ...o.tile }, score: o.score, side: o.side, reasons: [...o.reasons] })),
        hands: liveHands.map(h => h.map(t => ({ ...t }))),
        board: liveBoard.map(t => ({ ...t })),
        leftEnd: liveLeftEnd, rightEnd: liveRightEnd,
        currentPlayer: liveCurrentPlayer,
        knowledge: liveKnowledge.clone(), notebook: liveNotebook.clone(),
        outcome
      });

      currentStep = currentGame.snapshots.length - 1;

      if (outcome) {
        currentGame.outcome = outcome;
        finishPlayGame(outcome);
      }
    }

    function recordLivePass(player) {
      liveMoveNum++;
      livePassCount++;
      liveKnowledge.recordPass(player, liveLeftEnd, liveRightEnd);
      liveNotebook.recordPass(player, liveMoveNum, liveLeftEnd, liveRightEnd);

      let outcome = null;
      if (livePassCount >= 4) {
        const hv = liveHands.map((h, i) => ({ player: i, team: i % 2, points: h.reduce((s, t) => s + t.left + t.right, 0) }));
        const min = Math.min(...hv.map(v => v.points));
        const winners = hv.filter(v => v.points === min);
        if (winners.length > 1 && winners.some(w => w.team === 0) && winners.some(w => w.team === 1)) {
          outcome = { type: 'tie', points: 0 };
        } else {
          outcome = { type: 'blocked', winner: winners[0].player, team: winners[0].team, points: 1, handValues: hv };
        }
      }

      liveCurrentPlayer = outcome ? -1 : (player + 1) % 4;

      currentGame.snapshots.push({
        move: liveMoveNum, player, action: 'pass', tile: null, side: null,
        reasons: [`No tiles matching ${liveLeftEnd} or ${liveRightEnd}`],
        allOptions: [],
        hands: liveHands.map(h => h.map(t => ({ ...t }))),
        board: liveBoard.map(t => ({ ...t })),
        leftEnd: liveLeftEnd, rightEnd: liveRightEnd,
        currentPlayer: liveCurrentPlayer,
        knowledge: liveKnowledge.clone(), notebook: liveNotebook.clone(),
        outcome
      });

      currentStep = currentGame.snapshots.length - 1;

      if (outcome) {
        currentGame.outcome = outcome;
        finishPlayGame(outcome);
      }
    }

    function finishPlayGame(outcome) {
      stopPlayAI();
      playWaiting = false;
      playSidePick = null;

      // Apply dobrada multiplier
      outcome.basePoints = outcome.points || 0;
      outcome.points = (outcome.points || 0) * scoreMultiplier;
      outcome.multiplier = scoreMultiplier;

      const lastSnap = currentGame.snapshots[currentGame.snapshots.length - 1];
      if (lastSnap) lastSnap.outcome = outcome;

      if (outcome.winner !== undefined && outcome.points) {
        const winTeam = outcome.winner % 2;
        matchScore[winTeam] += outcome.points;
        lastWinTeam = winTeam;
        if (matchScore[0] >= MATCH_TARGET || matchScore[1] >= MATCH_TARGET) {
          matchScore = [0, 0];
          scoreMultiplier = 1;
          lastWinTeam = null;
        }
      }

      if (outcome.type === 'tie') {
        scoreMultiplier *= 2;
      } else {
        scoreMultiplier = 1;
      }

      render();
    }

    function stopPlayAI() {
      if (playAITimer) { clearTimeout(playAITimer); playAITimer = null; }
    }

    // ========== PLAY MODE HUMAN INPUT ==========

    function playPickTile(tileId) {
      if (!playWaiting || playSidePick) return;
      const hand = liveHands[0];
      const tile = hand.find(t => t.id === tileId);
      if (!tile) return;
      if (!canPlay(tile, liveLeftEnd, liveRightEnd, liveBoard.length)) return;

      const canLeft = canPlayOnSide(tile, liveLeftEnd);
      const canRight = canPlayOnSide(tile, liveRightEnd);

      if (liveLeftEnd === liveRightEnd) {
        finishPlayPick(tile, 'left');
        return;
      }

      if (canLeft && canRight) {
        playSidePick = { tile, canLeft, canRight };
        render();
        return;
      }

      if (canLeft) finishPlayPick(tile, 'left');
      else if (canRight) finishPlayPick(tile, 'right');
    }

    function playPickSide(side) {
      if (!playSidePick) return;
      const tile = playSidePick.tile;
      playSidePick = null;
      finishPlayPick(tile, side);
    }

    function finishPlayPick(tile, side) {
      playWaiting = false;
      playSidePick = null;
      playHint = null;
      playLastMove = null;

      const allOptions = smartAI(liveHands[0], liveLeftEnd, liveRightEnd, liveBoard.length, 0, liveKnowledge, true);
      const chosen = allOptions.find(o => o.tile.id === tile.id && o.side === side)
                  || allOptions.find(o => o.tile.id === tile.id);
      const reasons = chosen ? chosen.reasons : ['Player choice'];
      const score = chosen ? chosen.score : 0;

      recordLivePlay(0, tile, side, reasons, score, allOptions);
      render();
      scheduleNextMove();
    }

    function playPass() {
      if (!playWaiting) return;
      const hand = liveHands[0];
      if (hand.some(t => canPlay(t, liveLeftEnd, liveRightEnd, liveBoard.length))) return;

      playWaiting = false;
      playSidePick = null;
      playHint = null;
      playLastMove = null;
      recordLivePass(0);
      render();
      scheduleNextMove();
    }

    function showPlayHint() {
      if (!playWaiting || playSidePick) return;
      const allOptions = smartAI(liveHands[0], liveLeftEnd, liveRightEnd, liveBoard.length, 0, liveKnowledge, true);
      if (allOptions.length > 0) {
        const best = allOptions[0];
        playHint = { tileId: best.tile.id, side: best.side, reasons: best.reasons.slice(0, 3) };
      } else {
        playHint = { tileId: null, side: null, reasons: ['No playable tiles — pass'] };
      }
      render();
    }

    function renderPlaySidePickOverlay() {
      const t = playSidePick.tile;
      return `<div class="text-center mt-2 bg-slate-900 rounded-lg p-2 border border-yellow-500">
        <div class="text-xs text-yellow-300 mb-1">[${t.left}|${t.right}] can play on both ends. Which side?</div>
        <div class="flex justify-center gap-3">
          <button class="side-pick-btn bg-blue-600 text-white" onclick="playPickSide('left')">Left End (${liveLeftEnd})</button>
          <button class="side-pick-btn bg-red-600 text-white" onclick="playPickSide('right')">Right End (${liveRightEnd})</button>
        </div>
      </div>`;
    }

    // ========== MONTE CARLO LOOKAHEAD ==========

    // Check if player p can hold tile t given knowledge constraints
    // cantHave[p] = set of numbers where player p is VOID (has no tiles with that number)
    // A tile is impossible if ANY of its numbers is in cantHave
    function canPlayerHold(p, t, knowledge) {
      if (knowledge.cantHave[p].has(t.left)) return false;
      if (knowledge.cantHave[p].has(t.right)) return false;
      return true;
    }

    // Generate a belief-consistent deal (Phase 1 upgrade)
    // Uses BeliefSampler when belief model available, else rejection + backtracking (no greedy fallback)
    function generateConsistentDeal(myHand, handSizes, knowledge, myIdx) {
      // If we have belief model + seedable RNG, use importance-weighted sampler
      if (belief && solverRng) {
        const sampler = new BeliefSampler(solverRng);
        belief.syncFromKnowledge(knowledge);
        const { deals } = sampler.sampleDeals(myHand, handSizes, belief, myIdx, 1);
        if (deals.length > 0) return deals[0];
        // Fall through to rejection sampling if sampler fails
      }

      const myIds = new Set(myHand.map(t => t.id));
      const pool = [];
      for (const t of ALL_TILES) {
        if (knowledge.played.has(t.id) || myIds.has(t.id)) continue;
        pool.push(t);
      }
      const rng = getRng();
      const players = [0, 1, 2, 3].filter(p => p !== myIdx);
      const eligible = {};
      for (const p of players) {
        eligible[p] = pool.filter(t => canPlayerHold(p, t, knowledge));
      }

      // Try rejection sampling first (unbiased, fast when constraints are loose)
      for (let attempt = 0; attempt < 200; attempt++) {
        const shuffled = [...pool];
        rng.shuffle(shuffled);
        const hands = [[], [], [], []];
        hands[myIdx] = [...myHand];
        let idx = 0, valid = true;
        for (const p of players) {
          for (let i = 0; i < handSizes[p]; i++) {
            if (idx >= shuffled.length) { valid = false; break; }
            hands[p].push(shuffled[idx++]);
          }
          if (!valid) break;
          for (const t of hands[p]) {
            if (!canPlayerHold(p, t, knowledge)) { valid = false; break; }
          }
          if (!valid) break;
        }
        if (valid) return hands;
      }

      // Fallback: randomized backtracking (handles tight constraints, no greedy)
      const hands = [[], [], [], []];
      hands[myIdx] = [...myHand];
      const assigned = new Set();
      const shuffledPlayers = [...players];
      rng.shuffle(shuffledPlayers);

      function backtrack(pIdx) {
        if (pIdx >= shuffledPlayers.length) return true;
        const p = shuffledPlayers[pIdx];
        const available = eligible[p].filter(t => !assigned.has(t.id));
        rng.shuffle(available);
        if (available.length < handSizes[p]) return false;
        const chosen = available.slice(0, handSizes[p]);
        for (const t of chosen) { hands[p].push(t); assigned.add(t.id); }
        if (backtrack(pIdx + 1)) return true;
        for (const t of chosen) { hands[p].pop(); assigned.delete(t.id); }
        for (let retry = 0; retry < 5; retry++) {
          rng.shuffle(available);
          const chosen2 = available.slice(0, handSizes[p]);
          for (const t of chosen2) { hands[p].push(t); assigned.add(t.id); }
          if (backtrack(pIdx + 1)) return true;
          for (const t of chosen2) { hands[p].pop(); assigned.delete(t.id); }
        }
        return false;
      }

      if (backtrack(0)) return hands;

      // Emergency: rejection with relaxed attempt count (still no greedy — correctness first)
      for (let attempt = 0; attempt < 500; attempt++) {
        const shuffled = [...pool];
        rng.shuffle(shuffled);
        const h2 = [[], [], [], []];
        h2[myIdx] = [...myHand];
        let idx = 0, valid = true;
        for (const p of players) {
          for (let i = 0; i < handSizes[p]; i++) {
            if (idx >= shuffled.length) { valid = false; break; }
            h2[p].push(shuffled[idx++]);
          }
          if (!valid) break;
          for (const t of h2[p]) {
            if (!canPlayerHold(p, t, knowledge)) { valid = false; break; }
          }
          if (!valid) break;
        }
        if (valid) return h2;
      }

      // Absolute last resort: return hands from backtracking even if incomplete
      // (better than greedy which violates constraints)
      return hands;
    }

    // Compute tile probabilities for a player using MC sampling
    function computeTileProbs(playerIdx, knowledge, handSizes, myHand, myIdx, numSamples = 500) {
      const probs = {};
      const counts = {};
      for (const t of ALL_TILES) {
        if (knowledge.played.has(t.id) || myHand.some(m => m.id === t.id)) continue;
        counts[t.id] = 0;
      }
      let validSamples = 0;
      for (let i = 0; i < numSamples; i++) {
        const deal = generateConsistentDeal(myHand, handSizes, knowledge, myIdx);
        validSamples++;
        for (const t of deal[playerIdx]) {
          if (counts[t.id] !== undefined) counts[t.id]++;
        }
      }
      if (validSamples === 0) return probs;
      for (const id of Object.keys(counts)) {
        probs[id] = counts[id] / validSamples;
      }
      return probs;
    }

    // Simulate a game from a given position using smartAI for all players
    // Returns { winnerTeam, points, type } with full scoring
    function simulateFromPosition(hands, board, lE, rE, nextPlayer, knowledge, initBLen) {
      const simHands = hands.map(h => [...h]);
      let bLen = initBLen != null ? initBLen : (board ? board.length : 0);
      let simLE = lE, simRE = rE;
      let cur = nextPlayer;
      let passCount = 0;
      const simKnowledge = knowledge.clone();
      let prevLE, prevRE; // track ends before last move for scoring

      for (let move = 0; move < 100; move++) {
        const decision = smartAI(simHands[cur], simLE, simRE, bLen, cur, simKnowledge, false);

        if (decision) {
          passCount = 0;
          const { tile, side: prefSide } = decision;
          let side = prefSide;
          if (!side) side = (tile.left === simLE || tile.right === simLE) ? 'left' : 'right';

          simHands[cur] = simHands[cur].filter(t => t.id !== tile.id);
          simKnowledge.recordPlay(cur, tile);

          prevLE = simLE; prevRE = simRE;
          if (bLen === 0) {
            simLE = tile.left; simRE = tile.right;
          } else if (side === 'left') {
            simLE = tile.left === simLE ? tile.right : tile.left;
          } else {
            simRE = tile.right === simRE ? tile.left : tile.right;
          }
          bLen++;

          if (simHands[cur].length === 0) {
            // Score the win
            const isD = tile.left === tile.right;
            const wasBoth = bLen > 1 && couldPlayBothEnds(tile, prevLE, prevRE);
            let pts = 1, type = 'normal';
            if (isD && wasBoth) { pts = 4; type = 'cruzada'; }
            else if (isD) { pts = 2; type = 'carroca'; }
            else if (wasBoth) { pts = 3; type = 'laelo'; }
            return { winnerTeam: cur % 2, points: pts, type };
          }
          cur = (cur + 1) % 4;
        } else {
          passCount++;
          simKnowledge.recordPass(cur, simLE, simRE);
          if (passCount >= 4) {
            // Pernambuco rule: individual lowest pip count wins (not team total)
            const pips = simHands.map((h, i) => ({ player: i, team: i % 2, pts: h.reduce((a, t) => a + t.left + t.right, 0) }));
            const minPips = Math.min(...pips.map(p => p.pts));
            const winners = pips.filter(p => p.pts === minPips);
            if (winners.length > 1 && winners.some(w => w.team === 0) && winners.some(w => w.team === 1)) {
              return { winnerTeam: -1, points: 0, type: 'tie' };
            }
            return { winnerTeam: winners[0].team, points: 1, type: 'blocked' };
          }
          cur = (cur + 1) % 4;
        }
      }
      return { winnerTeam: -1, points: 0, type: 'tie' };
    }

    // Run Monte Carlo evaluation for all playable tiles from current position
    // Returns rich results: E[pts], win%, block%, outcome distribution
    function monteCarloEval(snap, player, numSims = 80) {
      const hand = snap.hands[player];
      const lE = snap.leftEnd, rE = snap.rightEnd;
      const board = snap.board;
      const knowledge = snap.knowledge;

      const playable = hand.filter(t => canPlay(t, lE, rE, board.length));
      if (playable.length === 0) return [];
      if (playable.length === 1) {
        return [{ tile: playable[0], winRate: 0.5, expectedPoints: 0, sims: 0, side: null,
                  blockRate: 0, outcomes: { normal: 0, carroca: 0, laelo: 0, cruzada: 0, blocked: 0, tie: 0 },
                  variance: 0, stdDev: 0, ci95: 0, cvar5: 0 }];
      }

      // Check cache
      const cacheKey = [lE, rE, hand.map(t=>t.id).sort().join(','),
        snap.hands.map(h=>h.length).join(','),
        [...knowledge.played].sort().join(',')].join('::');
      if (mcCache.has(cacheKey)) return mcCache.get(cacheKey);

      const handSizes = snap.hands.map(h => h.length);
      const myTeam = player % 2;
      const results = [];

      for (const tile of playable) {
        const sides = [];
        if (board.length === 0) {
          sides.push(null);
        } else {
          if (tile.left === lE || tile.right === lE) sides.push('left');
          if ((tile.left === rE || tile.right === rE) && lE !== rE) sides.push('right');
          if (sides.length === 0 && (tile.left === rE || tile.right === rE)) sides.push('right');
        }

        let bestResult = null;

        for (const side of sides) {
          let wins = 0, totalPts = 0, sumPtsSq = 0, blocks = 0, ties = 0;
          const outcomes = { normal: 0, carroca: 0, laelo: 0, cruzada: 0, blocked: 0, tie: 0 };
          const ptsArray = []; // for CVaR computation

          let newLE = lE, newRE = rE;
          const newBLen = board.length + 1;
          if (board.length === 0) {
            newLE = tile.left; newRE = tile.right;
          } else if (side === 'left') {
            newLE = tile.left === lE ? tile.right : tile.left;
          } else {
            newRE = tile.right === rE ? tile.left : tile.right;
          }

          const newHandSizes = [...handSizes];
          newHandSizes[player]--;

          // Check instant win
          if (newHandSizes[player] === 0) {
            const isD = tile.left === tile.right;
            const wasBoth = board.length > 0 && couldPlayBothEnds(tile, lE, rE);
            let pts = 1, type = 'normal';
            if (isD && wasBoth) { pts = 4; type = 'cruzada'; }
            else if (isD) { pts = 2; type = 'carroca'; }
            else if (wasBoth) { pts = 3; type = 'laelo'; }
            bestResult = {
              tile, side,
              winRate: 1.0, expectedPoints: pts,
              blockRate: 0, outcomes: { normal: 0, carroca: 0, laelo: 0, cruzada: 0, blocked: 0, tie: 0, [type]: numSims },
              sims: numSims, variance: 0, stdDev: 0, ci95: 0, cvar5: pts
            };
            break;
          }

          const newKnowledge = knowledge.clone();
          newKnowledge.recordPlay(player, tile);
          const myNewHand = hand.filter(t => t.id !== tile.id);

          for (let sim = 0; sim < numSims; sim++) {
            const simHands = generateConsistentDeal(myNewHand, newHandSizes, newKnowledge, player);
            const result = simulateFromPosition(simHands, null, newLE, newRE, (player + 1) % 4, newKnowledge, newBLen);

            const signedPts = result.winnerTeam === myTeam ? result.points :
                              result.winnerTeam >= 0 ? -result.points : 0;

            if (result.winnerTeam === myTeam) wins++;
            totalPts += signedPts;
            sumPtsSq += signedPts * signedPts;
            ptsArray.push(signedPts);
            if (result.type === 'blocked' || result.type === 'tie') blocks++;
            if (result.type === 'tie') ties++;
            if (outcomes[result.type] !== undefined) outcomes[result.type]++;
          }

          const ep = numSims > 0 ? totalPts / numSims : 0;
          const wr = numSims > 0 ? wins / numSims : 0.5;
          const variance = numSims > 1 ? (sumPtsSq / numSims) - ep * ep : 0;
          const stdDev = Math.sqrt(Math.max(0, variance));
          const ci95 = numSims > 1 ? 1.96 * stdDev / Math.sqrt(numSims) : 0;

          // CVaR 5%: expected value of worst 5% of outcomes
          ptsArray.sort((a, b) => a - b);
          const cvarCount = Math.max(1, Math.ceil(numSims * 0.05));
          let cvarSum = 0;
          for (let i = 0; i < cvarCount; i++) cvarSum += ptsArray[i];
          const cvar5 = cvarSum / cvarCount;

          const thisResult = {
            tile, side,
            winRate: wr, expectedPoints: ep,
            blockRate: blocks / numSims,
            outcomes,
            sims: numSims,
            variance, stdDev, ci95, cvar5
          };

          if (!bestResult || ep > bestResult.expectedPoints) {
            bestResult = thisResult;
          }
        }

        if (bestResult) results.push(bestResult);
      }

      results.sort((a, b) => b.expectedPoints - a.expectedPoints || b.winRate - a.winRate);
      mcCache.set(cacheKey, results);
      return results;
    }

    // ========== STATE ==========

    let currentGame = null;
    let currentStep = 0;
    let autoPlayTimer = null;
    let autoPlaySpeed = 1500;
    let gameMode = 'watch'; // 'watch' | 'quiz' | 'play'
    let scoreMultiplier = 1; // dobrada: doubles after tied block
    let matchScore = [0, 0];  // team0 vs team1 score, first to 6 wins match
    let lastWinTeam = null;   // null = first game of match, 0 or 1 = team that won last
    let starterChoicePending = false; // true when waiting for user to pick starter
    let pendingHands = null; // pre-dealt hands shown during starter choice

    // ========== PLAY MODE STATE ==========
    let playWaiting = false;        // true when waiting for human to pick tile
    let playSidePick = null;        // {tile, canLeft, canRight} — waiting for side choice
    let playAITimer = null;         // setTimeout handle for AI move delays
    let playLastMove = null;        // { player, tile, side, pass } — last AI move announcement
    let playOpeningPending = null;  // { tile } — waiting for user to acknowledge opening
    let playDifficulty = { opponents: 0.75, partner: 0.75 };
    const DIFFICULTY_PRESETS = {
      beginner:     { value: 0.25, label: 'Beginner',     desc: 'Nearly random', color: '#22c55e' },
      intermediate: { value: 0.50, label: 'Intermediate',  desc: 'Decent, makes mistakes', color: '#eab308' },
      advanced:     { value: 0.75, label: 'Advanced',      desc: 'Strong, rare errors',  color: '#f97316' },
      expert:       { value: 1.00, label: 'Expert',        desc: 'Always optimal',   color: '#ef4444' }
    };
    let playAIDelay = 1.5; // seconds per AI move (user-configurable)
    let playShowingDiffPicker = false;
    let playHint = null; // { tileId, side, reasons } — AI recommendation shown on request
    // Live game mutable state (play mode only)
    let liveHands = null, liveBoard = null, liveLeftEnd = null, liveRightEnd = null;
    let liveCurrentPlayer = null, livePassCount = 0, liveMoveNum = 0;
    let liveKnowledge = null, liveNotebook = null;

    // ========== MATCH EQUITY TABLE (3D with dobrada) ==========
    // ME3D[s1][s2][dobIdx] = P(team1 wins match | scores s1 vs s2, dobrada multiplier)
    const MATCH_TARGET = 6;
    const POINT_DIST = [
      { pts: 1, prob: 0.70 },  // normal + blocked
      { pts: 2, prob: 0.16 },  // carroca
      { pts: 3, prob: 0.10 },  // la-e-lo
      { pts: 4, prob: 0.04 }   // cruzada
    ];
    const DOB_VALUES = [1, 2, 4, 8]; // dobrada multiplier levels

    const ME3D = (() => {
      const T = MATCH_TARGET;
      const S = T + 5;
      // me[s1][s2][dobIdx]
      const me = Array.from({length: S}, () =>
        Array.from({length: S}, () => new Float64Array(DOB_VALUES.length))
      );
      // Base cases
      for (let d = 0; d < DOB_VALUES.length; d++) {
        for (let s2 = 0; s2 < S; s2++) {
          for (let s1 = T; s1 < S; s1++) {
            me[s1][s2][d] = s2 >= T ? 0.5 : 1.0;
          }
        }
        for (let s1 = 0; s1 < T; s1++) {
          for (let s2 = T; s2 < S; s2++) {
            me[s1][s2][d] = 0.0;
          }
        }
      }
      // Fill bottom-up
      const TIE_PROB = 0.03; // ~3% of rounds are ties
      // Iterate d from highest to lowest so tie term references already-computed values
      for (let s1 = T - 1; s1 >= 0; s1--) {
        for (let s2 = T - 1; s2 >= 0; s2--) {
          for (let d = DOB_VALUES.length - 1; d >= 0; d--) {
            const dob = DOB_VALUES[d];
            let decisive = 0;
            for (const { pts: basePts, prob } of POINT_DIST) {
              const pts = basePts * dob;
              const s1w = Math.min(s1 + pts, T + 4);
              const s2w = Math.min(s2 + pts, T + 4);
              decisive += 0.5 * prob * me[s1w][s2][0] + 0.5 * prob * me[s1][s2w][0];
            }
            const nextDobIdx = Math.min(d + 1, DOB_VALUES.length - 1);
            if (d === DOB_VALUES.length - 1) {
              // Max dobrada: tie maps to self → solve: val = decisive*(1-t) + t*val
              // → val*(1-t) = decisive*(1-t) → val = decisive
              me[s1][s2][d] = decisive;
            } else {
              me[s1][s2][d] = decisive * (1 - TIE_PROB) + TIE_PROB * me[s1][s2][nextDobIdx];
            }
          }
        }
      }
      return me;
    })();

    // Backward-compat 2D ME wrapper (dob=1)
    const ME = (() => {
      const T = MATCH_TARGET;
      const S = T + 5;
      const tbl = Array.from({length: S}, () => new Float64Array(S));
      for (let s1 = 0; s1 < S; s1++)
        for (let s2 = 0; s2 < S; s2++)
          tbl[s1][s2] = ME3D[s1][s2][0];
      return tbl;
    })();

    function getMatchEquity(s1, s2) {
      const c1 = Math.min(s1, MATCH_TARGET + 4);
      const c2 = Math.min(s2, MATCH_TARGET + 4);
      return ME[c1][c2];
    }

    function getMatchEquity3D(s1, s2, dobMultiplier) {
      const dIdx = DOB_VALUES.indexOf(dobMultiplier);
      const d = dIdx >= 0 ? dIdx : 0;
      return ME3D[Math.min(s1, MATCH_TARGET + 4)][Math.min(s2, MATCH_TARGET + 4)][d];
    }

    // Convert round E[pts] to match equity change (dobrada-aware)
    function roundToMatchEquity(epts, myTeamScore, oppTeamScore, dob) {
      const d = dob || scoreMultiplier || 1;
      const currentME = getMatchEquity3D(myTeamScore, oppTeamScore, d);
      // Improved: weight by actual point distribution × dobrada
      let meAfter = 0;
      for (const { pts: basePts, prob } of POINT_DIST) {
        const pts = basePts * d;
        if (epts >= 0) {
          // Positive: probability of us winning with these pts
          const frac = prob; // weight this outcome type
          meAfter += frac * getMatchEquity3D(
            Math.min(myTeamScore + pts, MATCH_TARGET + 4), oppTeamScore, 1);
        } else {
          meAfter += prob * getMatchEquity3D(
            myTeamScore, Math.min(oppTeamScore + pts, MATCH_TARGET + 4), 1);
        }
      }
      // Scale by magnitude of epts (epts is signed expected pts)
      const mePerPt = getMatchEquity3D(Math.min(myTeamScore + d, MATCH_TARGET + 4), oppTeamScore, 1) - currentME;
      return epts * mePerPt;
    }

    let rightPanelTab = 'reasoning'; // 'reasoning' | 'probability' | 'stats' | 'guide'
    let deepAnalysis = false;        // Monte Carlo toggle
    let mcResults = null;            // cached MC results for current step
    let mcRunning = false;           // is MC currently computing?

    // Quiz state
    let quizWaiting = false;       // Are we waiting for user to pick a tile?
    let quizSidePick = null;       // {tile, canLeft, canRight} — waiting for side choice
    let quizResult = null;         // { userTile, userSide, aiTile, aiSide, grade, scoreDiff }
    let quizShowingResult = false;

    // Stats tracking (persists across games in session)
    let stats = {
      totalMoves: 0,
      optimalMoves: 0,
      goodMoves: 0,    // inaccuracy (small equity loss)
      okMoves: 0,      // mistake (medium equity loss)
      badMoves: 0,     // blunder (large equity loss)
      games: 0,
      totalEquityLoss: 0,  // cumulative E[pts] equity loss
      history: []  // last 30 decisions
    };

    // Load stats from localStorage
    try {
      const saved = localStorage.getItem('domino-trainer-stats');
      if (saved) stats = JSON.parse(saved);
    } catch(e) {}

    function saveStats() {
      try { localStorage.setItem('domino-trainer-stats', JSON.stringify(stats)); } catch(e) {}
    }

    // ========== QUIZ LOGIC ==========

    function isQuizTurn() {
      if (gameMode !== 'quiz' || !currentGame) return false;
      const snap = currentGame.snapshots[currentStep];
      // We quiz on P0's turns (the next move to be revealed)
      // The snapshot at currentStep shows the state BEFORE this move
      // Actually, we need to check the NEXT snapshot's player
      const nextStep = currentStep + 1;
      if (nextStep >= currentGame.snapshots.length) return false;
      const nextSnap = currentGame.snapshots[nextStep];
      return nextSnap.player === 0;
    }

    function startQuiz() {
      quizWaiting = true;
      quizResult = null;
      quizShowingResult = false;
      quizSidePick = null;
      render();
    }

    function quizPickTile(tileId) {
      if (!quizWaiting || quizSidePick) return;
      const snap = currentGame.snapshots[currentStep];
      const tile = snap.hands[0].find(t => t.id === tileId);
      if (!tile) return;

      // Check if this tile can play on both sides
      const canLeft = canPlayOnSide(tile, snap.leftEnd);
      const canRight = canPlayOnSide(tile, snap.rightEnd);

      if (snap.leftEnd === snap.rightEnd) {
        // Both ends same number, only one effective side
        if (canLeft) {
          finishQuizPick(tile, 'left');
        } else {
          // tile can't play — user picked wrong
          finishQuizPick(tile, null);
        }
      } else if (canLeft && canRight) {
        // Tile can play both sides — ask which
        quizSidePick = { tile, canLeft, canRight };
        render();
      } else if (canLeft) {
        finishQuizPick(tile, 'left');
      } else if (canRight) {
        finishQuizPick(tile, 'right');
      }
    }

    function quizPickSide(side) {
      if (!quizSidePick) return;
      const tile = quizSidePick.tile;
      quizSidePick = null; // clear BEFORE render triggered by finishQuizPick
      finishQuizPick(tile, side);
    }

    function quizPass() {
      if (!quizWaiting) return;
      // Passing is always correct when you have no playable tiles — just advance
      quizWaiting = false;
      stepForward();
    }

    function finishQuizPick(userTile, userSide) {
      const nextSnap = currentGame.snapshots[currentStep + 1];
      const snap = currentGame.snapshots[currentStep];
      const aiTile = nextSnap.tile;
      const aiSide = nextSnap.side;
      const aiScore = nextSnap.score || 0;

      // Find user's tile score and reasons from allOptions
      const allOpts = nextSnap.allOptions || [];
      const userOpt = allOpts.find(o => o.tile.id === userTile.id && (o.side === userSide || !userSide));
      const aiOpt = allOpts.find(o => o.tile.id === aiTile.id && o.side === aiSide);
      const userScore = userOpt ? userOpt.score : -50;
      const scoreDiff = aiScore - userScore;

      // Run Monte Carlo for equity loss computation
      let quizMC = null;
      if (deepAnalysis) {
        quizMC = monteCarloEval(snap, 0, puzzleMode ? MC_SIMS_PUZZLE : MC_SIMS_QUIZ);
      }

      // Compute equity loss from MC (primary) or heuristic (fallback)
      let equityLoss = 0;
      let equityLossSource = 'heuristic';
      const canP = canPlay(userTile, snap.leftEnd, snap.rightEnd, snap.board.length);

      if (!canP) {
        equityLoss = 99; // invalid play sentinel
      } else if (quizMC && quizMC.length > 0) {
        // MC-based equity loss: difference in E[pts] between best and user's choice
        const mcBest = quizMC[0]; // sorted by expectedPoints
        const mcUser = quizMC.find(m => m.tile.id === userTile.id);
        if (mcBest && mcUser) {
          equityLoss = mcBest.expectedPoints - mcUser.expectedPoints;
          equityLossSource = 'mc';
        } else if (mcBest) {
          equityLoss = Math.max(0, mcBest.expectedPoints); // can't find user tile in MC → big miss
          equityLossSource = 'mc';
        }
      } else {
        // Heuristic fallback: normalize score diff to E[pts] scale (~0-2 range)
        equityLoss = Math.max(0, scoreDiff) / 25; // rough mapping: 25 heuristic pts ≈ 1 E[pts]
      }

      // Grade based on equity loss (in expected points)
      let grade;
      if (!canP) {
        grade = 'bad';
      } else if (userTile.id === aiTile.id && userSide === aiSide) {
        grade = 'perfect';
      } else if (userTile.id === aiTile.id) {
        grade = equityLoss < 0.02 ? 'perfect' : 'good'; // right tile, suboptimal side
      } else if (equityLoss < 0.02) {
        grade = 'perfect'; // truly negligible — within MC noise
      } else if (equityLoss < 0.15) {
        grade = 'good';    // inaccuracy
      } else if (equityLoss < 0.40) {
        grade = 'ok';      // mistake
      } else {
        grade = 'bad';     // blunder
      }

      // Build detailed explanation context
      const knowledge = snap.knowledge;
      const hand = snap.hands[0];
      const lE = snap.leftEnd, rE = snap.rightEnd;

      // Compute what ends each choice creates
      const aiNewEnds = computeNewEnds(aiTile, aiSide, lE, rE);
      const userNewEnds = userSide ? computeNewEnds(userTile, userSide, lE, rE) : null;

      // Build detailed comparison
      const detail = buildDetailedExplanation({
        userTile, userSide, userScore, userReasons: userOpt ? userOpt.reasons : [],
        aiTile, aiSide, aiScore, aiReasons: aiOpt ? aiOpt.reasons : nextSnap.reasons || [],
        aiNewEnds, userNewEnds,
        hand, knowledge, lE, rE, grade, scoreDiff, allOptions: allOpts
      });

      // Match equity context
      const meNow = getMatchEquity(matchScore[0], matchScore[1]);
      const meShift = equityLossSource === 'mc' ? roundToMatchEquity(equityLoss, matchScore[0], matchScore[1]) : null;

      // Missed deductions from Coach notebook
      let missedDeductions = [];
      if (grade !== 'perfect' && snap.notebook) {
        try {
          missedDeductions = snap.notebook.getMissedDeductions(userTile, userSide, aiTile, aiSide, snap);
        } catch (e) { console.warn('getMissedDeductions error:', e); }
      }

      quizResult = {
        userTile, userSide, aiTile, aiSide, grade, scoreDiff, userScore, aiScore,
        allOptions: allOpts, detail, aiNewEnds, userNewEnds,
        userReasons: userOpt ? userOpt.reasons : [],
        aiReasons: aiOpt ? aiOpt.reasons : nextSnap.reasons || [],
        mcResults: quizMC,
        equityLoss: Math.round(equityLoss * 1000) / 1000,
        equityLossSource,
        matchEquity: meNow,
        matchEquityShift: meShift,
        missedDeductions
      };
      quizWaiting = false;
      quizShowingResult = true;

      // Track stats
      stats.totalMoves++;
      if (grade === 'perfect') stats.optimalMoves++;
      else if (grade === 'good') stats.goodMoves++;
      else if (grade === 'ok') stats.okMoves++;
      else stats.badMoves++;
      if (typeof stats.totalEquityLoss !== 'number') stats.totalEquityLoss = 0;
      stats.totalEquityLoss += equityLoss < 90 ? equityLoss : 0; // skip invalid-play sentinel
      stats.history.push({
        grade, scoreDiff, equityLoss: Math.round(equityLoss * 1000) / 1000,
        userTile: `${userTile.left}-${userTile.right}`,
        aiTile: `${aiTile.left}-${aiTile.right}`
      });
      if (stats.history.length > 30) stats.history.shift();
      saveStats();

      // Save puzzle completion (best grade)
      if (puzzleMode && puzzleDef) {
        const prev = puzzleCompletion[puzzleDef.id];
        const gradeRank = { perfect: 4, good: 3, ok: 2, bad: 1 };
        if (!prev || (gradeRank[grade] || 0) > (gradeRank[prev] || 0)) {
          puzzleCompletion[puzzleDef.id] = grade;
          savePuzzleCompletion();
        }
      }

      render();
    }

    function computeNewEnds(tile, side, lE, rE) {
      if (!side) return { newLeft: lE, newRight: rE };
      if (side === 'left') {
        const newL = tile.left === lE ? tile.right : tile.left;
        return { newLeft: newL, newRight: rE };
      } else {
        const newR = tile.right === rE ? tile.left : tile.right;
        return { newLeft: lE, newRight: newR };
      }
    }

    function buildDetailedExplanation(ctx) {
      const { userTile, userSide, userScore, userReasons, aiTile, aiSide, aiScore, aiReasons,
              aiNewEnds, userNewEnds, hand, knowledge, lE, rE, grade, scoreDiff, allOptions } = ctx;
      const lines = [];
      const pNames = PLAYER_NAMES_FULL;

      if (grade === 'perfect') {
        if (userTile.id === aiTile.id) {
          lines.push({ type: 'success', text: `You picked the optimal play! [${userTile.left}|${userTile.right}] on ${userSide || aiSide}. Well done.` });
        } else {
          lines.push({ type: 'success', text: `Great pick! [${userTile.left}|${userTile.right}] on ${userSide} is essentially equal to [${aiTile.left}|${aiTile.right}] (negligible difference).` });
        }
        if (aiReasons.length > 0) {
          lines.push({ type: 'info', text: `Why it's best: ${aiReasons.join('. ')}` });
        }
        return lines;
      }

      // === HEADER: What AI chose and why ===
      lines.push({ type: 'header', text: `Better play: [${aiTile.left}|${aiTile.right}] on ${aiSide}` });

      // AI's reasons
      if (aiReasons.length > 0) {
        for (const r of aiReasons) {
          lines.push({ type: 'ai-reason', text: r });
        }
      }

      // === What you chose and its shortcomings ===
      lines.push({ type: 'header2', text: `Your pick: [${userTile.left}|${userTile.right}]${userSide ? ' on ' + userSide : ''}` });
      if (userReasons.length > 0) {
        for (const r of userReasons) {
          lines.push({ type: 'user-reason', text: r });
        }
      }

      // === DETAILED COMPARISON ===

      // 1. Board ends comparison
      if (aiNewEnds && userNewEnds) {
        const aiEnds = `${aiNewEnds.newLeft}/${aiNewEnds.newRight}`;
        const userEnds = `${userNewEnds.newLeft}/${userNewEnds.newRight}`;
        if (aiEnds !== userEnds) {
          // Count how many tiles in remaining hand match each set of ends
          const remainingHand = hand.filter(t => t.id !== aiTile.id && t.id !== userTile.id);
          const aiMyFollow = hand.filter(t => t.id !== aiTile.id &&
            (t.left === aiNewEnds.newLeft || t.right === aiNewEnds.newLeft || t.left === aiNewEnds.newRight || t.right === aiNewEnds.newRight)).length;
          const userMyFollow = hand.filter(t => t.id !== userTile.id &&
            (t.left === userNewEnds.newLeft || t.right === userNewEnds.newLeft || t.left === userNewEnds.newRight || t.right === userNewEnds.newRight)).length;

          if (aiMyFollow > userMyFollow) {
            lines.push({ type: 'compare',
              text: `Board ends: AI leaves ${aiEnds} (you have ${aiMyFollow} follow-up tiles) vs your pick leaves ${userEnds} (only ${userMyFollow} follow-ups). More follow-ups = you stay in control.`
            });
          } else if (aiMyFollow < userMyFollow) {
            lines.push({ type: 'compare',
              text: `Board ends: Your pick leaves ${userEnds} (${userMyFollow} follow-ups) vs AI's ${aiEnds} (${aiMyFollow}). Your ends are actually better for suit control, but other factors matter more here.`
            });
          }
        }
      }

      // 2. Opponent analysis from passes
      for (const oppIdx of [1, 3]) {
        const dead = knowledge ? knowledge.deadNumbers(oppIdx) : [];
        if (dead.length === 0) continue;

        if (aiNewEnds) {
          const aiBlocksOpp = dead.includes(aiNewEnds.newLeft) && dead.includes(aiNewEnds.newRight);
          const userBlocksOpp = userNewEnds && dead.includes(userNewEnds.newLeft) && dead.includes(userNewEnds.newRight);

          if (aiBlocksOpp && !userBlocksOpp) {
            lines.push({ type: 'opponent',
              text: `${pNames[oppIdx]} passed and can't have {${dead.join(', ')}}. The AI's play leaves ends ${aiNewEnds.newLeft}/${aiNewEnds.newRight} which BLOCKS them completely — they'll pass again. Your pick doesn't achieve this.`
            });
          }
        }
      }

      // 3. Partner analysis
      if (knowledge) {
        const partnerDead = knowledge.deadNumbers(2);
        const partnerStrength = knowledge.inferStrength(2);
        const partnerPlays = knowledge.playsBy[2] || [];

        if (aiNewEnds && userNewEnds) {
          // Does AI's play help partner more?
          const aiPartnerHelp = !partnerDead.includes(aiNewEnds.newLeft) || !partnerDead.includes(aiNewEnds.newRight);
          const userPartnerHurt = partnerDead.includes(userNewEnds.newLeft) && partnerDead.includes(userNewEnds.newRight);

          if (userPartnerHurt && aiPartnerHelp) {
            lines.push({ type: 'partner',
              text: `Partner can't have {${partnerDead.join(', ')}}. Your pick leaves ends ${userNewEnds.newLeft}/${userNewEnds.newRight} which blocks your own partner! The AI avoids this.`
            });
          }

          // Partner suit affinity — only if tiles with that number are still out there
          const strongSuits = partnerStrength.map((v, i) => ({ suit: i, count: v })).filter(x => x.count >= 2).sort((a, b) => b.count - a.count);
          if (strongSuits.length > 0 && knowledge) {
            const topSuit = strongSuits[0].suit;
            const remaining = knowledge.remainingWithNumber(topSuit);
            const weHold = hand.filter(t => t.left === topSuit || t.right === topSuit).length;
            const othersCouldHave = remaining - weHold;
            if (othersCouldHave > 0 && !partnerDead.includes(topSuit)) {
              const aiHasPartnerSuit = aiNewEnds.newLeft === topSuit || aiNewEnds.newRight === topSuit;
              const userHasPartnerSuit = userNewEnds.newLeft === topSuit || userNewEnds.newRight === topSuit;
              if (aiHasPartnerSuit && !userHasPartnerSuit) {
                lines.push({ type: 'partner',
                  text: `Partner played ${strongSuits[0].count} tiles with ${topSuit}s and ${othersCouldHave} tiles with ${topSuit} are still unaccounted for (not in your hand or played). AI leaves a ${topSuit}-end so partner can likely play. Your pick doesn't.`
                });
              }
            }
          }
        }

        // Partner close to winning
        const estPartnerHand = Math.max(0, 6 - partnerPlays.length);
        if (estPartnerHand <= 2 && estPartnerHand > 0) {
          lines.push({ type: 'partner',
            text: `Partner has ~${estPartnerHand} tile${estPartnerHand > 1 ? 's' : ''} left — they're close to winning! Prioritize leaving ends they can play, even at your own expense.`
          });
        }
      }

      // 4. Double management
      if (aiTile.left === aiTile.right && userTile.left !== userTile.right) {
        const aiDblNum = aiTile.left;
        const support = hand.filter(t => t.id !== aiTile.id && (t.left === aiDblNum || t.right === aiDblNum)).length;
        if (support === 0) {
          lines.push({ type: 'strategy',
            text: `The AI plays the isolated double [${aiDblNum}|${aiDblNum}] now while it can. Doubles only match one number and become harder to play later. If you hold it and the board moves away from ${aiDblNum}s, you're stuck with it.`
          });
        } else {
          lines.push({ type: 'strategy',
            text: `The AI clears the double [${aiDblNum}|${aiDblNum}] early — doubles are inflexible (only connect to one number). Better to play them when the opportunity is there.`
          });
        }
      }

      // 5. Heavy tile dumping
      if (aiTile.left + aiTile.right > userTile.left + userTile.right + 3) {
        lines.push({ type: 'strategy',
          text: `The AI dumps the heavier tile (${aiTile.left + aiTile.right} pips vs your ${userTile.left + userTile.right} pips). If the game blocks, your team's total pips decide who loses. Getting rid of heavy tiles early is safer.`
        });
      }

      // 6. Scarcity warning
      if (knowledge && aiNewEnds) {
        const aiLeftRem = knowledge.remainingWithNumber(aiNewEnds.newLeft);
        const aiRightRem = knowledge.remainingWithNumber(aiNewEnds.newRight);
        if (userNewEnds) {
          const userLeftRem = knowledge.remainingWithNumber(userNewEnds.newLeft);
          const userRightRem = knowledge.remainingWithNumber(userNewEnds.newRight);
          if ((userLeftRem <= 1 || userRightRem <= 1) && aiLeftRem > 1 && aiRightRem > 1) {
            const scarce = userLeftRem <= 1 ? userNewEnds.newLeft : userNewEnds.newRight;
            lines.push({ type: 'warning',
              text: `Your pick creates a near-dead end: only ${knowledge.remainingWithNumber(scarce)} tile(s) left with ${scarce}. The board could stall. The AI avoids scarce numbers as ends.`
            });
          }
        }
      }

      // If no detailed lines beyond header, add a generic one
      if (lines.filter(l => !l.type.includes('header') && l.type !== 'user-reason').length === 0) {
        lines.push({ type: 'info', text: `The AI's choice is stronger due to a combination of suit control, blocking opponents, and/or supporting your partner.` });
      }

      return lines;
    }

    function renderOutcomeOverlay(snap, pTeams) {

    function renderPlayerAreaP0(snap, names, teams, colors, shouldQuiz) {

    // Convert raw AI score to human-readable quality label
    function scoreToQuality(score, allScores) {
      if (allScores.length <= 1) return { label: 'Only option', cls: 'text-slate-400' };
      const best = allScores[0];
      const worst = allScores[allScores.length - 1];
      const range = best - worst;
      if (range === 0) return { label: 'Equal', cls: 'text-slate-400' };
      const pct = range > 0 ? ((score - worst) / range * 100) : 50;
      if (pct >= 90) return { label: 'Best', cls: 'text-emerald-400' };
      if (pct >= 65) return { label: 'Good', cls: 'text-yellow-400' };
      if (pct >= 35) return { label: 'Okay', cls: 'text-orange-400' };
      return { label: 'Weak', cls: 'text-red-400' };
    }

    // Normalize raw heuristic score to 0-100 scale relative to options
    function scorePct(score, allScores) {
      if (allScores.length <= 1) return 100;
      const best = allScores[0], worst = allScores[allScores.length - 1];
      const range = best - worst;
      return range > 0 ? Math.round((score - worst) / range * 100) : 100;
    }

    // Color for a 0-100 score
    function scoreColor(pct) {
      if (pct >= 80) return '#22c55e';
      if (pct >= 50) return '#eab308';
      if (pct >= 25) return '#f97316';
      return '#ef4444';
    }

          <span class="text-xs text-slate-600 ml-auto">Match: ${matchScore[0]}-${matchScore[1]} | ME: ${(getMatchEquity(matchScore[0], matchScore[1]) * 100).toFixed(0)}%</span>

                  ${tileLoss !== null && tileLoss > 0.01 ? `<span class="font-mono text-red-400 w-10 text-right">-${tileLoss.toFixed(2)}</span>` : tileLoss !== null ? `<span class="font-mono text-emerald-400 w-10 text-right">BEST</span>` : ''}

          ${r.mcResults[0].tile.id !== r.aiTile.id ? '<div class="text-xs text-yellow-400">MC disagrees with heuristic — simulation sees deeper!</div>' : '<div class="text-xs text-emerald-400">MC confirms the heuristic choice</div>'}

        ${(() => {

            const bestMC = r.mcResults[0];

    function renderSidePlayer(playerIdx, snap, names, teams, colors) {

      const justPlayed = snap.action === 'play' && snap.player === playerIdx;

      const highlight = autoPlayed || justPlayed;
      const revealHand = !!snap.outcome;
      const pips = hand.reduce((s, t) => s + t.left + t.right, 0);

      const borderCls = justPassed ? 'border-red-500' : highlight ? 'border-yellow-500' : isActive ? 'active-turn border-emerald-500' : 'border-slate-700';

        : justPassed ? `<div class="text-xs text-red-400 text-center mt-1 font-bold animate-pulse">PASSED!</div>`
        : justPlayed ? `<div class="text-xs text-yellow-400 text-center mt-1 font-bold">PLAYED</div>`
        : isActive ? '<div class="text-xs text-emerald-400 text-center mt-1 font-bold">Playing</div>' : '';

      return `

          </div>
          ${statusText}

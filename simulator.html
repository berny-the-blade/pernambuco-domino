          hBits[p] = mask;
        }
        const initHash = _egHashInit(hBits, lE, finalRE, bLen, nextPlayer, 0);

        const tt = new Map();
        const deadline = Date.now() + 10000;
        let prodVal, bruteVal;
        try {
          prodVal = _endgameMinimaxBit(hBits, lE, finalRE, bLen, nextPlayer, 0, myTeam, -Infinity, Infinity, deadline, tt, initHash);
        } catch (e) { continue; }

        totalNodes += tt.size;

        // For ≤12 tiles: compare against brute-force ground truth
        // For >12 tiles: self-consistency check only (brute-force too slow)
        if (totalTiles <= 12) {
          try {
            bruteVal = _bruteForceMinimax(hands, lE, finalRE, bLen, nextPlayer, 0, myTeam);
          } catch (e) { continue; }

          if (Math.abs(prodVal - bruteVal) < EPS) {
            pass++;
          } else {
            fail++;
            if (failures.length < 10) {
              failures.push({
                case: c, tiles: totalTiles,
                hands: hands.map(h => h.map(t => t.id)),
                lE, rE: finalRE, bLen, nextPlayer, myTeam,
                prodVal, bruteVal, diff: Math.abs(prodVal - bruteVal)
              });
            }
          }
        } else {
          // Self-consistency: solve twice with fresh TT, values must match
          const tt2 = new Map();
          const hash2 = _egHashInit(hBits, lE, finalRE, bLen, nextPlayer, 0);
          const val2 = _endgameMinimaxBit(hBits, lE, finalRE, bLen, nextPlayer, 0, myTeam, -Infinity, Infinity, deadline, tt2, hash2);
          if (Math.abs(prodVal - val2) < EPS) { pass++; }
          else {
            fail++;
            if (failures.length < 10) {
              failures.push({
                case: c, tiles: totalTiles,
                hands: hands.map(h => h.map(t => t.id)),
                lE, rE: finalRE, bLen, nextPlayer, myTeam,
                prodVal, bruteVal: val2, diff: Math.abs(prodVal - val2)
              });
            }
          }
        }

        // TT collision check (10% of cases, ≤12 tiles only)
        if (totalTiles <= 12 && tt.size > 0 && rng.randomInt(10) === 0) {
          const tt2 = new Map();
          const hash2 = _egHashInit(hBits, lE, finalRE, bLen, nextPlayer, 0);
          const val2 = _endgameMinimaxBit(hBits, lE, finalRE, bLen, nextPlayer, 0, myTeam, -Infinity, Infinity, deadline, tt2, hash2);
          if (Math.abs(prodVal - val2) > EPS) collisions++;
        }
      }

      matchScore[0] = savedMatchScore[0]; matchScore[1] = savedMatchScore[1];
      scoreMultiplier = savedMultiplier;

      const result = { total: pass + fail, pass, fail, collisions,
        avgTTSize: Math.round(totalNodes / Math.max(1, pass + fail)),
        failures: failures.slice(0, 5) };

      console.log(`%cEndgame Bitmask Solver Verification`, 'font-weight:bold; font-size:14px;');
      console.log(`Cases: ${result.total} (4-16 tiles) | Pass: ${pass} | Fail: ${fail} | TT collisions: ${collisions}`);
      console.log(`Avg TT entries/case: ${result.avgTTSize}`);
      if (fail > 0) {
        console.log(`%cFAILURES:`, 'color:red; font-weight:bold');
        for (const f of result.failures) {
          console.log(`  Case ${f.case} (${f.tiles} tiles): prod=${f.prodVal.toFixed(6)} brute=${f.bruteVal.toFixed(6)} diff=${f.diff.toFixed(9)}`);
          console.log(`    hands=${JSON.stringify(f.hands)} lE=${f.lE} rE=${f.rE} bLen=${f.bLen} next=${f.nextPlayer}`);
        }
      } else {
        console.log(`%cALL PASS ✓`, 'color:green; font-weight:bold');
      }
      return result;
    }

    // Run Monte Carlo evaluation for all playable tiles from current position
    // Returns rich results: E[pts], win%, block%, outcome distribution
    function monteCarloEval(snap, player, numSims = 80) {
      const hand = snap.hands[player];
      const lE = snap.leftEnd, rE = snap.rightEnd;
      const board = snap.board;
      const knowledge = snap.knowledge;

      const playable = hand.filter(t => canPlay(t, lE, rE, board.length));
      if (playable.length === 0) return [];
      if (playable.length === 1) {
        return [{ tile: playable[0], winRate: 0.5, expectedPoints: 0, sims: 0, side: null,
                  blockRate: 0, outcomes: { normal: 0, carroca: 0, laelo: 0, cruzada: 0, blocked: 0, tie: 0 },
                  variance: 0, stdDev: 0, ci95: 0, cvar5: 0 }];
      }

      // Endgame solver: return exact minimax values instead of MC sampling
      const _egMcTotal = snap.hands.reduce((s, h) => s + h.length, 0);
      if (_egMcTotal <= ENDGAME_THRESHOLD) {
        const handSizes = snap.hands.map(h => h.length);
        try {
          const egRes = endgameSolve(hand, lE, rE, board.length, player, knowledge, handSizes);
          if (egRes.length > 0) return egRes;
        } catch(e) { /* fall through to standard MC */ }
      }

      // Check cache — BitSet-based compact keys
      const playedBS = new BitSet();
      for (const id of knowledge.played) playedBS.set(TILE_INDEX[id]);
      const handBS = handBits(hand);
      const cantBS = cantHaveBits(knowledge);
      const playsByKey = knowledge.playsBy.map(a => a.length).join(',');
      const cacheKey = `${lE}:${rE}:${handBS}:${playedBS}:${cantBS}:${playsByKey}`;
      if (mcCache.has(cacheKey)) return mcCache.get(cacheKey);

      const handSizes = snap.hands.map(h => h.length);
      const myTeam = player % 2;
      const useME = true; // Always use match equity for optimal play

      // Build all tile×side options with pre-computed state
      const options = [];
      for (const tile of playable) {
        const sides = [];
        if (board.length === 0) {
          sides.push(null);
        } else {
          if (tile.left === lE || tile.right === lE) sides.push('left');
          if ((tile.left === rE || tile.right === rE) && lE !== rE) sides.push('right');
          if (sides.length === 0 && (tile.left === rE || tile.right === rE)) sides.push('right');
        }
        for (const side of sides) {
          let newLE = lE, newRE = rE;
          if (board.length === 0) { newLE = tile.left; newRE = tile.right; }
          else if (side === 'left') { newLE = tile.left === lE ? tile.right : tile.left; }
          else { newRE = tile.right === rE ? tile.left : tile.right; }

          const newHandSizes = [...handSizes];
          newHandSizes[player]--;

          // Check instant win
          if (newHandSizes[player] === 0) {
            const w = scoreWin(tile, lE, rE, board.length + 1);
            const wt = w.type.toLowerCase();
            options.push({
              tile, side, instantWin: true,
              winRate: 1.0, expectedPoints: w.pts,
              blockRate: 0, outcomes: { normal: 0, carroca: 0, laelo: 0, cruzada: 0, blocked: 0, tie: 0, [wt]: numSims },
              sims: numSims, variance: 0, stdDev: 0, ci95: 0, cvar5: w.pts
            });
            continue;
          }

          const newKnowledge = knowledge.clone();
          newKnowledge.recordPlay(player, tile);
          const myNewHand = hand.filter(t => t.id !== tile.id);
          options.push({
            tile, side, instantWin: false,
            newLE, newRE, newBLen: board.length + 1, newHandSizes, newKnowledge, myNewHand,
            wins: 0, totalPts: 0, sumPtsSq: 0, blocks: 0, sims: 0,
            outcomes: { normal: 0, carroca: 0, laelo: 0, cruzada: 0, blocked: 0, tie: 0 },
            ptsArray: []
          });
        }
      }

      const simOptions = options.filter(o => !o.instantWin);

      // Adaptive MC: run in batches, check early stop every 20 sims
      const BATCH = 20;
      const MIN_SIMS = 40; // minimum before checking early stop
      for (let done = 0; done < numSims; done += BATCH) {
        const batchSize = Math.min(BATCH, numSims - done);
        for (const o of simOptions) {
          for (let b = 0; b < batchSize; b++) {
            const simHands = generateConsistentDeal(o.myNewHand, o.newHandSizes, o.newKnowledge, player);
            let signedPts;
            if (USE_NN_LEAF_VALUE && _nnModel) {
              // NN leaf value: encode from next player's perspective
              const nextP = (player + 1) % 4;
              const t0 = performance.now();
              const nnState = _nnEncodeState(simHands[nextP], o.newLE, o.newRE, o.newBLen, nextP, o.newKnowledge);
              const value = _nnForwardValue(nnState);
              _nnLeafStats.calls++;
              _nnLeafStats.totalMs += performance.now() - t0;
              // NN value is from nextP's team perspective; convert to myTeam and scale to ×4 (match existing scale)
              const meReward = (nextP % 2 === myTeam) ? value : -value;
              signedPts = meReward * 4;
              if (meReward > 0) o.wins++;
            } else {
              const result = simulateFromPosition(simHands, null, o.newLE, o.newRE, (player + 1) % 4, o.newKnowledge, o.newBLen);
              const rawPts = result.winnerTeam === myTeam ? result.points :
                             result.winnerTeam >= 0 ? -result.points : 0;
              signedPts = useME ? _rolloutToMEReward(result.winnerTeam, result.points, myTeam) * 4 : rawPts;
              if (result.winnerTeam === myTeam) o.wins++;
              if (result.type === 'blocked' || result.type === 'tie') o.blocks++;
              if (o.outcomes[result.type] !== undefined) o.outcomes[result.type]++;
            }
            o.totalPts += signedPts;
            o.sumPtsSq += signedPts * signedPts;
            o.ptsArray.push(signedPts);
            o.sims++;
          }
        }
        // Early stop check: if best option's lower CI bound > second option's upper CI bound
        // (disabled during F1 diagnostic to ensure equal sample counts across variants)
        if (!_f1FreezeEarlyStop && done + batchSize >= MIN_SIMS && simOptions.length >= 2) {
          const sorted = simOptions.map(o => ({
            ep: o.totalPts / o.sims,
            variance: o.sims > 1 ? (o.sumPtsSq / o.sims) - (o.totalPts / o.sims) ** 2 : 1,
            sims: o.sims
          })).sort((a, b) => b.ep - a.ep);
          const best = sorted[0], second = sorted[1];
          const diffMean = best.ep - second.ep;
          const diffStdErr = Math.sqrt(Math.max(0, best.variance) / best.sims + Math.max(0, second.variance) / second.sims);
          // 90% CI separation — best is clearly better
          if (diffMean > 1.65 * diffStdErr && diffMean > 0.05) break;
        }
      }

      // Build final results — pick best side per tile
      const tileResults = new Map();
      for (const o of options) {
        const n = o.sims || numSims;
        const ep = o.instantWin ? o.expectedPoints : (n > 0 ? o.totalPts / n : 0);
        const wr = o.instantWin ? o.winRate : (n > 0 ? o.wins / n : 0.5);
        const variance = o.instantWin ? 0 : (n > 1 ? (o.sumPtsSq / n) - ep * ep : 0);
        const stdDev = Math.sqrt(Math.max(0, variance));
        const ci95 = n > 1 ? 1.96 * stdDev / Math.sqrt(n) : 0;
        let cvar5 = o.instantWin ? o.cvar5 : 0;
        if (!o.instantWin && o.ptsArray.length > 0) {
          o.ptsArray.sort((a, b) => a - b);
          const cc = Math.max(1, Math.ceil(n * 0.05));
          let cs = 0; for (let i = 0; i < cc; i++) cs += o.ptsArray[i];
          cvar5 = cs / cc;
        }
        const r = {
          tile: o.tile, side: o.side,
          winRate: wr, expectedPoints: ep,
          blockRate: o.instantWin ? 0 : o.blocks / n,
          outcomes: o.outcomes, sims: n,
          variance, stdDev, ci95, cvar5
        };
        const key = o.tile.id;
        if (!tileResults.has(key) || ep > tileResults.get(key).expectedPoints) {
          tileResults.set(key, r);
        }
      }

      const results = [...tileResults.values()];
      results.sort((a, b) => b.expectedPoints - a.expectedPoints || b.winRate - a.winRate);
      mcCache.set(cacheKey, results);
      return results;
    }

    // ========== NEURAL NET INFERENCE ENGINE ==========
    // Lightweight inference for DominoNet (4-block ResNet, 185→57+1).
    // Loads binary weights exported by training/export_model.py.

    let _nnModel = null; // loaded model weights + config
    const NN_STATE_DIM = 185;
    const NN_NUM_ACTIONS = 57;

    // NN leaf value toggle: when true + model loaded, ISMCTS uses NN value head
    // instead of fastAI rollouts for leaf evaluation. Toggle via console:
    //   setNNLeafValue(true)   — use NN value head
    //   setNNLeafValue(false)  — use fastAI rollouts (default)
    let USE_NN_LEAF_VALUE = false;
    let _nnLeafStats = { calls: 0, totalMs: 0 }; // perf tracking
    window.setNNLeafValue = function(on) {
      USE_NN_LEAF_VALUE = !!on;
      _nnLeafStats = { calls: 0, totalMs: 0 };
      console.log(`NN leaf value: ${USE_NN_LEAF_VALUE ? 'ON' : 'OFF'}${!_nnModel ? ' (WARNING: no model loaded)' : ''}`);
    };
    window.getNNLeafStats = function() {
      const avg = _nnLeafStats.calls > 0 ? _nnLeafStats.totalMs / _nnLeafStats.calls : 0;
      console.log(`NN leaf: ${_nnLeafStats.calls} evals, avg ${avg.toFixed(3)}ms/eval, total ${(_nnLeafStats.totalMs/1000).toFixed(1)}s`);
      return _nnLeafStats;
    };

    // Load binary model file. Call: await loadNeuralModel('domino_model.bin')
    async function loadNeuralModel(url) {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`Failed to load model: ${resp.status}`);
      const buf = await resp.arrayBuffer();
      const view = new DataView(buf);

      // Read header
      const headerLen = view.getUint32(0, true);
      const headerBytes = new Uint8Array(buf, 4, headerLen);
      const header = JSON.parse(new TextDecoder().decode(headerBytes));

      // Read float32 data (copy to ensure 4-byte alignment)
      const dataOffset = 4 + headerLen;
      const rawBytes = new Uint8Array(buf, dataOffset, header.total_floats * 4);
      const alignedBuf = new ArrayBuffer(rawBytes.length);
      new Uint8Array(alignedBuf).set(rawBytes);
      const floats = new Float32Array(alignedBuf);

      // Build weight map: name → Float32Array
      const w = {};
      for (const layer of header.layers) {
        w[layer.name] = {
          shape: layer.shape,
          data: floats.subarray(layer.offset, layer.offset + layer.length),
        };
      }

      _nnModel = { weights: w, arch: header.architecture, generation: header.generation };
      console.log(`Neural model loaded: gen ${header.generation}, ${header.total_floats.toLocaleString()} params`);
      return _nnModel;
    }

    // Matrix-vector multiply: out = W @ x + b (W is [rows, cols], x is [cols])
    function _nnMatVec(W, b, x) {
      const rows = W.shape[0], cols = W.shape[1];
      const out = new Float32Array(rows);
      for (let r = 0; r < rows; r++) {
        let sum = b.data[r];
        const rOff = r * cols;
        for (let c = 0; c < cols; c++) sum += W.data[rOff + c] * x[c];
        out[r] = sum;
      }
      return out;
    }

    // BatchNorm in eval mode: y = (x - running_mean) / sqrt(running_var + eps) * weight + bias
    function _nnBatchNorm(x, weight, bias, mean, variance) {
      const n = x.length;
      const out = new Float32Array(n);
      for (let i = 0; i < n; i++) {
        out[i] = (x[i] - mean.data[i]) / Math.sqrt(variance.data[i] + 1e-5) * weight.data[i] + bias.data[i];
      }
      return out;
    }

    function _nnRelu(x) {
      const out = new Float32Array(x.length);
      for (let i = 0; i < x.length; i++) out[i] = x[i] > 0 ? x[i] : 0;
      return out;
    }

    function _nnAdd(a, b) {
      const out = new Float32Array(a.length);
      for (let i = 0; i < a.length; i++) out[i] = a[i] + b[i];
      return out;
    }

    function _nnSoftmax(x, mask) {
      const out = new Float32Array(x.length);
      let maxVal = -Infinity;
      for (let i = 0; i < x.length; i++) {
        if (mask[i] > 0 && x[i] > maxVal) maxVal = x[i];
      }
      let sum = 0;
      for (let i = 0; i < x.length; i++) {
        if (mask[i] > 0) { out[i] = Math.exp(x[i] - maxVal); sum += out[i]; }
        else out[i] = 0;
      }
      if (sum > 0) for (let i = 0; i < x.length; i++) out[i] /= sum;
      return out;
    }

    // Full forward pass through DominoNet
    function _nnForward(state, mask) {
      const w = _nnModel.weights;

      // Input projection: relu(BN(Linear(x)))
      let h = _nnMatVec(w['input_fc.weight'], w['input_fc.bias'], state);
      h = _nnBatchNorm(h, w['input_bn.weight'], w['input_bn.bias'], w['input_bn.running_mean'], w['input_bn.running_var']);
      h = _nnRelu(h);

      // 4 residual blocks
      for (let b = 0; b < 4; b++) {
        const prefix = `res_blocks.${b}`;
        let out = _nnMatVec(w[`${prefix}.fc1.weight`], w[`${prefix}.fc1.bias`], h);
        out = _nnBatchNorm(out, w[`${prefix}.bn1.weight`], w[`${prefix}.bn1.bias`], w[`${prefix}.bn1.running_mean`], w[`${prefix}.bn1.running_var`]);
        out = _nnRelu(out);
        out = _nnMatVec(w[`${prefix}.fc2.weight`], w[`${prefix}.fc2.bias`], out);
        out = _nnBatchNorm(out, w[`${prefix}.bn2.weight`], w[`${prefix}.bn2.bias`], w[`${prefix}.bn2.running_mean`], w[`${prefix}.bn2.running_var`]);
        h = _nnRelu(_nnAdd(out, h));
      }

      // Policy head
      let p = _nnMatVec(w['policy_fc1.weight'], w['policy_fc1.bias'], h);
      p = _nnBatchNorm(p, w['policy_bn.weight'], w['policy_bn.bias'], w['policy_bn.running_mean'], w['policy_bn.running_var']);
      p = _nnRelu(p);
      p = _nnMatVec(w['policy_fc2.weight'], w['policy_fc2.bias'], p);
      const policy = _nnSoftmax(p, mask);

      // Value head
      let v = _nnMatVec(w['value_fc1.weight'], w['value_fc1.bias'], h);
      v = _nnBatchNorm(v, w['value_bn.weight'], w['value_bn.bias'], w['value_bn.running_mean'], w['value_bn.running_var']);
      v = _nnRelu(v);
      v = _nnMatVec(w['value_fc2.weight'], w['value_fc2.bias'], v);
      const value = Math.tanh(v[0]);

      return { policy, value };
    }

    // Value-only forward pass: skips policy head (2 matmuls + BN + softmax)
    function _nnForwardValue(state) {
      const w = _nnModel.weights;
      let h = _nnMatVec(w['input_fc.weight'], w['input_fc.bias'], state);
      h = _nnBatchNorm(h, w['input_bn.weight'], w['input_bn.bias'], w['input_bn.running_mean'], w['input_bn.running_var']);
      h = _nnRelu(h);
      for (let b = 0; b < 4; b++) {
        const prefix = `res_blocks.${b}`;
        let out = _nnMatVec(w[`${prefix}.fc1.weight`], w[`${prefix}.fc1.bias`], h);
        out = _nnBatchNorm(out, w[`${prefix}.bn1.weight`], w[`${prefix}.bn1.bias`], w[`${prefix}.bn1.running_mean`], w[`${prefix}.bn1.running_var`]);
        out = _nnRelu(out);
        out = _nnMatVec(w[`${prefix}.fc2.weight`], w[`${prefix}.fc2.bias`], out);
        out = _nnBatchNorm(out, w[`${prefix}.bn2.weight`], w[`${prefix}.bn2.bias`], w[`${prefix}.bn2.running_mean`], w[`${prefix}.bn2.running_var`]);
        h = _nnRelu(_nnAdd(out, h));
      }
      let v = _nnMatVec(w['value_fc1.weight'], w['value_fc1.bias'], h);
      v = _nnBatchNorm(v, w['value_bn.weight'], w['value_bn.bias'], w['value_bn.running_mean'], w['value_bn.running_var']);
      v = _nnRelu(v);
      v = _nnMatVec(w['value_fc2.weight'], w['value_fc2.bias'], v);
      return Math.tanh(v[0]);
    }

    // Export canonical snapshot (v1) for parity testing and training data
    function exportSnapshot(hand, lE, rE, bLen, player, knowledge) {
      return {
        version: 1,
        player: player,
        hand: hand.map(t => TILE_INDEX[t.id]),
        played: Array.from(knowledge.played).map(id => TILE_INDEX[id]),
        left_end: lE,
        right_end: rE,
        board_length: bLen,
        cant_have: Object.fromEntries(
          knowledge.cantHave.map((s, i) => [String(i), Array.from(s)])
        ),
        plays_by: Object.fromEntries(
          knowledge.playsBy.map((arr, i) => [String(i), arr.map(t => TILE_INDEX[t.id])])
        ),
        match_score: matchScore.slice(),
        score_multiplier: scoreMultiplier
      };
    }

    // Encode game state to 185-dim vector (mirrors Python DominoEncoder.encode)
    function _nnEncodeState(hand, lE, rE, bLen, player, knowledge) {
      const state = new Float32Array(NN_STATE_DIM);
      const me = player;
      const partner = (me + 2) % 4;
      const lho = (me + 1) % 4;
      const rho = (me + 3) % 4;

      // [0:28] My hand
      for (const t of hand) state[TILE_INDEX[t.id]] = 1.0;

      // [28:56] Played tiles
      for (const id of knowledge.played) state[28 + TILE_INDEX[id]] = 1.0;

      // [56:63] Left end one-hot
      if (lE >= 0 && lE <= 6) state[56 + lE] = 1.0;

      // [63:70] Right end one-hot
      if (rE >= 0 && rE <= 6) state[63 + rE] = 1.0;

      // [70:91] CantHave: 3 players × 7 numbers
      const others = [partner, lho, rho];
      for (let i = 0; i < 3; i++) {
        for (const n of knowledge.cantHave[others[i]]) {
          if (n >= 0 && n <= 6) state[70 + i * 7 + n] = 1.0;
        }
      }

      // [91:175] Belief probabilities (persistent Bayesian, matches Python DominoEncoder)
      // Export conditional distribution P(zone | not dorme, not me)
      const handIds = new Set(hand.map(h => h.id));
      for (let t = 0; t < 28; t++) {
        const tile = ALL_TILES[t];
        if (handIds.has(tile.id) || knowledge.played.has(tile.id)) {
          // Tile in my hand or played — uniform fallback (NN sees hand/played vectors)
          state[91 + t] = state[91 + 28 + t] = state[91 + 56 + t] = 1/3;
          continue;
        }
        // Extract beliefs for 3 other players (absolute → relative)
        let b0 = knowledge.nnBelief[t * 5 + partner];
        let b1 = knowledge.nnBelief[t * 5 + lho];
        let b2 = knowledge.nnBelief[t * 5 + rho];
        // Defensive cantHave clamp (should already be reflected in nnBelief)
        if (knowledge.cantHave[partner].has(tile.left) || knowledge.cantHave[partner].has(tile.right)) b0 = 0;
        if (knowledge.cantHave[lho].has(tile.left) || knowledge.cantHave[lho].has(tile.right)) b1 = 0;
        if (knowledge.cantHave[rho].has(tile.left) || knowledge.cantHave[rho].has(tile.right)) b2 = 0;
        // Normalize to conditional distribution over {partner, LHO, RHO}
        const total = b0 + b1 + b2;
        if (total > 0) {
          state[91 + t] = b0 / total;
          state[91 + 28 + t] = b1 / total;
          state[91 + 56 + t] = b2 / total;
        } else {
          // All 3 eliminated — tile must be in dorme
          state[91 + t] = state[91 + 28 + t] = state[91 + 56 + t] = 1/3;
        }
      }

      // [175:179] Hand sizes (normalized)
      const playedBy = knowledge.playsBy;
      state[175] = hand.length / 6.0;
      for (let i = 0; i < 3; i++) {
        state[176 + i] = Math.max(0, 6 - playedBy[others[i]].length) / 6.0;
      }

      // [179:181] Match scores
      const myTeam = me % 2;
      state[179] = matchScore[myTeam] / 6.0;
      state[180] = matchScore[1 - myTeam] / 6.0;

      // [181:182] Multiplier
      state[181] = Math.min(scoreMultiplier, 4) / 4.0;

      // [182:183] Board length
      state[182] = bLen / 24.0;

      // [183:184] Game phase
      state[183] = knowledge.played.size / 24.0;

      // [184:185] My team
      state[184] = myTeam;

      return state;
    }

    // Build action mask (57-dim: 0-27 = tile on left, 28-55 = tile on right, 56 = pass)
    function _nnActionMask(hand, lE, rE, bLen) {
      const mask = new Float32Array(NN_NUM_ACTIONS);
      const playable = hand.filter(t => canPlay(t, lE, rE, bLen));
      if (playable.length === 0) {
        mask[56] = 1.0; // pass
        return mask;
      }
      for (const tile of playable) {
        const idx = TILE_INDEX[tile.id];
        if (bLen === 0) {
          mask[idx] = 1.0; // left side for opening
        } else if (lE === rE) {
          // Both ends identical — only use left slot to avoid duplicate actions
          mask[idx] = 1.0;
        } else {
          if (tile.left === lE || tile.right === lE) mask[idx] = 1.0;        // left
          if (tile.left === rE || tile.right === rE) mask[28 + idx] = 1.0;  // right
        }
      }
      return mask;
    }

    // Decode policy action index to {tile, side}
    function _nnDecodeAction(actionIdx, hand) {
      if (actionIdx === 56) return null; // pass
      const tileIdx = actionIdx < 28 ? actionIdx : actionIdx - 28;
      const side = actionIdx < 28 ? 'left' : 'right';
      const tile = hand.find(t => TILE_INDEX[t.id] === tileIdx);
      return tile ? { tile, side: side } : null;
    }

    // Neural net guided move selection (requires model loaded)
    // Returns array of {tile, side, score, reasons} sorted by neural policy probability
    function neuralEval(hand, lE, rE, bLen, player, knowledge) {
      if (!_nnModel) return null;
      const state = _nnEncodeState(hand, lE, rE, bLen, player, knowledge);
      const mask = _nnActionMask(hand, lE, rE, bLen);
      const { policy, value } = _nnForward(state, mask);

      // Convert policy distribution to move list
      const results = [];
      for (let a = 0; a < NN_NUM_ACTIONS; a++) {
        if (mask[a] < 0.5 || policy[a] < 0.001) continue;
        const decoded = _nnDecodeAction(a, hand);
        if (!decoded) continue;
        results.push({
          tile: decoded.tile,
          side: decoded.side,
          score: Math.round(policy[a] * 1000),
          reasons: [`NN policy: ${(policy[a] * 100).toFixed(1)}%, value: ${value.toFixed(3)}`],
        });
      }
      results.sort((a, b) => b.score - a.score);
      return results;
    }

    window.loadNeuralModel = loadNeuralModel;
    window.neuralEval = neuralEval;

    // ========== ISMCTS (Information Set Monte Carlo Tree Search) ==========

    class ISMCTSNode {
      constructor(move = null, parent = null) {
        this.move = move;       // { tile, side } or null for root
        this.parent = parent;
        this.children = [];
        this.visits = 0;
        this.totalReward = 0;
        this.hBias = 0;         // progressive bias from heuristic evaluation
        this.priorP = 0.0;      // P(a) PUCT prior from NN policy
        this.actionIdx = -1;    // 0..56 action index for prior lookup
      }
      avgReward() {
        return this.visits > 0 ? this.totalReward / this.visits : 0.0;
      }
      puctScore(parentVisits, cPuct) {
        const Q = this.avgReward();
        const U = cPuct * this.priorP * Math.sqrt(parentVisits) / (1 + this.visits);
        return Q + U;
      }
      ucb1(C = ISMCTS_C, useProgBias = ISMCTS_PROG_BIAS) {
        if (this.visits === 0) return Infinity;
        const exploit = this.totalReward / this.visits;
        const explore = C * Math.sqrt(Math.log(this.parent.visits) / this.visits);
        const bias = useProgBias ? this.hBias / (this.visits + 1) : 0;
        return exploit + explore + bias;
      }
      selectChild(legalMoves, cfg) {
        // Filter children to those whose move is legal in this determinization
        const legal = this.children.filter(c =>
          legalMoves.some(m => m.tile.id === c.move.tile.id && m.side === c.move.side)
        );
        if (legal.length === 0) return null;
        const pVisits = Math.max(1, this.visits);
        const doPUCT = cfg.usePUCT && (!cfg.rootOnlyPUCT || cfg.isRoot);
        let best = legal[0];
        let bestScore = doPUCT ? legal[0].puctScore(pVisits, cfg.cPuct)
                               : legal[0].ucb1(cfg.C, cfg.useProgBias);
        for (let i = 1; i < legal.length; i++) {
          const s = doPUCT ? legal[i].puctScore(pVisits, cfg.cPuct)
                           : legal[i].ucb1(cfg.C, cfg.useProgBias);
          if (s > bestScore) { best = legal[i]; bestScore = s; }
        }
        return best;
      }
      expand(move) {
        const child = new ISMCTSNode(move, this);
        this.children.push(child);
        return child;
      }
      update(reward) {
        this.visits++;
        this.totalReward += reward;
      }
    }

    function ismctsGetLegalMoves(hand, lE, rE, bLen) {
      const playable = hand.filter(t => canPlay(t, lE, rE, bLen));
      const moves = [];
      for (const tile of playable) {
        if (bLen === 0) {
          moves.push({ tile, side: null });
        } else {
          if (tile.left === lE || tile.right === lE) moves.push({ tile, side: 'left' });
          if ((tile.left === rE || tile.right === rE) && lE !== rE) moves.push({ tile, side: 'right' });
          if (moves.length === 0 || moves[moves.length-1].tile.id !== tile.id) {
            if (tile.left === rE || tile.right === rE) moves.push({ tile, side: 'right' });
          }
        }
      }
      return moves;
    }

    function ismctsApplyMove(tile, side, lE, rE, bLen) {
      if (bLen === 0) return { newLE: tile.left, newRE: tile.right };
      if (side === 'left') return { newLE: tile.left === lE ? tile.right : tile.left, newRE: rE };
      return { newLE: lE, newRE: tile.right === rE ? tile.left : tile.right };
    }

    // Heuristic bias for ISMCTS progressive bias — lightweight scoring for root-level moves
    function _ismctsHeuristic(move, hand, lE, rE, bLen, knowledge, player) {
      const { tile, side } = move;
      let h = 0;
      const opp1 = (player + 1) % 4, opp2 = (player + 3) % 4;
      const partner = (player + 2) % 4;
      // Compute new end and other end after move
      let newEnd, otherEnd;
      if (bLen === 0) { newEnd = tile.right; otherEnd = tile.left; }
      else if (side === 'left') { newEnd = tile.left === lE ? tile.right : tile.left; otherEnd = rE; }
      else { newEnd = tile.right === rE ? tile.left : tile.right; otherEnd = lE; }
      // Suit control: tiles in hand matching new board end
      for (const t of hand) {
        if (t.id !== tile.id && (t.left === newEnd || t.right === newEnd)) h += 0.04;
      }
      // Double clearing bonus
      if (tile.left === tile.right) h += 0.03;
      // Blocking: opponent void on BOTH ends
      if (knowledge.cantHave[opp1].has(newEnd) && knowledge.cantHave[opp1].has(otherEnd)) h += 0.06;
      else if (knowledge.cantHave[opp1].has(newEnd)) h += 0.04;
      if (knowledge.cantHave[opp2].has(newEnd) && knowledge.cantHave[opp2].has(otherEnd)) h += 0.05;
      else if (knowledge.cantHave[opp2].has(newEnd)) h += 0.03;
      // Partner void penalty
      if (knowledge.cantHave[partner].has(newEnd) && knowledge.cantHave[partner].has(otherEnd)) h -= 0.03;
      // Dead number detection
      if (bLen > 0) {
        const remNew = knowledge.remainingWithNumber(newEnd);
        if (remNew <= 1 && newEnd !== otherEnd) {
          const tileHasOther = (tile.left === otherEnd || tile.right === otherEnd) ? 1 : 0;
          const remOther = knowledge.remainingWithNumber(otherEnd) - tileHasOther;
          if (remOther > 0) h -= 0.06; // one end dead, bad
          else h -= 0.02; // both dead, depends on pips (mild penalty)
        }
      }
      // Near-win / closing bonus
      if (hand.length === 1) h += 0.5;
      else if (hand.length === 2) {
        const last = hand.find(t => t.id !== tile.id);
        if (last && (last.left === newEnd || last.right === newEnd || last.left === otherEnd || last.right === otherEnd)) h += 0.12;
        else h -= 0.04;
      } else if (hand.length === 3) {
        let cover = 0;
        for (const t of hand) {
          if (t.id !== tile.id && (t.left === newEnd || t.right === newEnd || t.left === otherEnd || t.right === otherEnd)) cover++;
        }
        if (cover === 2) h += 0.04;
        else if (cover === 0) h -= 0.03;
      }
      // Phase-dependent pip weight (favor high-pip dumps in endgame)
      const pipMul = bLen <= 4 ? 0.001 : (bLen <= 14 ? 0.003 : 0.005);
      h += (tile.left + tile.right) * pipMul;
      return h;
    }

    // Configurable ISMCTS knobs (tunable from console)
    let ISMCTS_C = 1.41;         // UCB1 exploration constant
    let ISMCTS_PROG_BIAS = true; // progressive bias from heuristic
    let ISMCTS_POOL_SIZE = 0;    // determinization pool: 0=fresh each sim (best), >0=reuse K worlds
    window.setISMCTS = function(opts) {
      if (opts.C !== undefined) ISMCTS_C = opts.C;
      if (opts.progBias !== undefined) ISMCTS_PROG_BIAS = !!opts.progBias;
      if (opts.sims !== undefined) MC_SIMS_PLAY_EXPERT = opts.sims;
      if (opts.pool !== undefined) ISMCTS_POOL_SIZE = Math.max(0, opts.pool | 0);
      console.log(`ISMCTS config: C=${ISMCTS_C}, progBias=${ISMCTS_PROG_BIAS}, sims=${MC_SIMS_PLAY_EXPERT}, pool=${ISMCTS_POOL_SIZE}`);
    };

    function ismctsEval(hand, lE, rE, bLen, player, knowledge, beliefModel) {
      const MAX_ITERATIONS = 600;
      const TIME_LIMIT = 300; // ms
      const MAX_NODES = 5000;
      const myTeam = player % 2;
      const useME = true; // Always use match equity for optimal play
      const handSizes = [6, 6, 6, 6]; // approximate — will be overridden per determinization

      // Tree policy config: auto-tune when NN is active
      const nnActive = USE_NN_LEAF_VALUE && _nnModel;
      const usePUCT = nnActive; // PUCT when NN model available

      // Search config object — no globals mutated
      const cfg = {
        usePUCT,
        rootOnlyPUCT: true,     // only apply PUCT at root level
        cPuct: 1.0,             // PUCT exploration constant
        C: nnActive ? 0.7 : ISMCTS_C,
        useProgBias: nnActive ? false : ISMCTS_PROG_BIAS,
        isRoot: true,
      };

      // Determinization pool: pre-sample K worlds and reuse them across sims.
      // Reduces variance from world-mixing and makes more sims additive.
      const poolSize = ISMCTS_POOL_SIZE;

      // Compute actual hand sizes from knowledge
      const totalPlayed = knowledge.played.size;
      const tilesPerPlayer = Math.max(1, Math.floor((28 - 4 - totalPlayed) / 4)); // rough estimate
      for (let p = 0; p < 4; p++) {
        handSizes[p] = p === player ? hand.length : tilesPerPlayer;
      }
      // Adjust based on actual played counts
      const playedPerPlayer = knowledge.playsBy.map(a => a.length);
      const opening = Math.max(0, bLen > 0 ? 1 : 0);
      for (let p = 0; p < 4; p++) {
        if (p === player) continue;
        handSizes[p] = Math.max(0, 6 - playedPerPlayer[p] + (p === ((player + bLen) % 4) ? 0 : 0));
        // Better estimate: 6 minus tiles they've played
        handSizes[p] = Math.max(1, 6 - playedPerPlayer[p]);
      }
      handSizes[player] = hand.length;

      // Pre-sample determinization pool: K worlds reused across sims
      // K=0 means fresh deal each sim (old behavior, for A/B testing)
      const usePool = poolSize > 0;
      const dealPool = [];
      if (usePool) {
        for (let k = 0; k < poolSize; k++) {
          dealPool.push(generateConsistentDeal(hand, handSizes, knowledge, player));
        }
      }

      const root = new ISMCTSNode();
      let nodeCount = 1;
      const startTime = Date.now();

      // Compute root PUCT prior: blended NN policy + uniform (once)
      let rootPrior = null;
      if (usePUCT) {
        const mask = _nnActionMask(hand, lE, rE, bLen);
        const enc = _nnEncodeState(hand, lE, rE, bLen, player, knowledge);
        const { policy: pNN } = _nnForward(enc, mask);
        const alpha = 0.2; // blend weight: (1-alpha)*uniform + alpha*NN
        rootPrior = new Float32Array(57);
        let legalCount = 0;
        for (let a = 0; a < 57; a++) if (mask[a] > 0) legalCount++;
        const u = legalCount > 0 ? 1.0 / legalCount : 0;
        let sum = 0;
        for (let a = 0; a < 57; a++) {
          if (mask[a] === 0) { rootPrior[a] = 0; continue; }
          rootPrior[a] = (1 - alpha) * u + alpha * Math.max(pNN[a], 1e-12);
          sum += rootPrior[a];
        }
        if (sum > 0) for (let a = 0; a < 57; a++) rootPrior[a] /= sum;
      }

      for (let iter = 0; iter < MAX_ITERATIONS; iter++) {
        if (Date.now() - startTime > TIME_LIMIT) break;
        if (nodeCount >= MAX_NODES) break;

        // 1. DETERMINIZE: pick from pool or sample fresh
        const deal = usePool ? dealPool[iter % poolSize]
                             : generateConsistentDeal(hand, handSizes, knowledge, player);

        // 2. SELECT + EXPAND + ROLLOUT
        let node = root;
        let simHands = deal.map(h => [...h]);
        simHands[player] = [...hand]; // our hand is known
        let simLE = lE, simRE = rE, simBLen = bLen;
        let simKnowledge = knowledge.clone();
        let curPlayer = player;
        cfg.isRoot = true;

        // Selection phase — walk down tree while node has children
        while (node.children.length > 0) {
          const legalMoves = ismctsGetLegalMoves(simHands[curPlayer], simLE, simRE, simBLen);
          if (legalMoves.length === 0) break; // pass — skip selection

          const child = node.selectChild(legalMoves, cfg);
          if (!child) break;

          // Check progressive widening: should we expand instead?
          const untriedMoves = legalMoves.filter(m =>
            !node.children.some(c => c.move.tile.id === m.tile.id && c.move.side === m.side)
          );
          if (untriedMoves.length > 0 && node.children.length < Math.ceil(Math.sqrt(node.visits + 1))) {
            // Expand: pick best untried by prior (PUCT at root), else random
            let expandMove;
            if (node === root && rootPrior && untriedMoves.length > 1) {
              let bestP = -1;
              for (const m of untriedMoves) {
                const tIdx = TILE_INDEX[m.tile.id];
                const aIdx = m.side === 'right' ? tIdx + 28 : tIdx;
                if (rootPrior[aIdx] > bestP) { bestP = rootPrior[aIdx]; expandMove = m; }
              }
            } else {
              expandMove = untriedMoves[getRng().randomInt(untriedMoves.length)];
            }
            const _prevNode = node;
            node = node.expand(expandMove);
            nodeCount++;
            // Root children: always compute actionIdx, assign PUCT prior if active
            if (_prevNode === root) {
              const tIdx = TILE_INDEX[expandMove.tile.id];
              node.actionIdx = expandMove.side === 'right' ? tIdx + 28 : tIdx;
              if (rootPrior) node.priorP = rootPrior[node.actionIdx];
              // Progressive bias fallback when no PUCT
              if (!usePUCT && curPlayer === player) {
                node.hBias = _ismctsHeuristic(expandMove, hand, lE, rE, bLen, knowledge, player);
              }
            }
            // Apply move
            const applied = ismctsApplyMove(expandMove.tile, expandMove.side, simLE, simRE, simBLen);
            simHands[curPlayer] = simHands[curPlayer].filter(t => t.id !== expandMove.tile.id);
            simKnowledge.recordPlay(curPlayer, expandMove.tile);
            simLE = applied.newLE; simRE = applied.newRE; simBLen++;
            if (simHands[curPlayer].length === 0) {
              // Terminal — immediate win
              const w = scoreWin(expandMove.tile, lE, rE, simBLen);
              const reward = useME ? _rolloutToMEReward(curPlayer % 2, w.pts, myTeam) : (curPlayer % 2 === myTeam ? w.pts / 4 : -w.pts / 4);
              _ismctsBackprop(node, reward);
              break;
            }
            curPlayer = (curPlayer + 1) % 4;
            break; // go to rollout
          }

          // Follow selected child
          const { tile, side } = child.move;
          const applied = ismctsApplyMove(tile, side, simLE, simRE, simBLen);
          simHands[curPlayer] = simHands[curPlayer].filter(t => t.id !== tile.id);
          simKnowledge.recordPlay(curPlayer, tile);
          simLE = applied.newLE; simRE = applied.newRE; simBLen++;
          if (simHands[curPlayer].length === 0) {
            const w = scoreWin(tile, lE, rE, simBLen);
            const reward = useME ? _rolloutToMEReward(curPlayer % 2, w.pts, myTeam) : (curPlayer % 2 === myTeam ? w.pts / 4 : -w.pts / 4);
            _ismctsBackprop(child, reward);
            node = null; // signal: already backpropagated
            break;
          }
          curPlayer = (curPlayer + 1) % 4;
          node = child;
          cfg.isRoot = false; // past root level now
        }

        if (node === null) continue; // already backpropagated

        // Expansion at leaf with no children
        if (node.children.length === 0) {
          const legalMoves = ismctsGetLegalMoves(simHands[curPlayer], simLE, simRE, simBLen);
          if (legalMoves.length > 0) {
            const expandMove = legalMoves[getRng().randomInt(legalMoves.length)];
            const _leafParent = node;
            node = node.expand(expandMove);
            nodeCount++;
            // Root children: always compute actionIdx, assign PUCT prior if active
            if (_leafParent === root) {
              const tIdx = TILE_INDEX[expandMove.tile.id];
              node.actionIdx = expandMove.side === 'right' ? tIdx + 28 : tIdx;
              if (rootPrior) node.priorP = rootPrior[node.actionIdx];
              if (!usePUCT && curPlayer === player) {
                node.hBias = _ismctsHeuristic(expandMove, hand, lE, rE, bLen, knowledge, player);
              }
            }
            const applied = ismctsApplyMove(expandMove.tile, expandMove.side, simLE, simRE, simBLen);
            simHands[curPlayer] = simHands[curPlayer].filter(t => t.id !== expandMove.tile.id);
            simKnowledge.recordPlay(curPlayer, expandMove.tile);
            simLE = applied.newLE; simRE = applied.newRE; simBLen++;
            if (simHands[curPlayer].length === 0) {
              const w = scoreWin(expandMove.tile, lE, rE, simBLen);
              const reward = useME ? _rolloutToMEReward(curPlayer % 2, w.pts, myTeam) : (curPlayer % 2 === myTeam ? w.pts / 4 : -w.pts / 4);
              _ismctsBackprop(node, reward);
              continue;
            }
            curPlayer = (curPlayer + 1) % 4;
          }
        }

        // 3. LEAF EVALUATION: NN value head (if available) or fastAI rollout
        let reward;
        if (USE_NN_LEAF_VALUE && _nnModel) {
          const t0 = performance.now();
          const nnState = _nnEncodeState(simHands[curPlayer], simLE, simRE, simBLen, curPlayer, simKnowledge);
          const value = _nnForwardValue(nnState);
          _nnLeafStats.calls++;
          _nnLeafStats.totalMs += performance.now() - t0;
          // NN value is from curPlayer's team perspective (tanh [-1,1])
          // Convert to myTeam's perspective
          reward = (curPlayer % 2 === myTeam) ? value : -value;
        } else {
          // Fallback: fastAI rollout to terminal
          const result = simulateFromPosition(simHands, null, simLE, simRE, curPlayer, simKnowledge, simBLen);
          const rawReward = result.winnerTeam === myTeam ? result.points / 4 :
                            result.winnerTeam >= 0 ? -result.points / 4 : 0;
          reward = useME ? _rolloutToMEReward(result.winnerTeam, result.points, myTeam) : rawReward;
        }

        // 4. BACKPROPAGATE
        _ismctsBackprop(node, reward);
      }

      // Extract results from root's children
      if (root.children.length === 0) return []; // fallback: no tree built

      const results = [];
      const tileResults = new Map();
      for (const child of root.children) {
        if (child.visits === 0) continue;
        const avgReward = child.totalReward / child.visits;
        const key = `${child.move.tile.id}:${child.move.side}`;
        const tileKey = child.move.tile.id;
        const r = {
          tile: child.move.tile, side: child.move.side,
          winRate: (avgReward + 1) / 2, // normalize [-1,1] → [0,1]
          expectedPoints: avgReward * 4, // scale back
          visits: child.visits,
          blockRate: 0, sims: child.visits,
          outcomes: { normal: 0, carroca: 0, laelo: 0, cruzada: 0, blocked: 0, tie: 0 },
          variance: 0, stdDev: 0, ci95: 0, cvar5: 0,
          ismcts: true
        };
        const existing = tileResults.get(tileKey);
        const dominated = usePUCT
          ? (!existing || r.visits > existing.visits || (r.visits === existing.visits && r.expectedPoints > existing.expectedPoints))
          : (!existing || r.expectedPoints > existing.expectedPoints);
        if (dominated) tileResults.set(tileKey, r);
      }
      const finalResults = [...tileResults.values()];
      // PUCT: sort by most-visited (stable at high sims), fallback to avgReward
      if (usePUCT) {
        finalResults.sort((a, b) => b.visits - a.visits || b.expectedPoints - a.expectedPoints);
      } else {
        finalResults.sort((a, b) => b.expectedPoints - a.expectedPoints || b.visits - a.visits);
      }
      return finalResults;
    }

    function _ismctsBackprop(node, reward) {
      while (node) {
        node.update(reward);
        node = node.parent;
      }
    }

    // Extract visit-count policy from ISMCTS root (57-dim, for training export)
    function rootVisitPolicy(root, legalMask, tau = 1.0) {
      const pi = new Float32Array(57);
      let sum = 0.0;
      for (const child of root.children) {
        const a = child.actionIdx;
        if (a < 0 || child.visits <= 0) continue;
        if (legalMask && legalMask[a] === 0) continue;
        const w = tau === 1.0 ? child.visits : Math.pow(child.visits, 1.0 / tau);
        pi[a] = w;
        sum += w;
      }
      if (sum > 0) {
        for (let a = 0; a < 57; a++) pi[a] /= sum;
      } else if (legalMask) {
        let k = 0;
        for (let a = 0; a < 57; a++) if (legalMask[a] > 0) k++;
        if (k > 0) for (let a = 0; a < 57; a++) if (legalMask[a] > 0) pi[a] = 1.0 / k;
      }
      return pi;
    }

    // ========== STATE ==========

    let currentGame = null;
    let currentStep = 0;
    let autoPlayTimer = null;
    let autoPlaySpeed = 1500;
    let gameMode = 'watch'; // 'watch' | 'quiz' | 'play'
    let scoreMultiplier = 1; // dobrada: doubles after tied block
    let matchScore = [0, 0];  // team0 vs team1 score, first to 6 wins match
    let lastWinTeam = null;   // null = first game of match, 0 or 1 = team that won last
    let starterChoicePending = false; // true when waiting for user to pick starter
    let pendingHands = null; // pre-dealt hands shown during starter choice

    // ========== PLAY MODE STATE ==========
    let playWaiting = false;        // true when waiting for human to pick tile
    let playSidePick = null;        // {tile, canLeft, canRight} — waiting for side choice
    let playAITimer = null;         // setTimeout handle for AI move delays
    let playLastMove = null;        // { player, tile, side, pass } — last AI move announcement
    let playOpeningPending = null;  // { tile } — waiting for user to acknowledge opening
    let playStarterPending = false; // true when waiting for user to choose who opens
    let playMatchWinner = null;     // 0 or 1 — team that won the match, null if no match just ended
    let playDifficulty = { opponents: 0.75, partner: 0.75 };
    function getDifficultyPresets() { return {
      beginner:     { value: 0.25, label: _t('beginner'),     desc: _t('beginner_d'), color: '#22c55e' },
      intermediate: { value: 0.50, label: _t('intermediate'),  desc: _t('intermediate_d'), color: '#eab308' },

      expert:       { value: 1.00, label: _t('expert'),        desc: _t('expert_d'),   color: '#ef4444' }
    }; }
    const DIFFICULTY_PRESETS = getDifficultyPresets();
    let playAIDelay = 1.5; // seconds per AI move (user-configurable)
    let playShowingDiffPicker = false;
    let playHint = null; // { tileId, side, reasons } — AI recommendation shown on request

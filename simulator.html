<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domino Pernambucano — Strategy Trainer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
    .tile { display: inline-flex; border: 2px solid #475569; border-radius: 6px; background: #fef3c7; cursor: default; }
    .tile-v { flex-direction: column; width: 36px; height: 68px; }
    .tile-h { flex-direction: row; width: 68px; height: 36px; }
    .tile-half { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
    .tile-v .tile-half:first-child { border-bottom: 1.5px solid #94a3b8; }
    .tile-h .tile-half:first-child { border-right: 1.5px solid #94a3b8; }
    .tile-played { opacity: 0.4; border-color: #334155; }
    .tile-highlight { border-color: #22c55e !important; box-shadow: 0 0 12px rgba(34,197,94,0.6); }
    .tile-playable { border-color: #eab308 !important; box-shadow: 0 0 8px rgba(234,179,8,0.4); cursor: pointer !important; }
    .tile-playable:hover { transform: scale(1.15); box-shadow: 0 0 16px rgba(234,179,8,0.8); }
    .tile-wrong { border-color: #ef4444 !important; box-shadow: 0 0 12px rgba(239,68,68,0.6); }
    .tile-optimal { border-color: #22c55e !important; box-shadow: 0 0 12px rgba(34,197,94,0.6); }
    .tile-good { border-color: #f59e0b !important; box-shadow: 0 0 8px rgba(245,158,11,0.4); }
    .dot { width: 5px; height: 5px; background: #1e293b; border-radius: 50%; position: absolute; }
    .dot-sm { width: 4px; height: 4px; }
    .board-tile { display: inline-flex; border: 1.5px solid #64748b; border-radius: 4px; background: #fef3c7; }
    .board-tile-v { flex-direction: column; width: 26px; height: 48px; }
    .board-tile-h { flex-direction: row; width: 48px; height: 26px; }
    .board-tile .tile-half:first-child { border-color: #94a3b8; }
    .board-snake { min-height: 100%; display: flex; flex-direction: column; justify-content: center; }
    .log-entry { transition: background 0.2s; }
    .log-entry.active { background: rgba(34,197,94,0.15); border-left: 3px solid #22c55e; }
    .log-entry.past { opacity: 0.5; }
    #log-container { scroll-behavior: smooth; }
    .player-area { transition: all 0.2s; }
    .player-area.active-turn { background: rgba(34,197,94,0.1); border-color: #22c55e !important; }
    .speed-btn.active { background: #22c55e; color: #0f172a; }
    .btn { padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
    .btn:hover { transform: scale(1.05); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-green { background: #22c55e; color: #0f172a; }
    .btn-blue { background: #3b82f6; color: white; }
    .btn-gray { background: #334155; color: #e2e8f0; }
    .btn-yellow { background: #eab308; color: #0f172a; }
    .btn-red { background: #ef4444; color: white; }
    .btn-purple { background: #8b5cf6; color: white; }
    .mode-btn.active { ring: 2px; box-shadow: 0 0 0 2px #22c55e; }
    .prob-cell { width: 20px; height: 20px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; }
    .strength-bar { height: 8px; border-radius: 4px; transition: width 0.5s, background 0.5s; }
    .tab { padding: 6px 10px; border-radius: 8px 8px 0 0; cursor: pointer; font-weight: 600; font-size: 12px; border: 1px solid #334155; border-bottom: none; }
    .tab.active { background: #1e293b; color: #22c55e; border-color: #22c55e; }
    .tab:not(.active) { background: #0f172a; color: #64748b; }
    .grade-badge { padding: 2px 8px; border-radius: 12px; font-weight: 700; font-size: 11px; }
    .grade-perfect { background: #22c55e; color: #0f172a; }
    .grade-good { background: #f59e0b; color: #0f172a; }
    .grade-ok { background: #f97316; color: white; }
    .grade-bad { background: #ef4444; color: white; }
    .quiz-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; border-radius: 12px; z-index: 10; }
    .pulse { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .tooltip { position: relative; }
    .tooltip .tip-text { visibility: hidden; background: #1e293b; color: #e2e8f0; padding: 4px 8px; border-radius: 4px; position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%); white-space: nowrap; font-size: 11px; z-index: 20; border: 1px solid #475569; }
    .tooltip:hover .tip-text { visibility: visible; }
    .side-pick-btn { padding: 4px 12px; border-radius: 6px; font-weight: 600; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; font-size: 13px; }
    .side-pick-btn:hover { transform: scale(1.1); }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // ========== DOMINO DOT PATTERNS ==========
    const DOT_POS = {
      0: [],
      1: [[50,50]],
      2: [[20,20],[80,80]],
      3: [[20,20],[50,50],[80,80]],
      4: [[20,20],[20,80],[80,20],[80,80]],
      5: [[20,20],[20,80],[50,50],[80,20],[80,80]],
      6: [[20,20],[20,80],[50,20],[50,80],[80,20],[80,80]]
    };

    function renderDots(value, small) {
      const cls = small ? 'dot dot-sm' : 'dot';
      return (DOT_POS[value] || []).map(([t,l]) =>
        `<div class="${cls}" style="top:${t}%;left:${l}%;transform:translate(-50%,-50%)"></div>`
      ).join('');
    }

    function tileHTML(tile, cls = '', orient = 'v', extraCls = '', onClick = '') {
      const dir = orient === 'v' ? 'tile-v' : 'tile-h';
      const sm = cls.includes('board') ? true : false;
      const base = cls.includes('board') ? 'board-tile' : 'tile';
      const dirB = orient === 'v' ? `${base}-v` : `${base}-h`;
      const clickAttr = onClick ? `onclick="${onClick}"` : '';
      return `<div class="${base} ${dirB} ${extraCls}" title="${tile.left}-${tile.right}" ${clickAttr}>
        <div class="tile-half">${renderDots(tile.left, sm)}</div>
        <div class="tile-half">${renderDots(tile.right, sm)}</div>
      </div>`;
    }

    // ========== GAME LOGIC ==========

    function createDeck() {
      const d = [];
      for (let i = 0; i <= 6; i++)
        for (let j = i; j <= 6; j++)
          d.push({ left: i, right: j, id: `${i}-${j}` });
      return d;
    }

    const ALL_TILES = createDeck(); // shared immutable deck — never mutate

    function shuffleDeck(deck) {
      const s = [...deck];
      for (let i = s.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [s[i], s[j]] = [s[j], s[i]];
      }
      return s;
    }

    function canPlay(t, lE, rE, bLen) {
      if (bLen === 0) return true;
      return t.left === lE || t.right === lE || t.left === rE || t.right === rE;
    }

    function couldPlayBothEnds(t, l, r) {
      if (l === null || r === null) return false;
      return (t.left === l || t.right === l) && (t.left === r || t.right === r);
    }

    function canPlayOnSide(tile, end) {
      return tile.left === end || tile.right === end;
    }

    // Global player name mapping
    const PLAYER_NAMES = ['You', 'Opp Left', 'Partner', 'Opp Right'];
    const PLAYER_NAMES_FULL = ['You (P0)', 'Opp Left (P1)', 'Partner (P2)', 'Opp Right (P3)'];
    function pn(idx) { return PLAYER_NAMES[idx] || `P${idx}`; }

    // Knowledge tracker
    class Knowledge {
      constructor() {
        this.cantHave = [new Set(), new Set(), new Set(), new Set()];
        this.played = new Set();
        this.allTiles = ALL_TILES;
        this.playsBy = [[], [], [], []];
        this.passedOn = [[], [], [], []];
        this._strengthCache = [null, null, null, null];
      }
      clone() {
        const k = Object.create(Knowledge.prototype);
        k.cantHave = this.cantHave.map(s => new Set(s));
        k.played = new Set(this.played);
        k.allTiles = ALL_TILES;
        k.playsBy = this.playsBy.map(a => [...a]); // tile refs are immutable
        k.passedOn = this.passedOn.map(a => [...a]);
        k._strengthCache = [null, null, null, null];
        return k;
      }
      recordPlay(p, t) {
        this.played.add(t.id);
        if (p >= 0 && p <= 3) {
          this.playsBy[p].push(t);
          this._strengthCache[p] = null; // invalidate
        }
      }
      recordPass(p, lE, rE) {
        this.cantHave[p].add(lE);
        this.cantHave[p].add(rE);
        this.passedOn[p].push({ lE, rE });
      }
      inferStrength(p) {
        if (this._strengthCache[p]) return this._strengthCache[p];
        const s = [0,0,0,0,0,0,0];
        for (const t of this.playsBy[p]) { s[t.left]++; if (t.left !== t.right) s[t.right]++; }
        this._strengthCache[p] = s;
        return s;
      }
      deadNumbers(p) { return [...this.cantHave[p]]; }
      remainingWithNumber(n) {
        let c = 0;
        for (const t of ALL_TILES) { if (!this.played.has(t.id) && (t.left === n || t.right === n)) c++; }
        return c;
      }
      possibleTilesFor(p) {
        const possible = [];
        for (const t of ALL_TILES) {
          if (this.played.has(t.id)) continue;
          if (this.cantHave[p].has(t.left) && this.cantHave[p].has(t.right)) continue;
          if (t.left === t.right && this.cantHave[p].has(t.left)) continue;
          possible.push(t);
        }
        return possible;
      }
    }

    // Smart AI - returns all scored options (not just best)
    function smartAI(hand, lE, rE, bLen, player, knowledge, returnAll = false) {
      const playable = hand.filter(t => canPlay(t, lE, rE, bLen));
      if (playable.length === 0) return returnAll ? [] : null;

      if (bLen === 0) {
        const sc = [0,0,0,0,0,0,0];
        for (const t of hand) { sc[t.left]++; if (t.left !== t.right) sc[t.right]++; }
        const scored = playable.map(t => {
          let s = sc[t.left]*10 + sc[t.right]*10 + (t.left===t.right?15:0) + (t.left+t.right)*2;
          return { tile: t, score: s, side: null, reasons: [`Open: suit ${t.left}=${sc[t.left]}, suit ${t.right}=${sc[t.right]}${t.left===t.right?' (double bonus)':''}`] };
        });
        scored.sort((a, b) => b.score - a.score);
        return returnAll ? scored : scored[0];
      }

      const partner = (player + 2) % 4;
      const opp1 = (player + 1) % 4, opp2 = (player + 3) % 4;

      const scored = playable.flatMap(tile => {
        const options = [];
        for (const side of ['left', 'right']) {
          const cS = side === 'left' ? (tile.left === lE || tile.right === lE) : (tile.left === rE || tile.right === rE);
          if (!cS) continue;

          let newEnd;
          if (side === 'left') newEnd = tile.left === lE ? tile.right : tile.left;
          else newEnd = tile.right === rE ? tile.left : tile.right;

          const otherEnd = side === 'left' ? rE : lE;
          let ss = 0;
          const sr = [];

          // Suit control
          const myCount = hand.filter(x => x.id !== tile.id && (x.left === newEnd || x.right === newEnd || x.left === otherEnd || x.right === otherEnd)).length;
          ss += myCount * 15;
          if (myCount > 0) sr.push(`${myCount} more tiles match new ends [${newEnd}..${otherEnd}]`);

          // Blocking
          if (knowledge.cantHave[opp1].has(newEnd) && knowledge.cantHave[opp1].has(otherEnd)) { ss += 25; sr.push(`Blocks ${pn(opp1)}`); }
          if (knowledge.cantHave[opp2].has(newEnd) && knowledge.cantHave[opp2].has(otherEnd)) { ss += 25; sr.push(`Blocks ${pn(opp2)}`); }

          // Partner support — check if partner has played tiles with these numbers
          // Discount: remaining tiles with that number minus tiles WE hold with it
          const pStr = knowledge.inferStrength(partner);
          let pAff = 0;
          const partnerDetails = [];
          const endNums = newEnd === otherEnd ? [newEnd] : [newEnd, otherEnd];
          for (const endNum of endNums) {
            const played = pStr[endNum] || 0;
            if (played > 0) {
              // How many tiles with this number are left in play (not played, not in our hand)?
              const remaining = knowledge.remainingWithNumber(endNum);
              const weHold = hand.filter(x => x.id !== tile.id && (x.left === endNum || x.right === endNum)).length;
              const othersCouldHave = remaining - weHold;
              if (othersCouldHave > 0 && !knowledge.cantHave[partner].has(endNum)) {
                pAff += played;
                partnerDetails.push(`${endNum}s (played ${played}x, ${othersCouldHave} still out)`);
              }
            }
          }
          if (pAff > 0) { ss += pAff * 8; sr.push(`Partner played ${partnerDetails.join(' & ')} — may have more`); }
          if (knowledge.cantHave[partner].has(newEnd)) { ss -= 10; sr.push(`Partner can't have ${newEnd}`); }

          // Pip weight — prefer playing heavier tiles earlier
          const tilePips = tile.left + tile.right;
          ss += tilePips * 2;
          if (tilePips >= 9) sr.push(`Dump heavy tile (${tilePips} pips)`);
          else if (tilePips >= 6) sr.push(`Sheds ${tilePips} pips`);

          // Play doubles early
          if (tile.left === tile.right) { ss += 12; sr.push('Clear inflexible double'); }

          // Isolated double setup
          for (const h of hand) {
            if (h.id === tile.id || h.left !== h.right) continue;
            const sup = hand.filter(x => x.id !== h.id && x.id !== tile.id && (x.left === h.left || x.right === h.left)).length;
            if (sup === 0 && (newEnd === h.left || otherEnd === h.left)) { ss += 20; sr.push(`Sets up isolated [${h.left}|${h.left}]`); }
          }

          // Scarcity
          if (knowledge.remainingWithNumber(newEnd) <= 1) { ss -= 8; sr.push(`Few tiles left with ${newEnd}`); }

          // Partner close to winning
          const estPHand = Math.max(0, 6 - knowledge.playsBy[partner].length);
          if (estPHand <= 2 && estPHand > 0) { ss += 15; sr.push(`Partner close (est. ${estPHand} tiles)`); }

          options.push({ tile, score: ss, reasons: sr, side });
        }
        return options;
      });

      scored.sort((a, b) => b.score - a.score);

      if (returnAll) return scored;
      return scored[0] || null;
    }

    // Hand strength evaluation
    function evaluateHandStrength(hand, lE, rE, bLen, player, knowledge) {
      const metrics = {};
      // Suit depth
      const sc = [0,0,0,0,0,0,0];
      for (const t of hand) { sc[t.left]++; if (t.left !== t.right) sc[t.right]++; }
      const maxSuit = Math.max(...sc);
      metrics.suitDepth = { value: maxSuit, label: `Deepest suit: ${maxSuit}`, good: maxSuit >= 4 };

      // Doubles
      const doubles = hand.filter(t => t.left === t.right);
      const isoDoubles = doubles.filter(d => {
        return hand.filter(x => x.id !== d.id && (x.left === d.left || x.right === d.left)).length === 0;
      });
      metrics.doubles = { value: doubles.length, label: `${doubles.length} doubles (${isoDoubles.length} isolated)`, good: doubles.length <= 2 && isoDoubles.length === 0 };

      // Playable now
      const playable = bLen > 0 ? hand.filter(t => canPlay(t, lE, rE, bLen)).length : hand.length;
      metrics.playable = { value: playable, label: `${playable}/${hand.length} playable`, good: playable >= 2 };

      // Total pips (risk in blocked game)
      const pips = hand.reduce((s, t) => s + t.left + t.right, 0);
      metrics.pips = { value: pips, label: `${pips} pips in hand`, good: pips <= 20 };

      // Connectivity (unique numbers covered)
      const nums = new Set();
      for (const t of hand) { nums.add(t.left); nums.add(t.right); }
      metrics.coverage = { value: nums.size, label: `${nums.size}/7 numbers covered`, good: nums.size >= 5 };

      // Overall score 0-100
      let score = 0;
      score += Math.min(maxSuit, 5) * 8; // 0-40
      score += Math.max(0, 3 - doubles.length) * 5; // 0-15
      score -= isoDoubles.length * 10; // penalty
      score += playable * 5; // 0-30
      score += Math.max(0, 30 - pips) * 0.5; // 0-15
      score += nums.size * 2; // 0-14
      score = Math.max(0, Math.min(100, score));

      return { metrics, score, pips };
    }

    // ========== SIMULATION ENGINE ==========

    function simulateFullRound(initHands, startPlayer, initBoard, initLeft, initRight, autoPlayer) {
      const hands = initHands.map(h => h.map(t => ({...t})));
      let board = [...initBoard], lE = initLeft, rE = initRight;
      let cur = startPlayer, passCount = 0;
      const knowledge = new Knowledge();
      // Record auto-played opening tile with actual player for hand-size estimation
      for (const t of initBoard) knowledge.recordPlay(autoPlayer != null ? autoPlayer : -1, t);

      const snapshots = [];
      snapshots.push({
        move: 0, player: -1, action: 'start', tile: null, side: null, reasons: ['Game begins'],
        hands: hands.map(h => h.map(t => ({...t}))),
        board: [...board], leftEnd: lE, rightEnd: rE, currentPlayer: cur,
        knowledge: knowledge.clone()
      });

      let moveNum = 0;
      while (moveNum < 200) {
        moveNum++;
        // Get ALL scored options for this player
        const allOptions = smartAI(hands[cur], lE, rE, board.length, cur, knowledge, true);
        const decision = allOptions.length > 0 ? allOptions[0] : null;

        if (decision) {
          passCount = 0;
          const { tile, side: prefSide, reasons } = decision;
          let side = prefSide;
          if (board.length > 0 && !side) {
            side = (tile.left === lE || tile.right === lE) ? 'left' : 'right';
          }

          const playedTile = {...tile};
          hands[cur] = hands[cur].filter(t => t.id !== tile.id);
          knowledge.recordPlay(cur, tile);

          const pL = lE, pR = rE;

          if (board.length === 0) {
            board = [playedTile]; lE = tile.left; rE = tile.right;
          } else {
            let placed = {...tile};
            if (side === 'left') {
              if (tile.left === lE) placed = {left: tile.right, right: tile.left, id: tile.id};
              board.unshift(placed); lE = placed.left;
            } else {
              if (tile.right === rE) placed = {left: tile.right, right: tile.left, id: tile.id};
              board.push(placed); rE = placed.right;
            }
          }

          let outcome = null;
          if (hands[cur].length === 0) {
            const isD = tile.left === tile.right;
            const wasBoth = couldPlayBothEnds(tile, pL, pR);
            let pts, type;
            if (isD && wasBoth) { pts = 4; type = 'CRUZADA'; }
            else if (isD) { pts = 2; type = 'CARROCA'; }
            else if (wasBoth) { pts = 3; type = 'LA E LO'; }
            else { pts = 1; type = 'NORMAL'; }
            outcome = { type: 'win', winner: cur, team: cur % 2, points: pts, winType: type };
          }

          snapshots.push({
            move: moveNum, player: cur, action: 'play', tile: playedTile, side: side || 'first',
            reasons, score: decision.score,
            allOptions: allOptions.map(o => ({ tile: {...o.tile}, score: o.score, side: o.side, reasons: [...o.reasons] })),
            hands: hands.map(h => h.map(t => ({...t}))),
            board: board.map(t => ({...t})), leftEnd: lE, rightEnd: rE,
            currentPlayer: outcome ? -1 : (cur + 1) % 4,
            knowledge: knowledge.clone(),
            outcome
          });

          if (outcome) return { snapshots, outcome };
          cur = (cur + 1) % 4;

        } else {
          passCount++;
          knowledge.recordPass(cur, lE, rE);

          let outcome = null;
          if (passCount >= 4) {
            const hv = hands.map((h, i) => ({ player: i, team: i%2, points: h.reduce((s,t)=>s+t.left+t.right,0) }));
            const min = Math.min(...hv.map(v => v.points));
            const winners = hv.filter(v => v.points === min);
            if (winners.length > 1 && winners.some(w => w.team===0) && winners.some(w => w.team===1)) {
              outcome = { type: 'tie', points: 0 };
            } else {
              outcome = { type: 'blocked', winner: winners[0].player, team: winners[0].team, points: 1, handValues: hv };
            }
          }

          snapshots.push({
            move: moveNum, player: cur, action: 'pass', tile: null, side: null,
            reasons: [`No tiles matching ${lE} or ${rE}`, `Known dead: {${knowledge.deadNumbers(cur).join(', ')}}`],
            allOptions: [],
            hands: hands.map(h => h.map(t => ({...t}))),
            board: board.map(t => ({...t})), leftEnd: lE, rightEnd: rE,
            currentPlayer: outcome ? -1 : (cur + 1) % 4,
            knowledge: knowledge.clone(),
            outcome
          });

          if (outcome) return { snapshots, outcome };
          cur = (cur + 1) % 4;
        }
      }
      return { snapshots, outcome: { type: 'abort' } };
    }

    function generateGame() {
      const deck = shuffleDeck(ALL_TILES);
      const hands = [[],[],[],[]];
      for (let i = 0; i < 24; i++) hands[i%4].push(deck[i]);

      let hd = -1, hp = 0, ht = null;
      for (let p = 0; p < 4; p++)
        for (const t of hands[p])
          if (t.left === t.right && t.left > hd) { hd = t.left; hp = p; ht = t; }

      const autoTile = {...ht};
      hands[hp] = hands[hp].filter(t => t.id !== ht.id);
      const starter = (hp + 1) % 4;

      return {
        originalHands: hands.map(h => h.map(t => ({...t}))),
        autoPlayedBy: hp,
        autoTile,
        ...simulateFullRound(hands, starter, [autoTile], autoTile.left, autoTile.right, hp)
      };
    }

    // ========== MONTE CARLO LOOKAHEAD ==========

    // Check if player p can hold tile t given knowledge constraints
    function canPlayerHold(p, t, knowledge) {
      if (t.left === t.right) return !knowledge.cantHave[p].has(t.left);
      return !(knowledge.cantHave[p].has(t.left) && knowledge.cantHave[p].has(t.right));
    }

    // Generate a random deal using rejection sampling (unbiased) with backtracking fallback
    function generateConsistentDeal(myHand, handSizes, knowledge, myIdx) {
      const myIds = new Set(myHand.map(t => t.id));
      const pool = [];
      for (const t of ALL_TILES) {
        if (knowledge.played.has(t.id) || myIds.has(t.id)) continue;
        pool.push(t);
      }

      // Pre-compute eligible tiles per player (hard constraint filter)
      const players = [0, 1, 2, 3].filter(p => p !== myIdx);
      const eligible = {};
      for (const p of players) {
        eligible[p] = pool.filter(t => canPlayerHold(p, t, knowledge));
      }

      // Try rejection sampling first (unbiased, fast when constraints are loose)
      for (let attempt = 0; attempt < 200; attempt++) {
        // Shuffle pool
        const shuffled = [...pool];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        // Cut into hands
        const hands = [[], [], [], []];
        hands[myIdx] = [...myHand];
        let idx = 0, valid = true;
        for (const p of players) {
          for (let i = 0; i < handSizes[p]; i++) {
            if (idx >= shuffled.length) { valid = false; break; }
            hands[p].push(shuffled[idx++]);
          }
          if (!valid) break;
          // Validate constraints
          for (const t of hands[p]) {
            if (!canPlayerHold(p, t, knowledge)) { valid = false; break; }
          }
          if (!valid) break;
        }
        if (valid) return hands;
      }

      // Fallback: randomized backtracking (handles tight constraints)
      const hands = [[], [], [], []];
      hands[myIdx] = [...myHand];
      const assigned = new Set();

      // Shuffle player order each call to avoid systematic bias
      const shuffledPlayers = [...players];
      for (let i = shuffledPlayers.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffledPlayers[i], shuffledPlayers[j]] = [shuffledPlayers[j], shuffledPlayers[i]];
      }

      function backtrack(pIdx) {
        if (pIdx >= shuffledPlayers.length) return true;
        const p = shuffledPlayers[pIdx];
        const available = eligible[p].filter(t => !assigned.has(t.id));
        // Shuffle available for randomness
        for (let i = available.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [available[i], available[j]] = [available[j], available[i]];
        }
        if (available.length < handSizes[p]) return false;
        // Pick first handSizes[p] tiles
        const chosen = available.slice(0, handSizes[p]);
        for (const t of chosen) { hands[p].push(t); assigned.add(t.id); }
        if (backtrack(pIdx + 1)) return true;
        // Backtrack
        for (const t of chosen) { hands[p].pop(); assigned.delete(t.id); }
        // Try different random subset (up to 3 retries)
        for (let retry = 0; retry < 3; retry++) {
          for (let i = available.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [available[i], available[j]] = [available[j], available[i]];
          }
          const chosen2 = available.slice(0, handSizes[p]);
          for (const t of chosen2) { hands[p].push(t); assigned.add(t.id); }
          if (backtrack(pIdx + 1)) return true;
          for (const t of chosen2) { hands[p].pop(); assigned.delete(t.id); }
        }
        return false;
      }

      if (backtrack(0)) return hands;

      // Last resort: greedy (old method) — at least returns something
      for (const p of players) {
        for (const t of eligible[p]) {
          if (assigned.has(t.id) || hands[p].length >= handSizes[p]) continue;
          hands[p].push(t);
          assigned.add(t.id);
        }
        // Fill remaining with anything
        if (hands[p].length < handSizes[p]) {
          for (const t of pool) {
            if (assigned.has(t.id) || hands[p].length >= handSizes[p]) continue;
            hands[p].push(t);
            assigned.add(t.id);
          }
        }
      }
      return hands;
    }

    // Compute tile probabilities for a player using MC sampling
    function computeTileProbs(playerIdx, knowledge, handSizes, myHand, myIdx, numSamples = 500) {
      const probs = {};
      const counts = {};
      for (const t of ALL_TILES) {
        if (knowledge.played.has(t.id) || myHand.some(m => m.id === t.id)) continue;
        counts[t.id] = 0;
      }
      let validSamples = 0;
      for (let i = 0; i < numSamples; i++) {
        const deal = generateConsistentDeal(myHand, handSizes, knowledge, myIdx);
        validSamples++;
        for (const t of deal[playerIdx]) {
          if (counts[t.id] !== undefined) counts[t.id]++;
        }
      }
      if (validSamples === 0) return probs;
      for (const id of Object.keys(counts)) {
        probs[id] = counts[id] / validSamples;
      }
      return probs;
    }

    // Simulate a game from a given position using smartAI for all players
    // Returns { winnerTeam, points, type } with full scoring
    function simulateFromPosition(hands, board, lE, rE, nextPlayer, knowledge, initBLen) {
      const simHands = hands.map(h => [...h]);
      let bLen = initBLen != null ? initBLen : (board ? board.length : 0);
      let simLE = lE, simRE = rE;
      let cur = nextPlayer;
      let passCount = 0;
      const simKnowledge = knowledge.clone();
      let prevLE, prevRE; // track ends before last move for scoring

      for (let move = 0; move < 100; move++) {
        const decision = smartAI(simHands[cur], simLE, simRE, bLen, cur, simKnowledge, false);

        if (decision) {
          passCount = 0;
          const { tile, side: prefSide } = decision;
          let side = prefSide;
          if (!side) side = (tile.left === simLE || tile.right === simLE) ? 'left' : 'right';

          simHands[cur] = simHands[cur].filter(t => t.id !== tile.id);
          simKnowledge.recordPlay(cur, tile);

          prevLE = simLE; prevRE = simRE;
          if (bLen === 0) {
            simLE = tile.left; simRE = tile.right;
          } else if (side === 'left') {
            simLE = tile.left === simLE ? tile.right : tile.left;
          } else {
            simRE = tile.right === simRE ? tile.left : tile.right;
          }
          bLen++;

          if (simHands[cur].length === 0) {
            // Score the win
            const isD = tile.left === tile.right;
            const wasBoth = bLen > 1 && couldPlayBothEnds(tile, prevLE, prevRE);
            let pts = 1, type = 'normal';
            if (isD && wasBoth) { pts = 4; type = 'cruzada'; }
            else if (isD) { pts = 2; type = 'carroca'; }
            else if (wasBoth) { pts = 3; type = 'laelo'; }
            return { winnerTeam: cur % 2, points: pts, type };
          }
          cur = (cur + 1) % 4;
        } else {
          passCount++;
          simKnowledge.recordPass(cur, simLE, simRE);
          if (passCount >= 4) {
            const t0 = simHands.filter((h, i) => i % 2 === 0).reduce((s, h) => s + h.reduce((a, t) => a + t.left + t.right, 0), 0);
            const t1 = simHands.filter((h, i) => i % 2 === 1).reduce((s, h) => s + h.reduce((a, t) => a + t.left + t.right, 0), 0);
            if (t0 < t1) return { winnerTeam: 0, points: 1, type: 'blocked' };
            if (t1 < t0) return { winnerTeam: 1, points: 1, type: 'blocked' };
            return { winnerTeam: -1, points: 0, type: 'tie' };
          }
          cur = (cur + 1) % 4;
        }
      }
      return { winnerTeam: -1, points: 0, type: 'tie' };
    }

    // Run Monte Carlo evaluation for all playable tiles from current position
    // Returns rich results: E[pts], win%, block%, outcome distribution
    function monteCarloEval(snap, player, numSims = 80) {
      const hand = snap.hands[player];
      const lE = snap.leftEnd, rE = snap.rightEnd;
      const board = snap.board;
      const knowledge = snap.knowledge;

      const playable = hand.filter(t => canPlay(t, lE, rE, board.length));
      if (playable.length === 0) return [];
      if (playable.length === 1) {
        return [{ tile: playable[0], winRate: 0.5, expectedPoints: 0, sims: 0, side: null,
                  blockRate: 0, outcomes: { normal: 0, carroca: 0, laelo: 0, cruzada: 0, blocked: 0, tie: 0 } }];
      }

      const handSizes = snap.hands.map(h => h.length);
      const myTeam = player % 2;
      const results = [];

      for (const tile of playable) {
        const sides = [];
        if (board.length === 0) {
          sides.push(null);
        } else {
          if (tile.left === lE || tile.right === lE) sides.push('left');
          if ((tile.left === rE || tile.right === rE) && lE !== rE) sides.push('right');
          if (sides.length === 0 && (tile.left === rE || tile.right === rE)) sides.push('right');
        }

        let bestEP = -99, bestWR = 0, bestSide = sides[0];
        let bestOutcomes = null, bestBlockRate = 0;

        for (const side of sides) {
          let wins = 0, totalPts = 0, blocks = 0;
          const outcomes = { normal: 0, carroca: 0, laelo: 0, cruzada: 0, blocked: 0, tie: 0 };

          let newLE = lE, newRE = rE;
          const newBLen = board.length + 1;
          if (board.length === 0) {
            newLE = tile.left; newRE = tile.right;
          } else if (side === 'left') {
            newLE = tile.left === lE ? tile.right : tile.left;
          } else {
            newRE = tile.right === rE ? tile.left : tile.right;
          }

          const newHandSizes = [...handSizes];
          newHandSizes[player]--;

          // Check instant win
          if (newHandSizes[player] === 0) {
            const isD = tile.left === tile.right;
            const wasBoth = board.length > 0 && couldPlayBothEnds(tile, lE, rE);
            let pts = 1, type = 'normal';
            if (isD && wasBoth) { pts = 4; type = 'cruzada'; }
            else if (isD) { pts = 2; type = 'carroca'; }
            else if (wasBoth) { pts = 3; type = 'laelo'; }
            bestEP = pts; bestWR = 1.0; bestSide = side;
            bestOutcomes = { normal: 0, carroca: 0, laelo: 0, cruzada: 0, blocked: 0, tie: 0 };
            bestOutcomes[type] = numSims;
            bestBlockRate = 0;
            break;
          }

          const newKnowledge = knowledge.clone();
          newKnowledge.recordPlay(player, tile);
          const myNewHand = hand.filter(t => t.id !== tile.id);

          for (let sim = 0; sim < numSims; sim++) {
            const simHands = generateConsistentDeal(myNewHand, newHandSizes, newKnowledge, player);
            const result = simulateFromPosition(simHands, null, newLE, newRE, (player + 1) % 4, newKnowledge, newBLen);
            if (result.winnerTeam === myTeam) {
              wins++;
              totalPts += result.points;
            } else if (result.winnerTeam >= 0) {
              totalPts -= result.points;
            }
            if (result.type === 'blocked' || result.type === 'tie') blocks++;
            if (outcomes[result.type] !== undefined) {
              // Attribute outcome to winning/losing team
              outcomes[result.type]++;
            }
          }

          const ep = numSims > 0 ? totalPts / numSims : 0;
          const wr = numSims > 0 ? wins / numSims : 0.5;
          if (ep > bestEP) {
            bestEP = ep; bestWR = wr; bestSide = side;
            bestOutcomes = { ...outcomes };
            bestBlockRate = blocks / numSims;
          }
        }

        results.push({
          tile, side: bestSide,
          winRate: bestWR,
          expectedPoints: bestEP,
          blockRate: bestBlockRate,
          outcomes: bestOutcomes || { normal: 0, carroca: 0, laelo: 0, cruzada: 0, blocked: 0, tie: 0 },
          sims: numSims
        });
      }

      // Sort by expected points (primary), then winRate (tiebreaker)
      return results.sort((a, b) => b.expectedPoints - a.expectedPoints || b.winRate - a.winRate);
    }

    // ========== STATE ==========

    let currentGame = null;
    let currentStep = 0;
    let autoPlayTimer = null;
    let autoPlaySpeed = 1500;
    let gameMode = 'watch'; // 'watch' | 'quiz'
    let scoreMultiplier = 1; // dobrada: doubles after tied block
    let matchScore = [0, 0];  // team0 vs team1 score, first to 6 wins match

    // ========== MATCH EQUITY TABLE ==========
    // ME[s1][s2] = P(team1 wins match | score s1 vs s2), match to 6 pts
    // Point distribution when winning a round: 70% 1pt, 16% 2pt, 10% 3pt, 4% 4pt
    const MATCH_TARGET = 6;
    const POINT_DIST = [
      { pts: 1, prob: 0.70 },  // normal + blocked
      { pts: 2, prob: 0.16 },  // carroca
      { pts: 3, prob: 0.10 },  // la-e-lo
      { pts: 4, prob: 0.04 }   // cruzada
    ];

    // Pre-compute match equity table using DP
    const ME = (() => {
      const tbl = Array.from({length: MATCH_TARGET + 5}, () =>
        new Float64Array(MATCH_TARGET + 5)
      );
      // Base cases
      for (let s2 = 0; s2 <= MATCH_TARGET + 4; s2++) {
        for (let s1 = MATCH_TARGET; s1 <= MATCH_TARGET + 4; s1++) {
          tbl[s1][s2] = s2 >= MATCH_TARGET ? 0.5 : 1.0; // both >= target: 50/50
        }
      }
      for (let s1 = 0; s1 < MATCH_TARGET; s1++) {
        for (let s2 = MATCH_TARGET; s2 <= MATCH_TARGET + 4; s2++) {
          tbl[s1][s2] = 0.0;
        }
      }
      // Fill bottom-up
      for (let s1 = MATCH_TARGET - 1; s1 >= 0; s1--) {
        for (let s2 = MATCH_TARGET - 1; s2 >= 0; s2--) {
          let val = 0;
          for (const { pts, prob } of POINT_DIST) {
            const s1w = Math.min(s1 + pts, MATCH_TARGET + 4);
            const s2w = Math.min(s2 + pts, MATCH_TARGET + 4);
            // 50% we win with these pts, 50% they win with these pts
            val += 0.5 * prob * tbl[s1w][s2] + 0.5 * prob * tbl[s1][s2w];
          }
          tbl[s1][s2] = val;
        }
      }
      return tbl;
    })();

    // Get match equity given current scores
    function getMatchEquity(s1, s2) {
      const c1 = Math.min(s1, MATCH_TARGET + 4);
      const c2 = Math.min(s2, MATCH_TARGET + 4);
      return ME[c1][c2];
    }

    // Convert round E[pts] to match equity change
    // epts = signed expected points for our team this round (+ours, -theirs)
    function roundToMatchEquity(epts, myTeamScore, oppTeamScore) {
      const currentME = getMatchEquity(myTeamScore, oppTeamScore);
      // Approximate: weight outcomes by point distribution
      // epts already accounts for scoring type, so we need to map to match equity shift
      // Simple linear approximation: each point changes ME by (ME(s+1,o) - ME(s,o)) on average
      const mePerPt = getMatchEquity(Math.min(myTeamScore + 1, MATCH_TARGET), oppTeamScore) - currentME;
      return epts * mePerPt;
    }

    let rightPanelTab = 'reasoning'; // 'reasoning' | 'probability' | 'stats' | 'guide'
    let deepAnalysis = false;        // Monte Carlo toggle
    let mcResults = null;            // cached MC results for current step
    let mcRunning = false;           // is MC currently computing?

    // Quiz state
    let quizWaiting = false;       // Are we waiting for user to pick a tile?
    let quizSidePick = null;       // {tile, canLeft, canRight} — waiting for side choice
    let quizResult = null;         // { userTile, userSide, aiTile, aiSide, grade, scoreDiff }
    let quizShowingResult = false;

    // Stats tracking (persists across games in session)
    let stats = {
      totalMoves: 0,
      optimalMoves: 0,
      goodMoves: 0,    // inaccuracy (small equity loss)
      okMoves: 0,      // mistake (medium equity loss)
      badMoves: 0,     // blunder (large equity loss)
      games: 0,
      totalEquityLoss: 0,  // cumulative E[pts] equity loss
      history: []  // last 30 decisions
    };

    // Load stats from localStorage
    try {
      const saved = localStorage.getItem('domino-trainer-stats');
      if (saved) stats = JSON.parse(saved);
    } catch(e) {}

    function saveStats() {
      try { localStorage.setItem('domino-trainer-stats', JSON.stringify(stats)); } catch(e) {}
    }

    // ========== QUIZ LOGIC ==========

    function isQuizTurn() {
      if (gameMode !== 'quiz' || !currentGame) return false;
      const snap = currentGame.snapshots[currentStep];
      // We quiz on P0's turns (the next move to be revealed)
      // The snapshot at currentStep shows the state BEFORE this move
      // Actually, we need to check the NEXT snapshot's player
      const nextStep = currentStep + 1;
      if (nextStep >= currentGame.snapshots.length) return false;
      const nextSnap = currentGame.snapshots[nextStep];
      return nextSnap.player === 0;
    }

    function startQuiz() {
      quizWaiting = true;
      quizResult = null;
      quizShowingResult = false;
      quizSidePick = null;
      render();
    }

    function quizPickTile(tileId) {
      if (!quizWaiting || quizSidePick) return;
      const snap = currentGame.snapshots[currentStep];
      const tile = snap.hands[0].find(t => t.id === tileId);
      if (!tile) return;

      // Check if this tile can play on both sides
      const canLeft = canPlayOnSide(tile, snap.leftEnd);
      const canRight = canPlayOnSide(tile, snap.rightEnd);

      if (snap.leftEnd === snap.rightEnd) {
        // Both ends same number, only one effective side
        if (canLeft) {
          finishQuizPick(tile, 'left');
        } else {
          // tile can't play — user picked wrong
          finishQuizPick(tile, null);
        }
      } else if (canLeft && canRight) {
        // Tile can play both sides — ask which
        quizSidePick = { tile, canLeft, canRight };
        render();
      } else if (canLeft) {
        finishQuizPick(tile, 'left');
      } else if (canRight) {
        finishQuizPick(tile, 'right');
      }
    }

    function quizPickSide(side) {
      if (!quizSidePick) return;
      const tile = quizSidePick.tile;
      quizSidePick = null; // clear BEFORE render triggered by finishQuizPick
      finishQuizPick(tile, side);
    }

    function quizPass() {
      if (!quizWaiting) return;
      // Passing is always correct when you have no playable tiles — just advance
      quizWaiting = false;
      stepForward();
    }

    function finishQuizPick(userTile, userSide) {
      const nextSnap = currentGame.snapshots[currentStep + 1];
      const snap = currentGame.snapshots[currentStep];
      const aiTile = nextSnap.tile;
      const aiSide = nextSnap.side;
      const aiScore = nextSnap.score || 0;

      // Find user's tile score and reasons from allOptions
      const allOpts = nextSnap.allOptions || [];
      const userOpt = allOpts.find(o => o.tile.id === userTile.id && (o.side === userSide || !userSide));
      const aiOpt = allOpts.find(o => o.tile.id === aiTile.id && o.side === aiSide);
      const userScore = userOpt ? userOpt.score : -50;
      const scoreDiff = aiScore - userScore;

      // Run Monte Carlo for equity loss computation
      let quizMC = null;
      if (deepAnalysis) {
        quizMC = monteCarloEval(snap, 0, MC_SIMS_QUIZ);
      }

      // Compute equity loss from MC (primary) or heuristic (fallback)
      let equityLoss = 0;
      let equityLossSource = 'heuristic';
      const canP = canPlay(userTile, snap.leftEnd, snap.rightEnd, snap.board.length);

      if (!canP) {
        equityLoss = 99; // invalid play sentinel
      } else if (quizMC && quizMC.length > 0) {
        // MC-based equity loss: difference in E[pts] between best and user's choice
        const mcBest = quizMC[0]; // sorted by expectedPoints
        const mcUser = quizMC.find(m => m.tile.id === userTile.id);
        if (mcBest && mcUser) {
          equityLoss = mcBest.expectedPoints - mcUser.expectedPoints;
          equityLossSource = 'mc';
        } else if (mcBest) {
          equityLoss = Math.max(0, mcBest.expectedPoints); // can't find user tile in MC → big miss
          equityLossSource = 'mc';
        }
      } else {
        // Heuristic fallback: normalize score diff to E[pts] scale (~0-2 range)
        equityLoss = Math.max(0, scoreDiff) / 25; // rough mapping: 25 heuristic pts ≈ 1 E[pts]
      }

      // Grade based on equity loss (in expected points)
      let grade;
      if (!canP) {
        grade = 'bad';
      } else if (userTile.id === aiTile.id && userSide === aiSide) {
        grade = 'perfect';
      } else if (equityLoss < 0.05) {
        grade = 'perfect'; // negligible difference
      } else if (equityLoss < 0.15) {
        grade = 'good';    // inaccuracy
      } else if (equityLoss < 0.40) {
        grade = 'ok';      // mistake
      } else {
        grade = 'bad';     // blunder
      }

      // Build detailed explanation context
      const knowledge = snap.knowledge;
      const hand = snap.hands[0];
      const lE = snap.leftEnd, rE = snap.rightEnd;

      // Compute what ends each choice creates
      const aiNewEnds = computeNewEnds(aiTile, aiSide, lE, rE);
      const userNewEnds = userSide ? computeNewEnds(userTile, userSide, lE, rE) : null;

      // Build detailed comparison
      const detail = buildDetailedExplanation({
        userTile, userSide, userScore, userReasons: userOpt ? userOpt.reasons : [],
        aiTile, aiSide, aiScore, aiReasons: aiOpt ? aiOpt.reasons : nextSnap.reasons || [],
        aiNewEnds, userNewEnds,
        hand, knowledge, lE, rE, grade, scoreDiff, allOptions: allOpts
      });

      // Match equity context
      const meNow = getMatchEquity(matchScore[0], matchScore[1]);
      const meShift = equityLossSource === 'mc' ? roundToMatchEquity(equityLoss, matchScore[0], matchScore[1]) : null;

      quizResult = {
        userTile, userSide, aiTile, aiSide, grade, scoreDiff, userScore, aiScore,
        allOptions: allOpts, detail, aiNewEnds, userNewEnds,
        userReasons: userOpt ? userOpt.reasons : [],
        aiReasons: aiOpt ? aiOpt.reasons : nextSnap.reasons || [],
        mcResults: quizMC,
        equityLoss: Math.round(equityLoss * 1000) / 1000,
        equityLossSource,
        matchEquity: meNow,
        matchEquityShift: meShift
      };
      quizWaiting = false;
      quizShowingResult = true;

      // Track stats
      stats.totalMoves++;
      if (grade === 'perfect') stats.optimalMoves++;
      else if (grade === 'good') stats.goodMoves++;
      else if (grade === 'ok') stats.okMoves++;
      else stats.badMoves++;
      if (typeof stats.totalEquityLoss !== 'number') stats.totalEquityLoss = 0;
      stats.totalEquityLoss += equityLoss < 90 ? equityLoss : 0; // skip invalid-play sentinel
      stats.history.push({
        grade, scoreDiff, equityLoss: Math.round(equityLoss * 1000) / 1000,
        userTile: `${userTile.left}-${userTile.right}`,
        aiTile: `${aiTile.left}-${aiTile.right}`
      });
      if (stats.history.length > 30) stats.history.shift();
      saveStats();

      render();
    }

    function computeNewEnds(tile, side, lE, rE) {
      if (!side) return { newLeft: lE, newRight: rE };
      if (side === 'left') {
        const newL = tile.left === lE ? tile.right : tile.left;
        return { newLeft: newL, newRight: rE };
      } else {
        const newR = tile.right === rE ? tile.left : tile.right;
        return { newLeft: lE, newRight: newR };
      }
    }

    function buildDetailedExplanation(ctx) {
      const { userTile, userSide, userScore, userReasons, aiTile, aiSide, aiScore, aiReasons,
              aiNewEnds, userNewEnds, hand, knowledge, lE, rE, grade, scoreDiff, allOptions } = ctx;
      const lines = [];
      const pNames = PLAYER_NAMES_FULL;

      if (grade === 'perfect') {
        lines.push({ type: 'success', text: `You picked the optimal play! [${aiTile.left}|${aiTile.right}] on ${aiSide}. Well done.` });
        if (aiReasons.length > 0) {
          lines.push({ type: 'info', text: `Why it's best: ${aiReasons.join('. ')}` });
        }
        return lines;
      }

      // === HEADER: What AI chose and why ===
      lines.push({ type: 'header', text: `Better play: [${aiTile.left}|${aiTile.right}] on ${aiSide}` });

      // AI's reasons
      if (aiReasons.length > 0) {
        for (const r of aiReasons) {
          lines.push({ type: 'ai-reason', text: r });
        }
      }

      // === What you chose and its shortcomings ===
      lines.push({ type: 'header2', text: `Your pick: [${userTile.left}|${userTile.right}]${userSide ? ' on ' + userSide : ''}` });
      if (userReasons.length > 0) {
        for (const r of userReasons) {
          lines.push({ type: 'user-reason', text: r });
        }
      }

      // === DETAILED COMPARISON ===

      // 1. Board ends comparison
      if (aiNewEnds && userNewEnds) {
        const aiEnds = `${aiNewEnds.newLeft}/${aiNewEnds.newRight}`;
        const userEnds = `${userNewEnds.newLeft}/${userNewEnds.newRight}`;
        if (aiEnds !== userEnds) {
          // Count how many tiles in remaining hand match each set of ends
          const remainingHand = hand.filter(t => t.id !== aiTile.id && t.id !== userTile.id);
          const aiMyFollow = hand.filter(t => t.id !== aiTile.id &&
            (t.left === aiNewEnds.newLeft || t.right === aiNewEnds.newLeft || t.left === aiNewEnds.newRight || t.right === aiNewEnds.newRight)).length;
          const userMyFollow = hand.filter(t => t.id !== userTile.id &&
            (t.left === userNewEnds.newLeft || t.right === userNewEnds.newLeft || t.left === userNewEnds.newRight || t.right === userNewEnds.newRight)).length;

          if (aiMyFollow > userMyFollow) {
            lines.push({ type: 'compare',
              text: `Board ends: AI leaves ${aiEnds} (you have ${aiMyFollow} follow-up tiles) vs your pick leaves ${userEnds} (only ${userMyFollow} follow-ups). More follow-ups = you stay in control.`
            });
          } else if (aiMyFollow < userMyFollow) {
            lines.push({ type: 'compare',
              text: `Board ends: Your pick leaves ${userEnds} (${userMyFollow} follow-ups) vs AI's ${aiEnds} (${aiMyFollow}). Your ends are actually better for suit control, but other factors matter more here.`
            });
          }
        }
      }

      // 2. Opponent analysis from passes
      for (const oppIdx of [1, 3]) {
        const dead = knowledge ? knowledge.deadNumbers(oppIdx) : [];
        if (dead.length === 0) continue;

        if (aiNewEnds) {
          const aiBlocksOpp = dead.includes(aiNewEnds.newLeft) && dead.includes(aiNewEnds.newRight);
          const userBlocksOpp = userNewEnds && dead.includes(userNewEnds.newLeft) && dead.includes(userNewEnds.newRight);

          if (aiBlocksOpp && !userBlocksOpp) {
            lines.push({ type: 'opponent',
              text: `${pNames[oppIdx]} passed and can't have {${dead.join(', ')}}. The AI's play leaves ends ${aiNewEnds.newLeft}/${aiNewEnds.newRight} which BLOCKS them completely — they'll pass again. Your pick doesn't achieve this.`
            });
          }
        }
      }

      // 3. Partner analysis
      if (knowledge) {
        const partnerDead = knowledge.deadNumbers(2);
        const partnerStrength = knowledge.inferStrength(2);
        const partnerPlays = knowledge.playsBy[2] || [];

        if (aiNewEnds && userNewEnds) {
          // Does AI's play help partner more?
          const aiPartnerHelp = !partnerDead.includes(aiNewEnds.newLeft) || !partnerDead.includes(aiNewEnds.newRight);
          const userPartnerHurt = partnerDead.includes(userNewEnds.newLeft) && partnerDead.includes(userNewEnds.newRight);

          if (userPartnerHurt && aiPartnerHelp) {
            lines.push({ type: 'partner',
              text: `Partner can't have {${partnerDead.join(', ')}}. Your pick leaves ends ${userNewEnds.newLeft}/${userNewEnds.newRight} which blocks your own partner! The AI avoids this.`
            });
          }

          // Partner suit affinity — only if tiles with that number are still out there
          const strongSuits = partnerStrength.map((v, i) => ({ suit: i, count: v })).filter(x => x.count >= 2).sort((a, b) => b.count - a.count);
          if (strongSuits.length > 0 && knowledge) {
            const topSuit = strongSuits[0].suit;
            const remaining = knowledge.remainingWithNumber(topSuit);
            const weHold = hand.filter(t => t.left === topSuit || t.right === topSuit).length;
            const othersCouldHave = remaining - weHold;
            if (othersCouldHave > 0 && !partnerDead.includes(topSuit)) {
              const aiHasPartnerSuit = aiNewEnds.newLeft === topSuit || aiNewEnds.newRight === topSuit;
              const userHasPartnerSuit = userNewEnds.newLeft === topSuit || userNewEnds.newRight === topSuit;
              if (aiHasPartnerSuit && !userHasPartnerSuit) {
                lines.push({ type: 'partner',
                  text: `Partner played ${strongSuits[0].count} tiles with ${topSuit}s and ${othersCouldHave} tiles with ${topSuit} are still unaccounted for (not in your hand or played). AI leaves a ${topSuit}-end so partner can likely play. Your pick doesn't.`
                });
              }
            }
          }
        }

        // Partner close to winning
        const estPartnerHand = Math.max(0, 6 - partnerPlays.length);
        if (estPartnerHand <= 2 && estPartnerHand > 0) {
          lines.push({ type: 'partner',
            text: `Partner has ~${estPartnerHand} tile${estPartnerHand > 1 ? 's' : ''} left — they're close to winning! Prioritize leaving ends they can play, even at your own expense.`
          });
        }
      }

      // 4. Double management
      if (aiTile.left === aiTile.right && userTile.left !== userTile.right) {
        const aiDblNum = aiTile.left;
        const support = hand.filter(t => t.id !== aiTile.id && (t.left === aiDblNum || t.right === aiDblNum)).length;
        if (support === 0) {
          lines.push({ type: 'strategy',
            text: `The AI plays the isolated double [${aiDblNum}|${aiDblNum}] now while it can. Doubles only match one number and become harder to play later. If you hold it and the board moves away from ${aiDblNum}s, you're stuck with it.`
          });
        } else {
          lines.push({ type: 'strategy',
            text: `The AI clears the double [${aiDblNum}|${aiDblNum}] early — doubles are inflexible (only connect to one number). Better to play them when the opportunity is there.`
          });
        }
      }

      // 5. Heavy tile dumping
      if (aiTile.left + aiTile.right > userTile.left + userTile.right + 3) {
        lines.push({ type: 'strategy',
          text: `The AI dumps the heavier tile (${aiTile.left + aiTile.right} pips vs your ${userTile.left + userTile.right} pips). If the game blocks, your team's total pips decide who loses. Getting rid of heavy tiles early is safer.`
        });
      }

      // 6. Scarcity warning
      if (knowledge && aiNewEnds) {
        const aiLeftRem = knowledge.remainingWithNumber(aiNewEnds.newLeft);
        const aiRightRem = knowledge.remainingWithNumber(aiNewEnds.newRight);
        if (userNewEnds) {
          const userLeftRem = knowledge.remainingWithNumber(userNewEnds.newLeft);
          const userRightRem = knowledge.remainingWithNumber(userNewEnds.newRight);
          if ((userLeftRem <= 1 || userRightRem <= 1) && aiLeftRem > 1 && aiRightRem > 1) {
            const scarce = userLeftRem <= 1 ? userNewEnds.newLeft : userNewEnds.newRight;
            lines.push({ type: 'warning',
              text: `Your pick creates a near-dead end: only ${knowledge.remainingWithNumber(scarce)} tile(s) left with ${scarce}. The board could stall. The AI avoids scarce numbers as ends.`
            });
          }
        }
      }

      // If no detailed lines beyond header, add a generic one
      if (lines.filter(l => !l.type.includes('header') && l.type !== 'user-reason').length === 0) {
        lines.push({ type: 'info', text: `The AI's choice is stronger due to a combination of suit control, blocking opponents, and/or supporting your partner.` });
      }

      return lines;
    }

    // Convert raw AI score to human-readable quality label
    function scoreToQuality(score, allScores) {
      if (allScores.length <= 1) return { label: 'Only option', cls: 'text-slate-400' };
      const best = allScores[0];
      const worst = allScores[allScores.length - 1];
      const range = best - worst;
      if (range === 0) return { label: 'Equal', cls: 'text-slate-400' };
      const pct = range > 0 ? ((score - worst) / range * 100) : 50;
      if (pct >= 90) return { label: 'Best', cls: 'text-emerald-400' };
      if (pct >= 65) return { label: 'Good', cls: 'text-yellow-400' };
      if (pct >= 35) return { label: 'Okay', cls: 'text-orange-400' };
      return { label: 'Weak', cls: 'text-red-400' };
    }

    // Normalize raw heuristic score to 0-100 scale relative to options
    function scorePct(score, allScores) {
      if (allScores.length <= 1) return 100;
      const best = allScores[0], worst = allScores[allScores.length - 1];
      const range = best - worst;
      return range > 0 ? Math.round((score - worst) / range * 100) : 100;
    }

    // Color for a 0-100 score
    function scoreColor(pct) {
      if (pct >= 80) return '#22c55e';
      if (pct >= 50) return '#eab308';
      if (pct >= 25) return '#f97316';
      return '#ef4444';
    }

      const allScores = (r.allOptions || []).map(o => o.score);

      // Icon map for detail line types
      const iconMap = {

        'header2': 'text-yellow-300 font-bold',
        'ai-reason': 'text-emerald-200',

        'compare': 'text-blue-200',
        'opponent': 'text-red-200',
        'partner': 'text-blue-200',

      // Equity loss display

        <div class="flex items-center gap-2 mb-2 flex-wrap">
          <span class="grade-badge ${gradeCls}">${gradeText}</span>
          ${r.grade !== 'perfect' ? (() => {
            return `<span class="text-xs font-mono font-bold" style="color:${eqColor}">EL: ${eqLoss.toFixed(2)} pts</span>
              <span class="text-xs text-slate-600">(${eqSrc})</span>
              ${mcUser && mcBest ? `<span class="text-xs text-slate-500">|</span>
                <span class="text-xs text-slate-400">[${r.userTile.left}|${r.userTile.right}]</span>
                <span class="text-xs font-mono" style="color:${epColor(mcUser.expectedPoints)}">${fmtEP(mcUser.expectedPoints)}</span>
                <span class="text-xs text-slate-500">&rarr;</span>
                <span class="text-xs text-slate-400">[${r.aiTile.left}|${r.aiTile.right}]</span>
                <span class="text-xs font-mono text-emerald-400">${fmtEP(mcBest.expectedPoints)}</span>` :
              `<span class="text-xs text-slate-500">|</span>
                <span class="text-xs text-slate-400">[${r.userTile.left}|${r.userTile.right}]</span>
                <span class="text-xs text-slate-500">&rarr;</span>
                <span class="text-xs text-slate-400">[${r.aiTile.left}|${r.aiTile.right}]</span>`}`;
          })() : `<span class="text-xs font-mono text-emerald-400">EL: 0.00</span>
            ${mcBest ? `<span class="text-xs font-mono text-emerald-400">E[pts]: ${fmtEP(mcBest.expectedPoints)}</span>` : ''}`}
          <span class="text-xs text-slate-600 ml-auto">Match: ${matchScore[0]}-${matchScore[1]} | ME: ${(getMatchEquity(matchScore[0], matchScore[1]) * 100).toFixed(0)}%</span>
        </div>

        <!-- Detailed explanation -->
        <div class="space-y-1.5 mb-2">
          ${detailLines.map(line => `
            <div class="text-xs ${colorMap[line.type] || 'text-slate-300'} flex items-start gap-1.5">
              <span class="mt-0.5 flex-shrink-0">${iconMap[line.type] || ''}</span>
              <span>${line.text}</span>
            </div>
          `).join('')}
        </div>

        ${r.allOptions && r.allOptions.length > 1 ? `
        <div class="border-t border-slate-700 pt-1.5 mt-1.5">
          <div class="text-xs text-slate-500 mb-1 flex items-center gap-3">
            <span>Tile ranking:</span>
            <span class="text-slate-600 font-mono">H = heuristic${r.mcResults ? '  E[pts] = MC expected points' : ''}</span>
          </div>
          ${(() => {
            // Merge heuristic and MC data, sort by MC E[pts] if available
            const merged = r.allOptions.slice(0, 6).map(o => {
              const mc = r.mcResults ? r.mcResults.find(m => m.tile.id === o.tile.id) : null;
              return { ...o, mc };
            });
            if (r.mcResults) merged.sort((a, b) => (b.mc ? b.mc.expectedPoints : -99) - (a.mc ? a.mc.expectedPoints : -99));
            const bestEP = merged[0]?.mc?.expectedPoints;
            return merged.map((o, i) => {
              const hPct = scorePct(o.score, allScores);
              const hCol = scoreColor(hPct);
              const isAi = o.tile.id === r.aiTile.id && o.side === r.aiSide;
              const isUser = o.tile.id === r.userTile.id && o.side === r.userSide;
              const tag = isAi ? 'AI' : isUser ? 'YOU' : '';
              const mc = o.mc;
              const ep = mc ? mc.expectedPoints : null;
              const epCol = mc ? epColor(ep) : '';
              const tileLoss = mc && bestEP !== undefined ? bestEP - ep : null;
              return `<div class="text-xs mb-1.5">
                <div class="flex items-center gap-1">
                  <span class="font-mono w-3 text-slate-500">${i+1}.</span>
                  <span class="${isAi ? 'text-emerald-400 font-bold' : isUser ? 'text-yellow-400' : 'text-slate-400'} w-14">[${o.tile.left}|${o.tile.right}] ${o.side}</span>
                  <span class="font-mono font-bold w-8 text-right" style="color:${hCol}">H:${hPct}</span>
                  ${ep !== null ? `<span class="font-mono font-bold w-12 text-right" style="color:${epCol}">${fmtEP(ep)}</span>
                  <div class="flex-1 bg-slate-700 rounded-full h-1.5 mx-1 relative" style="max-width:50px">
                    <div class="absolute top-0 left-1/2 w-px h-1.5 bg-slate-500"></div>

                  `<div class="flex-1 bg-slate-700 rounded-full h-1.5 mx-1" style="max-width:50px"><div class="h-1.5 rounded-full" style="width:${hPct}%;background:${hCol}"></div></div>`}
                  ${tileLoss !== null && tileLoss > 0.01 ? `<span class="font-mono text-red-400 w-10 text-right">-${tileLoss.toFixed(2)}</span>` : tileLoss !== null ? `<span class="font-mono text-emerald-400 w-10 text-right">BEST</span>` : ''}
                  ${tag ? `<span class="font-mono text-xs px-1 rounded ${isAi ? 'bg-emerald-900 text-emerald-300' : 'bg-yellow-900 text-yellow-300'}">${tag}</span>` : ''}

        ${r.mcResults && r.mcResults.length > 0 ? `
        <div class="border-t border-blue-800 pt-1.5 mt-1.5">
          <div class="text-xs text-blue-400 font-bold mb-1">Monte Carlo verdict:</div>
          <div class="text-xs text-blue-300">Best: [${r.mcResults[0].tile.left}|${r.mcResults[0].tile.right}] E[pts]: ${fmtEP(r.mcResults[0].expectedPoints)} | Win: ${(r.mcResults[0].winRate*100).toFixed(0)}%</div>
          ${r.mcResults[0].tile.id !== r.aiTile.id ? '<div class="text-xs text-yellow-400">MC disagrees with heuristic — simulation sees deeper!</div>' : '<div class="text-xs text-emerald-400">MC confirms the heuristic choice</div>'}

    function renderSidePlayer(playerIdx, snap, names, teams, colors) {
      const hand = snap.hands[playerIdx] || [];
      const isActive = snap.currentPlayer === playerIdx;
      const justPassed = snap.action === 'pass' && snap.player === playerIdx;

      const borderCls = justPassed ? 'border-red-500' : highlight ? 'border-yellow-500' : isActive ? 'active-turn border-emerald-500' : 'border-slate-700';
      const statusText = autoPlayed ? `<div class="text-xs text-yellow-400 text-center mt-1 font-bold">OPENED</div>`
        : justPassed ? `<div class="text-xs text-red-400 text-center mt-1 font-bold animate-pulse">PASSED!</div>`
        : justPlayed ? `<div class="text-xs text-yellow-400 text-center mt-1 font-bold">PLAYED</div>`
        : isActive ? '<div class="text-xs text-emerald-400 text-center mt-1 font-bold">Playing</div>' : '';

      return `
        <div class="player-area bg-slate-800 rounded-xl p-2 border-2 h-full flex flex-col ${borderCls}">
          <div class="text-xs font-bold text-center mb-1" style="color:${colors[playerIdx%2]}">${names[playerIdx].split('(')[0].trim()}</div>

          <div class="flex flex-col gap-0.5 items-center flex-1 justify-center">
            ${hand.map(() => `<div class="w-12 h-3 rounded-sm border border-slate-600 bg-slate-700"></div>`).join('')}
          </div>
          ${statusText}
        </div>`;

    function renderBoard(snap) {
      if (!snap.board || snap.board.length === 0) return '<div class="text-green-700 text-sm" style="display:flex;align-items:center;justify-content:center;height:100%">Empty board</div>';

      const TW = 50, DW = 28; // tile widths: horizontal / double(vertical)

      const makeTile = t => {
        const isD = t.left === t.right;
        const isNew = snap.action === 'play' && snap.tile && snap.tile.id === t.id;
        return `<div style="flex-shrink:0" class="${isNew ? 'ring-2 ring-emerald-400 rounded' : ''}">${tileHTML(t, 'board', isD ? 'v' : 'h')}</div>`;
      };

      // Get available width from board container (minus padding)
      const boardEl = document.getElementById('board-area');
      const maxW = boardEl ? boardEl.clientWidth - 20 : 480;

      // Split tiles into rows
      const rows = [[]];
      let rowW = 0;
      for (const t of snap.board) {
        const w = t.left === t.right ? DW : TW;
        if (rowW + w > maxW && rows[rows.length - 1].length > 0) {
          rows.push([]);
          rowW = 0;
        }
        rows[rows.length - 1].push(t);
        rowW += w;
      }

      // Single row — just center it
      if (rows.length === 1) {
        return `<div style="display:flex;gap:1px;align-items:center;justify-content:center">${rows[0].map(makeTile).join('')}</div>`;
      }

      // Multi-row zigzag snake (like real domino apps)
      // Even rows: left-to-right. Odd rows: right-to-left.
      // Connected by a vertical bar on the turn side.
      let html = '';
      for (let ri = 0; ri < rows.length; ri++) {
        const ltr = ri % 2 === 0;

        // Row direction: row-reverse puts first DOM child (chain-order) on the RIGHT
        const dir = ltr ? 'row' : 'row-reverse';
        const tiles = rows[ri].map(makeTile).join('');
        html += `<div style="display:flex;gap:1px;align-items:center;flex-direction:${dir}">${tiles}</div>`;

        // Vertical connector between rows (on the side where the chain turns)
        if (ri < rows.length - 1) {
          // After LTR row → connector on right side. After RTL row → connector on left side.
          const side = ltr ? 'flex-end' : 'flex-start';
          html += `<div style="display:flex;justify-content:${side}">` +
                  `<div style="width:4px;height:16px;background:#86efac;border-radius:2px;margin:0 12px"></div></div>`;
        }
      }
      return html;
    }

    function renderHandStrength(hs, tileCount) {
      if (tileCount === 0) return '';
      const score = hs.score;
      const color = score >= 65 ? '#22c55e' : score >= 45 ? '#eab308' : score >= 30 ? '#f97316' : '#ef4444';
      const label = score >= 65 ? 'Strong' : score >= 45 ? 'Average' : score >= 30 ? 'Weak' : 'Danger';

      return `<div class="bg-slate-800 rounded-lg px-3 py-1.5 mt-2 flex items-center gap-3">
        <span class="text-xs text-slate-400 w-20">Hand Strength</span>
        <div class="flex-1 bg-slate-700 rounded-full h-2.5">
          <div class="strength-bar" style="width:${score}%; background:${color}"></div>
        </div>
        <span class="text-xs font-bold w-16 text-right" style="color:${color}">${score.toFixed(0)}% ${label}</span>
        <div class="flex gap-2 ml-2">
          ${Object.values(hs.metrics).map(m =>
            `<span class="text-xs tooltip ${m.good ? 'text-slate-400' : 'text-orange-400'}">
              ${m.label.split(':')[0].split(' ')[0]}
              <span class="tip-text">${m.label}</span>
            </span>`
          ).join('')}
        </div>
      </div>`;
    }

    // ========== RIGHT PANEL TABS ==========

    function renderReasoningPanel(snap, pNames, pTeams, teamColors) {
      const allScores = (snap.allOptions || []).map(o => o.score);
      return `
        <!-- Current move detail -->
        ${snap.move > 0 ? `
        <div class="bg-slate-900 rounded-lg p-2.5 mb-2 border ${snap.action === 'pass' ? 'border-orange-500' : 'border-emerald-500'}">
          <div class="flex items-center gap-2 mb-1">
            <span class="text-xs font-bold px-2 py-0.5 rounded" style="background:${teamColors[snap.player%2]}">${pn(snap.player)}</span>
            <span class="text-xs font-bold ${snap.action === 'pass' ? 'text-orange-400' : 'text-emerald-400'}">
              ${snap.action === 'pass' ? 'PASSES' : `plays [${snap.tile.left}|${snap.tile.right}] on ${snap.side}`}
            </span>
          </div>
          <div class="text-xs text-slate-500 mb-1">Why this tile:</div>

          ${snap.allOptions && snap.allOptions.length > 1 ? `
          <div class="mt-2 pt-1.5 border-t border-slate-700">

            ${(() => {
              const opts = snap.allOptions.slice(0, 6).map(o => {
                const mc = mcResults ? mcResults.find(m => m.tile.id === o.tile.id) : null;
                return { ...o, mc };
              });
              // Sort by MC E[pts] if available
              if (mcResults) opts.sort((a, b) => (b.mc ? b.mc.expectedPoints : -99) - (a.mc ? a.mc.expectedPoints : -99));
              const bestEP = opts[0]?.mc?.expectedPoints;
              return opts.map((o, i) => {
                const hPct = scorePct(o.score, allScores);

                return `<div class="text-xs ${i === 0 ? 'text-emerald-400 font-bold' : 'text-slate-500'} mb-1">
                  <div class="flex items-center gap-1">
                    <span class="font-mono w-3">${i+1}.</span>
                    <span class="w-14">[${o.tile.left}|${o.tile.right}]${o.side ? ' '+o.side : ''}</span>
                    <span class="font-mono font-bold w-7 text-right" style="color:${hCol}">${hPct}</span>
                    ${ep !== null ? `<span class="font-mono font-bold w-12 text-right" style="color:${epCol}">${fmtEP(ep)}</span>
                    ${tileLoss !== null && tileLoss > 0.01 ? `<span class="font-mono text-red-400 w-10 text-right">-${tileLoss.toFixed(2)}</span>` : `<span class="font-mono text-emerald-400 w-10">BEST</span>`}` :
                    `<div class="bg-slate-700 rounded-full h-1.5 mx-1" style="width:50px"><div class="h-1.5 rounded-full" style="width:${hPct}%;background:${hCol}"></div></div>`}
                  </div>
                  ${o.reasons.length > 0 ? `<div class="ml-4 text-slate-600">${o.reasons.map(r => '· ' + r).join('<br>')}</div>` : ''}
                </div>`;

          </div>` : ''}
        </div>` : `
        <div class="bg-slate-900 rounded-lg p-2.5 mb-2 border border-slate-600">
          <div class="text-xs text-slate-400">
            ${pn(currentGame.autoPlayedBy)} auto-plays [${currentGame.autoTile.left}|${currentGame.autoTile.right}] (highest double — first round rule).
          </div>
        </div>`}

        <!-- Monte Carlo Analysis -->
        ${renderMCPanel()}

        <!-- Teaching tip -->
        ${renderTeachingTip(snap)}

        <!-- Knowledge panel -->
        <div class="bg-slate-900 rounded-lg p-2 mb-2">
          <div class="text-xs font-bold text-slate-400 mb-1">Intelligence</div>
          ${[0,1,2,3].map(p => {
            const dead = snap.knowledge ? snap.knowledge.deadNumbers(p) : [];
            if (dead.length === 0) return '';
            return `<div class="text-xs mb-0.5"><span style="color:${teamColors[p%2]}">${pn(p)}:</span> can't have <span class="text-red-400 font-mono">{${dead.join(', ')}}</span></div>`;
          }).join('')}
          ${snap.knowledge && [0,1,2,3].every(p => snap.knowledge.deadNumbers(p).length === 0) ? '<div class="text-xs text-slate-500">No intelligence yet</div>' : ''}
        </div>

        <!-- Move log -->
        <div id="log-container" class="flex-1 overflow-y-auto space-y-0.5 max-h-[350px]">
          ${currentGame.snapshots.slice(1).map((s, i) => {
            const stepIdx = i + 1;
            const isCur = stepIdx === currentStep;
            const isPast = stepIdx < currentStep;
            return `<div class="log-entry rounded px-2 py-0.5 cursor-pointer text-xs ${isCur ? 'active' : isPast ? 'past' : ''}"
              onclick="goTo(${stepIdx})" id="log-${stepIdx}">
              <span class="font-mono text-slate-500">#${s.move}</span>

              ${s.action === 'pass'
                ? '<span class="text-orange-400">passes</span>'
                : `<span class="text-emerald-400">[${s.tile.left}|${s.tile.right}]</span> <span class="text-slate-400">${s.side}</span>`}
              ${s.outcome ? `<span class="text-yellow-400 ml-1">${s.outcome.winType || s.outcome.type}</span>` : ''}

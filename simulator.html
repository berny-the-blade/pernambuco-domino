            currentPlayer: liveCurrentPlayer,
            knowledge: liveKnowledge.clone(), notebook: liveNotebook.clone()
          }],
          outcome: null
        };
      } else {
        // Empty board — first player will place any tile
        liveBoard = [];
        liveLeftEnd = null;
        liveRightEnd = null;
        liveCurrentPlayer = firstPlayer;
        currentGame = {
          originalHands: liveHands.map(h => [...h]),
          snapshots: [{
            move: 0, player: -1, action: 'start', tile: null, side: null,
            reasons: ['Game begins'],
            hands: liveHands.map(h => [...h]),
            board: [], leftEnd: null, rightEnd: null,
            currentPlayer: firstPlayer,
            knowledge: liveKnowledge.clone(), notebook: liveNotebook.clone()
          }],
          outcome: null
        };
      }
      currentStep = 0;
    }

    function dismissOpeningOverlay() {
      playOpeningPending = null;
      render();
      scheduleNextMove();
    }

    function scheduleNextMove() {
      if (currentGame && currentGame.outcome) return;
      if (liveCurrentPlayer === 0) {
        playWaiting = true;
        playSidePick = null;
        if (coachEnabled) generateCoachOnYourTurn();
        render();
        return;
      }
      playAITimer = setTimeout(() => {
        playAITimer = null;
        executeAIMove();
      }, playAIDelay * 1000);
    }

    function executeAIMove() {
      if (!liveHands || currentGame.outcome) return;
      const player = liveCurrentPlayer;
      const hand = liveHands[player];
      const allOptions = smartAI(hand, liveLeftEnd, liveRightEnd, liveBoard.length, player, liveKnowledge, true);

      const difficulty = getDifficultyForPlayer(player);
      let decision;
      // Endgame solver: exact minimax when few tiles remain (Advanced+ difficulty)
      const _egLiveTotal = liveHands[0].length + liveHands[1].length + liveHands[2].length + liveHands[3].length;
      if (_egLiveTotal <= ENDGAME_THRESHOLD && allOptions.length > 1 && difficulty >= 0.7) {
        const handSizes = liveHands.map(h => h.length);
        computeBeliefs(liveKnowledge, handSizes, hand, player, 200);
        try {
          const egRes = endgameSolve(hand, liveLeftEnd, liveRightEnd, liveBoard.length, player, liveKnowledge, handSizes);
          if (egRes.length > 0) {
            const best = egRes[0];
            decision = allOptions.find(o => o.tile.id === best.tile.id && o.side === best.side)
                    || allOptions.find(o => o.tile.id === best.tile.id)
                    || allOptions[0];
          } else {
            decision = allOptions[0];
          }
        } catch(e) { decision = allOptions[0]; }
      } else if (difficulty >= 1.0 && allOptions.length > 1) {
        // Compute Bayesian beliefs before search — importance-weighted tile probabilities
        const handSizes = liveHands.map(h => h.length);
        computeBeliefs(liveKnowledge, handSizes, hand, player, 200);
        // Expert: use ISMCTS when mid-game, fall back to MC. Neural net blends if loaded.
        let searchRes = null;
        if (liveBoard.length >= 6 && hand.length >= 2) {
          try { searchRes = ismctsEval(hand, liveLeftEnd, liveRightEnd, liveBoard.length, player, liveKnowledge, belief); } catch(e) {}
        }
        // NN blend REMOVED — NN must only affect play via leaf value eval (future)
        // See ROADMAP_FREEZE v1 Commit 4
        if (!searchRes || searchRes.length === 0) {
          const snap = { hands: liveHands, leftEnd: liveLeftEnd, rightEnd: liveRightEnd, board: liveBoard, knowledge: liveKnowledge };
          searchRes = monteCarloEval(snap, player, MC_SIMS_PLAY_EXPERT);
        }
        if (searchRes.length > 0) {
          const best = searchRes[0];
          decision = allOptions.find(o => o.tile.id === best.tile.id && o.side === best.side)
                  || allOptions.find(o => o.tile.id === best.tile.id)
                  || allOptions[0];
        } else {
          decision = allOptions[0];
        }
      } else {
        decision = allOptions.length > 0 ? selectMoveByDifficulty(allOptions, difficulty) : null;
      }

      if (decision) {
        playLastMove = { player, tile: decision.tile, side: decision.side, pass: false };
        recordLivePlay(player, decision.tile, decision.side, decision.reasons, decision.score, allOptions);
      } else {
        playLastMove = { player, tile: null, side: null, pass: true };
        recordLivePass(player);
      }

      if (coachEnabled) generateCoachOnAIMove(player, decision?.tile, decision?.side, allOptions, !decision);
      render();
      scheduleNextMove();
    }

    function recordLivePlay(player, tile, prefSide, reasons, score, allOptions) {
      liveMoveNum++;
      let side = prefSide;
      if (liveBoard.length > 0 && !side) {
        side = (tile.left === liveLeftEnd || tile.right === liveLeftEnd) ? 'left' : 'right';
      }

      const playedTile = { ...tile };
      liveHands[player] = liveHands[player].filter(t => t.id !== tile.id);
      liveKnowledge.recordPlay(player, tile);
      liveNotebook.recordPlay(player, liveMoveNum, tile, side, liveLeftEnd, liveRightEnd);
      // Update opponent style model for all players in play mode
      if (opponentStyles[player]) {
        opponentStyles[player].update(tile, { bLen: liveBoard.length, lE: liveLeftEnd, rE: liveRightEnd, knowledge: liveKnowledge, player });
      }
      // Continuous belief updates: sync after every live play
      if (belief && liveKnowledge.played.size >= 4) {
        belief.syncFromKnowledge(liveKnowledge);
      }
      livePassCount = 0;

      const pL = liveLeftEnd, pR = liveRightEnd;

      if (liveBoard.length === 0) {
        liveBoard = [playedTile];
        liveLeftEnd = tile.left;
        liveRightEnd = tile.right;
      } else {
        let placed = { ...tile };
        if (side === 'left') {
          if (tile.left === liveLeftEnd) placed = { left: tile.right, right: tile.left, id: tile.id };
          liveBoard.unshift(placed);
          liveLeftEnd = placed.left;
        } else {
          if (tile.right === liveRightEnd) placed = { left: tile.right, right: tile.left, id: tile.id };
          liveBoard.push(placed);
          liveRightEnd = placed.right;
        }
      }

      let outcome = null;
      if (liveHands[player].length === 0) {
        const w = scoreWin(tile, pL, pR, liveBoard.length);
        outcome = { type: 'win', winner: player, team: player % 2, points: w.pts, winType: w.type };
      }

      liveCurrentPlayer = outcome ? -1 : (player + 1) % 4;

      currentGame.snapshots.push({
        move: liveMoveNum, player, action: 'play', tile: playedTile, side: side || 'first',
        reasons: reasons || [], score: score || 0,
        allOptions: (allOptions || []).map(o => ({ tile: { ...o.tile }, score: o.score, side: o.side, reasons: [...o.reasons] })),
        hands: liveHands.map(h => [...h]),
        board: [...liveBoard],
        leftEnd: liveLeftEnd, rightEnd: liveRightEnd,
        currentPlayer: liveCurrentPlayer,
        knowledge: liveKnowledge.clone(), notebook: liveNotebook.clone(),
        outcome
      });

      currentStep = currentGame.snapshots.length - 1;

      if (outcome) {
        currentGame.outcome = outcome;
        finishPlayGame(outcome);
      }
    }

    function recordLivePass(player) {
      liveMoveNum++;
      livePassCount++;
      liveKnowledge.recordPass(player, liveLeftEnd, liveRightEnd);
      liveNotebook.recordPass(player, liveMoveNum, liveLeftEnd, liveRightEnd);
      // Continuous belief updates: sync after pass (strong signal)
      if (belief && liveKnowledge.played.size >= 4) {
        belief.syncFromKnowledge(liveKnowledge);
      }

      let outcome = null;
      if (livePassCount >= 4) {
        outcome = resolveBlock(liveHands);
      }

      liveCurrentPlayer = outcome ? -1 : (player + 1) % 4;

      currentGame.snapshots.push({
        move: liveMoveNum, player, action: 'pass', tile: null, side: null,
        reasons: [`No tiles matching ${liveLeftEnd} or ${liveRightEnd}`],
        allOptions: [],
        hands: liveHands.map(h => [...h]),
        board: [...liveBoard],
        leftEnd: liveLeftEnd, rightEnd: liveRightEnd,
        currentPlayer: liveCurrentPlayer,
        knowledge: liveKnowledge.clone(), notebook: liveNotebook.clone(),
        outcome
      });

      currentStep = currentGame.snapshots.length - 1;

      if (outcome) {
        currentGame.outcome = outcome;
        finishPlayGame(outcome);
      }
    }

    function finishPlayGame(outcome) {
      stopPlayAI();
      playWaiting = false;
      playSidePick = null;

      // Apply dobrada multiplier
      outcome.basePoints = outcome.points || 0;
      outcome.points = (outcome.points || 0) * scoreMultiplier;
      outcome.multiplier = scoreMultiplier;

      const lastSnap = currentGame.snapshots[currentGame.snapshots.length - 1];
      if (lastSnap) lastSnap.outcome = outcome;

      // Save match score before update for history
      currentGame._matchScoreBefore = [...matchScore];

      if (outcome.winner !== undefined && outcome.points) {
        const winTeam = outcome.winner % 2;
        matchScore[winTeam] += outcome.points;
        lastWinTeam = winTeam;
        if (matchScore[0] >= MATCH_TARGET || matchScore[1] >= MATCH_TARGET) {
          playMatchWinner = matchScore[0] >= MATCH_TARGET ? 0 : 1;
        }
      }

      if (outcome.type === 'tie') {
        scoreMultiplier *= 2;
      } else {
        scoreMultiplier = 1;
      }

      // Save game to history (analysis will be added after async computation)
      if (gameMode === 'play') {
        currentGame._historyId = Date.now();
        recordGameToHistory(currentGame, null);
        // Auto-trigger analysis for history
        if (!currentGame._analysisCache && !analysisRunning) {
          setTimeout(() => {
            runAnalysisAsync(() => {
              // Update history record with analysis once done
              if (currentGame && currentGame._analysisCache && currentGame._historyId) {
                const idx = gameHistory.findIndex(g => g.id === currentGame._historyId);
                if (idx >= 0) {
                  const cache = currentGame._analysisCache;
                  const totalEL = cache.reduce((s, a) => s + a.eqLoss, 0);
                  gameHistory[idx].analysis = {
                    avgEL: Math.round((totalEL / cache.length) * 1000) / 1000,
                    totalEL: Math.round(totalEL * 100) / 100,
                    moves: cache.length,
                    perfect: cache.filter(a => a.grade === 'perfect').length,
                    good: cache.filter(a => a.grade === 'good').length,
                    ok: cache.filter(a => a.grade === 'ok').length,
                    bad: cache.filter(a => a.grade === 'bad').length,
                    moveDetails: cache.map(a => ({
                      move: a.move, grade: a.grade, eqLoss: Math.round(a.eqLoss * 1000) / 1000,
                      tile: a.tile ? `${a.tile.left}|${a.tile.right}` : '',
                      bestTile: a.bestTile ? `${a.bestTile.left}|${a.bestTile.right}` : '',
                      side: a.side, bestSide: a.bestSide
                    }))
                  };
                  saveGameHistory();
                  // Record to player profile after analysis completes
                  if (idx >= 0) _recordPlayerGame(gameHistory[idx]);
                  // Record start/roll outcome
                  if (_currentStartDecision && gameHistory[idx].outcome) {
                    const won = gameHistory[idx].outcome.team === 0;
                    _recordStartRollResult(_currentStartDecision, won);
                    _currentStartDecision = null;
                  }
                  render();
                }
              }
            });
          }, 100);
        }
      }

      render();
    }

    function stopPlayAI() {
      if (playAITimer) { clearTimeout(playAITimer); playAITimer = null; }
      stopCoachMC();
    }

    function goHome() {
      stopPlayAI();
      currentGame = null;
      puzzleMode = false;
      puzzleDef = null;
      showingPuzzleBrowser = false;
      showingOpeningQuiz = false;
      playShowingDiffPicker = false;
      _showPuzzleQA = false;
      render();
    }

    // ========== COACH OVERLAY ENGINE ==========

    function getGamePhase() {
      if (!liveHands) return 'opening';
      if (liveMoveNum <= 3) return 'opening';
      const minHand = Math.min(...liveHands.map(h => h.length));
      if (minHand <= 2) return 'endgame';
      return 'midgame';
    }

    function addCoachMsg(type, text) {
      coachMessages.push({ type, text, phase: getGamePhase(), turn: liveMoveNum });
    }

    function generateCoachOnAIMove(player, tile, side, allOptions, wasPass) {
      const name = pn(player);
      const isPartner = player === 2;
      const isOpp = player === 1 || player === 3;
      const pt = appLang === 'pt';

      if (wasPass) {
        const voids = [];
        if (liveLeftEnd !== null) voids.push(liveLeftEnd);
        if (liveRightEnd !== null && liveRightEnd !== liveLeftEnd) voids.push(liveRightEnd);
        const voidStr = voids.join(pt ? ' e ' : ' and ');
        if (isOpp) {
          addCoachMsg('deduction', pt
            ? `${name} passou — não tem ${voidStr}. Lembre-se! Mantenha esses números no tabuleiro para bloqueá-lo.`
            : `${name} passed — they have no ${voidStr}. Remember this! Keep those numbers on the board to block them.`);
        } else {
          addCoachMsg('deduction', pt
            ? `Seu parceiro ${name} passou — sem ${voidStr}. Tente mudar as pontas para números que possa ter.`
            : `Your partner ${name} passed — void in ${voidStr}. Try to change board ends to numbers they might have.`);
        }
        return;
      }

      if (!tile) return;
      const msgs = [];
      const isDouble = tile.left === tile.right;
      const prevLeft = currentGame.snapshots.length >= 2 ? currentGame.snapshots[currentGame.snapshots.length - 2].leftEnd : null;
      const prevRight = currentGame.snapshots.length >= 2 ? currentGame.snapshots[currentGame.snapshots.length - 2].rightEnd : null;

      if (isDouble) {
        msgs.push(pt
          ? `${name} jogou carroça [${tile.left}|${tile.right}] — descartar carroças cedo é inteligente pois são inflexíveis.`
          : `${name} played double [${tile.left}|${tile.right}] — clearing doubles early is smart since they're inflexible (only match one number).`);
      }

      const newEnd = side === 'left' ? liveLeftEnd : liveRightEnd;
      const oldEnd = side === 'left' ? prevLeft : prevRight;
      if (oldEnd !== null && newEnd !== oldEnd && !isDouble) {
        if (isOpp) {
          const otherEnd = side === 'left' ? liveRightEnd : liveLeftEnd;
          const oppVoids = liveKnowledge.cantHave[player];
          if (oppVoids.has(otherEnd)) {
            msgs.push(pt
              ? `${name} jogou no ${side} (evitando ponta ${otherEnd}) — confirmado sem ${otherEnd}s.`
              : `${name} played on the ${side} (avoiding ${otherEnd}-end) — confirmed void in ${otherEnd}s.`);
          } else {
            msgs.push(pt
              ? `${name} mudou a ponta ${side} de ${oldEnd} para ${newEnd}. Observe se está acumulando ${newEnd}s.`
              : `${name} changed the ${side} end from ${oldEnd} to ${newEnd}. Watch if they're building strength in ${newEnd}s.`);
          }
        } else {
          msgs.push(pt
            ? `Parceiro jogou [${tile.left}|${tile.right}] ${side}, mudando ponta para ${newEnd}. Pode ser forte em ${newEnd}s — tente manter no tabuleiro.`
            : `Partner played [${tile.left}|${tile.right}] ${side}, changing end to ${newEnd}. They may be strong in ${newEnd}s — try to keep it on the board.`);
        }
      }

      if (isOpp && msgs.length === 0) {
        const hasVoid = liveKnowledge.cantHave[player].size > 0;
        if (hasVoid) {
          const voidNums = [...liveKnowledge.cantHave[player]].join(', ');
          msgs.push(pt
            ? `${name} jogou [${tile.left}|${tile.right}] ${side}. Lembre: não tem ${voidNums}.`
            : `${name} played [${tile.left}|${tile.right}] ${side}. Remember: they're void in ${voidNums}.`);
        } else {
          msgs.push(`${name} ${pt ? 'jogou' : 'played'} [${tile.left}|${tile.right}] ${side}.`);
        }
      }

      if (isPartner && msgs.length === 0) {
        msgs.push(pt
          ? `Parceiro jogou [${tile.left}|${tile.right}] ${side}.`
          : `Partner played [${tile.left}|${tile.right}] ${side}.`);
      }

      if (liveHands[player].length <= 2 && liveHands[player].length > 0) {
        const n = liveHands[player].length;
        msgs.push(pt
          ? `${isPartner ? 'Seu parceiro' : name} tem só ${n} pedra${n > 1 ? 's' : ''}!`
          : `${isPartner ? 'Your partner' : name} has only ${n} tile${n > 1 ? 's' : ''} left!`);
      }

      if (msgs.length > 0) addCoachMsg('observation', msgs.join(' '));
    }

    function generateCoachOnYourTurn() {
      const hand = liveHands[0];
      const phase = getGamePhase();
      const playable = hand.filter(t => canPlay(t, liveLeftEnd, liveRightEnd, liveBoard ? liveBoard.length : 0));
      const msgs = [];
      const pt = appLang === 'pt';

      if (liveBoard && liveBoard.length > 0) {
        msgs.push(pt
          ? `Pontas: <b>${liveLeftEnd}</b> e <b>${liveRightEnd}</b>. Você tem ${playable.length} pedra${playable.length !== 1 ? 's jogáveis' : ' jogável'} de ${hand.length}.`
          : `Board ends: <b>${liveLeftEnd}</b> and <b>${liveRightEnd}</b>. You have ${playable.length} playable tile${playable.length !== 1 ? 's' : ''} out of ${hand.length}.`);
      }

      const oppVoids = [];
      [1, 3].forEach(p => {
        const v = [...liveKnowledge.cantHave[p]];
        if (v.length > 0) oppVoids.push(`${pn(p)} ${pt ? 'sem' : 'void in'} ${v.join(',')}`);
      });
      const partnerVoids = [...liveKnowledge.cantHave[2]];
      if (oppVoids.length > 0) msgs.push(`${pt ? 'Info chave' : 'Key info'}: ${oppVoids.join('; ')}.`);
      if (partnerVoids.length > 0) msgs.push(`${pt ? 'Parceiro sem' : 'Partner void in'} ${partnerVoids.join(',')}.`);

      if (phase === 'opening') {
        msgs.push(pt ? 'Início — priorize controle de naipe. Qual jogada deixa mais pedras compatíveis?' : _t('early_game'));
      } else if (phase === 'endgame') {
        msgs.push(pt ? 'Final — pense em bater. Pode preparar sua(s) última(s) pedra(s)?' : _t('endgame_think'));
      } else {
        if (oppVoids.length > 0) {
          msgs.push(pt ? 'Pode manter um número que o adversário não tem no tabuleiro para forçar outro passe?' : _t('keep_void'));
        } else if (playable.length > 1) {
          msgs.push(pt ? 'Múltiplas opções — qual jogada mantém mais flexibilidade?' : _t('multiple_opts'));
        }
      }

      if (playable.length === 0) {
        msgs.push(pt
          ? `Sem pedras jogáveis — deve passar. Adversários vão saber que você não tem ${liveLeftEnd}${liveLeftEnd !== liveRightEnd ? ' nem ' + liveRightEnd : ''}.`
          : `No playable tiles — you must pass. Opponents will learn you're void in ${liveLeftEnd}${liveLeftEnd !== liveRightEnd ? ' and ' + liveRightEnd : ''}.`);
      }

      if (msgs.length > 0) addCoachMsg('think', msgs.join(' '));
      if (liveMoveNum >= 3) generateCoachOpponentIntel();
    }

    function generateCoachOpponentIntel() {
      const myHand = new Set(liveHands[0].map(t => t.id));
      const played = liveKnowledge.played;
      const remaining = ALL_TILES.filter(t => !played.has(t.id) && !myHand.has(t.id));
      const pt = appLang === 'pt';

      const intel = [];
      for (const p of [1, 3, 2]) {
        const voids = liveKnowledge.cantHave[p];
        const tilesPlayed = liveKnowledge.playsBy[p].length;
        const handSize = Math.max(0, 6 - tilesPlayed);
        if (handSize === 0) continue;

        const possible = remaining.filter(t => !voids.has(t.left) && !voids.has(t.right));
        const numCounts = {};
        for (let n = 0; n <= 6; n++) {
          if (voids.has(n)) continue;
          numCounts[n] = possible.filter(t => t.left === n || t.right === n).length;
        }

        const name = pn(p);
        const voidStr = voids.size > 0 ? `${pt ? 'sem' : 'void in'} ${[...voids].join(',')}` : (pt ? 'sem vazios conhecidos' : 'no known voids');
        const tileStrs = possible.map(t => `[${t.left}|${t.right}]`);
        const tLbl = pt ? 'pedras' : 'tiles';

        if (possible.length <= 12) {
          intel.push(`<b>${name}</b> (${handSize} ${tLbl}, ${voidStr}): ${pt ? 'pode ter' : 'could hold'} ${tileStrs.join(' ')}`);
        } else {
          const strong = Object.entries(numCounts).filter(([_, c]) => c >= 3).sort((a, b) => b[1] - a[1]).map(([n, c]) => `${c}x ${n}s`);
          if (strong.length > 0) {
            intel.push(`<b>${name}</b> (${handSize} ${tLbl}, ${voidStr}): ${pt ? 'provável que tenha' : 'likely has'} ${strong.join(', ')}`);
          }
        }
      }

      if (intel.length > 0) {
        addCoachMsg('deduction', intel.join(' | '));
      }
    }

    function generateCoachOnYourPlay(tile, side, allOptions) {
      if (!allOptions || allOptions.length === 0) return;
      const best = allOptions[0];
      const played = allOptions.find(o => o.tile.id === tile.id && o.side === side)
                  || allOptions.find(o => o.tile.id === tile.id);
      const playedIdx = played ? allOptions.indexOf(played) : -1;
      const pt = appLang === 'pt';
      const yourReasons = played && played.reasons.length > 0 ? played.reasons.slice(0, 2).join('; ') : '';

      let partnerSuitNote = '';
      if (currentGame && currentGame.autoPlayedBy === 2 && currentGame.autoTile) {
        const openNum = currentGame.autoTile.left;
        const preservesOpen = (side === 'left' && liveLeftEnd === openNum) || (side === 'right' && liveRightEnd === openNum) ||
          (tile.left === openNum || tile.right === openNum);
        if (preservesOpen && playedIdx > 0 && best.side) {
          const bestChangesEnd = best.side === 'left'
            ? (liveLeftEnd === openNum && best.tile.left !== openNum && best.tile.right !== openNum)
            : (liveRightEnd === openNum && best.tile.left !== openNum && best.tile.right !== openNum);
          if (bestChangesEnd) {
            partnerSuitNote = pt
              ? ` Inteligente proteger o naipe de abertura do parceiro (${openNum}s).`
              : ` Smart to protect partner's opening suit (${openNum}s) — they likely have more.`;
          }
        }
      }

      if (playedIdx === 0) {
        const why = best.reasons.length > 0 ? ' — ' + best.reasons.slice(0, 2).join('; ') : '';
        addCoachMsg('good', pt
          ? `Boa jogada! Você jogou [${tile.left}|${tile.right}] ${side} — a jogada mais forte${why}.${partnerSuitNote}`
          : `Good choice! You played [${tile.left}|${tile.right}] ${side} — the strongest play${why}.${partnerSuitNote}`);
      } else if (playedIdx >= 1 && playedIdx <= 2) {
        const diff = best.reasons.filter(r => !(played && played.reasons.includes(r)));
        const hint = diff.length > 0 ? diff[0] : best.reasons[0] || '';
        const yourPart = yourReasons ? (pt ? ` Sua jogada: ${yourReasons}.` : ` Your play: ${yourReasons}.`) : '';
        addCoachMsg('ok', pt
          ? `Você jogou [${tile.left}|${tile.right}] ${side} — razoável.${yourPart}${partnerSuitNote} Melhor opção era [${best.tile.left}|${best.tile.right}] ${best.side || ''} — ${hint}.`
          : `You played [${tile.left}|${tile.right}] ${side} — reasonable.${yourPart}${partnerSuitNote} Top pick was [${best.tile.left}|${best.tile.right}] ${best.side || ''} — ${hint}.`);
      } else if (playedIdx > 2 || playedIdx === -1) {
        const diff = best.reasons.filter(r => !(played && played.reasons.includes(r)));
        const hint = diff.length > 0 ? diff[0] : best.reasons[0] || '';
        const yourPart = yourReasons ? (pt ? ` Sua jogada: ${yourReasons}.` : ` Your play: ${yourReasons}.`) : '';
        addCoachMsg('warn', pt
          ? `Você jogou [${tile.left}|${tile.right}] ${side}.${yourPart}${partnerSuitNote} Considere: [${best.tile.left}|${best.tile.right}] ${best.side || ''} pontuou mais — ${hint}.`
          : `You played [${tile.left}|${tile.right}] ${side}.${yourPart}${partnerSuitNote} Consider: [${best.tile.left}|${best.tile.right}] ${best.side || ''} scored higher — ${hint}.`);
      }
    }

    function generateCoachOnPass() {
      const pt = appLang === 'pt';
      const voidNums = liveLeftEnd === liveRightEnd
        ? `${liveLeftEnd}`
        : `${liveLeftEnd} ${pt ? 'e' : 'and'} ${liveRightEnd}`;
      addCoachMsg('think', pt
        ? `Forçado a passar — nenhuma pedra combina com ${voidNums}. Adversários agora sabem. Seu parceiro deve tentar mudar as pontas para você.`
        : `Forced to pass — no tiles match ${voidNums}. Opponents now know you're void. Your partner should try to change the board ends for you.`);
    }

    function stopCoachMC() {
      if (coachMCTimer) { clearTimeout(coachMCTimer); coachMCTimer = null; }
      coachMCRunning = false;
    }

    function runCoachMC(snapBeforePlay, playerTile, playerSide, heuristicMsgIdx) {
      // Run async MC evaluation on the position BEFORE user played
      // to get ground-truth expected points for all tile options
      stopCoachMC();
      const snap = snapBeforePlay;
      const player = 0;
      const hand = snap.hands[player];
      const lE = snap.leftEnd, rE = snap.rightEnd;
      const board = snap.board;
      const knowledge = snap.knowledge;
      const handSizes = snap.hands.map(h => h.length);
      const myTeam = player % 2;

      const playable = hand.filter(t => canPlay(t, lE, rE, board.length));
      if (playable.length <= 1) return; // no comparison needed
      // Compute Bayesian beliefs for coach MC deal quality
      computeBeliefs(knowledge, handSizes, hand, player, 200);
      const mcMsgIdx = coachMessages.length;
      addCoachMsg('deduction', `<b>MC Analysis running...</b> ${playable.length} options \u00D7 ${COACH_MC_SIMS} rollouts`);
      render();

      // Build option list: each playable tile × each valid side
      const options = [];
      for (const tile of playable) {
        const sides = [];
        if (board.length === 0) { sides.push(null); }
        else {
          if (tile.left === lE || tile.right === lE) sides.push('left');
          if ((tile.left === rE || tile.right === rE) && lE !== rE) sides.push('right');
          if (sides.length === 0 && (tile.left === rE || tile.right === rE)) sides.push('right');
        }
        for (const side of sides) {
          // Pre-compute new board state after this play
          let newLE = lE, newRE = rE;
          if (board.length === 0) { newLE = tile.left; newRE = tile.right; }
          else if (side === 'left') { newLE = tile.left === lE ? tile.right : tile.left; }
          else { newRE = tile.right === rE ? tile.left : tile.right; }
          const newHS = [...handSizes]; newHS[player]--;
          // Instant win check
          if (newHS[player] === 0) {
            const w = scoreWin(tile, lE, rE, board.length + 1);
            options.push({ tile, side, ep: w.pts, wr: 1.0, ci95: 0, sims: COACH_MC_SIMS, done: true });
            continue;
          }
          const newK = knowledge.clone();
          newK.recordPlay(player, tile);
          const myNewHand = hand.filter(t => t.id !== tile.id);
          options.push({ tile, side, ep: 0, wr: 0, wins: 0, totalPts: 0, sumSq: 0, sims: 0, done: false,
                         newLE, newRE, newHS, newK, myNewHand, newBLen: board.length + 1 });
        }
      }

      const pending = options.filter(o => !o.done);
      if (pending.length === 0) { finishCoachMC(options, playerTile, playerSide, mcMsgIdx, snap, heuristicMsgIdx); return; }

      coachMCRunning = true;
      const BATCH = 10; // sims per option per batch

      function mcBatch() {
        for (const opt of pending) {
          for (let i = 0; i < BATCH && opt.sims < COACH_MC_SIMS; i++) {
            try {
              const simHands = generateConsistentDeal(opt.myNewHand, opt.newHS, opt.newK, player);
              const result = simulateFromPosition(simHands, null, opt.newLE, opt.newRE, (player + 1) % 4, opt.newK, opt.newBLen);
              const signedPts = result.winnerTeam === myTeam ? result.points :
                                result.winnerTeam >= 0 ? -result.points : 0;
              if (result.winnerTeam === myTeam) opt.wins++;
              opt.totalPts += signedPts;
              opt.sumSq += signedPts * signedPts;
              opt.sims++;
            } catch(e) { opt.sims = COACH_MC_SIMS; } // skip on error
          }
        }

        const totalNeeded = pending.length * COACH_MC_SIMS;
        const totalDone = pending.reduce((s, o) => s + o.sims, 0);

        // Update progress message
        if (coachMessages[mcMsgIdx]) {
          const pct = Math.round(100 * totalDone / totalNeeded);
          coachMessages[mcMsgIdx].text = `<b>MC Analysis running... ${pct}%</b> (${totalDone}/${totalNeeded} rollouts)`;
          render();
        }

        if (totalDone < totalNeeded) {
          coachMCTimer = setTimeout(mcBatch, 0);
        } else {
          // Finalize
          for (const opt of pending) {
            opt.ep = opt.sims > 0 ? opt.totalPts / opt.sims : 0;
            opt.wr = opt.sims > 0 ? opt.wins / opt.sims : 0.5;
            const variance = opt.sims > 1 ? (opt.sumSq / opt.sims) - opt.ep * opt.ep : 0;
            opt.ci95 = opt.sims > 1 ? 1.96 * Math.sqrt(Math.max(0, variance) / opt.sims) : 0;
            opt.done = true;
          }
          finishCoachMC(options, playerTile, playerSide, mcMsgIdx, snap, heuristicMsgIdx);
        }
      }

      coachMCTimer = setTimeout(mcBatch, 10);
    }

    function finishCoachMC(options, playerTile, playerSide, mcMsgIdx, snap, heuristicMsgIdx) {
      coachMCRunning = false;
      coachMCTimer = null;
      // Sort by expected points
      options.sort((a, b) => b.ep - a.ep);
      const mcBest = options[0];
      const mcPlayed = options.find(o => o.tile.id === playerTile.id && o.side === playerSide)
                    || options.find(o => o.tile.id === playerTile.id);

      if (!mcPlayed || !mcBest) return;

      const ranking = options.indexOf(mcPlayed) + 1;
      const diff = mcBest.ep - mcPlayed.ep;
      const lines = [];

      // Build MC ranking table for top options
      const top = options.slice(0, Math.min(5, options.length));
      const table = top.map((o, i) => {
        const marker = o.tile.id === playerTile.id ? '\u25B6' : ` ${i + 1}`;
        const epStr = o.ep >= 0 ? `+${o.ep.toFixed(2)}` : o.ep.toFixed(2);
        const wrStr = `${(o.wr * 100).toFixed(0)}%`;
        return `${marker} [${o.tile.left}|${o.tile.right}] ${o.side || ''} EP: <b>${epStr}</b> \u00B1${o.ci95.toFixed(2)} WR: ${wrStr}`;
      }).join(' | ');
      lines.push(table);

      // Verdict
      if (ranking === 1) {
        lines.push(`\u2705 MC confirms: your play was the best! (+${mcPlayed.ep.toFixed(2)} EP)`);
      } else if (diff < 0.15) {
        lines.push(`\u2248 Very close to optimal (${diff.toFixed(2)} EP difference — within noise).`);
      } else {
        const severity = diff < 0.40 ? 'Slight' : 'Clear';
        lines.push(`\u{1F4CA} ${severity} edge to [${mcBest.tile.left}|${mcBest.tile.right}] ${mcBest.side || ''} (+${diff.toFixed(2)} EP, ${(mcBest.wr*100).toFixed(0)}% vs ${(mcPlayed.wr*100).toFixed(0)}% WR).`);
      }

      // Detailed strategic explanation when not best play
      if (ranking > 1 && snap) {
        const explanation = generateMCExplanation(snap, mcBest, mcPlayed, diff, options);
        if (explanation) lines.push(explanation);
      }

      // Replace the "running..." message with final results
      const resultText = `<b>MC Analysis (${COACH_MC_SIMS} rollouts):</b><br>${lines.join('<br>')}`;
      if (mcMsgIdx !== undefined && coachMessages[mcMsgIdx]) {
        coachMessages[mcMsgIdx].text = resultText;
      } else {
        addCoachMsg('deduction', resultText);
      }

      // Rewrite the heuristic feedback message to match MC ground truth
      if (heuristicMsgIdx !== undefined && coachMessages[heuristicMsgIdx]) {
        const pSide = playerSide || '';
        if (ranking === 1) {
          // MC confirms user's play was best — get reasons from smartAI
          let why = '';
          try {
            const aiOpts = smartAI(snap.hands[0], snap.leftEnd, snap.rightEnd, snap.board.length, 0, snap.knowledge, true);
            const aiMatch = aiOpts.find(o => o.tile.id === playerTile.id);
            if (aiMatch && aiMatch.reasons.length > 0) why = ' — ' + aiMatch.reasons.slice(0, 2).join('; ');
          } catch(e) {}
          coachMessages[heuristicMsgIdx].type = 'good';
          coachMessages[heuristicMsgIdx].text = `\u2705 Best play! You played [${playerTile.left}|${playerTile.right}] ${pSide} (EP: ${mcPlayed.ep >= 0 ? '+' : ''}${mcPlayed.ep.toFixed(2)}, WR: ${(mcPlayed.wr*100).toFixed(0)}%)${why}.`;
        } else if (diff < 0.15) {
          coachMessages[heuristicMsgIdx].type = 'good';
          coachMessages[heuristicMsgIdx].text = `\u2705 You played [${playerTile.left}|${playerTile.right}] ${pSide} — effectively optimal (only ${diff.toFixed(2)} EP from best, within noise).`;
        } else {
          const bestT = mcBest.tile;
          // Get strategic reasons for the MC-best tile
          let why = '';
          try {
            const aiOpts = smartAI(snap.hands[0], snap.leftEnd, snap.rightEnd, snap.board.length, 0, snap.knowledge, true);
            const aiBest = aiOpts.find(o => o.tile.id === bestT.id);
            const aiPlay = aiOpts.find(o => o.tile.id === playerTile.id);
            const playSet = new Set(aiPlay ? aiPlay.reasons : []);
            if (aiBest) {
              const diffR = aiBest.reasons.filter(r => !playSet.has(r));
              if (diffR.length > 0) why = ' — ' + diffR.slice(0, 2).join('; ');
            }
          } catch(e) {}
          const severity = diff < 0.40 ? 'ok' : 'warn';
          coachMessages[heuristicMsgIdx].type = severity;
          coachMessages[heuristicMsgIdx].text = `You played [${playerTile.left}|${playerTile.right}] ${pSide} (EP: ${mcPlayed.ep >= 0 ? '+' : ''}${mcPlayed.ep.toFixed(2)}). MC-best: [${bestT.left}|${bestT.right}] ${mcBest.side || ''} (EP: ${mcBest.ep >= 0 ? '+' : ''}${mcBest.ep.toFixed(2)}, +${diff.toFixed(2)} better)${why}.`;
        }
      }

      render();
    }

    function generateMCExplanation(snap, mcBest, mcPlayed, epDiff, allMCOptions) {
      const lE = snap.leftEnd, rE = snap.rightEnd;
      const hand = snap.hands[0];
      const knowledge = snap.knowledge;
      const board = snap.board;
      const bLen = board.length;
      const reasons = [];

      const bestT = mcBest.tile, bestS = mcBest.side;
      const playT = mcPlayed.tile, playS = mcPlayed.side;

      // Compute new board ends for each option
      const bestNewEnd = bestS === 'left' ? (bestT.left === lE ? bestT.right : bestT.left) :
                         bestS === 'right' ? (bestT.right === rE ? bestT.left : bestT.right) :
                         bestT.right; // opening: right end
      const bestKeptEnd = bestS === 'left' ? rE : bestS === 'right' ? lE : bestT.left;

      const playNewEnd = playS === 'left' ? (playT.left === lE ? playT.right : playT.left) :
                         playS === 'right' ? (playT.right === rE ? playT.left : playT.right) :
                         playT.right;
      const playKeptEnd = playS === 'left' ? rE : playS === 'right' ? lE : playT.left;

      // 1. Suit control — count remaining hand tiles matching new board ends
      const handAfterBest = hand.filter(t => t.id !== bestT.id);
      const handAfterPlay = hand.filter(t => t.id !== playT.id);
      const bestMatch = handAfterBest.filter(t => t.left === bestNewEnd || t.right === bestNewEnd || t.left === bestKeptEnd || t.right === bestKeptEnd).length;
      const playMatch = handAfterPlay.filter(t => t.left === playNewEnd || t.right === playNewEnd || t.left === playKeptEnd || t.right === playKeptEnd).length;
      if (bestMatch > playMatch) {
        reasons.push(`<b>Suit control:</b> [${bestT.left}|${bestT.right}] leaves ${bestMatch} tiles matching the new board ends (${bestNewEnd},${bestKeptEnd}) vs only ${playMatch} for your play (${playNewEnd},${playKeptEnd}). More matching tiles = more options next turn.`);
      }

      // 2. Opponent blocking — opponent must be void in BOTH ends to be forced to pass
      const oppVoids = [1, 3].flatMap(p => [...knowledge.cantHave[p]]);
      if (oppVoids.length > 0) {
        const bestBlocksOpp = [1, 3].filter(p => knowledge.cantHave[p].has(bestNewEnd) && knowledge.cantHave[p].has(bestKeptEnd));
        const playBlocksOpp = [1, 3].filter(p => knowledge.cantHave[p].has(playNewEnd) && knowledge.cantHave[p].has(playKeptEnd));
        if (bestBlocksOpp.length > playBlocksOpp.length) {
          const blocked = bestBlocksOpp.map(p => pn(p)).join(' & ');
          reasons.push(`<b>Blocking:</b> [${bestT.left}|${bestT.right}] keeps board ends on numbers that ${blocked} can't play (void in both ${bestNewEnd} and ${bestKeptEnd}), forcing them to pass. Your play opens a number they can match.`);
        }
      }

      // 3. Partner void avoidance
      const partnerVoids = knowledge.cantHave[2];
      if (partnerVoids.size > 0) {
        const bestHurtsPartner = partnerVoids.has(bestNewEnd) && partnerVoids.has(bestKeptEnd);
        const playHurtsPartner = partnerVoids.has(playNewEnd) && partnerVoids.has(playKeptEnd);
        if (playHurtsPartner && !bestHurtsPartner) {
          reasons.push(`<b>Partner support:</b> Your play puts both board ends on numbers your partner is void in — they'll be forced to pass. [${bestT.left}|${bestT.right}] keeps at least one end playable for partner.`);
        }
      }

      // 4. Double management
      if (playT.left === playT.right && bestT.left !== bestT.right) {
        reasons.push(`<b>Double management:</b> [${bestT.left}|${bestT.right}] connects to both ${bestT.left}s and ${bestT.right}s — two suits instead of one. The double [${playT.left}|${playT.right}] only connects to ${playT.left}s, so save it for when a ${playT.left} is on the board and you need to play it.`);
      }
      if (bestT.left === bestT.right && playT.left !== playT.right) {
        reasons.push(`<b>Clear double early:</b> [${bestT.left}|${bestT.right}] only connects to ${bestT.left}s — it's inflexible. Play it now while a ${bestT.left} is available. Hold it too long and the board may move away, leaving you stuck.`);
      }

      // 5. Go-out setup
      if (handAfterBest.length === 1) {
        const lastTile = handAfterBest[0];
        const canGoOut = lastTile.left === bestNewEnd || lastTile.right === bestNewEnd || lastTile.left === bestKeptEnd || lastTile.right === bestKeptEnd;
        const canGoOutPlay = handAfterPlay.length === 1 && (handAfterPlay[0].left === playNewEnd || handAfterPlay[0].right === playNewEnd || handAfterPlay[0].left === playKeptEnd || handAfterPlay[0].right === playKeptEnd);
        if (canGoOut && !canGoOutPlay) {
          reasons.push(`<b>Go-out setup:</b> [${bestT.left}|${bestT.right}] sets up your last tile [${lastTile.left}|${lastTile.right}] to go out next turn. Your play strands your last tile — it doesn't match the new board ends.`);
        }
      } else if (handAfterBest.length === 2) {
        const canPlayBest = handAfterBest.filter(t => t.left === bestNewEnd || t.right === bestNewEnd || t.left === bestKeptEnd || t.right === bestKeptEnd).length;
        const canPlayUser = handAfterPlay.filter(t => t.left === playNewEnd || t.right === playNewEnd || t.left === playKeptEnd || t.right === playKeptEnd).length;
        if (canPlayBest > canPlayUser) {
          reasons.push(`<b>Go-out setup:</b> [${bestT.left}|${bestT.right}] keeps ${canPlayBest} of your last 2 tiles playable vs ${canPlayUser} for your play. Staying connected to the board is critical in the endgame.`);
        }
      }

      // 6. Pip weight (deep endgame, 1-2 tiles left)
      if (hand.length < 3) {
        const bestPips = bestT.left + bestT.right;
        const playPips = playT.left + playT.right;
        if (bestPips > playPips + 3) {
          reasons.push(`<b>Dump heavy tile:</b> [${bestT.left}|${bestT.right}] sheds ${bestPips} pips vs ${playPips} for your play. In case of a block, lower pip count wins.`);
        }
      }

      // 7. Coverage diversification — detect stacking tiles on one end
      const bestMatchByEnd = [
        handAfterBest.filter(t => t.left === bestNewEnd || t.right === bestNewEnd).length,
        handAfterBest.filter(t => t.left === bestKeptEnd || t.right === bestKeptEnd).length
      ];
      const playMatchByEnd = [
        handAfterPlay.filter(t => t.left === playNewEnd || t.right === playNewEnd).length,
        handAfterPlay.filter(t => t.left === playKeptEnd || t.right === playKeptEnd).length
      ];
      const bestSpread = Math.min(bestMatchByEnd[0], bestMatchByEnd[1]);
      const playSpread = Math.min(playMatchByEnd[0], playMatchByEnd[1]);
      if (bestSpread > playSpread && playSpread === 0) {
        const stacked = playMatchByEnd[0] > playMatchByEnd[1] ? playNewEnd : playKeptEnd;
        const empty = playMatchByEnd[0] > playMatchByEnd[1] ? playKeptEnd : playNewEnd;
        reasons.push(`<b>Coverage risk:</b> Your play stacks ${playMatchByEnd[0] + playMatchByEnd[1]} tile${playMatchByEnd[0]+playMatchByEnd[1]>1?'s':''} on end ${stacked} with nothing on ${empty} — if opponents kill ${stacked}, you're stuck. [${bestT.left}|${bestT.right}] spreads coverage across both ends.`);
      }

      // 8. Team perspective — partner benefits from the new board ends
      const pStr = knowledge.inferStrength(2);
      const bestPartnerFit = (pStr[bestNewEnd] || 0) + (pStr[bestKeptEnd] || 0);
      const playPartnerFit = (pStr[playNewEnd] || 0) + (pStr[playKeptEnd] || 0);
      if (bestPartnerFit > playPartnerFit + 1) {
        const strongEnd = pStr[bestNewEnd] > pStr[bestKeptEnd] ? bestNewEnd : bestKeptEnd;
        reasons.push(`<b>Team play:</b> Partner has shown strength in ${strongEnd}s (played ${pStr[strongEnd]}x). [${bestT.left}|${bestT.right}] keeps the board favorable for them — remember it's their turn soon too.`);
      }

      // 9. Chicote / dead number context
      if (bLen >= 6) {
        const bestRemNew = knowledge.remainingWithNumber(bestNewEnd);
        const playRemNew = knowledge.remainingWithNumber(playNewEnd);
        if (bestRemNew <= 1 && playRemNew >= 3) {
          const chic = knowledge.chicoteFor(bestNewEnd, hand);
          if (chic && chic.holder === 'self') {
            reasons.push(`<b>Chicote power:</b> You hold the last ${bestNewEnd}-tile (chicote). [${bestT.left}|${bestT.right}] creates end ${bestNewEnd} that only YOU can play on — you control whether it lives or dies.`);
          } else if (chic && (chic.holder === 1 || chic.holder === 3)) {
            reasons.push(`<b>Chicote risk:</b> An opponent holds the chicote for ${bestNewEnd}. But the MC still favors this — the ${bestKeptEnd}-end and pip advantage likely compensate.`);
          }
        }
        if (playRemNew <= 1 && bestRemNew >= 3) {
          reasons.push(`<b>Avoid dead end:</b> Your play creates end ${playNewEnd} with only ${playRemNew} tile${playRemNew===1?'':'s'} left — it's nearly dead. [${bestT.left}|${bestT.right}] keeps end ${bestNewEnd} alive (${bestRemNew} tiles still out).`);
        }
      }

      // 10. Pip insurance for blocked games
      const bestPipTotal = bestT.left + bestT.right;
      const playPipTotal = playT.left + playT.right;
      if (bestPipTotal > playPipTotal + 2 && hand.length >= 3) {
        reasons.push(`<b>Pip insurance:</b> [${bestT.left}|${bestT.right}] sheds ${bestPipTotal} pips vs ${playPipTotal} for your play. If the game blocks, the team with lowest individual pip count wins — shedding heavy tiles early is insurance.`);
      }

      if (reasons.length === 0) {
        // Fallback: use heuristic reasons from smartAI, with category-aware filtering
        // Raw string diff fails because each tile generates unique reason text
        // (different end numbers, tile lists, pip counts) even for the same category.
        // We must compare by category so we don't show "Sheds 7 pips" as an advantage
        // when the played tile sheds 11 pips.
        try {
          const aiOptions = smartAI(hand, lE, rE, bLen, 0, knowledge, true);
          const aiBest = aiOptions.find(o => o.tile.id === bestT.id);
          const aiPlay = aiOptions.find(o => o.tile.id === playT.id);
          if (aiBest && aiBest.reasons.length > 0) {
            const playReasons = aiPlay ? aiPlay.reasons : [];
            const playReasonSet = new Set(playReasons);
            const diff = [];
            for (const reason of aiBest.reasons) {
              if (playReasonSet.has(reason)) continue;

              // Category: connectivity ("X more tiles match new ends")
              const connM = reason.match(/^(\d+) more tiles match new ends/);
              if (connM) {
                const bestCnt = parseInt(connM[1]);
                const playConn = playReasons.find(r => /^\d+ more tiles match new ends/.test(r));
                if (playConn && parseInt(playConn.match(/^(\d+)/)[1]) >= bestCnt) continue;
              }

              // Category: pip shedding ("Sheds X pips" or "Dump heavy tile (X pips)")
              const pipM = reason.match(/(?:Sheds |Dump heavy tile \()(\d+) pips/);
              if (pipM) {
                const bestPips = parseInt(pipM[1]);
                const playPip = playReasons.find(r => /(?:Sheds |Dump heavy tile \()(\d+) pips/.test(r));
                if (playPip && parseInt(playPip.match(/(?:Sheds |Dump heavy tile \()(\d+) pips/)[1]) >= bestPips) continue;
              }

              diff.push(reason);
            }
            if (diff.length > 0) {
              reasons.push(`<b>Why better:</b> ${diff.slice(0, 2).join('; ')}.`);
            }
          }
        } catch(e) {}
      }

      return reasons.length > 0 ? reasons.join('<br>') : null;
    }

    function toggleCoach() {
      coachEnabled = !coachEnabled;
      try { localStorage.setItem('pernambuco_coach', coachEnabled ? '1' : '0'); } catch(e) {}
      render();
    }

    function toggleCoachCollapse() {
      coachCollapsed = !coachCollapsed;
      try { localStorage.setItem('pernambuco_coach_collapsed', coachCollapsed ? '1' : '0'); } catch(e) {}
      render();
    }

    function jumpToCoachTurn(msgIdx) {
      if (!currentGame || !currentGame.outcome) return; // only after game ends
      const msg = coachMessages[msgIdx];
      if (!msg) return;
      // Find the snapshot closest to this coach message's turn number
      const targetTurn = msg.turn;
      let bestSnap = 0;
      for (let i = 0; i < currentGame.snapshots.length; i++) {
        if (currentGame.snapshots[i].move <= targetTurn) bestSnap = i;
      }
      // Switch to watch mode to show the board at that state
      gameMode = 'watch';
      currentStep = bestSnap;
      rightPanelTab = 'analysis';
      render();
    }

    // ========== PLAY MODE HUMAN INPUT ==========

    function playPickTile(tileId) {
      if (!playWaiting || playSidePick) return;
      const hand = liveHands[0];
      const tile = hand.find(t => t.id === tileId);
      if (!tile) return;
      if (!canPlay(tile, liveLeftEnd, liveRightEnd, liveBoard.length)) return;

      const canLeft = canPlayOnSide(tile, liveLeftEnd);
      const canRight = canPlayOnSide(tile, liveRightEnd);

      if (liveLeftEnd === liveRightEnd) {
        finishPlayPick(tile, 'left');
        return;
      }

      if (canLeft && canRight) {
        playSidePick = { tile, canLeft, canRight };
        render();
        return;
      }

      if (canLeft) finishPlayPick(tile, 'left');
      else if (canRight) finishPlayPick(tile, 'right');
    }

    function playPickSide(side) {
      if (!playSidePick) return;
      const tile = playSidePick.tile;
      playSidePick = null;
      finishPlayPick(tile, side);
    }

    function finishPlayPick(tile, side) {
      playWaiting = false;
      playSidePick = null;
      playHint = null;
      playLastMove = null;

      const allOptions = smartAI(liveHands[0], liveLeftEnd, liveRightEnd, liveBoard.length, 0, liveKnowledge, true);
      const chosen = allOptions.find(o => o.tile.id === tile.id && o.side === side)
                  || allOptions.find(o => o.tile.id === tile.id);
      const reasons = chosen ? chosen.reasons : ['Player choice'];
      const score = chosen ? chosen.score : 0;

      if (coachEnabled) {
        const heuristicMsgIdx = coachMessages.length;
        generateCoachOnYourPlay(tile, side, allOptions);
        // Capture pre-play snapshot for async MC evaluation
        const snapForMC = currentGame.snapshots[currentGame.snapshots.length - 1];
        recordLivePlay(0, tile, side, reasons, score, allOptions);
        runCoachMC(snapForMC, tile, side, heuristicMsgIdx);
      } else {
        recordLivePlay(0, tile, side, reasons, score, allOptions);
      }
      render();
      scheduleNextMove();
    }

    function playPass() {
      if (!playWaiting) return;
      const hand = liveHands[0];
      if (hand.some(t => canPlay(t, liveLeftEnd, liveRightEnd, liveBoard.length))) return;

      playWaiting = false;
      playSidePick = null;
      playHint = null;
      playLastMove = null;
      if (coachEnabled) generateCoachOnPass();
      recordLivePass(0);
      render();
      scheduleNextMove();
    }

    function showPlayHint() {
      if (!playWaiting || playSidePick) return;
      const allOptions = smartAI(liveHands[0], liveLeftEnd, liveRightEnd, liveBoard.length, 0, liveKnowledge, true);
      if (allOptions.length > 0) {
        const best = allOptions[0];
        playHint = { tileId: best.tile.id, side: best.side, reasons: best.reasons.slice(0, 3) };
      } else {
        playHint = { tileId: null, side: null, reasons: ['No playable tiles — pass'] };
      }
      render();
    }

    function renderPlaySidePickOverlay() {

        <div class="flex justify-center gap-3">

          <button class="side-pick-btn bg-red-600 text-white" onclick="playPickSide('right')">${_t('right_end')} (${liveRightEnd})</button>
        </div>
        <button class="text-xs text-slate-400 hover:text-white mt-2 underline" onclick="playSidePick=null;render()">${appLang==='pt'?'Cancelar — escolher outra pedra':'Cancel — pick a different tile'}</button>
      </div>`;

    function computeCoachWinProb() {
      // Match equity from score table
      const me = getMatchEquity3D(matchScore[0], matchScore[1], scoreMultiplier);
      // In-game adjustment based on tile advantage
      let gameAdj = 0;
      if (liveHands && liveKnowledge) {
        const myTiles = liveHands[0] ? liveHands[0].length : 0;
        const partnerTiles = liveHands[2] ? liveHands[2].length : 0;
        const opp1Tiles = liveHands[1] ? liveHands[1].length : 0;
        const opp3Tiles = liveHands[3] ? liveHands[3].length : 0;
        const teamTiles = myTiles + partnerTiles;
        const oppTiles = opp1Tiles + opp3Tiles;
        if (teamTiles + oppTiles > 0) {
          gameAdj = (oppTiles - teamTiles) / (teamTiles + oppTiles) * 0.15;
        }
        // Void advantage: count how many more voids opponents have vs us
        const myVoids = liveKnowledge.cantHave[0].size + liveKnowledge.cantHave[2].size;
        const oppVoids = liveKnowledge.cantHave[1].size + liveKnowledge.cantHave[3].size;
        gameAdj += (oppVoids - myVoids) * 0.02;
      }
      return Math.max(0.01, Math.min(0.99, me + gameAdj));
    }

    function renderWinProbBar() {
      const wp = computeCoachWinProb();
      const pct = Math.round(wp * 100);
      const oppPct = 100 - pct;
      const barColor = pct >= 60 ? '#22c55e' : pct >= 45 ? '#eab308' : '#ef4444';
      return `<div class="px-3 py-1.5 border-b border-indigo-500/20">

          <span class="text-blue-400 font-bold">${_t('your_team')} ${pct}%</span>
          <span class="text-xs text-slate-500">${_t('win_prob')}</span>
          <span class="text-red-400 font-bold">${_t('opp_team')} ${oppPct}%</span>
        </div>
        <div class="h-2 rounded-full bg-red-900/60 overflow-hidden">
          <div style="width:${pct}%;background:${barColor};height:100%;border-radius:9999px;transition:width 0.5s"></div>
        </div>
      </div>`;
    }

        <div style="max-height:400px;overflow-y:auto" class="px-3 py-1.5 space-y-1.5" id="coachScrollArea">
          ${recent.map((m, idx) => {

            const realIdx = coachMessages.length - 1 - idx;
            return `<div class="flex items-start gap-1.5 text-xs leading-snug ${clickable}" ${currentGame?.outcome ? `onclick="jumpToCoachTurn(${realIdx})"` : ''}>
              <span style="flex-shrink:0">${icons[m.type] || ''}</span>

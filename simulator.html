    // ========== METRICS LIBRARY ==========

    // Helper: compute new board ends after a move
    function applyMove(snap, tile, side) {
      const lE = snap.leftEnd, rE = snap.rightEnd;
      if (snap.board.length === 0) return { newLeft: tile.left, newRight: tile.right };
      if (side === 'left') {
        return { newLeft: tile.left === lE ? tile.right : tile.left, newRight: rE };
      } else {
        return { newLeft: lE, newRight: tile.right === rE ? tile.left : tile.right };
      }
    }

    function computeFlexibility(hand, tile) {
      const leave = hand.filter(t => t.id !== tile.id);
      if (leave.length === 0) return { flexibility: 1.0, leaveEntropy: 0, numDistribution: new Array(7).fill(0) };

      const numCount = new Array(7).fill(0);
      for (const t of leave) {
        numCount[t.left]++;
        if (t.left !== t.right) numCount[t.right]++;
      }

      let totalPlayable = 0, combos = 0;
      for (let a = 0; a <= 6; a++) {
        for (let b = a; b <= 6; b++) {
          const playable = leave.filter(t =>
            t.left === a || t.right === a || t.left === b || t.right === b
          ).length;
          totalPlayable += playable;
          combos++;
        }
      }
      const flexibility = totalPlayable / combos / Math.max(1, leave.length);

      const total = numCount.reduce((s, c) => s + c, 0);
      let entropy = 0;
      for (const c of numCount) {
        if (c > 0 && total > 0) {
          const p = c / total;
          entropy -= p * Math.log2(p);
        }
      }

      return { flexibility, leaveEntropy: entropy, numDistribution: numCount };
    }

    function computeControlMetrics(snap, player, tile, side) {
      const { newLeft, newRight } = applyMove(snap, tile, side);
      const hand = snap.hands[player].filter(t => t.id !== tile.id);

      // Count our tiles that match new ends
      const myEndTiles = hand.filter(t =>
        t.left === newLeft || t.right === newLeft || t.left === newRight || t.right === newRight
      ).length;

      // Suit dominance: fraction of remaining tiles with each end number that we hold
      const suitDom = {};
      const knowledge = snap.knowledge;
      for (const n of [newLeft, newRight]) {
        const remaining = ALL_TILES.filter(t =>
          !knowledge.played.has(t.id) && (t.left === n || t.right === n)
        ).length;
        const weHave = hand.filter(t => t.left === n || t.right === n).length;
        suitDom[n] = remaining > 0 ? weHave / remaining : 0;
      }

      // Expected forced passes on opponents using belief or knowledge
      let expectedForcedPasses = 0;
      for (const opp of [1, 3]) {
        const dead = knowledge.cantHave[opp];
        const cantPlayL = dead.has(newLeft);
        const cantPlayR = dead.has(newRight);
        if (cantPlayL && cantPlayR) expectedForcedPasses += 1.0;
        else if (cantPlayL || cantPlayR) expectedForcedPasses += 0.3;
      }

      return {
        myEndTiles,
        suitDominance: suitDom,
        expectedForcedPasses,
        squeezeValue: expectedForcedPasses > 0.5 ? 'high' : expectedForcedPasses > 0.2 ? 'medium' : 'low'
      };
    }

    function computeTempoMetrics(snap, player, tile, side) {
      const myTeam = player % 2;
      const myTurns = snap.hands.filter((h, i) => i % 2 === myTeam)
        .reduce((s, h) => s + h.length, 0);
      const oppTurns = snap.hands.filter((h, i) => i % 2 !== myTeam)
        .reduce((s, h) => s + h.length, 0);

      const { newLeft, newRight } = applyMove(snap, tile, side);
      const nextPlayer = (player + 1) % 4;
      const nextDead = snap.knowledge.cantHave[nextPlayer];
      const nextCantPlayL = nextDead.has(newLeft);
      const nextCantPlayR = nextDead.has(newRight);
      const nextCanPlay = nextCantPlayL && nextCantPlayR ? 0 :
                          nextCantPlayL || nextCantPlayR ? 0.5 : 1.0;
      const nextIsOpp = nextPlayer % 2 !== myTeam;

      return {
        teamTurnsLeft: myTurns,
        oppTurnsLeft: oppTurns,
        nextPlayerCanPlay: nextCanPlay,
        controlRetention: nextIsOpp ? (1 - nextCanPlay) : nextCanPlay
      };
    }

    function computeInfoGain(snap, player, tile, side) {
      const knowledge = snap.knowledge;
      // Count total known void numbers across opponents as proxy for information state
      let knownVoids = 0;
      for (const p of [1, 2, 3]) knownVoids += knowledge.cantHave[p].size;

      const { newLeft, newRight } = applyMove(snap, tile, side);
      const nextP = (player + 1) % 4;
      const nextDead = knowledge.cantHave[nextP];
      const nextCantPlayL = nextDead.has(newLeft);
      const nextCantPlayR = nextDead.has(newRight);

      // Pass probability: 1.0 if both void, 0.3 if one void, else estimate
      const passProb = nextCantPlayL && nextCantPlayR ? 1.0 :
                       nextCantPlayL || nextCantPlayR ? 0.4 : 0.15;

      // Information gain: pass reveals 2 numbers, play reveals 1 tile
      const infoGain = passProb * 2.0 + (1 - passProb) * 0.5;
      const normalizedGain = infoGain / 2.5; // 0 to ~1

      return {
        infoGain: normalizedGain,
        passProb_nextPlayer: passProb,
        diagnosticValue: normalizedGain > 0.5 ? 'high' : normalizedGain > 0.2 ? 'medium' : 'low'
      };
    }

    function computePartnerSynergy(snap, player, tile, side) {
      const partner = (player + 2) % 4;
      const { newLeft, newRight } = applyMove(snap, tile, side);
      const knowledge = snap.knowledge;

      const partnerDead = knowledge.cantHave[partner];
      const partnerCantPlayL = partnerDead.has(newLeft);
      const partnerCantPlayR = partnerDead.has(newRight);
      const partnerPlayProb = partnerCantPlayL && partnerCantPlayR ? 0 :
                              partnerCantPlayL || partnerCantPlayR ? 0.5 : 0.85;

      const partnerWasLocked = partnerDead.has(snap.leftEnd) && partnerDead.has(snap.rightEnd);
      const partnerNowUnlocked = partnerPlayProb > 0.3;
      const rescueValue = partnerWasLocked && partnerNowUnlocked ? 1.0 : 0.0;

      // Check partner strength in new end numbers
      const pStr = knowledge.inferStrength(partner);
      const feedsPartner = pStr[newLeft] >= 2 || pStr[newRight] >= 2;

      return {
        partnerPlayProb,
        partnerRescueValue: rescueValue,
        feedsPartnerSuit: feedsPartner
      };
    }

    // Compute all metrics for a move in one call
    function computeAllMetrics(snap, player, tile, side) {
      return {
        flexibility: computeFlexibility(snap.hands[player], tile),
        control: computeControlMetrics(snap, player, tile, side),
        tempo: computeTempoMetrics(snap, player, tile, side),
        info: computeInfoGain(snap, player, tile, side),
        partner: computePartnerSynergy(snap, player, tile, side)
      };
    }

    // ========== EXPLANATION ENGINE ==========

    class ExplanationBuilder {
      explain(bestMove, allMoves, snap, metrics) {
        return {
          tldr: this._buildTLDR(bestMove, snap, metrics),
          keyDrivers: this._buildKeyDrivers(bestMove, metrics),
          motifs: this._tagMotifs(bestMove, snap, metrics),
          counterfactuals: this._buildCounterfactuals(bestMove, allMoves, snap)
        };
      }

      _buildTLDR(best, snap, metrics) {
        const { newLeft, newRight } = applyMove(snap, best.tile, best.side);
        const reasons = [];
        const knowledge = snap.knowledge;

        for (const opp of [1, 3]) {
          const dead = [...knowledge.cantHave[opp]];
          if (dead.includes(newLeft) && dead.includes(newRight)) {
            reasons.push(`blocks ${pn(opp)} (void in ${dead.join(',')})`);
          }
        }

        const pStr = knowledge.inferStrength(2);
        if (pStr[newLeft] >= 2 || pStr[newRight] >= 2) {
          reasons.push(`feeds partner's strong suit`);
        }

        if (metrics && metrics.flexibility && metrics.flexibility.flexibility > 0.5) {
          reasons.push(`keeps hand flexible`);
        }

        if (metrics && metrics.control && metrics.control.expectedForcedPasses > 0.5) {
          reasons.push(`squeezes opponents`);
        }

        if (reasons.length === 0) reasons.push(`highest expected equity`);

        return `Play [${best.tile.left}|${best.tile.right}] on ${best.side} — ${reasons.join(', ')}.`;
      }

      _buildKeyDrivers(best, metrics) {
        const drivers = [];
        drivers.push({
          metric: 'E[pts]', value: best.expectedPoints.toFixed(2),
          explanation: `Expected ${best.expectedPoints >= 0 ? 'gain' : 'loss'} of ${Math.abs(best.expectedPoints).toFixed(2)} pts`
        });
        drivers.push({
          metric: 'Win%', value: (best.winRate * 100).toFixed(1) + '%',
          explanation: `Team wins ${(best.winRate * 100).toFixed(1)}% of the time`
        });
        if (metrics && metrics.control) {
          drivers.push({
            metric: 'Forced passes', value: metrics.control.expectedForcedPasses.toFixed(1),
            explanation: `Forces ~${metrics.control.expectedForcedPasses.toFixed(1)} opponent passes`
          });
        }
        if (metrics && metrics.partner) {
          drivers.push({
            metric: 'Partner play%', value: (metrics.partner.partnerPlayProb * 100).toFixed(0) + '%',
            explanation: `Partner can play ${(metrics.partner.partnerPlayProb * 100).toFixed(0)}% of the time`
          });
        }
        return drivers;
      }

      _tagMotifs(best, snap, metrics) {
        const motifs = [];
        const { newLeft, newRight } = applyMove(snap, best.tile, best.side);
        const knowledge = snap.knowledge;

        for (const opp of [1, 3]) {
          const dead = [...knowledge.cantHave[opp]];
          if (dead.includes(newLeft) && dead.includes(newRight)) {
            motifs.push({
              name: 'BLOCK', icon: '\u26D4',
              definition: 'Leaves ends opponent cannot play on.',
              evidence: `${pn(opp)} void in {${dead.join(',')}}. Ends → ${newLeft}/${newRight}.`
            });
          }
        }

        const pStr = knowledge.inferStrength(2);
        if (pStr[newLeft] >= 2 || pStr[newRight] >= 2) {
          const suit = pStr[newLeft] >= 2 ? newLeft : newRight;
          motifs.push({
            name: 'FEED', icon: '\u2764',
            definition: 'Opens an end in partner\'s strong suit.',
            evidence: `Partner played ${pStr[suit]}x tiles with ${suit}.`
          });
        }

        if (best.tile.left === best.tile.right) {
          motifs.push({
            name: 'CLEAR DOUBLE', icon: '\u2B1C',
            definition: 'Play a double while opportunity exists.',
            evidence: `[${best.tile.left}|${best.tile.right}] only connects to ${best.tile.left}s.`
          });
        }

        if (metrics && metrics.info && metrics.info.infoGain > 0.4) {
          motifs.push({
            name: 'PROBE', icon: '\u2753',
            definition: 'Maximizes information about opponent hands.',
            evidence: `Next player ${(metrics.info.passProb_nextPlayer * 100).toFixed(0)}% to pass.`
          });
        }

        if (metrics && metrics.tempo && metrics.tempo.controlRetention > 0.6) {
          motifs.push({
            name: 'TEMPO', icon: '\u26A1',
            definition: 'Maintains initiative — opponents struggle to play.',
            evidence: `Control retention: ${(metrics.tempo.controlRetention * 100).toFixed(0)}%.`
          });
        }

        if (metrics && metrics.partner && metrics.partner.partnerRescueValue > 0) {
          motifs.push({
            name: 'RESCUE', icon: '\uD83D\uDEDF',
            definition: 'Unlocks a locked partner by changing board ends.',
            evidence: `Partner was blocked — this move opens new numbers for them.`
          });
        }

        if (metrics && metrics.flexibility && metrics.flexibility.flexibility > 0.55) {
          motifs.push({
            name: 'FLEXIBLE', icon: '\uD83E\uDDF6',
            definition: 'Preserves hand versatility for future turns.',
            evidence: `Leave flexibility: ${(metrics.flexibility.flexibility * 100).toFixed(0)}%.`
          });
        }

        return motifs;
      }

      _buildCounterfactuals(best, allMoves, snap) {
        const top3 = allMoves.slice(0, 3);
        return top3.map((m, i) => {
          if (i === 0) return { move: m, comparison: 'BEST', delta: 0, reason: '' };
          const delta = best.expectedPoints - m.expectedPoints;
          const bE = applyMove(snap, best.tile, best.side);
          const mE = applyMove(snap, m.tile, m.side);

          let reason = '';
          if (delta > 0.3) {
            reason = `Loses ${delta.toFixed(2)} E[pts]: `;
            if (m.winRate < best.winRate - 0.05) {
              reason += `win% drops ${(best.winRate*100).toFixed(0)}%→${(m.winRate*100).toFixed(0)}%`;
            } else {
              reason += `worse ends (${mE.newLeft}/${mE.newRight} vs ${bE.newLeft}/${bE.newRight})`;
            }
          } else {
            reason = `Close (${delta.toFixed(2)} E[pts] worse). Viable in some deals.`;
          }
          return { move: m, comparison: `#${i+1}`, delta, reason };
        });
      }
    }

    const explanationBuilder = new ExplanationBuilder();

    function explainUncertainty(results) {
      if (!results || results.length < 2) return null;
      const best = results[0], second = results[1];
      const gap = best.expectedPoints - second.expectedPoints;
      const ciOverlap = gap < (best.ci95 + second.ci95);
      if (!ciOverlap) return null;
      return {
        message: `Close call: [${best.tile.left}|${best.tile.right}] and [${second.tile.left}|${second.tile.right}] within CIs (gap: ${gap.toFixed(2)}).`,
        recommendation: best.variance < second.variance
          ? `[${best.tile.left}|${best.tile.right}] is also lower variance — safer.`
          : `[${second.tile.left}|${second.tile.right}] has lower variance if you prefer safety.`
      };
    }

    // ========== GAME EXPORTER ==========

    class GameExporter {
      export(game, analysis, nb) {
        const lines = [];

        lines.push(JSON.stringify({
          type: 'header', version: '2.0',
          timestamp: new Date().toISOString(),
          matchScore: [...matchScore],
          dobrada: scoreMultiplier,
          engineConfig: { mcSims: MC_SIMS_QUIZ, seed: currentSeed || null }
        }));

        lines.push(JSON.stringify({
          type: 'deal',
          hands: game.originalHands ? game.originalHands.map(h => h.map(t => ({left:t.left, right:t.right, id:t.id}))) : null,
          autoPlayedBy: game.autoPlayedBy,
          autoTile: game.autoTile ? {left:game.autoTile.left, right:game.autoTile.right} : null
        }));

        const snapshots = game.snapshots || [];
        for (let i = 0; i < snapshots.length; i++) {
          const s = snapshots[i];
          if (s.action !== 'play' || s.player < 0) continue;
          const evalData = analysis ? analysis.find(a => a.stepIdx === i || a.move === s.move) : null;
          lines.push(JSON.stringify({
            type: 'decision', move: s.move, player: s.player,
            tile: { left: s.tile.left, right: s.tile.right },
            side: s.side,
            boardEnds: [s.leftEnd, s.rightEnd],
            handSize: s.hands[s.player].length,
            allOptions: (s.allOptions || []).map(o => ({
              tile: { left: o.tile.left, right: o.tile.right },
              side: o.side, heuristicScore: o.score
            })),
            evaluation: evalData ? {
              expectedPoints: evalData.playedEP, bestEP: evalData.bestEP,
              eqLoss: evalData.eqLoss, grade: evalData.grade
            } : null
          }));
        }

        // Outcome from last snapshot
        const last = snapshots[snapshots.length - 1];
        if (last) {
          lines.push(JSON.stringify({
            type: 'outcome',
            winner: last.winner ?? null,
            winnerTeam: last.winnerTeam ?? null,
            points: last.points ?? null,
            resultType: last.resultType ?? null,
            totalMoves: snapshots.filter(s => s.action === 'play').length
          }));
        }

        return lines.join('\n');
      }
    }

    function exportGame() {
      if (!currentGame) return;
      const exporter = new GameExporter();
      const analysis = currentGame._analysisCache || null;
      const jsonl = exporter.export(currentGame, analysis, notebook);
      const blob = new Blob([jsonl], { type: 'application/jsonl' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `domino-game-${Date.now()}.jsonl`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function importGame(jsonlText) {
      try {
        const lines = jsonlText.trim().split('\n').map(JSON.parse);
        const header = lines.find(l => l.type === 'header');
        const deal = lines.find(l => l.type === 'deal');
        const decisions = lines.filter(l => l.type === 'decision');
        const outcome = lines.find(l => l.type === 'outcome');
        if (!deal || !deal.hands) { alert('Invalid JSONL: missing deal data'); return; }

        // Restore seed from export header
        if (header && header.engineConfig && header.engineConfig.seed != null) {
          applySeed(header.engineConfig.seed);
        }

        // Reconstruct by replaying the game from the deal
        if (header && header.matchScore) matchScore = header.matchScore;
        if (header && header.dobrada) scoreMultiplier = header.dobrada;

        // Rebuild deck from deal hands
        const allHands = deal.hands.map(h => h.map(t => {
          const found = ALL_TILES.find(at => at.left === t.left && at.right === t.right);
          return found || t;
        }));

        // Create game by replaying
        const autoTile = deal.autoTile ? ALL_TILES.find(t => t.left === deal.autoTile.left && t.right === deal.autoTile.right) : null;
        const starter = (deal.autoPlayedBy + 1) % 4;
        const result = simulateFullRound(allHands, starter,
          autoTile ? [autoTile] : [], autoTile ? autoTile.left : null, autoTile ? autoTile.right : null, deal.autoPlayedBy);

        currentGame = result;
        currentStep = 0;
        quizWaiting = false;
        quizResult = null;
        gameMode = 'watch';
        render();
        alert(`Imported game: ${decisions.length} decisions, outcome: ${outcome ? outcome.resultType : 'unknown'}`);
      } catch (e) {
        alert(`Import error: ${e.message}\n[${seedContext()}]`);
      }
    }

    // ========== SELF-PLAY BENCHMARK ==========

    function selfPlayBatch(numGames = 100, progressCb) {
      const results = [];
      let wins = [0, 0], totalPts = [0, 0], blocked = 0;
      let idx = 0;

      function runNext() {
        if (idx >= numGames) {
          const summary = {
            games: numGames,
            team0Wins: wins[0], team1Wins: wins[1],
            team0WinPct: (wins[0] / numGames * 100).toFixed(1),
            avgPts: [(totalPts[0] / numGames).toFixed(2), (totalPts[1] / numGames).toFixed(2)],
            blockedPct: (blocked / numGames * 100).toFixed(1),
            results
          };
          if (progressCb) progressCb(summary, true);
          return summary;
        }

        newSeed();
        const deck = shuffleDeck(ALL_TILES);
        const hands = [deck.slice(0, 6), deck.slice(6, 12), deck.slice(12, 18), deck.slice(18, 24)];
        // Find highest double for opener
        let opener = -1, openerTile = null;
        for (let d = 6; d >= 0; d--) {
          const dt = ALL_TILES.find(t => t.left === d && t.right === d);
          for (let p = 0; p < 4; p++) {
            if (hands[p].find(t => t.id === dt.id)) { opener = p; openerTile = dt; break; }
          }
          if (opener >= 0) break;
        }

        const game = simulateFullRound(hands, opener, openerTile ? [openerTile] : [],
          openerTile ? openerTile.left : null, openerTile ? openerTile.right : null, opener);
        const snaps = game.snapshots;
        const lastSnap = snaps[snaps.length - 1];
        const wTeam = lastSnap.winnerTeam ?? -1;
        const pts = lastSnap.points ?? 0;
        const rType = lastSnap.resultType ?? 'normal';

        if (wTeam >= 0) { wins[wTeam]++; totalPts[wTeam] += pts; }
        if (rType === 'blocked' || rType === 'tie') blocked++;

        results.push({ game: idx, winnerTeam: wTeam, points: pts, type: rType });
        idx++;
        if (progressCb && idx % 10 === 0) progressCb({ done: idx, total: numGames }, false);
        setTimeout(runNext, 0);
      }

      setTimeout(runNext, 0);
    }

    // ========== ELO TRACKING ==========

    let eloRatings = JSON.parse(localStorage.getItem('domino_elo') || 'null') || { player: 1500, engine: 1500, history: [] };

    function updateElo(playerWon, kFactor = 32) {
      const pR = eloRatings.player, eR = eloRatings.engine;
      const expectedP = 1 / (1 + Math.pow(10, (eR - pR) / 400));
      const expectedE = 1 - expectedP;
      const scoreP = playerWon ? 1 : 0;
      const scoreE = playerWon ? 0 : 1;
      eloRatings.player = Math.round(pR + kFactor * (scoreP - expectedP));
      eloRatings.engine = Math.round(eR + kFactor * (scoreE - expectedE));
      eloRatings.history.push({ date: Date.now(), player: eloRatings.player, engine: eloRatings.engine, result: playerWon ? 'win' : 'loss' });
      if (eloRatings.history.length > 200) eloRatings.history.shift();
      localStorage.setItem('domino_elo', JSON.stringify(eloRatings));
    }

    // ========== PLAYER PROFILES ==========

    const PLAYERS_KEY = 'domino_players';

    function _loadPlayers() {
      try { return JSON.parse(localStorage.getItem(PLAYERS_KEY)) || { activePlayer: null, players: {} }; }
      catch(e) { return { activePlayer: null, players: {} }; }
    }
    function _savePlayers(data) {
      try { localStorage.setItem(PLAYERS_KEY, JSON.stringify(data)); } catch(e) {}
    }

    function createPlayer(name) {
      const data = _loadPlayers();
      const id = 'p_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
      data.players[id] = { id, name, created: new Date().toISOString(), lastPlayed: new Date().toISOString() };
      data.activePlayer = id;
      _savePlayers(data);
      _initPlayerStats(id);
      render();
      return id;
    }

    function switchPlayer(id) {
      const data = _loadPlayers();
      if (!data.players[id]) return;
      // Finalize current session before switching
      _finalizeSession();
      data.activePlayer = id;
      data.players[id].lastPlayed = new Date().toISOString();
      _savePlayers(data);
      render();
    }

    function deletePlayer(id) {
      const data = _loadPlayers();
      if (!data.players[id]) return;
      delete data.players[id];
      try { localStorage.removeItem('domino_player_' + id + '_stats'); } catch(e) {}
      if (data.activePlayer === id) {
        const remaining = Object.keys(data.players);
        data.activePlayer = remaining.length > 0 ? remaining[0] : null;
      }
      _savePlayers(data);
      render();
    }

    function getActivePlayer() {
      const data = _loadPlayers();
      if (!data.activePlayer || !data.players[data.activePlayer]) return null;
      return data.players[data.activePlayer];
    }

    function getActivePlayerId() {
      const data = _loadPlayers();
      return data.activePlayer;
    }

    function getAllPlayers() {
      return _loadPlayers().players;
    }

    // ========== PER-PLAYER STATS ==========

    function _playerStatsKey(id) { return 'domino_player_' + id + '_stats'; }

    function _initPlayerStats(id) {
      const existing = _loadPlayerStats(id);
      if (existing) return;
      const blank = {
        totalGames: 0, totalMoves: 0,
        optimalMoves: 0, goodMoves: 0, okMoves: 0, badMoves: 0,
        totalEquityLoss: 0,
        leaks: { BLOCKING_MISS: 0, FEED_ERROR: 0, DOUBLE_TIMING: 0, DEAD_END: 0, PIP_WASTE: 0, PARTNER_IGNORE: 0 },
        sessions: [],
        recentGames: [],
        startRoll: { startGames: 0, startWins: 0, rollGames: 0, rollWins: 0 },
      };
      try { localStorage.setItem(_playerStatsKey(id), JSON.stringify(blank)); } catch(e) {}
    }

    function _loadPlayerStats(id) {
      try { const s = localStorage.getItem(_playerStatsKey(id)); return s ? JSON.parse(s) : null; }
      catch(e) { return null; }
    }

    function _savePlayerStats(id, stats) {
      try { localStorage.setItem(_playerStatsKey(id), JSON.stringify(stats)); } catch(e) {}
    }

    // Session tracking
    let _sessionStart = null;
    let _sessionGames = 0;
    let _sessionMoves = 0;
    let _sessionOptimal = 0;
    let _sessionGood = 0;
    let _sessionLeaks = {};
    let _sessionEqLossSum = 0;
    let _lastActivityTime = null;
    const SESSION_TIMEOUT = 10 * 60 * 1000; // 10 min

    function _ensureSession() {
      const now = Date.now();
      if (!_sessionStart || (_lastActivityTime && now - _lastActivityTime > SESSION_TIMEOUT)) {
        _finalizeSession();
        _sessionStart = now;
        _sessionGames = 0; _sessionMoves = 0; _sessionOptimal = 0; _sessionGood = 0;
        _sessionLeaks = {}; _sessionEqLossSum = 0;
      }
      _lastActivityTime = now;
    }

    function _finalizeSession() {
      if (!_sessionStart || _sessionGames === 0) { _sessionStart = null; return; }
      const pid = getActivePlayerId();
      if (!pid) { _sessionStart = null; return; }
      const ps = _loadPlayerStats(pid);
      if (!ps) { _sessionStart = null; return; }
      ps.sessions.push({
        date: new Date(_sessionStart).toISOString().slice(0, 10),
        games: _sessionGames,
        moves: _sessionMoves,
        accuracy: _sessionMoves > 0 ? Math.round((_sessionOptimal + _sessionGood) / _sessionMoves * 1000) / 1000 : 0,
        leaks: { ..._sessionLeaks },
        avgEqLoss: _sessionMoves > 0 ? Math.round(_sessionEqLossSum / _sessionMoves * 1000) / 1000 : 0,
      });
      if (ps.sessions.length > 50) ps.sessions = ps.sessions.slice(-50);
      _savePlayerStats(pid, ps);
      _sessionStart = null;
    }

    // Record a graded move to player stats
    function _recordPlayerMove(grade, eqLoss, leakType) {
      const pid = getActivePlayerId();
      if (!pid) return;
      _ensureSession();
      const ps = _loadPlayerStats(pid);
      if (!ps) return;
      ps.totalMoves++;
      if (grade === 'perfect') { ps.optimalMoves++; _sessionOptimal++; }
      else if (grade === 'good') { ps.goodMoves++; _sessionGood++; }
      else if (grade === 'ok') ps.okMoves++;
      else if (grade === 'bad') ps.badMoves++;
      ps.totalEquityLoss += eqLoss || 0;
      _sessionMoves++;
      _sessionEqLossSum += eqLoss || 0;
      if (leakType && ps.leaks.hasOwnProperty(leakType)) {
        ps.leaks[leakType]++;
        _sessionLeaks[leakType] = (_sessionLeaks[leakType] || 0) + 1;
      }
      _savePlayerStats(pid, ps);
    }

    // Record a completed game to player stats
    function _recordPlayerGame(gameRecord) {
      const pid = getActivePlayerId();
      if (!pid) return;
      _ensureSession();
      const ps = _loadPlayerStats(pid);
      if (!ps) return;
      ps.totalGames++;
      _sessionGames++;
      const a = gameRecord.analysis;
      const entry = {
        date: gameRecord.date,
        result: gameRecord.outcome && gameRecord.outcome.team === 0 ? 'win' : gameRecord.outcome && gameRecord.outcome.type === 'tie' ? 'tie' : 'loss',
        points: gameRecord.outcome ? gameRecord.outcome.points || 0 : 0,
        moves: a ? a.moves : 0,
        accuracy: a && a.moves > 0 ? Math.round((a.perfect + a.good) / a.moves * 1000) / 1000 : 0,
        worstMistake: null,
      };
      if (a && a.moveDetails) {
        const worst = a.moveDetails.reduce((w, d) => d.eqLoss > (w ? w.eqLoss : 0) ? d : w, null);
        if (worst && worst.eqLoss > 0.02) {
          entry.worstMistake = { eqLoss: worst.eqLoss, moveNum: worst.move };
        }
      }
      ps.recentGames.push(entry);

        return t.left === l && t.right === l;

      const matchesL = t.left === l || t.right === l;

      if (!matchesL || !matchesR) return false;

    // Knowledge tracker
    class Knowledge {
      constructor() {
        this.cantHave = [new Set(), new Set(), new Set(), new Set()];
        this.played = new Set();

        this.playsBy = [[], [], [], []];
        this.passedOn = [[], [], [], []];

        this._remainingCount = [7, 7, 7, 7, 7, 7, 7]; // each number appears on 7 tiles

        this.sacrificeFlags = [new Set(), new Set(), new Set(), new Set()]; // suits where player dumped high-pip tiles
        this._moveCount = 0; // total moves for phase-weighted avoidance

        k.openingSuits = [...this.openingSuits];

      recordPlay(p, t) {

          // NN belief: tile is now played — zero all zones
          const _bi = TILE_INDEX[t.id];
          if (_bi !== undefined) for (let z = 0; z < 5; z++) this.nnBelief[_bi * 5 + z] = 0.0;
        }
        if (p >= 0 && p <= 3) {

          if (this.openingSuits[p] === null && this.playsBy[p].length <= 2 && this._moveCount < 8) {

            if (t.left === t.right) {

              this.openingSuits[p] = t.left;

          if (this.playsBy[p].length >= 2 && t.left + t.right >= 9 && t.left !== t.right) {

        for (let ti = 0; ti < 28; ti++) {

      // Chicote: find who holds the last tile of a near-dead suit
      // Returns null if remainingWithNumber(n) !== 1
      // Returns { tile, holder: playerIdx|'dorme', candidates: [], confidence: 0-1 }
      chicoteFor(n, myHand) {

        for (const t of ALL_TILES) {

        }
        if (!ct) return null;
        // In our hand?
        if (myHand && myHand.some(h => h.id === ct.id)) return { tile: ct, holder: 'self', confidence: 1 };

      isProbablyDead(n, myIdx) {

    // ========== OPPONENT STYLE MODELING ==========
    class OpponentStyle {
      constructor() {
        this.alpha = 0.3; // EMA smoothing factor
        this.metrics = { heavyDump: 0.5, doubleSpeed: 0.5, blockingFocus: 0.5, suitLoyalty: 0.5, aggressiveness: 0.5 };
        this.observations = 0;
        this._lastSuits = new Set(); // track suit continuity for loyalty
      }
      update(tile, context) {
        // context: { hand (estimated size), lE, rE, bLen, knowledge, player }
        this.observations++;
        const a = this.alpha;
        const pips = tile.left + tile.right;
        // heavyDump: did they play a heavy tile (pips >= 9)?
        this.metrics.heavyDump = (1 - a) * this.metrics.heavyDump + a * (pips >= 9 ? 1 : 0);
        // doubleSpeed: did they play a double?
        this.metrics.doubleSpeed = (1 - a) * this.metrics.doubleSpeed + a * (tile.left === tile.right ? 1 : 0);
        // blockingFocus: did the played tile create an end that blocks an opponent?
        const blocking = context.knowledge ? (() => {
          const opp = (context.player + 2) % 4; // their partner's opponents = our team
          // Check if the new end matches a number the next player can't have
          const nextP = (context.player + 1) % 4;
          const newNums = new Set([tile.left, tile.right]);
          for (const n of newNums) {
            if (context.knowledge.cantHave[nextP].has(n)) return 1;
          }
          return 0;
        })() : 0;
        this.metrics.blockingFocus = (1 - a) * this.metrics.blockingFocus + a * blocking;
        // suitLoyalty: are they replaying the same suits as last move?
        const tileSuits = new Set([tile.left, tile.right]);
        let overlap = 0;
        if (this._lastSuits.size > 0) {
          for (const s of tileSuits) { if (this._lastSuits.has(s)) overlap++; }
          const loyalty = overlap / Math.max(1, tileSuits.size);
          this.metrics.suitLoyalty = (1 - a) * this.metrics.suitLoyalty + a * loyalty;
        }
        this._lastSuits = tileSuits;
        // aggressiveness: normalized by game phase — playing early in round = more aggressive
        const aggression = context.bLen < 10 ? 0.7 : 0.4;
        this.metrics.aggressiveness = (1 - a) * this.metrics.aggressiveness + a * aggression;
      }
      getProfile() { return { ...this.metrics, observations: this.observations }; }
      getLabel() {
        if (this.observations < 3) return null; // not enough data
        const m = this.metrics;
        if (m.heavyDump > 0.65) return 'Heavy Dumper';
        if (m.blockingFocus > 0.65) return 'Blocker';
        if (m.aggressiveness > 0.65 && m.doubleSpeed > 0.55) return 'Aggressive';
        if (m.suitLoyalty > 0.7) return 'Suit Player';
        return null;
      }
      reset() {
        this.metrics = { heavyDump: 0.5, doubleSpeed: 0.5, blockingFocus: 0.5, suitLoyalty: 0.5, aggressiveness: 0.5 };
        this.observations = 0;
        this._lastSuits = new Set();
      }

    // Track player styles: P1 (opp left), P2 (partner), P3 (opp right)
    let opponentStyles = [null, new OpponentStyle(), new OpponentStyle(), new OpponentStyle()];
    function resetOpponentStyles() {
      opponentStyles[1] = new OpponentStyle();
      opponentStyles[2] = new OpponentStyle();
      opponentStyles[3] = new OpponentStyle();
    }

    // Tunable AI weights — CMA-ES tuner modifies these via iframe.contentWindow.AI_WEIGHTS
    const AI_WEIGHTS = {
      deadEndPenalty: 34.7,     // penalty for creating a dead board end (CMA-ES tuned)
      lockFavorable: 42.5,      // bonus for deliberate favorable lock
      lockUnfavorable: 62.8,    // penalty for unfavorable lock
      chicoteSelf: 26.9,        // bonus when we hold the chicote
      chicotePartner: 23.4,     // bonus when partner holds chicote (+56%)
      chicoteOpponent: 23.7,    // penalty when opponent holds chicote
      chicoteDorme: 16.9,       // penalty when chicote in dorme (+41%)
      lockApproachGood: 13.5,   // bonus when approaching lock favors us (-33%)
      lockApproachBad: 17.5,    // penalty when approaching lock hurts us
      monopolyBonus: 17.5,      // bonus for total monopoly on a suit
      boardCountGradient: 6.3,  // per-opponent tile gradient
      captiveEndBonus: 16,      // bonus for captive end (prob-dead favorable)
      probDeadPenalty: 21.9,    // penalty for prob-dead unfavorable

    // Smart AI - returns all scored options (not just best)
    function smartAI(hand, lE, rE, bLen, player, knowledge, returnAll = false) {
      const playable = hand.filter(t => canPlay(t, lE, rE, bLen));
      if (playable.length === 0) return returnAll ? [] : null;

      if (bLen === 0) {
        const sc = [0,0,0,0,0,0,0];
        for (const t of hand) { sc[t.left]++; if (t.left !== t.right) sc[t.right]++; }
        const scored = playable.map(t => {
          let s = sc[t.left]*10 + sc[t.right]*10 + (t.left===t.right?15:0) + (t.left+t.right)*2;
          return { tile: t, score: s, side: null, reasons: [`Open: suit ${t.left}=${sc[t.left]}, suit ${t.right}=${sc[t.right]}${t.left===t.right?' (double bonus)':''}`] };
        });
        scored.sort((a, b) => b.score - a.score);
        return returnAll ? scored : scored[0];
      }

      const partner = (player + 2) % 4;
      const opp1 = (player + 1) % 4, opp2 = (player + 3) % 4;

      // Phase-dependent multiplier for dead number / chicote scores
      const deadMul = bLen <= 4 ? 0.4 : (bLen <= 14 ? 1.0 : 1.4);

      // Pre-compute tile index by number for O(1) lookups
      const suitCount = new Array(7).fill(0);
      const tilesByNum = Array.from({length: 7}, () => []);
      for (const t of hand) {
        suitCount[t.left]++;
        if (t.left !== t.right) suitCount[t.right]++;
        tilesByNum[t.left].push(t);
        if (t.left !== t.right) tilesByNum[t.right].push(t);
      }

      const scored = playable.flatMap(tile => {
        const options = [];
        for (const side of ['left', 'right']) {
          const cS = side === 'left' ? (tile.left === lE || tile.right === lE) : (tile.left === rE || tile.right === rE);
          if (!cS) continue;

          let newEnd;
          if (side === 'left') newEnd = tile.left === lE ? tile.right : tile.left;
          else newEnd = tile.right === rE ? tile.left : tile.right;

          const otherEnd = side === 'left' ? rE : lE;
          let ss = 0;
          const sr = [];

          // Suit control — use pre-computed index
          const endSet = new Set([newEnd, otherEnd]);
          let myCount = 0;
          const matchingTiles = new Set();
          for (const n of endSet) {
            for (const x of tilesByNum[n]) { if (x.id !== tile.id) { myCount++; matchingTiles.add(x); } }
          }
          // Deduplicate: tiles touching both ends were counted twice
          if (endSet.size === 2) {
            for (const x of tilesByNum[newEnd]) {
              if (x.id !== tile.id && (x.left === otherEnd || x.right === otherEnd)) myCount--;
            }
          }
          ss += myCount * 15;
          if (myCount > 0) {
            const tileList = [...matchingTiles].map(t => `[${t.left}|${t.right}]`).join(' ');
            sr.push(`${myCount} more tiles match new ends [${newEnd}..${otherEnd}]: ${tileList}`);
          }

          // Blocking — opp1 plays next (higher value), opp2 plays after partner (lower)
          if (knowledge.cantHave[opp1].has(newEnd) && knowledge.cantHave[opp1].has(otherEnd)) { ss += 35; sr.push(`Blocks ${pn(opp1)} (next player)`); }
          if (knowledge.cantHave[opp2].has(newEnd) && knowledge.cantHave[opp2].has(otherEnd)) { ss += 25; sr.push(`Blocks ${pn(opp2)}`); }

          // Opponent style adjustment: block-focused opponents are higher-value targets
          if (opponentStyles[opp1] && opponentStyles[opp1].observations >= 3) {
            const bf1 = opponentStyles[opp1].metrics.blockingFocus;
            if (bf1 > 0.6 && knowledge.cantHave[opp1].has(newEnd)) { ss += 8; sr.push(`${pn(opp1)} is a blocker — priority target`); }
          }
          if (opponentStyles[opp2] && opponentStyles[opp2].observations >= 3) {
            const bf2 = opponentStyles[opp2].metrics.blockingFocus;
            if (bf2 > 0.6 && knowledge.cantHave[opp2].has(newEnd)) { ss += 5; sr.push(`${pn(opp2)} is a blocker — priority target`); }

          if (opponentStyles[partner] && opponentStyles[partner].observations >= 3) {

            if (partnerAgg > 0.6) {

              if (knowledge.cantHave[opp1].has(newEnd) || knowledge.cantHave[opp2].has(newEnd)) {

          // If partner opened with suit X, opening that end is likely good
          if (knowledge.openingSuits[partner] !== null) {
            const partnerSuit = knowledge.openingSuits[partner];

          for (const opp of [opp1, opp2]) {

          // Discount: remaining tiles with that number minus tiles WE hold with it

          for (const endNum of endNums) {

              const remaining = knowledge.remainingWithNumber(endNum);

              for (const x of tilesByNum[endNum]) { if (x.id !== tile.id) weHold++; }
              const tileHasEnd = (tile.left === endNum || tile.right === endNum) ? 1 : 0;
              const unknownWithEnd = Math.max(0, remaining - weHold - tileHasEnd);
              const tUnk = 28 - knowledge.played.size - hand.length;
              const othersCouldHave = tUnk > 4 ? Math.round(unknownWithEnd * (tUnk - 4) / tUnk) : 0;
              if (othersCouldHave > 0 && !knowledge.cantHave[partner].has(endNum)) {

              }
            }

          if (pAff > 0) { ss += pAff * 8; sr.push(`Partner played ${partnerDetails.join(' & ')} — may have more`); }

          // Partner forward modeling — can partner respond on new board ends?
          const partnerVoidNew = knowledge.cantHave[partner].has(newEnd);
          const partnerVoidOther = knowledge.cantHave[partner].has(otherEnd);
          if (partnerVoidNew && partnerVoidOther) {

            myIds.add(tile.id);
            let pTilesNew = 0, pTilesOther = 0;
            for (const pt of ALL_TILES) {
              if (knowledge.played.has(pt.id) || myIds.has(pt.id)) continue;
              if (knowledge.cantHave[partner].has(pt.left) || knowledge.cantHave[partner].has(pt.right)) continue;
              if (pt.left === newEnd || pt.right === newEnd) pTilesNew++;
              if (pt.left === otherEnd || pt.right === otherEnd) pTilesOther++;
            }
            if (pTilesNew >= 3 && pTilesOther >= 3) {
              ss += 8; sr.push('Partner has good coverage on both ends');
            } else if (pTilesNew === 0 && !partnerVoidNew) {
              ss -= 8; sr.push(`Few tiles left with ${newEnd} for partner`);
            }
          }

          // Pip weight — prefer playing heavier tiles, scaled by game phase
          // Opening (deadMul=0.4): suit control matters more than pip dumping
          // Endgame (deadMul=1.4): pip dumping critical for block outcomes
          const tilePips = tile.left + tile.right;
          ss += Math.round(tilePips * 2 * deadMul);
          if (tilePips >= 9) sr.push(`Dump heavy tile (${tilePips} pips)`);
          else if (tilePips >= 6) sr.push(`Sheds ${tilePips} pips`);

          // Play doubles early
          if (tile.left === tile.right) { ss += 12; sr.push('Clear inflexible double'); }

          // Isolated double setup
          for (const h of hand) {

            for (const x of tilesByNum[h.left]) { if (x.id !== h.id && x.id !== tile.id) sup++; }
            if (sup === 0 && (newEnd === h.left || otherEnd === h.left)) { ss += 20; sr.push(`Sets up isolated [${h.left}|${h.left}]`); }

          // Then adjust for 4 unknown removed tiles using expected value.
          const remNew = knowledge.remainingWithNumber(newEnd);
          let weHoldNew = 0;
          for (const x of tilesByNum[newEnd]) { if (x.id !== tile.id) weHoldNew++; }
          const unknownWithNew = Math.max(0, remNew - weHoldNew - 1); // -1 for tile being played
          const totalUnknown = 28 - knowledge.played.size - hand.length;
          const oppCouldHaveNew = totalUnknown > 4 ? Math.round(unknownWithNew * (totalUnknown - 4) / totalUnknown) : 0;
          // Gradient: 0 opponents tiles = +12, 1 = +6, 2 = 0, 3 = -6, 4+ = -12
          const boardCountScore = (2 - oppCouldHaveNew) * AI_WEIGHTS.boardCountGradient;
          ss += boardCountScore;
          if (oppCouldHaveNew <= 1) sr.push(`${newEnd}s nearly exhausted (${oppCouldHaveNew} out)`);
          else if (oppCouldHaveNew >= 4) sr.push(`${newEnd}s heavy — ${oppCouldHaveNew} still out for opponents`);

          // Dead number detection — compute POST-PLAY remaining counts
          // The tile we're playing has newEnd; it may also have otherEnd
          const remNewAfterPlay = knowledge.remainingWithNumber(newEnd) - 1;
          const tileHasOtherEnd = (tile.left === otherEnd || tile.right === otherEnd) ? 1 : 0;
          const remOtherAfterPlay = knowledge.remainingWithNumber(otherEnd) - tileHasOtherEnd;
          const deadNew = remNewAfterPlay === 0;
          const deadOther = remOtherAfterPlay === 0;
          if (deadNew && !deadOther) {
            // newEnd is dead — nobody can play there, board reduces to single active end
            ss -= Math.round(AI_WEIGHTS.deadEndPenalty * deadMul); sr.push(`Dead end — all ${newEnd}s played, board stalls`);
          } else if (!deadNew && deadOther && newEnd !== otherEnd) {
            // otherEnd already dead but newEnd is alive — no penalty for this move
            // (dead other end is inherited, not caused by this move)
          } else if (deadNew && deadOther) {
            // Both ends dead — game WILL lock. Evaluate pip advantage.
            // Use actual average of unseen tiles instead of fixed 5 pips
            const myPipsLock = hand.reduce((s, h) => s + (h.id === tile.id ? 0 : h.left + h.right), 0);
            const myIdsLock = new Set(hand.map(h => h.id));
            let unseenPipLock = 0, unseenCntLock = 0;
            for (const t of ALL_TILES) {
              if (knowledge.played.has(t.id) || myIdsLock.has(t.id)) continue;
              unseenPipLock += t.left + t.right;
              unseenCntLock++;
            }
            const avgPipLock = unseenCntLock > 0 ? unseenPipLock / unseenCntLock : 5;
            const estPartPips = Math.round(Math.max(0, 6 - knowledge.playsBy[partner].length) * avgPipLock);
            const estOpp1T = Math.max(0, 6 - knowledge.playsBy[opp1].length);
            const estOpp2T = Math.max(0, 6 - knowledge.playsBy[opp2].length);
            const estOppPips = Math.round((estOpp1T + estOpp2T) * avgPipLock);
            const myTeamBest = Math.min(myPipsLock, estPartPips);
            const oppTeamBest = Math.min(Math.round(estOpp1T * avgPipLock), Math.round(estOpp2T * avgPipLock));
            if (myTeamBest <= oppTeamBest - 2) {
              ss += Math.round(AI_WEIGHTS.lockFavorable * deadMul); sr.push(`Deliberate lock — we win on pips (${myPipsLock} vs ~${estOppPips})`);
            } else {
              ss -= Math.round(AI_WEIGHTS.lockUnfavorable * deadMul); sr.push(`Both ends dead (${newEnd}, ${otherEnd}) — game locks, pips unfavorable`);
            }
          }
          // Chicote detection: after our play, exactly 1 tile with newEnd remains — who holds it?
          if (!deadNew && remNewAfterPlay === 1 && newEnd !== otherEnd) {
            const chic = knowledge.chicoteFor(newEnd, hand);
            if (chic && chic.holder === 'self') {
              // WE hold the chicote — creating this end is POWERFUL
              ss += Math.round(AI_WEIGHTS.chicoteSelf * deadMul); sr.push(`We hold chicote for ${newEnd} — can kill this end at will`);
              // Extra: if opponents void on other end, lock threat
              if (knowledge.cantHave[opp1].has(otherEnd) || knowledge.cantHave[opp2].has(otherEnd)) {
                ss += 12; sr.push(`Chicote + opponent void on ${otherEnd} — lock threat`);
              }
            } else if (chic && chic.holder === partner) {
              // Partner confirmed holds chicote — they control it
              ss += Math.round(AI_WEIGHTS.chicotePartner * deadMul); sr.push(`Partner holds chicote for ${newEnd} — they control the kill`);
            } else if (chic && typeof chic.holder === 'number' && chic.holder !== partner) {
              // Opponent confirmed holds chicote — avoid this end
              ss -= Math.round(AI_WEIGHTS.chicoteOpponent * deadMul); sr.push(`Opponent holds chicote for ${newEnd} — they'll kill it`);
            } else if (chic && chic.holder === 'dorme') {
              // Chicote is in the removed tiles — end will die naturally
              ss -= AI_WEIGHTS.chicoteDorme; sr.push(`Chicote for ${newEnd} is in dorme — end will die`);
            } else if (chic && chic.holder === 'unknown') {
              // Uncertain — penalize proportional to opponent probability
              const oppCount = chic.candidates.filter(c => c !== partner && c !== player).length;
              const oppProb = oppCount / Math.max(chic.candidates.length, 1);
              ss -= Math.round(15 * oppProb);
              sr.push(`Near-dead ${newEnd} — chicote ${Math.round(oppProb*100)}% with opponent`);
            } else {
              ss -= 12; sr.push(`Near-dead — only 1 tile with ${newEnd} remains (not ours)`);
            }
          }

          // Probabilistic dead: all opponents void on this end (remaining tiles in dorme/our hand only)
          if (!deadNew && remNewAfterPlay > 0 && knowledge.isProbablyDead(newEnd, player)) {
            let myEndTiles = 0;
            for (const h of hand) {
              if (h.id === tile.id) continue;
              if (h.left === newEnd || h.right === newEnd) myEndTiles++;
            }
            if (myEndTiles > 0) {
              ss += Math.round(AI_WEIGHTS.captiveEndBonus * deadMul); sr.push(`Captive ${newEnd}-end — only we can play (${myEndTiles} in hand)`);
            } else {
              ss -= Math.round(AI_WEIGHTS.probDeadPenalty * deadMul); sr.push(`Prob-dead ${newEnd}-end — all tiles likely in dorme`);
            }
          }

          // Trancar (lock) risk/reward — if both ends are nearly dead, evaluate block outcome
          const remNewT = knowledge.remainingWithNumber(newEnd);
          const remOtherT = knowledge.remainingWithNumber(otherEnd);
          if (remNewT + remOtherT <= 3 && bLen >= 8 && hand.length >= 2) {
            // Board is heading toward a lock — who wins on pips?
            const myPips = hand.reduce((s, h) => s + (h.id === tile.id ? 0 : h.left + h.right), 0);
            // Better pip estimate: compute average pips of unseen tiles (excl. our hand)
            const myIds = new Set(hand.map(h => h.id));
            let unseenPipSum = 0, unseenCount = 0;
            for (const t of ALL_TILES) {
              if (knowledge.played.has(t.id) || myIds.has(t.id)) continue;
              unseenPipSum += t.left + t.right;
              unseenCount++;
            }
            const avgPipPerTile = unseenCount > 0 ? unseenPipSum / unseenCount : 5;
            const estPartnerTiles = Math.max(0, 6 - knowledge.playsBy[partner].length);
            const estOpp1Tiles = Math.max(0, 6 - knowledge.playsBy[opp1].length);
            const estOpp2Tiles = Math.max(0, 6 - knowledge.playsBy[opp2].length);
            const estOppPips = Math.round((estOpp1Tiles + estOpp2Tiles) * avgPipPerTile);
            const estPartnerPips = Math.round(estPartnerTiles * avgPipPerTile);
            const myTeamMin = Math.min(myPips, estPartnerPips);
            const oppTeamMin = Math.min(Math.round(estOpp1Tiles * avgPipPerTile), Math.round(estOpp2Tiles * avgPipPerTile));
            if (myTeamMin < oppTeamMin - 3) {
              // We'd likely win the block — locking is good
              ss += AI_WEIGHTS.lockApproachGood; sr.push(`Lock favors us — our pips ${myPips} vs opponents ~${estOppPips}`);
            } else if (myTeamMin > oppTeamMin + 5) {
              // We'd likely lose the block — avoid locking
              ss -= AI_WEIGHTS.lockApproachBad; sr.push(`Lock hurts us — our pips ${myPips} vs opponents ~${estOppPips}`);
            }
          }

          // Proactive suit exhaustion — playing this tile depletes a suit we control
          const tNums = tile.left === tile.right ? [tile.left] : [tile.left, tile.right];
          for (const n of tNums) {
            const remAfter = knowledge.remainingWithNumber(n) - 1;
            if (remAfter >= 1 && remAfter <= 3) {
              let weStillHold = 0;
              for (const h of hand) {
                if (h.id === tile.id) continue;
                if (h.left === n || h.right === n) weStillHold++;
              }
              if (weStillHold > 0 && weStillHold >= remAfter) {
                const bonus = 8 + (3 - remAfter) * 5;
                ss += bonus; sr.push(`Exhausting ${n}s — ${remAfter} left, we hold ${weStillHold}`);
              }
            }
          }

          // True monopoly: we hold ALL remaining tiles of an end number (absolute control)
          for (const endN of [newEnd, otherEnd]) {
            const remEnd = knowledge.remainingWithNumber(endN);
            if (remEnd >= 1 && remEnd <= 3) {
              let weHoldAll = 0;
              for (const h of hand) {
                if (h.id === tile.id) continue;
                if (h.left === endN || h.right === endN) weHoldAll++;
              }
              if (weHoldAll === remEnd) {
                const monoBonus = Math.round(AI_WEIGHTS.monopolyBonus * deadMul);
                ss += monoBonus; sr.push(`MONOPOLY on ${endN}s — hold ALL ${remEnd} remaining`);
              }
            }
          }

          // Near-monopoly: we hold 2+ of last 3-4 tiles of an end number (strong positional control)
          for (const endN of [newEnd, otherEnd]) {
            const remEnd = knowledge.remainingWithNumber(endN);
            if (remEnd >= 2 && remEnd <= 4) {
              let weHoldEnd = 0;
              for (const h of hand) {
                if (h.id === tile.id) continue;
                if (h.left === endN || h.right === endN) weHoldEnd++;
              }
              if (weHoldEnd >= 2 && weHoldEnd >= remEnd - 1) {
                const monoBonus = Math.round((weHoldEnd / remEnd) * 12 * deadMul);
                ss += monoBonus; sr.push(`Near-monopoly on ${endN}s (${weHoldEnd}/${remEnd} remaining)`);
              }
            }
          }

          // Information hiding — opening only
          if (bLen >= 1 && bLen <= 6 && hand.length >= 4) {
            const maxSC = Math.max(...suitCount);
            if (suitCount[newEnd] >= 3 && suitCount[newEnd] === maxSC) {
              ss -= 8; sr.push('Exposes strongest suit — opponents may target');
            } else if (suitCount[newEnd] <= 1 && newEnd !== otherEnd) {
              ss += 5; sr.push('Diversifies board — hides hand composition');
            }
          }

          // Partner close to winning — boost moves that create partner-friendly ends
          const estPHand = Math.max(0, 6 - knowledge.playsBy[partner].length);
          if (estPHand <= 2 && estPHand > 0) {
            const partStr = knowledge.inferStrength(partner);
            if (estPHand === 1) {
              // Partner has 1 tile — sacrifice to create their strong suit end
              // This is a team play: partner going out wins the round for us
              if (partStr[newEnd] >= 2) {
                ss += 25; sr.push(`Sacrifice for partner — ${newEnd} is their strong suit (1 tile left)`);
              } else if (partStr[otherEnd] >= 2) {
                ss += 10; sr.push('Partner close — their suit still on board');
              } else if (partStr[newEnd] >= 1 || partStr[otherEnd] >= 1) {
                ss += 15; sr.push('Partner close — keeping their suit on board');
              }
            } else {
              // Partner has 2 tiles
              if (partStr[newEnd] >= 1 || partStr[otherEnd] >= 1) {
                ss += 15; sr.push('Partner close — keeping their suit on board');
              }
            }
          }

          // === MATCH SCORE AWARENESS ===
          // At match point (5 pts), any win wins the match — prioritize safe plays
          // When behind, swing for high-variance plays (carroca/cruzada potential)
          const myTeam = player % 2;
          const ourScore = matchScore[myTeam], oppScore = matchScore[1 - myTeam];
          if (ourScore >= 5) {
            // At match point: boost pip dumping and safe plays, reduce risky blocking
            ss += Math.round(tilePips * 1.5); // extra pip dump weight (wins on block = match win)
            if (myCount >= 2) { ss += 8; sr.push('Match point — keep options open'); }
          } else if (oppScore >= 5 && ourScore < 4) {
            // Opponent at match point, we're behind: prefer aggressive high-impact moves
            if (tile.left === tile.right) { ss += 8; sr.push('Behind — play double for carroca potential'); }
          }

          // === POINT DENIAL ===
          // Penalize enabling opponent high-scoring finishes when they have 1 tile left
          for (const opp of [opp1, opp2]) {
            const estOppHand = Math.max(0, 6 - knowledge.playsBy[opp].length);
            if (estOppHand === 1) {
              const oppStr = knowledge.inferStrength(opp);
              for (const eN of [newEnd, otherEnd]) {
                if (oppStr[eN] >= 2) {
                  const wasThere = (eN === lE || eN === rE);
                  if (!wasThere) {
                    const isDouble = tile.left === tile.right;
                    const penalty = isDouble ? -15 : -8;
                    ss += penalty;
                    sr.push(`Danger: feeds ${pn(opp)} (1 tile, wants ${eN}s)${isDouble ? ' — cruzada risk!' : ''}`);
                  }
                }
              }
            }
          }

          // === CLOSING BONUS ===
          // Instant win: playing this tile empties our hand
          const remainAfter = hand.length - 1;
          if (remainAfter === 0) {
            // We go out immediately! Massive bonus.
            const w = scoreWin(tile, lE, rE, bLen + 1);
            ss += 200 + w.pts * 30;
            sr.push(`GO OUT! Win ${w.pts}pt${w.pts > 1 ? ' (' + w.type.toLowerCase() + ')' : ''}`);
          }
          // Near-close: playing this tile leaves 1 tile, check if it can play on new ends
          else if (remainAfter === 1) {
            const lastTile = hand.find(t => t.id !== tile.id);
            if (lastTile) {
              const canPlayLast = (lastTile.left === newEnd || lastTile.right === newEnd ||
                                   lastTile.left === otherEnd || lastTile.right === otherEnd);
              if (canPlayLast) {
                ss += 80; sr.push(`Sets up going out next turn with [${lastTile.left}|${lastTile.right}]`);
              } else {
                // Check if ALL playable tiles would strand the last one (not actionable if so)
                const allStrand = hand.filter(t => t.id !== tile.id).length === 1 && (() => {
                  const ot = lastTile; // the other tile (which would be played instead)
                  const otherPlayable = (ot.left === lE || ot.right === lE || ot.left === rE || ot.right === rE);
                  if (!otherPlayable) return false; // other tile can't even be played, so not comparable
                  // If we played the other tile instead, would THIS tile be stranded too?
                  for (const oSide of ['left', 'right']) {
                    const oEnd = oSide === 'left' ? lE : rE;
                    if (ot.left !== oEnd && ot.right !== oEnd) continue;
                    const oNewEnd = (ot.left === oEnd) ? ot.right : ot.left;
                    const oOtherEnd = oSide === 'left' ? rE : lE;
                    if (tile.left === oNewEnd || tile.right === oNewEnd || tile.left === oOtherEnd || tile.right === oOtherEnd) return false;
                  }
                  return true; // both choices strand — not a differentiator
                })();
                ss -= 30;
                if (!allStrand) sr.push(`STRANDS last tile [${lastTile.left}|${lastTile.right}] — can't play on ${newEnd}/${otherEnd}`);
              }
            }
          }
          // 2 tiles remaining: check coverage of new ends
          else if (remainAfter === 2) {
            const others = hand.filter(t => t.id !== tile.id);
            const coverCount = others.filter(t =>
              t.left === newEnd || t.right === newEnd || t.left === otherEnd || t.right === otherEnd
            ).length;
            if (coverCount === 2) { ss += 25; sr.push('Both remaining tiles playable on new ends'); }
            else if (coverCount === 0) { ss -= 15; sr.push('Neither remaining tile matches new ends'); }
          }

          options.push({ tile, score: ss, reasons: sr, side });
        }
        return options;
      });

      scored.sort((a, b) => b.score - a.score);

      // Two-ply lookahead: in endgame (≤3 tiles), simulate opponent best response
      // Penalize moves where opponent can go out or gain significant advantage
      if (hand.length <= 3 && scored.length >= 2 && bLen >= 10) {
        for (const opt of scored) {
          const { tile: oTile, side: oSide } = opt;
          let oppNewEnd;
          if (oSide === 'left') oppNewEnd = oTile.left === lE ? oTile.right : oTile.left;
          else oppNewEnd = oTile.right === rE ? oTile.left : oTile.right;
          const oppOtherEnd = oSide === 'left' ? rE : lE;

          // Check if opponent (opp1, next player) can go out
          const oppPossible = knowledge.possibleTilesFor(opp1);
          const estOpp1Hand = Math.max(0, 6 - knowledge.playsBy[opp1].length);
          if (estOpp1Hand === 1) {
            // Opponent has 1 tile — can they play it on the new board?
            const oppCanGo = oppPossible.some(t =>
              t.left === oppNewEnd || t.right === oppNewEnd || t.left === oppOtherEnd || t.right === oppOtherEnd
            );
            if (oppCanGo) {
              opt.score -= 25;
              opt.reasons.push(`Opponent may go out next (1 tile left)`);
            }
          } else if (estOpp1Hand === 2) {
            // Opponent has 2 tiles — check if new ends feed them
            const oppPlayable = oppPossible.filter(t =>
              t.left === oppNewEnd || t.right === oppNewEnd || t.left === oppOtherEnd || t.right === oppOtherEnd
            ).length;
            if (oppPlayable >= 2) {
              opt.score -= 10;
              opt.reasons.push('Feeds opponent — both their tiles playable on new ends');
            }
          }
        }
        // Re-sort after two-ply adjustments
        scored.sort((a, b) => b.score - a.score);
      }

      if (returnAll) return scored;
      return scored[0] || null;
    }

    // ========== DIFFICULTY-BASED MOVE SELECTION ==========
    function selectMoveByDifficulty(allOptions, difficulty) {
      if (!allOptions || allOptions.length === 0) return null;
      if (allOptions.length === 1) return allOptions[0];
      if (difficulty >= 1.0) return allOptions[0]; // expert: always best

      // Softmax with temperature: lower difficulty = higher temperature = more random
      const temperature = Math.max(0.05, (1 - difficulty) * 2.5);
      const maxScore = allOptions[0].score;
      const weights = allOptions.map(o => Math.exp((o.score - maxScore) / (temperature * 25 + 1)));
      const totalWeight = weights.reduce((s, w) => s + w, 0);

      let r = getRng().random() * totalWeight;
      for (let i = 0; i < weights.length; i++) {
        r -= weights[i];
        if (r <= 0) return allOptions[i];
      }
      return allOptions[allOptions.length - 1];
    }

    function getDifficultyForPlayer(player) {
      if (player === 0) return 1.0;
      if (player === 2) return playDifficulty.partner;
      return playDifficulty.opponents;
    }

    // Hand strength evaluation
    function evaluateHandStrength(hand, lE, rE, bLen, player, knowledge) {
      const metrics = {};
      // Suit depth
      const sc = [0,0,0,0,0,0,0];
      for (const t of hand) { sc[t.left]++; if (t.left !== t.right) sc[t.right]++; }
      const maxSuit = Math.max(...sc);
      metrics.suitDepth = { value: maxSuit, label: `Deepest suit: ${maxSuit}`, good: maxSuit >= 4 };

      // Doubles
      const doubles = hand.filter(t => t.left === t.right);
      const isoDoubles = doubles.filter(d => {
        return hand.filter(x => x.id !== d.id && (x.left === d.left || x.right === d.left)).length === 0;
      });
      metrics.doubles = { value: doubles.length, label: `${doubles.length} doubles (${isoDoubles.length} isolated)`, good: doubles.length <= 2 && isoDoubles.length === 0 };

      // Playable now
      const playable = bLen > 0 ? hand.filter(t => canPlay(t, lE, rE, bLen)).length : hand.length;
      metrics.playable = { value: playable, label: `${playable}/${hand.length} playable`, good: playable >= 2 };

      // Total pips (risk in blocked game)
      const pips = hand.reduce((s, t) => s + t.left + t.right, 0);
      metrics.pips = { value: pips, label: `${pips} pips in hand`, good: pips <= 20 };

      // Connectivity (unique numbers covered)
      const nums = new Set();
      for (const t of hand) { nums.add(t.left); nums.add(t.right); }
      metrics.coverage = { value: nums.size, label: `${nums.size}/7 numbers covered`, good: nums.size >= 5 };

      // Overall score 0-100
      let score = 0;
      score += Math.min(maxSuit, 5) * 8; // 0-40
      score += Math.max(0, 3 - doubles.length) * 5; // 0-15
      score -= isoDoubles.length * 10; // penalty
      score += playable * 5; // 0-30
      score += Math.max(0, 30 - pips) * 0.5; // 0-15
      score += nums.size * 2; // 0-14
      score = Math.max(0, Math.min(100, score));

      return { metrics, score, pips };
    }

    // ========== SIMULATION ENGINE ==========

    // Shared helpers — used by simulateFullRound, recordLivePlay, simulateFromPosition, monteCarloEval
    function scoreWin(tile, prevLE, prevRE, boardLen) {
      const isD = tile.left === tile.right;
      const wasBoth = boardLen > 1 && couldPlayBothEnds(tile, prevLE, prevRE);
      if (isD && wasBoth) return { pts: 4, type: 'CRUZADA' };
      if (isD) return { pts: 2, type: 'CARROCA' };
      if (wasBoth) return { pts: 3, type: 'LA E LO' };
      return { pts: 1, type: 'NORMAL' };
    }

    function resolveBlock(hands) {
      const hv = hands.map((h, i) => ({ player: i, team: i % 2, points: h.reduce((s, t) => s + t.left + t.right, 0) }));
      const min = Math.min(...hv.map(v => v.points));
      const winners = hv.filter(v => v.points === min);
      if (winners.length > 1 && winners.some(w => w.team === 0) && winners.some(w => w.team === 1)) {
        return { type: 'tie', points: 0, handValues: hv };
      }
      return { type: 'blocked', winner: winners[0].player, team: winners[0].team, points: 1, handValues: hv };
    }

    const MC_SIMS_GENERATE = 30; // MC sims during game generation (endgame only)

    function simulateFullRound(initHands, startPlayer, initBoard, initLeft, initRight, autoPlayer) {
      const hands = initHands.map(h => [...h]); // tiles are immutable, share refs
      let board = [...initBoard], lE = initLeft, rE = initRight;
      let cur = startPlayer, passCount = 0;
      const knowledge = new Knowledge();
      const nb = new DeductionNotebook();
      // Record auto-played opening tile with actual player for hand-size estimation
      for (const t of initBoard) {
        knowledge.recordPlay(autoPlayer != null ? autoPlayer : -1, t);
        nb.recordPlay(autoPlayer != null ? autoPlayer : -1, 0, t, null, undefined, undefined);
      }

      const snapshots = [];
      snapshots.push({
        move: 0, player: -1, action: 'start', tile: null, side: null, reasons: ['Game begins'],
        hands: hands.map(h => [...h]),
        board: [...board], leftEnd: lE, rightEnd: rE, currentPlayer: cur,
        knowledge: knowledge.clone(), notebook: nb.clone()
      });

      let moveNum = 0;
      while (moveNum < 200) {
        moveNum++;
        // Get ALL scored options for this player
        const allOptions = smartAI(hands[cur], lE, rE, board.length, cur, knowledge, true);
        let decision = allOptions.length > 0 ? allOptions[0] : null;

        // Endgame solver: when few tiles remain, use exact minimax instead of heuristic rollouts
        const _egTotal = hands[0].length + hands[1].length + hands[2].length + hands[3].length;
        if (decision && _egTotal <= ENDGAME_THRESHOLD && allOptions.length > 1) {
          const handSizes = hands.map(h => h.length);
          computeBeliefs(knowledge, handSizes, hands[cur], cur, 150);
          try {
            const egRes = endgameSolve(hands[cur], lE, rE, board.length, cur, knowledge, handSizes);
            if (egRes.length > 0) {
              const best = egRes[0];
              const matched = allOptions.find(o => o.tile.id === best.tile.id && o.side === best.side)
                           || allOptions.find(o => o.tile.id === best.tile.id);
              if (matched) {
                decision = matched;
                const egTag = `Endgame solver (exact, ME:${best.expectedPoints.toFixed(3)})`;
                if (!decision.reasons.includes(egTag)) {
                  decision.reasons = [...decision.reasons, egTag];
                }
              }
            }
          } catch(e) { console.warn(`Endgame solver failed [${seedContext()}]:`, e); }
        }
        // MC/ISMCTS-assisted play: when player has ≤4 tiles and multiple options
        else if (decision && hands[cur].length <= 4 && allOptions.length > 1) {
          const handSizes = hands.map(h => h.length);
          computeBeliefs(knowledge, handSizes, hands[cur], cur, 150);
          try {
            let searchRes;
            // Use ISMCTS when mid-game (board has 6+ tiles) and enough tiles for meaningful tree
            if (board.length >= 6 && hands[cur].length >= 2) {
              searchRes = ismctsEval(hands[cur], lE, rE, board.length, cur, knowledge, belief);
            }
            // Fallback to MC if ISMCTS didn't produce results
            if (!searchRes || searchRes.length === 0) {
              const snap = {
                hands: hands.map(h => [...h]),
                board: [...board],
                leftEnd: lE, rightEnd: rE,
                knowledge: knowledge.clone()
              };
              searchRes = monteCarloEval(snap, cur, MC_SIMS_GENERATE);
            }
            if (searchRes.length > 0) {
              const best = searchRes[0];
              const matched = allOptions.find(o => o.tile.id === best.tile.id && o.side === best.side)
                           || allOptions.find(o => o.tile.id === best.tile.id);
              if (matched) {
                decision = matched;
                const tag = best.ismcts ? 'ISMCTS' : 'MC';
                if (!decision.reasons.includes(`${tag} override`)) {
                  decision.reasons = [...decision.reasons, `${tag} override (E[pts]:${best.expectedPoints.toFixed(2)})`];
                }
              }
            }
          } catch(e) { console.warn(`MC/ISMCTS search failed [${seedContext()}]:`, e); }
        }

        if (decision) {
          passCount = 0;
          const { tile, side: prefSide, reasons } = decision;
          let side = prefSide;
          if (board.length > 0 && !side) {
            side = (tile.left === lE || tile.right === lE) ? 'left' : 'right';
          }

          const playedTile = {...tile};
          hands[cur] = hands[cur].filter(t => t.id !== tile.id);
          knowledge.recordPlay(cur, tile);
          nb.recordPlay(cur, moveNum, tile, side, lE, rE);
          // Update opponent style model
          if (opponentStyles[cur]) {
            opponentStyles[cur].update(tile, { bLen: board.length, lE, rE, knowledge, player: cur });
          }
          // Continuous belief updates: sync after every observed play
          if (belief && knowledge.played.size >= 4) {
            belief.syncFromKnowledge(knowledge);
          }

          const pL = lE, pR = rE;

          if (board.length === 0) {
            board = [playedTile]; lE = tile.left; rE = tile.right;
          } else {
            let placed = {...tile};
            if (side === 'left') {
              if (tile.left === lE) placed = {left: tile.right, right: tile.left, id: tile.id};
              board.unshift(placed); lE = placed.left;
            } else {
              if (tile.right === rE) placed = {left: tile.right, right: tile.left, id: tile.id};
              board.push(placed); rE = placed.right;
            }
          }

          let outcome = null;
          if (hands[cur].length === 0) {
            const w = scoreWin(tile, pL, pR, board.length);
            outcome = { type: 'win', winner: cur, team: cur % 2, points: w.pts, winType: w.type };
          }

          snapshots.push({
            move: moveNum, player: cur, action: 'play', tile: playedTile, side: side || 'first',
            reasons, score: decision.score,
            allOptions: allOptions.map(o => ({ tile: {...o.tile}, score: o.score, side: o.side, reasons: [...o.reasons] })),
            hands: hands.map(h => [...h]),
            board: [...board], leftEnd: lE, rightEnd: rE,
            currentPlayer: outcome ? -1 : (cur + 1) % 4,
            knowledge: knowledge.clone(), notebook: nb.clone(),
            outcome
          });

          if (outcome) return { snapshots, outcome };
          cur = (cur + 1) % 4;

        } else {
          passCount++;
          knowledge.recordPass(cur, lE, rE);
          nb.recordPass(cur, moveNum, lE, rE);
          // Continuous belief updates: sync after pass (strong signal)
          if (belief && knowledge.played.size >= 4) {
            belief.syncFromKnowledge(knowledge);
          }

          let outcome = null;
          if (passCount >= 4) {
            outcome = resolveBlock(hands);
          }

          snapshots.push({
            move: moveNum, player: cur, action: 'pass', tile: null, side: null,
            reasons: [`No tiles matching ${lE} or ${rE}`, `Known dead: {${knowledge.deadNumbers(cur).join(', ')}}`],
            allOptions: [],
            hands: hands.map(h => [...h]),
            board: [...board], leftEnd: lE, rightEnd: rE,
            currentPlayer: outcome ? -1 : (cur + 1) % 4,
            knowledge: knowledge.clone(), notebook: nb.clone(),
            outcome
          });

          if (outcome) return { snapshots, outcome };
          cur = (cur + 1) % 4;
        }
      }
      return { snapshots, outcome: { type: 'abort' } };
    }

    // Pick best opening tile when player has free choice (no highest-double rule)
    function pickOpeningTile(hand) {
      // Count suit depth for each number
      const suitCount = {};
      for (let n = 0; n <= 6; n++) suitCount[n] = hand.filter(t => t.left === n || t.right === n).length;

      // Score each tile: prefer doubles, deep suits, high pips
      return hand.slice().sort((a, b) => {
        const aIsD = a.left === a.right ? 1 : 0;
        const bIsD = b.left === b.right ? 1 : 0;
        if (bIsD !== aIsD) return bIsD - aIsD; // doubles first
        const aDepth = Math.max(suitCount[a.left], suitCount[a.right]);
        const bDepth = Math.max(suitCount[b.left], suitCount[b.right]);
        if (bDepth !== aDepth) return bDepth - aDepth; // deepest suit
        return (b.left + b.right) - (a.left + a.right); // highest pips
      })[0];
    }

    function generateGame(forcedStarter = null, freeChoice = false, predealtHands = null) {
      let hands;
      if (predealtHands) {
        hands = predealtHands.map(h => h.map(t => ({...t})));
      } else {
        const deck = shuffleDeck(ALL_TILES);
        hands = [[],[],[],[]];
        for (let i = 0; i < 24; i++) hands[i%4].push(deck[i]);
      }

      let hp, ht;
      if (forcedStarter !== null && freeChoice) {
        // Winning team chose this player — free choice of opening tile
        hp = forcedStarter;
        ht = pickOpeningTile(hands[hp]);
      } else {
        // First game of match OR dobrada: highest double across all players
        let hd = -1;
        hp = 0; ht = null;
        for (let p = 0; p < 4; p++)
          for (const t of hands[p])
            if (t.left === t.right && t.left > hd) { hd = t.left; hp = p; ht = t; }
        // Edge case: all 7 doubles in the 4 discarded tiles (~0.17% chance)
        if (!ht) { hp = 0; ht = pickOpeningTile(hands[0]); }
      }

      const autoTile = {...ht};
      hands[hp] = hands[hp].filter(t => t.id !== ht.id);
      const starter = (hp + 1) % 4;

      return {
        originalHands: hands.map(h => [...h]),
        autoPlayedBy: hp,
        autoTile,
        ...simulateFullRound(hands, starter, [autoTile], autoTile.left, autoTile.right, hp)
      };
    }

    // ========== LIVE PLAY ENGINE ==========

    function startPlayGame(predealtHands = null, forcedStarter = null, freeChoice = false) {
      stopPlayAI();
      playWaiting = false;
      playSidePick = null;
      playHint = null;
      playLastMove = null;
      playOpeningPending = null;
      playStarterPending = false;
      playMatchWinner = null;
      coachMessages = [];
      stopCoachMC();
      mcResults = null;
      quizWaiting = false;
      quizResult = null;
      quizShowingResult = false;
      puzzleMode = false;
      puzzleDef = null;

      newSeed();
      belief = new BeliefModel();

      // Deal hands (Pernambuco rule: 24 tiles dealt, 4 removed from game)
      if (predealtHands) {
        liveHands = predealtHands.map(h => h.map(t => ({ ...t })));
      } else {
        const deck = shuffleDeck(ALL_TILES);
        liveHands = [[], [], [], []];
        for (let i = 0; i < 24; i++) liveHands[i % 4].push(deck[i]);
      }

      // --- Determine who opens and how ---
      if (lastWinTeam !== null && !freeChoice) {
        // Subsequent game: winning team chooses who opens
        if (lastWinTeam === 0) {
          // Our team won — ask user if they want to open or pass to partner
          playStarterPending = true;
          liveBoard = [];
          liveLeftEnd = null;
          liveRightEnd = null;
          liveCurrentPlayer = -1;
          livePassCount = 0;
          liveMoveNum = 0;
          liveKnowledge = new Knowledge();
          liveNotebook = new DeductionNotebook();
          currentGame = {
            originalHands: liveHands.map(h => [...h]),
            snapshots: [{
              move: 0, player: -1, action: 'deal', tile: null, side: null,
              reasons: ['Choose who opens'], allOptions: [],
              hands: liveHands.map(h => [...h]),
              board: [], leftEnd: null, rightEnd: null,
              currentPlayer: -1,
              knowledge: liveKnowledge.clone(), notebook: liveNotebook.clone()
            }],
            outcome: null
          };
          currentStep = 0;
          gameMode = 'play';
          render();
          return;
        } else {
          // Opponent team won — AI picks opener (P1 or P3)
          forcedStarter = solverRng.random() < 0.5 ? 1 : 3;
          freeChoice = true;
        }
      }

      if (freeChoice && forcedStarter !== null) {
        // Free opening: starter plays any tile (AI picks best, P0 picks manually)
        if (forcedStarter === 0) {
          // P0 opens with free choice — set as their turn with empty board
          initLiveGameState(null, null, forcedStarter);
          gameMode = 'play';
          stats.games++;
          saveStats();
          playWaiting = true;
          render();
          return;
        } else {
          // AI opens with free choice
          const opener = forcedStarter;
          const tile = pickOpeningTile(liveHands[opener]);
          initLiveGameState(tile, opener, null);
          gameMode = 'play';
          stats.games++;
          saveStats();
          render();
          scheduleNextMove();
          return;
        }
      }

      // First game of match / dobrada: highest double across all players
      let hp = -1, ht = null, hd = -1;
      for (let p = 0; p < 4; p++)
        for (const t of liveHands[p])
          if (t.left === t.right && t.left > hd) { hd = t.left; hp = p; ht = t; }

      if (hp < 0) { // no doubles — redeal
        startPlayGame();
        return;
      }

      initLiveGameState(ht, hp, null);
      gameMode = 'play';
      stats.games++;
      saveStats();

      render();
      // If P0 opened, show confirmation overlay before AI starts
      if (hp === 0) {
        playOpeningPending = { tile: currentGame.autoTile };
        render();
      } else {
        scheduleNextMove();
      }
    }

    // Initialize live game state with an opening tile already played
    function initLiveGameState(openTile, opener, firstPlayer) {
      livePassCount = 0;
      liveMoveNum = 0;
      liveKnowledge = new Knowledge();
      liveNotebook = new DeductionNotebook();

      if (openTile && opener !== null) {
        const autoTile = { ...openTile };
        liveHands[opener] = liveHands[opener].filter(t => t.id !== openTile.id);
        liveBoard = [autoTile];
        liveLeftEnd = autoTile.left;
        liveRightEnd = autoTile.right;
        liveCurrentPlayer = (opener + 1) % 4;
        liveKnowledge.recordPlay(opener, autoTile);
        liveNotebook.recordPlay(opener, 0, autoTile, null, undefined, undefined);
        currentGame = {
          originalHands: liveHands.map(h => [...h]),
          autoPlayedBy: opener,
          autoTile,
          snapshots: [{
            move: 0, player: -1, action: 'start', tile: null, side: null,
            reasons: ['Game begins'],
            hands: liveHands.map(h => [...h]),
            board: [...liveBoard],
            leftEnd: liveLeftEnd, rightEnd: liveRightEnd,

    window.exportSnapshots = function(numGames = 100, startSeed = 1) {
      const lines = [];
      let totalSnaps = 0;

      for (let g = 0; g < numGames; g++) {
        const seed = startSeed + g * 7919;
        const rng = new SplitMix64(seed);
        const deck = [...ALL_TILES];
        rng.shuffle(deck);
        const hands = [deck.slice(0, 6), deck.slice(6, 12), deck.slice(12, 18), deck.slice(18, 24)];

        // Find highest double for opener
        let hp = -1, ht = null, hd = -1;
        for (let p = 0; p < 4; p++)
          for (const t of hands[p])
            if (t.left === t.right && t.left > hd) { hd = t.left; hp = p; ht = t; }
        if (!ht) continue;

        hands[hp] = hands[hp].filter(t => t.id !== ht.id);
        let lE = ht.left, rE = ht.right, bLen = 1;
        const knowledge = new Knowledge();
        knowledge.recordPlay(hp, ht);
        const played = new Set([TILE_INDEX[ht.id]]);

        // Track plays_by as tile indices per player
        const playsBy = { 0: [], 1: [], 2: [], 3: [] };
        playsBy[hp].push(TILE_INDEX[ht.id]);

        let cur = (hp + 1) % 4, passCount = 0;

        for (let move = 0; move < 200; move++) {
          // Capture snapshot BEFORE the decision
          const snap = {
            version: 1,
            game_seed: seed,
            move_num: move,
            player: cur,
            hand: hands[cur].map(t => TILE_INDEX[t.id]).sort((a, b) => a - b),
            played: [...played].sort((a, b) => a - b),
            left_end: lE,
            right_end: rE,
            board_length: bLen,
            cant_have: {},
            plays_by: {},
            match_score: [0, 0],
            score_multiplier: 1
          };

          // Populate cant_have from knowledge
          for (let p = 0; p < 4; p++) {
            snap.cant_have[p] = [...knowledge.cantHave[p]].sort((a, b) => a - b);
          }
          // Populate plays_by
          for (let p = 0; p < 4; p++) {
            snap.plays_by[p] = [...playsBy[p]];
          }

          lines.push(JSON.stringify(snap));
          totalSnaps++;

          // Make the decision
          const allOpts = smartAI(hands[cur], lE, rE, bLen, cur, knowledge, true);
          const decision = allOpts.length > 0 ? allOpts[0] : null;

          if (decision) {
            passCount = 0;
            const { tile, side: prefSide } = decision;
            let side = prefSide;
            if (bLen > 0 && !side) side = (tile.left === lE || tile.right === lE) ? 'left' : 'right';
            hands[cur] = hands[cur].filter(t => t.id !== tile.id);
            knowledge.recordPlay(cur, tile);
            const tIdx = TILE_INDEX[tile.id];
            played.add(tIdx);
            playsBy[cur].push(tIdx);
            if (bLen === 0) { lE = tile.left; rE = tile.right; }
            else if (side === 'left') { lE = tile.left === lE ? tile.right : tile.left; }
            else { rE = tile.right === rE ? tile.left : tile.right; }
            bLen++;
            if (hands[cur].length === 0) break;
            cur = (cur + 1) % 4;
          } else {
            passCount++;
            knowledge.recordPass(cur, lE, rE);
            if (passCount >= 4) break;
            cur = (cur + 1) % 4;
          }
        }

        if ((g + 1) % 10 === 0) {
          console.log(`  exported ${g + 1}/${numGames} games (${totalSnaps} snapshots)`);
        }
      }

      const jsonl = lines.join('\n');
      console.log(`Done: ${totalSnaps} snapshots from ${numGames} games`);

      // Copy to clipboard if available
      if (navigator.clipboard) {
        navigator.clipboard.writeText(jsonl).then(
          () => console.log('Copied to clipboard. Paste into a .jsonl file.'),
          () => console.log('Clipboard copy failed. Use return value instead.')

        const a = document.createElement('a');
        a.href = url;

        a.click();
        URL.revokeObjectURL(url);
        console.log('Download triggered.');
      } catch(e) {}

      return jsonl;
    };

    // ========== STANDALONE ΔME FUNCTION ==========
    // Pure function — does NOT read globals. Matches Python delta_me() exactly.
    // winnerTeam: 0 or 1, points: base points (1-4 before multiplier),
    // myTeam: perspective, myScore/oppScore: BEFORE game, multiplier: dobrada level
    function deltaMe(winnerTeam, points, myTeam, myScore, oppScore, multiplier) {
      if (winnerTeam < 0) return 0; // tie
      const dob = DOB_VALUES.includes(multiplier) ? multiplier : 1;
      const currentME = getMatchEquity3D(myScore, oppScore, dob);
      const pts = points * dob;
      let newME;
      if (winnerTeam === myTeam) {
        newME = getMatchEquity3D(Math.min(myScore + pts, MATCH_TARGET + 4), oppScore, 1);
      } else {
        newME = getMatchEquity3D(myScore, Math.min(oppScore + pts, MATCH_TARGET + 4), 1);
      }
      return newME - currentME;
    }
    window.deltaMe = deltaMe;

    // at every decision point. Policy is derived from smartAI scores via softmax.
    //
    // Console: exportTrainingData(50)        — 50 matches
    // Console: exportTrainingData(50, 1, 2)  — 50 matches, startSeed=1, temperature=2
    //
    // Output JSONL format per line:
    //   { snapshot: {...}, policy_57: [...], v_target: float, game_result: {...} }

    window.exportTrainingData = function(numMatches = 50, startSeed = 1, temperature = 2.0) {
      const allData = [];  // [{snapshot, policy_57, v_target, game_result}]
      let totalSnaps = 0, totalGames = 0;

      for (let m = 0; m < numMatches; m++) {
        const matchSeed = startSeed + m * 100003;
        let mScores = [0, 0];  // match scores [team0, team1]
        let mMultiplier = 1;   // dobrada level
        let gameIdx = 0;

        while (mScores[0] < MATCH_TARGET && mScores[1] < MATCH_TARGET && gameIdx < 20) {
          const gameSeed = matchSeed + gameIdx * 7919;
          const rng = new SplitMix64(gameSeed);
          const deck = [...ALL_TILES];
          rng.shuffle(deck);
          const hands = [deck.slice(0, 6), deck.slice(6, 12), deck.slice(12, 18), deck.slice(18, 24)];

          // Find highest double for opener
          let hp = -1, ht = null, hd = -1;
          for (let p = 0; p < 4; p++)
            for (const t of hands[p])
              if (t.left === t.right && t.left > hd) { hd = t.left; hp = p; ht = t; }
          if (!ht) { gameIdx++; continue; }

          // Capture match state BEFORE this game (for ΔME)
          const scoresBefore = [...mScores];
          const multiplierBefore = mMultiplier;

          // Auto-play opener's highest double
          hands[hp] = hands[hp].filter(t => t.id !== ht.id);
          let lE = ht.left, rE = ht.right, bLen = 1;
          const knowledge = new Knowledge();
          knowledge.recordPlay(hp, ht);
          const played = new Set([TILE_INDEX[ht.id]]);
          const playsBy = { 0: [], 1: [], 2: [], 3: [] };
          playsBy[hp].push(TILE_INDEX[ht.id]);

          let cur = (hp + 1) % 4, passCount = 0;
          const gameHistory = []; // steps in this game

          for (let move = 0; move < 200; move++) {
            // Build canonical snapshot
            const snap = {
              version: 1, game_seed: gameSeed, move_num: move,
              player: cur,
              hand: hands[cur].map(t => TILE_INDEX[t.id]).sort((a, b) => a - b),
              played: [...played].sort((a, b) => a - b),
              left_end: lE, right_end: rE, board_length: bLen,
              cant_have: {}, plays_by: {},
              match_score: [...scoresBefore],
              score_multiplier: multiplierBefore
            };
            for (let p = 0; p < 4; p++) {
              snap.cant_have[p] = [...knowledge.cantHave[p]].sort((a, b) => a - b);
              snap.plays_by[p] = [...playsBy[p]];
            }

            // Get smartAI decision + full scored list for policy
            const allOpts = smartAI(hands[cur], lE, rE, bLen, cur, knowledge, true);

            // Build 57-dim policy from smartAI scores via softmax
            const policy57 = new Float32Array(57);
            if (allOpts.length === 0) {
              // Pass
              policy57[56] = 1.0;
            } else {
              // Map each option to action index
              const actionScores = [];
              for (const opt of allOpts) {
                const tIdx = TILE_INDEX[opt.tile.id];
                if (bLen === 0) {
                  actionScores.push({ idx: tIdx, score: opt.score });
                } else {
                  const side = opt.side;
                  if (side === 'left') {
                    actionScores.push({ idx: tIdx, score: opt.score });
                  } else if (side === 'right') {
                    actionScores.push({ idx: 28 + tIdx, score: opt.score });
                  } else {
                    // No side specified — check which ends match
                    if (opt.tile.left === lE || opt.tile.right === lE)
                      actionScores.push({ idx: tIdx, score: opt.score });
                    if (opt.tile.left === rE || opt.tile.right === rE)
                      actionScores.push({ idx: 28 + tIdx, score: opt.score });
                  }
                }
              }
              // Symmetry: when lE === rE, only use left slot
              if (bLen > 0 && lE === rE) {
                for (let i = actionScores.length - 1; i >= 0; i--) {
                  if (actionScores[i].idx >= 28 && actionScores[i].idx < 56) {
                    actionScores.splice(i, 1);
                  }
                }
              }
              // Softmax with temperature
              if (actionScores.length > 0) {
                const maxS = Math.max(...actionScores.map(a => a.score));
                let sumExp = 0;
                for (const a of actionScores) {
                  a.exp = Math.exp((a.score - maxS) / temperature);
                  sumExp += a.exp;
                }
                for (const a of actionScores) {
                  policy57[a.idx] = a.exp / sumExp;
                }
              }
            }

            // Record step (v_target backfilled after game ends)
            gameHistory.push({ snap, policy57: Array.from(policy57), team: cur % 2 });
            totalSnaps++;

            // Execute the decision
            const decision = allOpts.length > 0 ? allOpts[0] : null;
            if (decision) {
              passCount = 0;
              const { tile, side: prefSide } = decision;
              let side = prefSide;
              if (bLen > 0 && !side) side = (tile.left === lE || tile.right === lE) ? 'left' : 'right';
              const prevLE = lE, prevRE = rE;
              hands[cur] = hands[cur].filter(t => t.id !== tile.id);
              knowledge.recordPlay(cur, tile);
              const tIdx = TILE_INDEX[tile.id];
              played.add(tIdx);
              playsBy[cur].push(tIdx);
              if (bLen === 0) { lE = tile.left; rE = tile.right; }
              else if (side === 'left') { lE = tile.left === lE ? tile.right : tile.left; }
              else { rE = tile.right === rE ? tile.left : tile.right; }
              bLen++;

              if (hands[cur].length === 0) {
                // Player went out — score the win
                const w = scoreWin(tile, prevLE, prevRE, bLen - 1);
                const winnerTeam = cur % 2;
                const basePts = w.pts;

                // Backfill ΔME for all steps in this game
                for (const step of gameHistory) {
                  const v = deltaMe(winnerTeam, basePts, step.team,
                    scoresBefore[step.team], scoresBefore[1 - step.team], multiplierBefore);
                  allData.push({
                    snapshot: step.snap,
                    policy_57: step.policy57,
                    v_target: Math.round(v * 1e8) / 1e8,
                    game_result: { winner_team: winnerTeam, base_points: basePts, type: w.type }
                  });
                }

                // Update match state
                const actualPts = basePts * mMultiplier;
                mScores[winnerTeam] += actualPts;
                mMultiplier = 1;
                break;
              }
              cur = (cur + 1) % 4;
            } else {
              passCount++;
              knowledge.recordPass(cur, lE, rE);
              if (passCount >= 4) {
                // Blocked — resolve
                const block = resolveBlock(hands);
                const winnerTeam = block.team ?? -1;
                const basePts = block.points || 0;

                for (const step of gameHistory) {
                  const v = deltaMe(winnerTeam, basePts, step.team,
                    scoresBefore[step.team], scoresBefore[1 - step.team], multiplierBefore);
                  allData.push({
                    snapshot: step.snap,
                    policy_57: step.policy57,
                    v_target: Math.round(v * 1e8) / 1e8,
                    game_result: { winner_team: winnerTeam, base_points: basePts, type: block.type }
                  });
                }

                // Update match state
                if (winnerTeam >= 0) {
                  mScores[winnerTeam] += basePts * mMultiplier;
                  mMultiplier = 1;
                } else {
                  mMultiplier = Math.min(mMultiplier * 2, 8); // dobrada
                }
                break;
              }
              cur = (cur + 1) % 4;
            }
          }

          totalGames++;
          gameIdx++;
        }

        if ((m + 1) % 5 === 0) {
          console.log(`  match ${m + 1}/${numMatches}: ${totalGames} games, ${totalSnaps} snapshots`);
        }
      }

      // Export as JSONL
      const lines = allData.map(d => JSON.stringify(d));
      const jsonl = lines.join('\n');
      console.log(`Done: ${totalSnaps} snapshots from ${totalGames} games across ${numMatches} matches`);

      // Quick ΔME stats
      const vTargets = allData.map(d => d.v_target);
      const mean = vTargets.reduce((s, v) => s + v, 0) / vTargets.length;
      const min = Math.min(...vTargets);
      const max = Math.max(...vTargets);
      const absVals = vTargets.map(Math.abs);
      absVals.sort((a, b) => a - b);
      const median = absVals[Math.floor(absVals.length / 2)];
      console.log(`ΔME stats: mean=${mean.toFixed(4)}, min=${min.toFixed(4)}, max=${max.toFixed(4)}, median|ΔME|=${median.toFixed(4)}`);

      // Download
      try {
        const blob = new Blob([jsonl], { type: 'application/jsonl' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `training_${numMatches}m_${totalSnaps}s.jsonl`;
        a.click();
        URL.revokeObjectURL(url);
        console.log('Download triggered.');
      } catch(e) {}

      return allData;
    };
  </script>
</body>
